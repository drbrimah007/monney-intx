          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
            <h3 style="margin:0;">🔗 Shared With You</h3>
            <span style="font-size:12px;color:var(--muted)">${records.length} record${records.length !== 1 ? 's' : ''}</span>
          </div>`;

        if (justLinked) {
          html += `<div style="background:rgba(108,99,255,.08);border:1px solid rgba(108,99,255,.2);border-radius:8px;padding:12px 16px;margin-bottom:14px;font-size:13px;color:var(--accent);font-weight:600;">
            ✅ Record linked to your account — you can view it any time from here.
          </div>`;
        }

        // Direction label from RECIPIENT's perspective
        const _recipDirLabel = t => ({
          they_owe_you:'You Owe',  invoice:'Invoice Due',  bill:'Bill Due',
          you_owe_them:'Owed To You', lend:'You Borrowed', borrow:'Owed To You',
          they_paid_you:'I Settled Them',  you_paid_them:'They Settled Me', gift:'Gift'
        }[t] || 'Shared');
        const _recipDirColor = t => (t==='they_owe_you'||t==='invoice'||t==='bill'||t==='lend') ? 'var(--red)' : 'var(--green)';

        // Show "New records received" banner for unconfirmed, non-dismissed records
        const pendingRecs = records.filter(r => !r.confirmed && !r.entry?.dismissed && !r.recipientClosed);
        if (pendingRecs.length > 0) {
          html += `<div style="background:#fef3c7;border:1px solid #fde68a;border-radius:10px;padding:14px 16px;margin-bottom:14px;">
            <div style="font-weight:700;font-size:14px;margin-bottom:10px;color:#92400e;">📬 New Record${pendingRecs.length>1?'s':''} Received (${pendingRecs.length})</div>`;
          pendingRecs.forEach(r => {
            const pe = r.entry;
            const pAmt = parseFloat(pe?.amount||0);
            html += `<div style="background:#fff;border:1px solid #fde68a;border-radius:8px;padding:10px 14px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;">
              <div>
                <div style="font-weight:700;font-size:13px;">${esc(pe?.fromName||'Someone')}</div>
                <div style="font-size:12px;color:var(--muted);">${fmt(pAmt)} · <span style="color:${_recipDirColor(pe?.txType)};font-weight:600;">${_recipDirLabel(pe?.txType)}</span> · ${pe?.date ? new Date(pe.date).toLocaleDateString() : ''}</div>
              </div>
              <div style="display:flex;gap:8px;">
                ${!_isSettlementEntry(pe) ? `<button onclick="doConfirmShared('${esc(r.token)}')" style="background:var(--accent);color:#fff;border:none;border-radius:7px;padding:7px 14px;font-size:12px;font-weight:700;cursor:pointer;">✅ Confirm &amp; Track</button>` : ''}
                <button onclick="doDismissShared('${esc(r.token)}')" style="background:var(--bg3);color:var(--text);border:1px solid var(--border);border-radius:7px;padding:7px 14px;font-size:12px;cursor:pointer;">✕ Dismiss</button>
              </div>
            </div>`;
          });
          html += `</div>`;
        }

        const hiddenCount  = records.filter(r => _sharedHidden.has(r.token)).length;
        const visibleRecs  = records.filter(r => !_sharedHidden.has(r.token));

        html += `<div class="tbl-wrap"><table><thead><tr>
          <th>From</th><th>Amount</th><th>Direction</th><th>Date</th><th>Status</th><th style="width:36px;"></th>
        </tr></thead><tbody>`;

        visibleRecs.forEach(r => {
          const e       = r.entry;
          const rawAmt  = parseFloat(e.amount) || 0;
          const offset  = _sharedOffsets[r.token] || 0;
          const netAmt  = Math.max(0, rawAmt - offset);
          const isClosed = (e.status === 'closed' || r.recipientClosed);
          const isExpired = isClosed;

          // Amount display: show net with strikethrough original if depreciated
          const amtHtml = offset > 0
            ? `<span style="text-decoration:line-through;color:var(--muted);font-size:12px;">$${rawAmt.toFixed(2)}</span> <strong>$${netAmt.toFixed(2)}</strong>`
            : `<strong>$${rawAmt.toFixed(2)}</strong>`;

          const dt = e.date ? new Date(e.date).toLocaleDateString() : '—';

          // Status badge
          const statusMap = { posted:'#888', accepted:'var(--green)', rejected:'var(--red)',
                              settled:'var(--accent)', disputed:'orange', closed:'var(--muted)',
                              paid:'var(--green)', voided:'var(--muted)' };
          let statusLabel = e.status || 'posted';
          let statusColor = statusMap[statusLabel] || '#888';
          if (isExpired) { statusLabel = 'expired'; statusColor = 'var(--muted)'; }
          if (offset > 0 && !isExpired) {
            if (netAmt === 0) { statusLabel = 'settled'; statusColor = 'var(--green)'; }
            else              { statusLabel = 'partial'; statusColor = 'var(--accent)'; }
          }
          const sBadge = `<span style="font-size:11px;font-weight:700;color:${statusColor};text-transform:uppercase;">${statusLabel}</span>`;

          const siteUrl = e.siteUrl || 'https://moneyinteractions.com';
          const rowStyle = isExpired ? 'opacity:.55;' : '';

          // Make sender name clickable — resolve identity (prefer display name over email)
          const _displayFromName = e._resolvedFromName || e.fromName || '—';
          const _senderContact = (() => {
            const u2 = curUser();
            if (!u2) return null;
            const nl = _displayFromName.toLowerCase().trim();
            const byName  = db.contacts.find(c => c.userId === u2.id && (c.name||'').toLowerCase().trim() === nl);
            if (byName) return byName;
            // Also try matching by email (fromName might be email)
            const emailLk = (e.fromName||'').toLowerCase().trim();
            return db.contacts.find(c => c.userId === u2.id && (c.email||'').toLowerCase().trim() === emailLk) || null;
          })();
          const _senderLink = _senderContact
            ? `<a href="#" onclick="cLink_open('${_senderContact.id}');return false;" style="font-weight:700;color:var(--accent);text-decoration:none;">${esc(_displayFromName)}</a>`
            : `<strong>${esc(_displayFromName)}</strong>`;
          const _pendingBadge = !r.confirmed && !e.dismissed ? `<span style="font-size:10px;background:#fef3c7;color:#92400e;border:1px solid #fde68a;border-radius:4px;padding:1px 5px;margin-left:4px;font-weight:700;">NEW</span>` : '';

          html += `<tr style="${rowStyle}">
            <td>${_senderLink}${_pendingBadge}</td>
            <td>${amtHtml}</td>
            <td><span style="font-weight:700;color:${isExpired?'var(--muted)':_recipDirColor(e.txType)}">${esc(_recipDirLabel(e.txType))}</span></td>
            <td>${dt}</td>
            <td>${sBadge}</td>
            <td>
              <div class="action-menu">
                <button class="action-menu-btn" onclick="toggleActionMenu(this)">⋮</button>
                <div class="action-dropdown">
                  <a href="${esc(siteUrl)}/view?t=${esc(r.token)}" target="_blank" style="display:block;padding:8px 14px;font-size:13px;color:var(--accent);text-decoration:none;font-weight:600;">👁 View</a>
                  ${!r.confirmed && !e.dismissed && !_isSettlementEntry(e) ? `<button onclick="doConfirmShared('${esc(r.token)}')">✅ Confirm &amp; Track</button>` : ''}
                  ${!r.confirmed && !e.dismissed ? `<button onclick="doDismissShared('${esc(r.token)}')">✕ Dismiss</button>` : ''}
                  ${!isExpired && e.status !== 'settled' && e.status !== 'paid' ? `<button onclick="_sharedMarkPaid('${esc(r.token)}')" style="color:var(--green);font-weight:700;">💰 Record Payment</button>` : ''}
                  <button onclick="_sharedDepreciateModal('${esc(r.token)}','${esc(e.fromName||'')}',${rawAmt})">📉 Depreciate</button>
                  ${!isExpired ? `<button onclick="_sharedExpire('${esc(r.token)}')">⏰ Expire</button>` : ''}
                  <button onclick="_sharedHideToggle('${esc(r.token)}')">🙈 Hide</button>
                </div>
              </div>
            </td>
          </tr>`;
        });

        if (hiddenCount > 0) {
          html += `<tr><td colspan="6" style="text-align:center;padding:10px;font-size:12px;color:var(--muted);">
            ${hiddenCount} hidden record${hiddenCount!==1?'s':''} —
            <button style="background:none;border:none;color:var(--accent);font-size:12px;cursor:pointer;font-weight:600;padding:0;"
              onclick="_cachedSharedRecords.forEach(r=>_sharedHidden.delete(r.token));_saveSharedPrefs();_loadSharedWithMe();">Show all</button>
          </td></tr>`;
        }

        html += `</tbody></table></div></div>`;
        if (el) el.innerHTML = html;
        // Also populate entries-page shared section if visible
        const entriesSharedEl = document.getElementById('entries-shared-with-me');
        if (entriesSharedEl) entriesSharedEl.innerHTML = html;

        // ── Update balance stat cards with shared-with-me amounts ──────────
        // txType is from SENDER's perspective:
        //   sender "they_owe_you"/"invoice"/"lend" → we (recipient) OWE the sender
        // Shared-with-me records are informational only — they do NOT affect balance.
        // Dashboard stat cards use getLedger() which only counts own entries.
        const toyEl = document.getElementById('stat_shared_toy');
        const yotEl = document.getElementById('stat_shared_yot');
        if (toyEl || yotEl) {
          const _u2 = curUser();
          const _myC2 = db.contacts.filter(c => c.userId === _u2.id && !c.archived);
          let _tot2Toy = 0, _tot2Yot = 0;
          _myC2.forEach(c => { const l = getLedger(c.id); _tot2Toy += l.toy; _tot2Yot += l.yot; });
          if (toyEl) toyEl.textContent = fmt(_tot2Toy);
          if (yotEl) yotEl.textContent = fmt(_tot2Yot);
        }

        // Scroll to it if this is a fresh link
        if (justLinked) {
          const scrollTarget = el || entriesSharedEl;
          if (scrollTarget) setTimeout(() => scrollTarget.scrollIntoView({ behavior: 'smooth', block: 'start' }), 150);
        }
      } catch(_) {}
    }

    // ============ PAGE: CONTACTS ============
    function renderContacts() {
      const u = curUser();
      const allContacts = curRole() === 'admin' ? db.contacts : db.contacts.filter(c => c.userId === u.id);
      const q = (window._search_contacts||'').toLowerCase().trim();
      const sortDesc = window._sort_contacts !== false; // default: latest first
      const showArchived = window._arch_contacts || false;
      let listed = showArchived ? allContacts : allContacts.filter(c => !c.archived);
      if (q) listed = listed.filter(c => (c.name||'').toLowerCase().includes(q) || (c.email||'').toLowerCase().includes(q) || (c.phone||'').toLowerCase().includes(q));
      const _lastActivity = cId => {
        const eTs = db.entries.filter(e=>e.cId===cId).reduce((m,e)=>Math.max(m,e.createdAt||0),0);
        const nTs = (db.notifs||[]).filter(n=>n.cId===cId).reduce((m,n)=>Math.max(m,n.createdAt||0),0);
        return Math.max(eTs, nTs, db.contacts.find(c=>c.id===cId)?.createdAt||0);
      };
      listed = [...listed].sort((a,b) => sortDesc ? _lastActivity(b.id)-_lastActivity(a.id) : _lastActivity(a.id)-_lastActivity(b.id));
      PG['contacts'] = PG['contacts'] || 1;
      if (q) PG['contacts'] = 1; // reset to page 1 on search
      const p2 = paginate(listed, 'contacts');

      // ── Name-change suggestion banners (like mobile "contact updated their info") ─
      const _suggestions = (db.settings._pendingNameSuggestions || []).filter(s => {
        const _sc = db.contacts.find(c => c.id === s.contactId);
        return _sc && _sc.userId === u.id;
      });
      let html = `<div class="page-header"><h2>Contacts</h2><button class="btn sm" onclick="openNewContact()">+ Add Contact</button></div>`;
      _suggestions.forEach(s => {
        html += `<div style="display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;
                   background:rgba(108,99,255,.08);border:1px solid rgba(108,99,255,.25);border-radius:10px;
                   padding:12px 16px;margin-bottom:10px;">
          <div style="display:flex;align-items:center;gap:10px;flex:1;">
            <span style="font-size:20px;">📝</span>
            <div>
              <div style="font-size:14px;font-weight:600;">Name update detected</div>
              <div style="font-size:13px;color:var(--muted);margin-top:2px;">
                <strong>${esc(s.oldName)}</strong> updated their name to <strong>${esc(s.newName)}</strong> — update your contact?
              </div>
            </div>
          </div>
          <div style="display:flex;gap:8px;flex-shrink:0;margin-top:4px;">
            <button class="btn sm" onclick="applyNameSuggestion('${s.id}')">✅ Update</button>
            <button class="bs sm" onclick="dismissNameSuggestion('${s.id}')">Keep current</button>
          </div>
        </div>`;
      });
      html += `<div class="card">
        <div style="display:flex;gap:8px;align-items:center;margin-bottom:12px;flex-wrap:wrap;">
          <input type="search" id="contacts_search_input" placeholder="Search contacts…" value="${esc(window._search_contacts||'')}" style="flex:1;min-width:180px;max-width:340px;">
          <button class="bs sm${sortDesc?' on':''}" onclick="window._sort_contacts=!${sortDesc};renderContacts()" title="Sort order">${sortDesc?'↓ Latest first':'↑ Oldest first'}</button>
          <label style="display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer;margin-left:4px;"><input type="checkbox" ${showArchived?'checked':''} onchange="window._arch_contacts=this.checked;PG.contacts=1;renderContacts()"> Archived</label>
        </div>`;

      const showAdmin = curRole() === 'admin';
      html += `<div class="tbl-wrap"><table><thead><tr><th>Name</th>${showAdmin?'<th class="hide-mobile">Owner</th>':''}<th>Email / Phone</th><th>Balance</th><th style="width:60px;"></th></tr></thead><tbody>`;
      p2.items.forEach(c => {
        const l = getLedger(c.id);
        const bal = l.toy - l.yot;
        const owner = showAdmin ? db.users.find(u2 => u2.id === c.userId) : null;
        html += `<tr${c.archived ? ' class="archived"' : ''}>
          <td>${cLink(c.id, c.name)}${c.archived?` <span class="badge badge-gray" style="font-size:10px;">arch.</span>`:''}</td>
          ${showAdmin?`<td class="hide-mobile" style="font-size:12px;color:var(--muted);">${esc(owner?.displayName||'—')}</td>`:''}
          <td style="font-size:13px;">${esc(c.email||c.phone||'—')}</td>
          <td><strong style="color: ${bal > 0 ? 'var(--green)' : bal < 0 ? 'var(--red)' : 'var(--muted)'}">${fmt(bal)}</strong></td>
          <td><div class="action-menu"><button class="action-menu-btn" onclick="toggleActionMenu(this)">⋮</button><div class="action-dropdown">
            <button onclick="openCP('${c.id}')">👁 View</button>
            <button onclick="editContact('${c.id}')">✏️ Edit</button>
            <button onclick="toggleArchiveContact('${c.id}')">${c.archived ? '📤 Unarchive' : '📦 Archive'}</button>
            <button onclick="delContact('${c.id}')" style="color: var(--red);">🗑 Delete</button>
          </div></div></td>
        </tr>`;
      });
      html += `</tbody></table></div>`;
      html += `<p style="font-size: 12px; color: var(--muted); margin-top: 12px;">Page ${p2.page} of ${p2.pages}</p>
        <div style="display: flex; gap: 8px; margin-top: 8px;">
          <button class="bs sm" onclick="PG['contacts'] = Math.max(1, (PG['contacts']||1)-1); renderContacts()" ${p2.page === 1 ? 'disabled' : ''}>← Prev</button>
          <button class="bs sm" onclick="PG['contacts'] = Math.min(${p2.pages}, (PG['contacts']||1)+1); renderContacts()" ${p2.page === p2.pages ? 'disabled' : ''}>Next →</button>
        </div>`;
      html += '</div>';
      document.getElementById('content').innerHTML = html;
      // Attach debounced search handler
      const searchInput = document.getElementById('contacts_search_input');
      if (searchInput) {
        searchInput.addEventListener('input', debounceSearch('_search_contacts', () => {
          PG.contacts = 1;
          renderContacts();
          // Restore focus after full re-render so keyboard stays open
          const inp = document.getElementById('contacts_search_input');
          if (inp) { inp.focus(); try { const l = inp.value.length; inp.setSelectionRange(l, l); } catch(_) {} }
        }));
      }
    }

    function openNewContact() {
      const u = curUser();
      const form = `<div class="modal-bg" onclick="this.remove()"><div class="modal" onclick="event.stopPropagation()"><div class="modal-title">Add Contact</div>
        <div class="fg"><label>Name *</label><input type="text" id="nname" placeholder="John Doe"></div>
        <div class="fg"><label>Email</label><input type="email" id="nemail"></div>
        <div class="fg"><label>Phone</label><input type="tel" id="nphone"></div>
        <div class="fg"><label>Address</label><textarea id="naddr" rows="2"></textarea></div>
        <div class="fg"><label>Notes</label><textarea id="nnotes" rows="2"></textarea></div>
        <div class="fg"><label>Tags (comma-separated)</label><input type="text" id="ntags"></div>
        <div class="fg"><label>Starting Balance — They Owe Me</label><input type="number" id="nstoy" min="0" value="0"></div>
        <div class="fg"><label>Starting Balance — I Owe Them</label><input type="number" id="nsyot" min="0" value="0"></div>
        <div style="display: flex; gap: 8px; justify-content: flex-end;">

    }

    function saveNewContact() {
      const name = document.getElementById('nname').value.trim();
      if (!name) return alert('Name required');
      const email = document.getElementById('nemail').value.trim();
      const phone = document.getElementById('nphone').value.trim();
      const addr = document.getElementById('naddr').value.trim();
      const notes = document.getElementById('nnotes').value.trim();
      const tags = document.getElementById('ntags').value.trim().split(',').map(t => t.trim()).filter(t => t);
      const toy = parseFloat(document.getElementById('nstoy').value) || 0;
      const yot = parseFloat(document.getElementById('nsyot').value) || 0;

      db.contacts.push({
        id: uuid(),
        userId: curUser().id,
        name, email, phone, address: addr, notes, tags, startToy: toy, startYot: yot,
        archived: false, photo: '', linkedUserId: null, createdAt: Date.now()
      });
      save();
      logAudit('add_contact', { name });
      document.querySelector('.modal-bg')?.remove();
      toast('Contact created');
      renderContacts();
    }

    function saveQuickContact() {
      const name = document.getElementById('qc_name')?.value.trim();
      if (!name) return alert('Contact name required');
      const email = document.getElementById('qc_email')?.value.trim() || '';
      const phone = document.getElementById('qc_phone')?.value.trim() || '';
      const newContact = {
        id: uuid(),
        userId: curUser().id,
        name, email, phone, address: '', notes: '', tags: [],
        startToy: 0, startYot: 0,

      };
      db.contacts.push(newContact);
      save();
      // Set the searchable contact select to the new contact (entry form + recurring form)
      ['necon','rcon'].forEach(id => {
        _csAddOption(id, newContact.id, newContact.name);
        _csSelect(id, newContact.id, newContact.name);
      });
      document.getElementById('quickContactBg')?.remove();
      toast('Contact created and selected');

    function editContact(cid) {
      const c = db.contacts.find(x => x.id === cid);
      if (!c) return;
      const form = `<div class="modal-bg" onclick="this.remove()"><div class="modal" onclick="event.stopPropagation()"><div class="modal-title">Edit Contact</div>
        <div class="fg"><label>Name *</label><input type="text" id="ename" value="${esc(c.name)}"></div>
        <div class="fg"><label>Email</label><input type="email" id="eemail" value="${esc(c.email || '')}"></div>
        <div class="fg"><label>Phone</label><input type="tel" id="ephone" value="${esc(c.phone || '')}"></div>
        <div class="fg"><label>Address</label><textarea id="eaddr" rows="2">${esc(c.address || '')}</textarea></div>
        <div class="fg"><label>Notes</label><textarea id="enotes" rows="2">${esc(c.notes || '')}</textarea></div>
        <div class="fg"><label>Tags (comma-separated)</label><input type="text" id="etags" value="${esc((c.tags || []).join(', '))}"></div>
        <div style="display: flex; gap: 8px; justify-content: flex-end;">
          <button class="bs sm" onclick="this.closest('.modal-bg').remove()">Cancel</button>
          <button class="btn sm" onclick="saveEditContact('${cid}')">Save</button>
        </div>
      </div></div>`;
      const _d2 = document.createElement('div'); _d2.innerHTML = form; document.body.appendChild(_d2.firstChild);
    }

    function saveEditContact(cid) {
      const c = db.contacts.find(x => x.id === cid);
      if (!c) return;
      c.name = document.getElementById('ename').value.trim() || c.name;
      c.email = document.getElementById('eemail').value.trim();
      c.phone = document.getElementById('ephone').value.trim();
      c.address = document.getElementById('eaddr').value.trim();
      c.notes = document.getElementById('enotes').value.trim();
      c.tags = document.getElementById('etags').value.trim().split(',').map(t => t.trim()).filter(t => t);
      saveNow(); // immediate sync — prevents email/phone being lost on quick navigation
      logAudit('edit_contact', { cid, name: c.name });
      document.querySelector('.modal-bg').remove();
      toast('Contact updated');
      renderContacts();
    }

    function toggleArchiveContact(cid) {
      const c = db.contacts.find(x => x.id === cid);
      if (c) {
        c.archived = !c.archived;
        save();
        logAudit(c.archived ? 'archive_contact' : 'unarchive_contact', { cid, name: c.name });
        renderContacts();
      }
    }

    // ── Name-change suggestions ──────────────────────────────────────────────
    function applyNameSuggestion(sid) {
      const list = db.settings._pendingNameSuggestions || [];
      const s = list.find(x => x.id === sid);
      if (!s) return;
      const c = db.contacts.find(x => x.id === s.contactId);
      if (c) { c.name = s.newName; }
      db.settings._pendingNameSuggestions = list.filter(x => x.id !== sid);
      save(); logAudit('apply_name_suggestion', { contactId: s.contactId, newName: s.newName });
      toast(`✅ Contact updated to "${s.newName}"`);
      renderContacts();

    // ============ PAGE: ENTRIES ============
    // Helper: does a field value count as "filled"?
    // Numbers: non-zero. Strings: non-empty. Everything else: truthy.
    function _fieldHasValue(v) {
      if (v === null || v === undefined) return false;
      const s = String(v).trim();
      if (s === '') return false;
      const n = parseFloat(s);
      if (!isNaN(n) && String(n) === s) return n !== 0;  // pure numeric
      return true; // non-empty string (e.g. item name, text field)
    }

    /* ── Status chip for white docs (inline, no dark CSS vars) ─────── */
    function _docStatusChip(s, entry) {
      const isInv = entry && isInvoiceMode(entry);
      let label;
      if (isInv && s === 'posted')   label = 'Offered';
      else if (isInv && s === 'sent')     label = 'Sent';
      else if (isInv && s === 'viewed')   label = 'Viewed';
      else if (isInv && s === 'accepted') label = 'Due';
      else label = ENTRY_STATUS[safeStatus(s)] || s;
      const bg = (s==='settled'||s==='payment') ? '#d1fae5' : (s==='overdue'||s==='disputed') ? '#fee2e2' :
                 (s==='partially_settled') ? '#fef3c7' : (s==='voided'||s==='draft') ? '#f3f4f6' : '#dbeafe';
      const col = (s==='settled'||s==='payment') ? '#065f46' : (s==='overdue'||s==='disputed') ? '#991b1b' :
                  (s==='partially_settled') ? '#92400e' : (s==='voided'||s==='draft') ? '#6b7280' : '#1e40af';
      return `<span style="display:inline-block;background:${bg};color:${col};border-radius:4px;padding:3px 10px;font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;">${esc(label)}</span>`;
    }

    /* ── Build visible field list from entry templateData ───────────── */
    function _visibleEntryFields(e, tpl) {
      const tplFieldDefs = tpl ? (tpl.fields || []) : [];
      const tplDataMap   = e.templateData || {};
      const orderedIds   = tplFieldDefs.length
        ? tplFieldDefs.map(f => f.id).filter(id => tplDataMap[id])
        : Object.keys(tplDataMap);
      return orderedIds.map(id => {
        const fd  = tplDataMap[id];
        const def = tplFieldDefs.find(f => f.id === id);
        if (!fd) return null;
        // Paired field: visible if it has at least one non-empty row
        if (fd.type === 'paired') {
          const hasRows = fd.rows && fd.rows.some(r => r.text || r.numeric);
          return hasRows ? { ...fd, id } : null;
        }
        // Computed result field
        if (fd.computed) {
          const calcs = def?.calculators || [];
          const anyVisible = calcs.length === 0 || calcs.some(c => c.resultVisible !== false);
          return (anyVisible && _fieldHasValue(fd.value)) ? { ...fd, id } : null;
        }
        // Regular input field
        return _fieldHasValue(fd.value) ? { ...fd, id } : null;
      }).filter(Boolean);
    }

    /* ═══════════════════════════════════════════════════════════════════
       MODE A — INVOICE / BILL / TEMPLATE  (billing documents)
    ═══════════════════════════════════════════════════════════════════ */
    function _renderInvoiceDoc(e) {
      const contact = db.contacts.find(x => x.id === e.cId);
      // Use frozen template snapshot if available, else live template
      const tpl     = e.templateSnapshot || (e.templateId ? db.templates.find(x => x.id === e.templateId) : null);
      const co      = db.settings.company || {};
      const dateStr = new Date(e.date).toLocaleDateString('en-US', {year:'numeric',month:'long',day:'numeric'});
      const docId   = e.invoiceNumber || (e.entryNum ? '#'+String(e.entryNum).padStart(4,'0') : null);
      const docLabel = (e.txType==='bill') ? 'BILL' : 'INVOICE';

      const fields   = _visibleEntryFields(e, tpl);
      const inFields = fields.filter(f => !f.computed);
      const calcF    = fields.filter(f =>  f.computed);

      // "From" = the actual user, not the platform/app name
      const fromUser    = curUser();
      const invShow     = fromUser.invoiceShow || {};
      const appName     = db.settings.appName || 'Money IntX';
      // Company name only if explicitly set, not same as app name, AND user has enabled it
      const companyName = (invShow.businessName && co.name && co.name !== appName) ? co.name : '';
      // Primary identity: show display name only if user enabled it
      const fromName    = invShow.displayName ? (fromUser.displayName || companyName || '') : companyName;
      const fromAddr    = invShow.address  ? (co.address || fromUser.address || '') : '';
      const fromEmail   = invShow.email    ? (co.email || fromUser.email || '')     : '';
      const fromPhone   = invShow.phone    ? (co.phone || fromUser.phone || '')     : '';

      // Live settlement state (always recalculated from linked records)
      const invSt = _getInvoiceSettlement(e.id);

      // Logo: user's own logo if enabled; fall back to platform logo if user has none
      const userLogoSrc = invShow.logo ? (fromUser.logoData || db.settings.logoData || '') : '';
      const logoHtml = userLogoSrc
        ? `<img src="${userLogoSrc}" style="height:56px;max-width:160px;object-fit:contain;margin-bottom:8px;display:block;">`
        : '';
      // Platform logo for footer watermark
      const platformLogoSrc = db.settings.logoData || '';
      const platformLogoHtml = platformLogoSrc
        ? `<img src="${platformLogoSrc}" style="height:22px;object-fit:contain;vertical-align:middle;">`
        : '';

      let doc = `<div id="invoicePrintDoc" style="font-family:'Segoe UI',Arial,sans-serif;color:#111;background:#fff;padding:40px 44px;">

        <!-- Top: Branding left | Document type + meta right -->
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:28px;padding-bottom:20px;border-bottom:3px solid #111;">

          <!-- LEFT: Logo + user identity + company + contact info -->
          <div>
            ${logoHtml}
            <div style="font-size:16px;font-weight:800;color:#111;">${esc(fromName)}</div>
            ${companyName ? `<div style="font-size:12px;color:#555;margin-top:2px;">${esc(companyName)}</div>` : ''}
            ${fromAddr  ? `<div style="font-size:11px;color:#777;margin-top:3px;white-space:pre-line;">${esc(fromAddr)}</div>`  : ''}
            ${fromEmail ? `<div style="font-size:11px;color:#777;">${esc(fromEmail)}</div>` : ''}
            ${fromPhone ? `<div style="font-size:11px;color:#777;">${esc(fromPhone)}</div>` : ''}
          </div>

          <!-- RIGHT: Document label + number + date + status -->
          <div style="text-align:right;">
            <div style="font-size:34px;font-weight:900;letter-spacing:.01em;text-transform:uppercase;color:#111;line-height:1;">${docLabel}</div>
            ${docId ? `<div style="font-size:13px;font-weight:700;color:#555;margin-top:5px;"># ${esc(docId)}</div>` : ''}
            <div style="margin-top:8px;">
              <div style="font-size:11px;color:#888;text-transform:uppercase;letter-spacing:.06em;">Date</div>
              <div style="font-weight:700;font-size:13px;">${dateStr}</div>
            </div>
            <div style="margin-top:8px;">${_docStatusChip(invSt.status, e)}</div>
          </div>
        </div>

        <!-- Parties: Bill To (left) | From / Issued By (right) -->
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:28px;margin-bottom:28px;padding-bottom:20px;border-bottom:1px solid #e5e5e5;">
          <div>
            <div style="font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#aaa;margin-bottom:6px;font-weight:700;">Bill To</div>
            <div style="font-weight:800;font-size:15px;">${esc(contact?.name||'—')}</div>
            ${contact?.email   ? `<div style="font-size:12px;color:#555;margin-top:3px;">${esc(contact.email)}</div>`  : ''}
            ${contact?.phone   ? `<div style="font-size:12px;color:#555;">${esc(contact.phone)}</div>`                : ''}
            ${contact?.address ? `<div style="font-size:12px;color:#555;margin-top:3px;white-space:pre-line;">${esc(contact.address)}</div>` : ''}
          </div>
          <div>
            <div style="font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#aaa;margin-bottom:6px;font-weight:700;">Issued By</div>
            <div style="font-weight:800;font-size:15px;">${esc(fromName)}</div>
            ${companyName ? `<div style="font-size:12px;color:#555;margin-top:3px;">${esc(companyName)}</div>` : ''}
            ${fromEmail ? `<div style="font-size:12px;color:#555;margin-top:3px;">${esc(fromEmail)}</div>` : ''}
            ${fromPhone ? `<div style="font-size:12px;color:#555;">${esc(fromPhone)}</div>` : ''}
            ${tpl       ? `<div style="font-size:11px;color:#aaa;margin-top:4px;font-style:italic;">${esc(tpl.name)}</div>` : ''}
          </div>
        </div>`;

      // Line items — paired fields render as row tables; text/numeric fields as simple rows
      if (inFields.length) {
        doc += `<table style="width:100%;border-collapse:collapse;margin-bottom:4px;"><tbody>`;

        // Track whether we're currently inside a paired section to avoid re-emitting its header
        let lastPairedId = null;
        inFields.forEach((f, i) => {
          if (f.type === 'paired') {
            // Paired field: group label + column header row, then data rows
            if (f.id !== lastPairedId) {
              lastPairedId = f.id;
              const txtLbl = f.textLabel || 'Item';
              const numLbl = f.numericLabel || 'Amount';
              doc += `<tr style="background:#f0f0f0;border-top:2px solid #111;">
                <td colspan="2" style="padding:6px 10px;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:#555;">${esc(f.label)}</td>
              </tr>
              <tr style="border-bottom:1px solid #ccc;">
                <td style="padding:4px 10px;font-size:10px;font-weight:700;color:#888;text-transform:uppercase;">${esc(txtLbl)}</td>
                <td style="padding:4px 10px;font-size:10px;font-weight:700;color:#888;text-transform:uppercase;text-align:right;">${esc(numLbl)}</td>
              </tr>`;
            }
            // Data rows (skip empty) — qty × price → effective value; qty itself not shown
            (f.rows || []).filter(r => r.text || r.numeric).forEach((r, ri) => {
              const _effAmt = (r.qty && r.numeric) ? r.qty * r.numeric : (r.numeric || 0);
              doc += `<tr style="background:${ri%2===0?'#fafafa':'#fff'};border-bottom:1px solid #eee;">
                <td style="padding:10px;">${esc(r.text||'')}</td>
                <td style="padding:10px;font-weight:600;text-align:right;">${_effAmt ? fmt(_effAmt, e.currency) : '—'}</td>
              </tr>`;
            });
          } else {
            // Regular text or numeric input field
            lastPairedId = null;
            const v    = f.value;
            const numV = parseFloat(v);
            const isN  = !isNaN(numV) && String(v).trim() !== '';
            doc += `<tr style="background:${i%2===0?'#fafafa':'#fff'};border-bottom:1px solid #eee;border-top:${i===0?'2px solid #111':'none'}">
              <td style="padding:10px;">${esc(f.label)}</td>
              <td style="padding:10px;font-weight:600;text-align:right;">${isN ? fmt(numV, e.currency) : esc(String(v))}</td>
            </tr>`;
          }
        });

        doc += `</tbody></table>`;
      }

      // Computed results summary
      if (calcF.length) {
        doc += `<div style="margin:${inFields.length?'0':'8px'} 0 20px;">`;
        calcF.forEach((f, i) => {
          const last = i === calcF.length - 1;
          doc += `<div style="display:flex;justify-content:space-between;align-items:center;
              padding:${last?'14px 10px':'9px 10px'};
              border-top:${i===0?'2px solid #111':'1px solid #e0e0e0'};
              ${last?'border-bottom:2px solid #111;':''}">
            <span style="font-size:${last?'14px':'13px'};font-weight:${last?'800':'500'};color:${last?'#111':'#555'};${last?'text-transform:uppercase;letter-spacing:.04em;':''}">${esc(f.label)}</span>
            <span style="font-size:${last?'22px':'15px'};font-weight:${last?'900':'600'};color:${last?'#111':'#333'};">${fmt(parseFloat(f.value)||0, e.currency)}</span>
          </div>`;
        });
        doc += `</div>`;
      }

      // Total / Settlement block — clean white, no dark card, live data
      if (e.amount) {
        doc += `<div style="display:flex;justify-content:flex-end;margin-bottom:28px;">
          <div style="border:2px solid #111;border-radius:8px;padding:16px 24px;min-width:260px;">`;
        if (invSt.settled > 0) {
          doc += `
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
              <span style="font-size:12px;color:#666;text-transform:uppercase;letter-spacing:.06em;">Invoice Total</span>
              <span style="font-size:14px;font-weight:700;">${fmt(invSt.total, e.currency)}</span>
            </div>
            <div style="display:flex;justify-content:space-between;align-items:center;padding-bottom:10px;border-bottom:1px solid #ddd;margin-bottom:10px;">
              <span style="font-size:12px;color:#059669;text-transform:uppercase;letter-spacing:.06em;">Settled</span>
              <span style="font-size:14px;font-weight:700;color:#059669;">− ${fmt(invSt.settled, e.currency)}</span>
            </div>
            <div style="display:flex;justify-content:space-between;align-items:center;">
              <span style="font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;">Remaining</span>
              <span style="font-size:26px;font-weight:900;color:${invSt.remaining<=0?'#059669':'#111'};">${fmt(invSt.remaining, e.currency)}</span>
            </div>`;
        } else {
          doc += `
            <div style="display:flex;justify-content:space-between;align-items:center;">
              <span style="font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;">Total Due</span>
              <span style="font-size:30px;font-weight:900;">${fmt(e.amount, e.currency)}</span>
            </div>`;
        }
        doc += `</div></div>`;
      }

      // Note
      if (e.note) {
        doc += `<div style="background:#f8f8f8;border-left:4px solid #ccc;border-radius:4px;padding:12px 16px;margin-bottom:20px;">
          <div style="font-size:10px;color:#aaa;text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px;">Note</div>
          <div style="font-size:13px;color:#333;">${esc(e.note)}</div>
        </div>`;
      }

      doc += `<div style="margin-top:28px;padding-top:14px;border-top:1px solid #e8e8e8;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;">
        <div style="font-size:10px;color:#bbb;line-height:1.7;">This document is a record only. It does not transfer funds or constitute a legal instrument.</div>
        ${platformLogoSrc
          ? `<div style="display:flex;align-items:center;">${platformLogoHtml}</div>`
          : `<div style="font-size:10px;color:#aaa;">${esc(appName)}</div>`}
      </div>`;

      const canSettle = (invSt.remaining > 0 && e.status !== 'voided');
      const actionBar = `
        ${canSettle ? `<button onclick="recordSettlement('${e.id}')" style="background:#065f46;color:#fff;border:none;border-radius:6px;padding:9px 18px;font-size:13px;font-weight:700;cursor:pointer;">✅ Record Settlement</button>` : ''}
        <button onclick="_downloadEntryPDF('${e.id}')" style="background:#4a45a8;color:#fff;border:none;border-radius:6px;padding:9px 18px;font-size:13px;font-weight:700;cursor:pointer;">📄 PDF</button>
        <button onclick="window.print()" style="background:#111;color:#fff;border:none;border-radius:6px;padding:9px 18px;font-size:13px;font-weight:700;cursor:pointer;">🖨 Print</button>
        <button onclick="document.getElementById('invoicePrintWrap').remove()" style="background:#fff;color:#111;border:1px solid #ccc;border-radius:6px;padding:9px 18px;font-size:13px;font-weight:600;cursor:pointer;">Close</button>`;

      _showDocPopup(doc, actionBar);
    }

    /* ═══════════════════════════════════════════════════════════════════
       MODE B — TRANSACTION RECORD  (ledger entries — no invoice layout)
    ═══════════════════════════════════════════════════════════════════ */
    function _renderTransactionDoc(e) {
      const contact = db.contacts.find(x => x.id === e.cId);
      const co      = db.settings.company || {};
      const fromUser = curUser();
      const dateStr = new Date(e.date).toLocaleDateString('en-US', {year:'numeric',month:'long',day:'numeric'});
      const docId   = e.entryNum ? '#'+String(e.entryNum).padStart(4,'0') : null;
      const txLabel = TXL[e.txType] || e.txType;

      // Accent colour based on direction
      const accentHex =
        (e.txType==='they_owe_you')  ? '#059669' :
        (e.txType==='you_owe_them')  ? '#dc2626' :
        (e.txType==='they_paid_you'||e.txType==='you_paid_them') ? '#0d9488' : '#6c63ff';

      const appName2    = db.settings.appName || 'Money IntX';
      const companyName2 = (co.name && co.name !== appName2) ? co.name : '';
      const fromName    = fromUser.displayName || companyName2 || 'Unknown';
      const logoSrc2    = db.settings.logoData || '';
      const logoHtml2   = logoSrc2
        ? `<img src="${logoSrc2}" style="height:40px;max-width:120px;object-fit:contain;margin-bottom:5px;display:block;">` : '';

      // Party labels based on transaction direction
      const partyLabels = {
        they_owe_you:  { left:'Owed To',    right:'Owed By' },
        they_paid_you: { left:'Received By', right:'Settled By' },
        you_owe_them:  { left:'Owed By',    right:'Owed To' },
        you_paid_them: { left:'Paid By',    right:'Settled To' },
      };
      const labels = partyLabels[e.txType] || { left:'You', right:'Contact' };

      let doc = `<div id="invoicePrintDoc" style="font-family:'Segoe UI',Arial,sans-serif;color:#111;background:#fff;padding:40px 44px;">

        <!-- Top: Branding left | Document meta right -->
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:28px;padding-bottom:18px;border-bottom:2px solid #111;">
          <div>
            ${logoHtml2}
            <div style="font-size:14px;font-weight:800;color:#111;">${esc(fromName)}</div>
            ${companyName2 ? `<div style="font-size:11px;color:#555;margin-top:1px;">${esc(companyName2)}</div>` : ''}
            ${co.address ? `<div style="font-size:11px;color:#777;margin-top:2px;white-space:pre-line;">${esc(co.address)}</div>` : ''}
          </div>
          <div style="text-align:right;">
            <div style="font-size:26px;font-weight:900;text-transform:uppercase;letter-spacing:.01em;color:#111;">Transaction</div>
            <div style="font-size:14px;font-weight:700;color:${accentHex};margin-top:4px;">${esc(txLabel)}</div>
            ${docId ? `<div style="font-size:12px;color:#999;margin-top:3px;">Ref&nbsp;${esc(docId)}</div>` : ''}
            <div style="margin-top:8px;">
              <div style="font-size:11px;color:#aaa;text-transform:uppercase;letter-spacing:.06em;">Date</div>
              <div style="font-weight:700;font-size:13px;">${dateStr}</div>
            </div>
            <div style="margin-top:8px;">${_docStatusChip(e.status, e)}</div>
          </div>
        </div>

        <!-- Parties: labelled by transaction direction -->
        <div style="display:grid;grid-template-columns:1fr auto 1fr;gap:16px;align-items:center;margin-bottom:28px;padding:18px 20px;background:#f9fafb;border-radius:8px;border:1px solid #e5e5e5;">
          <div>
            <div style="font-size:10px;color:#aaa;text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px;font-weight:700;">${labels.left}</div>
            <div style="font-weight:800;font-size:15px;">${esc(fromName)}</div>
            ${fromUser.email||co.email ? `<div style="font-size:11px;color:#777;margin-top:2px;">${esc(fromUser.email||co.email)}</div>` : ''}
          </div>
          <div style="font-size:24px;color:${accentHex};font-weight:900;text-align:center;padding:0 8px;">⇄</div>
          <div style="text-align:right;">
            <div style="font-size:10px;color:#aaa;text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px;font-weight:700;">${labels.right}</div>
            <div style="font-weight:800;font-size:15px;">${esc(contact?.name||'—')}</div>
            ${contact?.email   ? `<div style="font-size:11px;color:#777;margin-top:2px;">${esc(contact.email)}</div>` : ''}
            ${contact?.phone   ? `<div style="font-size:11px;color:#777;">${esc(contact.phone)}</div>` : ''}
          </div>
        </div>

        <!-- Amount -->
        <div style="text-align:center;padding:28px 0 24px;margin-bottom:24px;border-top:1px solid #e5e7eb;border-bottom:1px solid #e5e7eb;">
          <div style="font-size:11px;color:#aaa;text-transform:uppercase;letter-spacing:.12em;margin-bottom:8px;">Amount</div>
          <div style="font-size:52px;font-weight:900;color:${accentHex};letter-spacing:-.01em;">${fmt(e.amount, e.currency)}</div>
        </div>`;

      // Settlement breakdown (mirrors invoice doc behaviour)
      let _txSt = _getInvoiceSettlement(e.id);
      // Fallback: if linkedInvoiceId lookup returns 0 but status shows settlement,
      // try matching by note text or by cId + creditType + entryNum ref
      if (_txSt.settled === 0 && (e.status === 'partially_settled' || e.status === 'settled')) {
        const docRef = e.invoiceNumber || (e.entryNum ? '#'+String(e.entryNum).padStart(4,'0') : null);
        const altSettled = db.entries
          .filter(s => s.cId === e.cId && s.status !== 'voided' &&
                       (s.txType === 'they_paid_you' || s.txType === 'you_paid_them') &&
                       (s.linkedInvoiceId === e.id || (docRef && s.note && s.note.includes(docRef))))
          .reduce((sum, s) => sum + (parseFloat(s.amount) || 0), 0);
        if (altSettled > 0) {
          const total = parseFloat(e.amount) || 0;
          _txSt = { total, settled: altSettled, remaining: Math.max(0, total - altSettled), status: e.status };
          // Back-fill linkedInvoiceId so future calls work correctly
          db.entries.forEach(s => {
            if (s.cId === e.cId && s.status !== 'voided' &&
                (s.txType === 'they_paid_you' || s.txType === 'you_paid_them') &&
                !s.linkedInvoiceId && docRef && s.note && s.note.includes(docRef)) {
              s.linkedInvoiceId = e.id;
            }
          });
        }
      }
      if (_txSt.settled > 0) {
        doc += `<div style="display:flex;justify-content:flex-end;margin-bottom:24px;">
          <div style="border:2px solid #111;border-radius:8px;padding:16px 24px;min-width:260px;">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
              <span style="font-size:12px;color:#666;text-transform:uppercase;letter-spacing:.06em;">Original Amount</span>
              <span style="font-size:14px;font-weight:700;">${fmt(_txSt.total, e.currency)}</span>
            </div>
            <div style="display:flex;justify-content:space-between;align-items:center;padding-bottom:10px;border-bottom:1px solid #ddd;margin-bottom:10px;">
              <span style="font-size:12px;color:#059669;text-transform:uppercase;letter-spacing:.06em;">Settled</span>
              <span style="font-size:14px;font-weight:700;color:#059669;">− ${fmt(_txSt.settled, e.currency)}</span>
            </div>
            <div style="display:flex;justify-content:space-between;align-items:center;">
              <span style="font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;">Balance</span>
              <span style="font-size:26px;font-weight:900;color:${_txSt.remaining<=0?'#059669':'#111'};">${fmt(_txSt.remaining, e.currency)}</span>
            </div>
          </div>
        </div>`;
      }

      // Note
      if (e.note) {
        doc += `<div style="background:#f8f8f8;border-left:4px solid #d1d5db;border-radius:4px;padding:12px 16px;margin-bottom:20px;">
          <div style="font-size:10px;color:#aaa;text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px;">Note</div>
          <div style="font-size:13px;color:#333;">${esc(e.note)}</div>
        </div>`;
      }

      doc += `<div style="margin-top:28px;padding-top:14px;border-top:1px solid #e8e8e8;font-size:10px;color:#bbb;text-align:center;line-height:1.7;">
        This document is a record only. It does not transfer funds or constitute a legal instrument.
      </div>`;

      const canSettle = (_txSt.remaining > 0 && e.status !== 'voided' &&
                         (e.txType==='they_owe_you' || e.txType==='you_owe_them'));
      const actionBar = `
        ${canSettle ? `<button onclick="recordSettlement('${e.id}')" style="background:#065f46;color:#fff;border:none;border-radius:6px;padding:9px 18px;font-size:13px;font-weight:700;cursor:pointer;">✅ Record Settlement</button>` : ''}
        <button onclick="_downloadEntryPDF('${e.id}')" style="background:#4a45a8;color:#fff;border:none;border-radius:6px;padding:9px 18px;font-size:13px;font-weight:700;cursor:pointer;">📄 PDF</button>
        <button onclick="window.print()" style="background:#111;color:#fff;border:none;border-radius:6px;padding:9px 18px;font-size:13px;font-weight:700;cursor:pointer;">🖨 Print</button>
        <button onclick="document.getElementById('invoicePrintWrap').remove()" style="background:#fff;color:#111;border:1px solid #ccc;border-radius:6px;padding:9px 18px;font-size:13px;font-weight:600;cursor:pointer;">Close</button>`;

      _showDocPopup(doc, actionBar);
    }

    /* ── Entry point: pick mode based on entry type ─────────────────── */
    function openEntryInvoice(eid) {
      const e = db.entries.find(x => x.id === eid); if (!e) return;
      if (isInvoiceMode(e)) {
        _renderInvoiceDoc(e);
        // Sync current status to share_tokens snapshot whenever owner views invoice
        // This also back-fills stale tokens from before the sync-status feature
        _pushShareStatus(eid);
      } else {
        _renderTransactionDoc(e);
      }
    }

    /* ── Download Entry as PDF (opens print-ready window) ────────────── */
    function _downloadEntryPDF(eid) {
      const e = db.entries.find(x => x.id === eid);
      if (!e) return;
      const isInv = isInvoiceMode(e);
      const docId = e.invoiceNumber || (e.entryNum ? '#'+String(e.entryNum).padStart(4,'0') : null);

      // Build the document HTML by temporarily capturing _showDocPopup output
      let capturedDoc = '';
      const origShowDocPopup = _showDocPopup;
      _showDocPopup = function(docHtml, actionBarHtml) { capturedDoc = docHtml; };
      try {
        if (isInv) { _renderInvoiceDoc(e); } else { _renderTransactionDoc(e); }
      } finally {
        _showDocPopup = origShowDocPopup;
      }
      if (!capturedDoc) return;

      const title = (isInv ? (e.txType === 'bill' ? 'Bill' : 'Invoice') : 'Transaction') +
        ' - ' + (docId || 'Record');

      const printWin = window.open('', '_blank');
      if (!printWin) { toast('Popup blocked — please allow popups for this site.'); return; }
      printWin.document.write(`<!DOCTYPE html><html><head>
        <meta charset="utf-8">
        <title>${esc(title)}</title>
        <style>
          * { box-sizing: border-box; }

    // ── Balance Reconciliation Check (called after settlement actions) ───────
    async function _checkReconciliation(entryId) {
      if (!_IS_SERVER) return;
      try {
        const tok = localStorage.getItem('mxi_token');
        const headers = { 'Content-Type': 'application/json' };
        if (tok) headers['Authorization'] = 'Bearer ' + tok;
        const res = await fetch('/api/reconcile', {
          method: 'POST', credentials: 'include', headers,
          body: JSON.stringify({ action: 'check-entry', entryId })
        });
        const data = await res.json();
        if (data.ok && !data.balanced) {
          console.warn('[reconcile] Balance mismatch of $' + data.difference + ' — admin notified');
        }
      } catch (_) {}
    }

    // ── Admin: Run full reconciliation report ─────────────────────────────────
    async function _runReconciliation() {
      const btn = document.getElementById('reconcileBtn');
      const el  = document.getElementById('reconcileResults');
      if (!btn || !el) return;
      btn.disabled = true;
      btn.textContent = 'Syncing data...';
      el.innerHTML = '<p style="color:var(--muted);font-size:13px;">Syncing local data to server first...</p>';
      // Force sync current user's data to server before running reconciliation
      try { await saveNow(); } catch(_) {}
      btn.textContent = 'Checking...';
      el.innerHTML = '<p style="color:var(--muted);font-size:13px;">Running reconciliation...</p>';
      try {
        const _rHeaders = {};
        const _rTok = localStorage.getItem('mxi_token');
        if (_rTok) _rHeaders['Authorization'] = 'Bearer ' + _rTok;
        const res = await fetch('/api/reconcile', { credentials: 'include', headers: _rHeaders });
        const data = await res.json();
        if (!data.ok) {
          el.innerHTML = `<p style="color:var(--red);font-size:13px;">${esc(data.error || 'Reconciliation failed.')}</p>`;
          btn.disabled = false; btn.textContent = 'Run Reconciliation';
          return;
        }
        if (data.total === 0) {
          el.innerHTML = '<p style="color:var(--muted);font-size:13px;">No linked user pairs found. Share records between users to enable reconciliation.</p>';
          btn.disabled = false; btn.textContent = 'Run Reconciliation';
          return;
        }
        let html = '';
        if (data.mismatches === 0) {
          html += '<div style="padding:8px 12px;background:rgba(22,163,74,.08);border-radius:8px;color:#16a34a;font-weight:600;margin-bottom:12px;">All balanced — no mismatches found across ' + data.total + ' linked pair' + (data.total !== 1 ? 's' : '') + '.</div>';
        } else {
          html += '<div style="padding:8px 12px;background:rgba(239,68,68,.08);border-radius:8px;color:#dc2626;font-weight:600;margin-bottom:12px;">' + data.mismatches + ' mismatch' + (data.mismatches !== 1 ? 'es' : '') + ' found across ' + data.total + ' linked pair' + (data.total !== 1 ? 's' : '') + '.</div>';
        }
        html += '<div class="tbl-wrap"><table><thead><tr><th>User A</th><th>User B</th><th>A: TOY</th><th>A: YOT</th><th>B: TOY</th><th>B: YOT</th><th>Diff</th><th>Status</th></tr></thead><tbody>';
        data.pairs.forEach(function(p) {
          const rowStyle = p.mismatch ? 'background:rgba(239,68,68,.05);' : '';
          html += '<tr style="' + rowStyle + '">';
          html += '<td style="font-size:12px;">' + esc(p.userA.name) + '<br><span style="color:var(--muted);font-size:11px;">' + esc(p.userA.email) + '</span></td>';
          html += '<td style="font-size:12px;">' + esc(p.userB.name) + '<br><span style="color:var(--muted);font-size:11px;">' + esc(p.userB.email) + '</span></td>';
          html += '<td style="color:var(--green);font-weight:600;">' + fmt(p.balanceA.toy) + '</td>';
          html += '<td style="color:var(--red);font-weight:600;">' + fmt(p.balanceA.yot) + '</td>';
          html += '<td style="color:var(--green);font-weight:600;">' + fmt(p.balanceB.toy) + '</td>';
          html += '<td style="color:var(--red);font-weight:600;">' + fmt(p.balanceB.yot) + '</td>';
          html += '<td style="font-weight:700;color:' + (p.mismatch ? 'var(--red)' : 'var(--green)') + ';">' + fmt(p.difference) + '</td>';
          html += '<td>' + (p.mismatch ? '<span class="badge" style="background:rgba(239,68,68,.12);color:#dc2626;font-size:11px;">Mismatch</span>' : '<span class="badge" style="background:rgba(22,163,74,.12);color:#16a34a;font-size:11px;">Balanced</span>') + '</td>';
          html += '</tr>';
          if (p.warning) {
            html += '<tr style="background:rgba(245,158,11,.05);"><td colspan="8" style="font-size:11px;color:#b45309;padding:4px 12px;">⚠️ ' + esc(p.warning) + 'Ask user to sync via Settings.</td></tr>';
          }
        });
        html += '</tbody></table></div>';
        el.innerHTML = html;
      } catch (e) {
        el.innerHTML = '<p style="color:var(--red);font-size:13px;">Network error — could not run reconciliation.</p>';
      }
      btn.disabled = false;
      btn.textContent = 'Run Reconciliation';
    }

    async function _submitSettlement(eid, remainingAmt) {
      const e = db.entries.find(x => x.id === eid); if (!e) return;
      const rawVal   = (document.getElementById('settleAmt')?.value || '').trim();
      const errEl    = document.getElementById('settleErr');
      const btn      = document.getElementById('settleSubmitBtn');
      const parsedAmt = rawVal === '' ? remainingAmt : parseFloat(rawVal);
      if (isNaN(parsedAmt) || parsedAmt <= 0) {
        if (errEl) { errEl.textContent = 'Enter a valid amount greater than zero.'; errEl.style.display = 'block'; }
        return;
      }
      if (errEl) errEl.style.display = 'none';
      if (btn) { btn.disabled = true; btn.textContent = '⏳ Saving…'; }

      const docRef    = e.invoiceNumber || ('#' + String(e.entryNum||'?').padStart(4,'0'));
      const applyAmt  = Math.min(parsedAmt, remainingAmt);
      const overAmt   = Math.round((parsedAmt - applyAmt) * 100) / 100;
      const creditType = (e.txType==='they_owe_you'||e.txType==='invoice'||e.txType==='bill') ? 'they_paid_you' : 'you_paid_them';

      // Create linked settlement entry for the applied amount
      db.settings.entryCounter = (db.settings.entryCounter||0) + 1;
      db.entries.push({
        id: uuid(), userId: curUser().id, cId: e.cId, txType: creditType,
        amount: applyAmt,
        note: `Settlement for ${docRef}`,
        date: Date.now(), status: 'payment', archived: false, shared: false,
        responses: [], templateId: null, templateData: {},
        invoiceNumber: null, entryNum: db.settings.entryCounter, createdAt: Date.now(),
        linkedInvoiceId: eid,
        currency: e.currency || db.settings.currency || 'USD'
      });

      // Recompute invoice status from all linked settlements
      _syncInvoiceStatus(eid);
      _pushShareStatus(eid);

      // If overpayment: create a second receipt for the excess
      if (overAmt > 0.004) {
        db.settings.entryCounter = (db.settings.entryCounter||0) + 1;
        db.entries.push({
          id: uuid(), userId: curUser().id, cId: e.cId, txType: creditType,
          amount: overAmt,
          note: `Overpayment Receipt — excess beyond full balance of ${docRef}`,
          date: Date.now(), status: 'posted', archived: false, shared: false,
          responses: [], templateId: null, templateData: {},
          invoiceNumber: null, entryNum: db.settings.entryCounter, createdAt: Date.now(),
          isOverpayment: true, linkedInvoiceId: eid,
          currency: e.currency || db.settings.currency || 'USD'
        });
      }

      try { await saveNow(); } catch(saveErr) { console.warn('[settlement] saveNow failed:', saveErr); save(); }
      logAudit(overAmt > 0.004 ? 'record_settlement_overpayment' : 'record_settlement', { eid, applyAmt, overAmt });

      document.getElementById('settleBg')?.remove();
      document.getElementById('invoicePrintWrap')?.remove();

      if (overAmt > 0.004) {
        toast(`Settlement recorded. ${fmt(applyAmt, e.currency)} applied to ${docRef}. Overpayment receipt of ${fmt(overAmt, e.currency)} created.`);
      } else {
        toast(`Settlement of ${fmt(applyAmt, e.currency)} recorded`);
      }
      refreshCurPage();
      _checkReconciliation(eid);
    }

    function renderEntries() {
      const u = curUser();
      const role = curRole();
      // Any logged-in user (admin, standard, contact) can receive shared records.
      const isStd = _IS_SERVER && (role === 'standard' || role === 'admin' || role === 'contact');

      // Tab state: 'mine' | 'shared' | 'all' (default 'all')
      window._entriesTab = window._entriesTab || 'all';
      const tab = window._entriesTab;

      // ── Own entries ──────────────────────────────────────────────────────
      const allEntries = role === 'admin' ? db.entries : (role === 'standard' ? db.entries.filter(e => e.userId === u.id) : db.entries.filter(e => e.shared && e.cId));
      const q = (window._search_entries||'').toLowerCase().trim();
      const sortDesc = window._sort_entries !== false;
      let listed = allEntries.filter(e => e.status !== 'voided');
      if (q) listed = listed.filter(e => {
        const c = db.contacts.find(x => x.id === e.cId);
        const docNum = e.invoiceNumber || (e.entryNum ? '#'+String(e.entryNum).padStart(4,'0') : '');
        return (c?.name||'').toLowerCase().includes(q) || docNum.toLowerCase().includes(q) ||
               (TXL[e.txType]||'').toLowerCase().includes(q) || (ENTRY_STATUS[e.status]||'').toLowerCase().includes(q);
      });
      listed = [...listed].sort((a,b) => sortDesc ? (b.lastActivityAt||b.createdAt||new Date(b.date||0).getTime()||0)-(a.lastActivityAt||a.createdAt||new Date(a.date||0).getTime()||0) : (a.lastActivityAt||a.createdAt||new Date(a.date||0).getTime()||0)-(b.lastActivityAt||b.createdAt||new Date(b.date||0).getTime()||0));

      // ── Confirmed shared-with-me records ─────────────────────────────────
      const _recipDirLabelE = t => ({
        they_owe_you:'You Owe', invoice:'Invoice Due', bill:'Bill Due',
        you_owe_them:'Owed To You', lend:'You Borrowed', borrow:'Owed To You',
        they_paid_you:'I Settled Them', you_paid_them:'They Settled Me', gift:'Gift'
      }[t] || 'Shared');
      const _recipDirColorE = t => (t==='they_owe_you'||t==='invoice'||t==='bill'||t==='lend') ? 'var(--red)' : 'var(--green)';

      // ── Pending (unconfirmed) shared-with-me records ─────────────────────
      // Confirmed shared records are now in db.entries with isShared:true —
      // this array only holds records not yet confirmed (showing ⏳ Pending pill).
      let confirmedShared = isStd ? _cachedSharedRecords.filter(r =>
        !r.confirmed && !r.recipientClosed && !(r.entry?.dismissed)
      ) : [];
      if (q) confirmedShared = confirmedShared.filter(r => {
        const e = r.entry;
        const dn = (e?._resolvedFromName || e?.fromName || '').toLowerCase();
        return dn.includes(q) || (e?.amount||'').toString().includes(q) ||
               (_recipDirLabelE(e?.txType)||'').toLowerCase().includes(q);
      });
      confirmedShared = [...confirmedShared].sort((a,b) => {
        const aTs = a.sharedAt ? new Date(a.sharedAt).getTime() : 0;
        const bTs = b.sharedAt ? new Date(b.sharedAt).getTime() : 0;
        return sortDesc ? bTs - aTs : aTs - bTs;
      });

      // ── Tab counts ───────────────────────────────────────────────────────
      const ownListed    = listed.filter(e => !e.isShared);
      const isSharedList = listed.filter(e => e.isShared);
      const mineCount    = ownListed.length;
      const sharedCount  = isSharedList.length + confirmedShared.length;
      const allCount     = mineCount + sharedCount;

      PG['entries'] = PG['entries'] || 1;
      if (q) PG['entries'] = 1;

      // ── Determine what to paginate based on tab ──────────────────────────
      // 'mine'   → own entries only (no isShared)
      // 'shared' → isShared db.entries + any pending unconfirmed rows
      // 'all'    → everything merged by timestamp
      function _entryTs(item) {
        if (item.token) return item.sharedAt ? new Date(item.sharedAt).getTime() : 0; // pending shared
        return item.lastActivityAt || item.createdAt || new Date(item.date||0).getTime() || 0;
      }
      const _sortFn = (a,b) => sortDesc ? _entryTs(b)-_entryTs(a) : _entryTs(a)-_entryTs(b);
      const tabListed = tab === 'shared'
        ? [...isSharedList, ...confirmedShared].sort(_sortFn)
        : tab === 'mine'
          ? ownListed
          : [...ownListed, ...isSharedList, ...confirmedShared].sort(_sortFn);
      const p = paginate(tabListed, 'entries');
      // Store exportable entries (real db entries only, not pending shared tokens)
      window._exportableEntries = tabListed.filter(item => !item.token);

      // ── Header + tabs ────────────────────────────────────────────────────
      const tabBtnStyle = (t) => `padding:7px 14px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;` +
        (tab===t ? 'background:var(--accent);color:#fff;' : 'background:var(--bg3);color:var(--muted);');

      let html = `<div class="page-header"><h2>Entries</h2>`;
      if (role === 'admin' || role === 'standard') html += `<button class="btn sm" onclick="openNewEntry()">+ Add Entry</button>`;

      // Tabs — only show for standard users with shared records or server mode
      if (isStd) {
        html += `<div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;">
          <button style="${tabBtnStyle('all')}" onclick="window._entriesTab='all';PG.entries=1;renderEntries()">All (${allCount})</button>
          <button style="${tabBtnStyle('mine')}" onclick="window._entriesTab='mine';PG.entries=1;renderEntries()">Mine (${mineCount})</button>
          <button style="${tabBtnStyle('shared')}" onclick="window._entriesTab='shared';PG.entries=1;renderEntries()">🔗 Shared With Me (${sharedCount})</button>
        </div>`;
      }

      const _sm = window._selectMode || false;
      // Collect IDs of all selectable rows visible on this page (for select-all)
      // Excludes only pending shared rows (item.token) — isShared db.entries CAN be selected
      const _selPageIds = p.items.filter(item => !item.token).map(item => item.id);
      // Store page IDs in window so the onchange handler can reference without quote conflicts
      window._entryPageIds = _selPageIds;

      html += `<div class="card">
        <div style="display:flex;gap:8px;align-items:center;margin-bottom:12px;flex-wrap:wrap;">
          <input type="search" id="entries_search_input" placeholder="Search entries…" value="${esc(window._search_entries||'')}" style="flex:1;min-width:180px;max-width:340px;">
          <button class="bs sm${sortDesc?' on':''}" onclick="window._sort_entries=!${sortDesc};renderEntries()" title="Sort order">${sortDesc?'↓ Latest first':'↑ Oldest first'}</button>
          <button class="bs sm${_sm?' on':''}" onclick="_toggleSelectMode()" title="Select entries for bulk actions" style="${_sm?'background:var(--accent);color:#fff;border-color:var(--accent);':''}">☑ Select</button>
          <button class="bs sm" onclick="_exportCSV(window._exportableEntries||[],'entries-export.csv')" title="Export filtered entries as CSV">📥 Export CSV</button>
          <button class="bs sm" onclick="_printEntriesTable()" title="Export entries as PDF">📄 Export PDF</button>
          <button class="bs sm" onclick="_exportLedgerCSV()" title="Export ledger summary as CSV">📥 Export Ledger</button>
        </div>
        <div class="tbl-wrap"><table><thead><tr>
          ${_sm ? `<th class="sel-col"><input type="checkbox" class="sel-cb" id="_selAllCb" title="Select all" onchange="_selectAllEntries(window._entryPageIds)"></th>` : ''}
          <th>Contact</th><th class="hide-mobile">Doc #</th><th>Amount</th><th class="hide-mobile">Type</th><th>Date</th><th>Status</th><th style="width:80px;">Action</th>
        </tr></thead><tbody>`;

      p.items.forEach(item => {
        // Three row types:
        // 1. isSharedRow   — pending unconfirmed record from _cachedSharedRecords (item.token)
        // 2. isSharedEntry — confirmed shared record now in db.entries (item.isShared === true)
        // 3. own entry     — regular own entry
        const isSharedRow   = item.token !== undefined;
        const isSharedEntry = !isSharedRow && item.isShared === true;

        if (isSharedRow) {
          // ── Shared-with-me row ──────────────────────────────────────────
          const r = item;
          const e = r.entry;
          const rawAmt  = parseFloat(e?.amount||0);
          const dt      = e?.date ? new Date(e.date).toLocaleDateString() : '—';
          const dirLabel = _recipDirLabelE(e?.txType);
          const dirColor = _recipDirColorE(e?.txType);
          const siteUrl  = e?.siteUrl || 'https://moneyinteractions.com';
          // Unified sender identity: prefer resolved name over raw email
          const _dispName = e?._resolvedFromName || e?.fromName || '—';
          const _senderC = (() => {
            const nl = _dispName.toLowerCase().trim();
            const emailFb = (e?.fromName||'').toLowerCase().trim();
            return db.contacts.find(c => c.userId === u.id && (
              (c.name||'').toLowerCase().trim() === nl ||
              (c.email||'').toLowerCase().trim() === emailFb
            )) || null;
          })();
          const nameHtmlE = _senderC
            ? `<a href="#" onclick="cLink_open('${_senderC.id}');return false;" style="color:var(--accent);text-decoration:none;font-weight:700;">${esc(_dispName)}</a>`
            : `<strong>${esc(_dispName)}</strong>`;
          const _isSettlementShared = e?.linkedInvoiceId || e?.settledByRecipient || e?.txType === 'they_paid_you' || e?.txType === 'you_paid_them';
          const isPending = !r.confirmed && !(e?.dismissed) && !_isSettlementShared;
          const sharedPill = _isSettlementShared
            ? `<span style="font-size:9px;background:rgba(22,163,74,.1);color:#16a34a;border-radius:3px;padding:1px 5px;margin-left:3px;font-weight:700;">📋 Receipt</span>`
            : isPending
            ? `<span style="font-size:10px;background:rgba(251,191,36,.18);color:#d97706;border-radius:4px;padding:1px 5px;margin-left:3px;">⏳ Pending</span>`
            : `<span style="font-size:10px;background:rgba(108,99,255,.12);color:var(--accent);border-radius:4px;padding:1px 5px;margin-left:3px;">🔗 Shared</span>`;
          const isSettledE = e?.status === 'settled' || e?.status === 'paid' || e?.status === 'fulfilled' || e?.status === 'cancelled';
          const _selSharedId = r.token; // use token as id for shared rows
          const _sNoLedger = _sharedNoLedger.has(r.token);
          const _sNoLedgPill = _sNoLedger ? `<span title="Excluded from ledger balance" style="font-size:9px;background:rgba(245,158,11,.15);color:#b45309;border-radius:3px;padding:1px 4px;margin-left:3px;font-weight:700;">⊘ Ledger</span>` : '';
          const _sPaid = parseFloat(e?.settledAmt || 0);
          const _sRem  = parseFloat(e?.remaining  != null ? e.remaining : (e?.amount||0));
          const _sAmtHtml = _sPaid > 0
            ? `<strong>${fmt(rawAmt)}</strong><div class="mobile-label" style="font-size:11px;font-weight:700;color:${dirColor};margin-top:2px;">${esc(dirLabel)}</div><div style="font-size:11px;color:var(--muted);margin-top:1px;">Paid&nbsp;${fmt(_sPaid)}</div><div style="font-size:11px;font-weight:700;color:${_sRem<=0?'var(--green)':'var(--amber)'};">Bal&nbsp;${fmt(_sRem)}</div>`
