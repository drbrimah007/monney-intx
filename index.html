    // Handle joingroup link — user clicked an invite link
    function _handleJoinGroupLink() {
      const params = new URLSearchParams(window.location.search);
      const code = params.get('joingroup');
      if (!code) return;
      // Clean URL
      window.history.replaceState({}, '', window.location.pathname + (window.location.hash || ''));
      try {
        const decoded = atob(code);
        const [collection, itemId, inviterId] = decoded.split(':');
        if (!collection || !itemId) return;
        // Store pending join request — will be processed after login
        sessionStorage.setItem('_pendingJoinGroup', JSON.stringify({ collection, itemId, inviterId }));
        toast('Log in or sign up to join this ' + (collection === 'groups' ? 'group' : 'investment'), 5000);
      } catch (e) { console.error('[joingroup] invalid code'); }
    }

    // Process pending join request after login
    function _processPendingJoinGroup() {
      const raw = sessionStorage.getItem('_pendingJoinGroup');
      if (!raw) return;
      sessionStorage.removeItem('_pendingJoinGroup');
      try {
        const { collection, itemId, inviterId } = JSON.parse(raw);
        const u = curUser();
        // Push a join request to the inviter's blob via server
        const _tok = localStorage.getItem('mxi_token');
        const _headers = { 'Content-Type': 'application/json' };
        if (_tok) _headers['Authorization'] = 'Bearer ' + _tok;

        // Find inviter's email to push notification
        // We don't know their email directly, so push via the API using the item info
        fetch('/api/shared-groups', {
          method: 'POST', credentials: 'include', headers: _headers,
          body: JSON.stringify({
            targetEmail: '_byUserId:' + inviterId, // special flag
            notification: {
              id: uuid(), cId: null, eid: null,
              type: 'join_request',
              msg: `${u.displayName || u.email} wants to join your ${collection === 'groups' ? 'group' : 'investment'} (via invite link)`,
              channel: 'in-app', sent: true, who: u.displayName || u.email,
              sentTo: '', read: false, createdAt: Date.now(),
              _joinRequest: { collection, itemId, userEmail: u.email, userName: u.displayName || u.email }
            }
          })
        }).then(() => toast('Join request sent! The owner will review it.', 5000))
          .catch(() => toast('Could not send join request.'));
      } catch (e) { console.error('[joingroup] process failed'); }
    }

    // Send invite notification + email when adding member to group/investment
    async function _sendMemberInvite(contact, itemName, itemType) {
      const u = curUser();
      const inviterName = u.displayName || u.email || 'Someone';
      const msg = `${inviterName} invited you to ${itemType}: "${itemName}"`;
      const _notifId = uuid();
      const _now = Date.now();
      const _tok = localStorage.getItem('mxi_token');
      const _headers = { 'Content-Type': 'application/json' };
      if (_tok) _headers['Authorization'] = 'Bearer ' + _tok;

      // Push notification to INVITED user's server blob (not our local db)
      if (contact.email && _IS_SERVER) {
        try {
          await fetch('/api/shared-groups', {
            method: 'POST', credentials: 'include', headers: _headers,
            body: JSON.stringify({
              targetEmail: contact.email,
              notification: {
                id: _notifId, cId: null, eid: null,
                type: 'invite', msg, channel: 'in-app',
                sent: true, who: inviterName, sentTo: '',
                read: false, createdAt: _now
              }
            })
          });
        } catch (e) { console.error('[invite notif push]', e.message); }
      }

      // Also save locally for audit trail
      db.notifs.push({
        id: 'sent_' + _notifId, userId: u.id, cId: contact.id, eid: null,
        type: 'invite_sent', msg: `Invited ${contact.name} to ${itemType}: "${itemName}"`,
        channel: 'in-app', sent: true, who: 'you', sentTo: [contact.email||''],
        read: true, createdAt: _now
      });
      save();

      // Send email
      if (contact.email) {
        try {
          const _siteUrl = db.settings?.siteUrl || window.location.origin;
          const _emailRes = await fetch('/api/email', {
            method: 'POST', credentials: 'include', headers: _headers,
            body: JSON.stringify({
              action: 'send-invite',
              recipientEmail: contact.email,
              fromName: inviterName,
              itemName: itemName,
              itemType: itemType,
              message: `You've been invited to join ${itemType}: "${itemName}". Log in to view details and participate.`,
              siteUrl: _siteUrl,
              appName: db.settings?.appName || 'Money IntX',
              tagline: db.settings?.tagline || 'Making Money Matters Memorable',
              logoData: db.settings?.logoData || ''
            })
          });
          const _emailResult = await _emailRes.json().catch(() => ({}));
          db.emailLog = db.emailLog || [];
          if (_emailResult.ok) {
            db.emailLog.push({ id: uuid(), ts: Date.now(), type: 'invite', to: contact.email, status: 'sent' });
            toast('Invite email sent to ' + contact.email, 3000);
          } else {
            db.emailLog.push({ id: uuid(), ts: Date.now(), type: 'invite', to: contact.email, status: 'failed', error: _emailResult.error });
            console.error('[invite email] API error:', _emailResult.error);
            toast('Notification sent but email failed: ' + (_emailResult.error || 'unknown'), 4000);
          }
          save();
        } catch (e) {
          console.error('[invite email] fetch error:', e.message);
          toast('Notification sent but email failed', 3000);
        }
      } else {
        toast('Notification sent (no email on this contact)', 3000);
      }
    }

    async function _doAddGroupMember(gid) {
      const g = (db.groups||[]).find(x => x.id === gid);
      if (!g) return;
      const cid = document.getElementById('gaddmember').value;
      const contact = db.contacts.find(c => c.id === cid);
      if (!contact) return;
      if (!g.members) g.members = [];
      g.members.push({ id: 'm_' + Math.random().toString(36).substr(2, 9), contactId: cid, name: contact.name, role: 'member', joinedAt: Date.now() });
      if (g.useRotation) { if (!g.rotationOrder) g.rotationOrder = []; g.rotationOrder.push(g.members[g.members.length-1].id); }
      await saveNow();
      _sendMemberInvite(contact, g.name, 'a Group Savings circle');
      document.querySelector('.modal-bg:last-of-type')?.remove();
      toast(contact.name + ' added & invited');
      openGroupDetail(gid);
    }

    async function _sendGroupReminder(gid) {
      const g = (db.groups||[]).find(x => x.id === gid);
      if (!g) return;
      const curRound = (g.rounds||[])[(g.rounds||[]).length - 1];
      if (!curRound) { toast('No active round'); return; }
      const due = (curRound.contributions||[]).filter(c => !c.paid);
      if (due.length === 0) { toast('Everyone has paid!'); return; }
      const u = curUser();
      const _tok = localStorage.getItem('mxi_token');
      const _headers = { 'Content-Type': 'application/json' };
      if (_tok) _headers['Authorization'] = 'Bearer ' + _tok;
      const _siteUrl = db.settings?.siteUrl || window.location.origin;
      let sent = 0;
      for (const c of due) {
        const mem = (g.members||[]).find(m => m.id === c.memberId);
        if (!mem) continue;
        const contact = db.contacts.find(x => x.id === mem.contactId);
        if (!contact?.email) continue;
        try {
          await fetch('/api/email', {
            method: 'POST', credentials: 'include', headers: _headers,
            body: JSON.stringify({
              action: 'send-invite',
              recipientEmail: contact.email,
              fromName: u.displayName || u.email,
              itemName: g.name,
              itemType: 'Group Savings - Payment Reminder',
              message: `Hi ${mem.name}, your contribution of ${fmt(g.amount, g.currency)} for "${g.name}" Round ${curRound.roundNum} is due. Please make your payment.`,
              siteUrl: _siteUrl,
              appName: db.settings?.appName || 'Money IntX',
              tagline: db.settings?.tagline || 'Making Money Matters Memorable',
              logoData: db.settings?.logoData || ''
            })
          });
          sent++;
        } catch (e) { console.error('[reminder]', e.message); }
      }
      toast(sent > 0 ? `Reminder sent to ${sent} member${sent!==1?'s':''}` : 'No emails sent (members may not have emails)', 3000);
    }

    function _moveRotation(gid, fromIdx, direction) {
      const g = (db.groups||[]).find(x => x.id === gid);
      if (!g || !g.rotationOrder) return;
      if (!_canManageMembers(g)) return;
      const toIdx = fromIdx + direction;
      if (toIdx < 0 || toIdx >= g.rotationOrder.length) return;
      const temp = g.rotationOrder[fromIdx];
      g.rotationOrder[fromIdx] = g.rotationOrder[toIdx];
      g.rotationOrder[toIdx] = temp;
      _saveSharedItem(g, 'groups');
      // Re-render just the rotation list, not the whole modal
      const container = document.getElementById('_rotList_' + gid);
      if (container) {
        const members = g.members || [];
        const rounds = g.rounds || [];
        const nextIdx = rounds.length % g.rotationOrder.length;
        container.innerHTML = g.rotationOrder.map((mid, i) => {
          const mem = members.find(m => m.id === mid);
          return `<div style="display:flex;align-items:center;gap:8px;padding:6px 0;font-size:13px;${i===nextIdx?'background:rgba(108,99,255,.08);border-radius:6px;padding:6px 8px;':''}">
            <span style="font-weight:700;color:var(--muted);width:24px;">#${i+1}</span>
            <span style="flex:1;font-weight:600;">${esc(mem?.name||'?')}</span>
            ${i===nextIdx?'<span class="badge badge-blue" style="font-size:9px;">Next</span>':''}
            <div style="display:flex;gap:2px;">${i>0?`<button class="gh sm" onclick="_moveRotation('${gid}',${i},-1)" style="font-size:13px;">↑</button>`:''}${i<g.rotationOrder.length-1?`<button class="gh sm" onclick="_moveRotation('${gid}',${i},1)" style="font-size:13px;">↓</button>`:''}</div>
          </div>`;
        }).join('');
      }
    }

    async function removeGroupMember(gid, mid) {
      const g = (db.groups||[]).find(x => x.id === gid);
      if (!g) return;
      if (!confirm('Remove this member?')) return;
      g.members = (g.members||[]).filter(m => m.id !== mid);
      if (g.rotationOrder) g.rotationOrder = g.rotationOrder.filter(x => x !== mid);
      await saveNow(); openGroupDetail(gid);
    }

    function addGroupComment(gid) {
      const g = (db.groups||[]).find(x => x.id === gid);
      if (!g) return;
      const el = document.getElementById('gcomment_' + gid);
      const msg = el ? el.value.trim() : '';
      if (!msg) { toast('Enter a message'); return; }
      if (!g.noticeBoard) g.noticeBoard = [];
      g.noticeBoard.push({ id: 'nc_' + Math.random().toString(36).substr(2, 9), userId: curUser().id, userName: curUser().displayName || curUser().email, msg, createdAt: Date.now() });
      _saveSharedItem(g, 'groups');
      openGroupDetail(gid);
    }

    // ── Shared doc/receipt upload helpers ──────────────────────────
    function _uploadDoc(targetArr, refreshFn, label, sharedItem, sharedCollection) {
      const inp = document.createElement('input');
      inp.type = 'file';
      inp.accept = 'image/*,.pdf,.doc,.docx,.xls,.xlsx,.csv,.txt';
      inp.onchange = () => {
        const file = inp.files[0];
        if (!file) return;
        if (file.size > 5 * 1024 * 1024) { toast('File too large (max 5MB)'); return; }
        const reader = new FileReader();
        reader.onload = e => {
          targetArr.push({
            id: 'doc_' + Math.random().toString(36).substr(2, 9),
            name: file.name,
            type: file.type,
            size: file.size,
            data: e.target.result,
            label: label || 'Document',
            uploadedBy: curUser().displayName || curUser().email,
            uploadedAt: Date.now()
          });
          if (sharedItem) _saveSharedItem(sharedItem, sharedCollection);
          else save();
          toast(file.name + ' uploaded');
          if (refreshFn) refreshFn();
        };
        reader.readAsDataURL(file);
      };
      inp.click();
    }

    function _viewDoc(doc) {
      if (!doc) return;
      if (doc.type && doc.type.startsWith('image/')) {
        const html = '<div class="modal-bg" onclick="this.remove()" style="z-index:9600;"><div style="max-width:90vw;max-height:90vh;margin:auto;" onclick="event.stopPropagation()"><img src="' + doc.data + '" style="max-width:100%;max-height:85vh;border-radius:12px;"></div></div>';
        document.body.insertAdjacentHTML('beforeend', html);
      } else {
        const a = document.createElement('a');
        a.href = doc.data;
        a.download = doc.name;

      dividend:             { label: 'Dividend',             color: 'var(--green)',  dir: 'gain' },
      return:               { label: 'Return',               color: 'var(--green)',  dir: 'gain' },
      profit_distribution:  { label: 'Profit Distribution',  color: 'var(--amber)',  dir: 'out'  },
      withdrawal:           { label: 'Withdrawal',           color: 'var(--red)',    dir: 'out'  },

    };

    // True if this venture is personal (no collaborative features)
    function _isPersonalVenture(inv) {
      return (inv.venture_type || 'shared') === 'personal';
    }

    // Financial roll-up for a venture — works with both old and new TX types
    function _invCalc(inv) {
      const txs = inv.transactions || [];
      const _sum = (types) => txs.filter(t => types.includes(t.type)).reduce((s,t) => s+(parseFloat(t.amount)||0), 0);
      const capitalIn   = (parseFloat(inv.initialAmount)||0) + _sum(['capital_contribution','deposit']);
      const expenses    = _sum(['expense','asset_purchase']);
      const revenue     = _sum(['revenue','dividend','return']);
      const withdrawals = _sum(['withdrawal']);
      const distributions = _sum(['profit_distribution']);
      const adjustments = _sum(['adjustment']);
      const netPL       = revenue - expenses;
      const currentVal  = capitalIn - expenses - withdrawals - distributions + revenue + adjustments;
      const totalOut    = expenses + withdrawals + distributions;
      const roi         = capitalIn > 0 ? ((currentVal - capitalIn) / capitalIn * 100).toFixed(1) : '0.0';
      return { capitalIn, expenses, revenue, withdrawals, distributions, adjustments, netPL, currentVal, totalOut, roi };
    }

    function renderInvestments() {

      const showArchived = window._arch_investments || false;
      const filtered = showArchived ? myInv : myInv.filter(inv => !inv.archived);

      // Summary stats using new _invCalc
      let aggCapIn = 0, aggRevenue = 0, aggExpenses = 0, aggCurrentVal = 0;
      filtered.forEach(inv => {
        const c = _invCalc(inv);
        aggCapIn      += c.capitalIn;
        aggRevenue    += c.revenue;
        aggExpenses   += c.expenses;
        aggCurrentVal += c.currentVal;
      });
      const aggNetPL = aggRevenue - aggExpenses;

      const INV_TYPES = { general: 'General', stocks: 'Stocks', realestate: 'Real Estate', business: 'Business', project: 'Project', asset: 'Asset', crypto: 'Crypto', other: 'Other' };
      const INV_STATUS = { active: 'badge-green', matured: 'badge-blue', closed: 'badge-gray', lost: 'badge-red' };

      let html = `<div style="max-width:780px;margin:0 auto;">

    async function saveNewInvestment() {
      const name = document.getElementById('invname').value.trim();
      if (!name) { toast('Name is required'); return; }
      const venture_type  = document.querySelector('input[name="invVentureType"]:checked')?.value || 'personal';
      const isShared      = venture_type === 'shared';
      const access_mode   = isShared ? (document.getElementById('invAccessMode')?.value || 'members_only') : 'private';
      const inv = {
        id: 'inv_' + Math.random().toString(36).substr(2, 9),
        userId: curUser().id,
        venture_type,
        access_mode,
        invite_link_enabled: isShared && access_mode === 'members_and_invite',
        permissions: isShared ? {
          members_can_add_transactions: document.getElementById('invPerm_tx')?.checked !== false,
          members_can_upload_docs:      document.getElementById('invPerm_docs')?.checked === true,
          members_can_post_notice:      document.getElementById('invPerm_notice')?.checked !== false,
        } : { members_can_add_transactions: false, members_can_upload_docs: false, members_can_post_notice: false },
        name,
        description:    document.getElementById('invdesc').value.trim(),
        type:           document.getElementById('invtype').value,
        initialAmount:  parseFloat(document.getElementById('invamt').value) || 0,
        currency:       document.getElementById('invcur').value,
        startDate:      document.getElementById('invdate').value,
        expectedReturn: parseFloat(document.getElementById('invreturn').value) || 0,
        status:         document.getElementById('invstatus').value,
        members: [], transactions: [], noticeBoard: [], pendingInvites: [],
        archived: false, createdAt: Date.now()
      };
      const _invitedContacts2 = [];
      if (isShared) {
        document.querySelectorAll('.invmember-cb:checked').forEach(cb => {
          const contact = db.contacts.find(c => c.id === cb.value);
          if (contact) {
            inv.members.push({ id: 'm_' + Math.random().toString(36).substr(2, 9), contactId: contact.id, name: contact.name, role: 'member', joinedAt: Date.now() });
            _invitedContacts2.push(contact);
          }
        });
      }
      if (!db.investments) db.investments = [];
      db.investments.push(inv);
      await saveNow();
      db.notifs.push({
        id: uuid(), userId: curUser().id, cId: null, eid: null,
        type: 'investment_created',
        msg: `Venture "${inv.name}" created (${venture_type}${_invitedContacts2.length > 0 ? ', '+_invitedContacts2.length+' people added' : ''})`,
        channel: 'in-app', sent: false, who: 'you', sentTo: [], read: false, createdAt: Date.now()
      });
      save();
      _invitedContacts2.forEach(c => _sendMemberInvite(c, inv.name, 'a Venture'));
      document.querySelector('.modal-bg:last-of-type')?.remove();
      toast('Venture created & synced');
      renderInvestments();
    }

      if (sec) sec.style.display = isShared ? '' : 'none';
      document.querySelectorAll('input[name="einvVentureType"]').forEach(r => {
        const box = r.closest('label')?.querySelector('.vtype-box2');

    function saveEditInvestment(iid) {
      const inv = (db.investments||[]).find(x => x.id === iid);
      if (!inv) return;
      const name = document.getElementById('einvnm').value.trim();
      if (!name) { toast('Name required'); return; }
      const venture_type = document.querySelector('input[name="einvVentureType"]:checked')?.value || inv.venture_type || 'shared';
      const isShared     = venture_type === 'shared';
      inv.name           = name;
      inv.description    = document.getElementById('einvdesc').value.trim();
      inv.type           = document.getElementById('einvtype').value;
      inv.status         = document.getElementById('einvst').value;
      inv.initialAmount  = parseFloat(document.getElementById('einvamt').value) || inv.initialAmount || 0;
      inv.currency       = document.getElementById('einvcur').value;
      inv.startDate      = document.getElementById('einvdt').value;
      inv.expectedReturn = parseFloat(document.getElementById('einvret').value) || 0;
      inv.venture_type   = venture_type;
      inv.access_mode    = isShared ? (document.getElementById('einvAccessMode')?.value || 'members_only') : 'private';
      inv.invite_link_enabled = isShared && inv.access_mode === 'members_and_invite';
      inv.permissions    = isShared ? {
        members_can_add_transactions: document.getElementById('einvPerm_tx')?.checked !== false,
        members_can_upload_docs:      document.getElementById('einvPerm_docs')?.checked === true,
        members_can_post_notice:      document.getElementById('einvPerm_notice')?.checked !== false,
      } : { members_can_add_transactions: false, members_can_upload_docs: false, members_can_post_notice: false };
      saveNow();
      document.querySelector('.modal-bg:last-of-type')?.remove();
      toast('Venture updated');
      renderInvestments();
    }

    function toggleArchiveInv(iid) {
      const inv = (db.investments||[]).find(x => x.id === iid);
      if (!inv) return;
      inv.archived = !inv.archived;
      saveNow(); toast(inv.archived ? 'Investment archived' : 'Investment unarchived'); renderInvestments();
    }

    async function delInvestment(iid) {
      if (!confirm('Delete this investment? This cannot be undone.')) return;
      db.investments = (db.investments||[]).filter(x => x.id !== iid);
      await saveNow();
      toast('Investment deleted & synced');
      renderInvestments();
    }

    function addInvMember(iid) {
      const inv = (db.investments||[]).find(x => x.id === iid);
      if (!inv) return;
      if (!inv.members) inv.members = [];
      const u = curUser();
      const myContacts = db.contacts.filter(c => c.userId === u.id && !c.archived);
      const existing = new Set(inv.members.map(m => m.contactId));
      const available = myContacts.filter(c => !existing.has(c.id));
      if (available.length === 0) { toast('No more contacts to add'); return; }
      const opts = available.map(c => '<option value="' + c.id + '">' + esc(c.name) + '</option>').join('');
      const html = '<div class="modal-bg" onclick="this.remove()"><div class="modal" style="max-width:400px;" onclick="event.stopPropagation()"><div class="modal-title">Add Member / Partner</div><div class="fg"><label>Select Contact</label><select id="invaddmember">' + opts + '</select></div><div style="display:flex;gap:8px;margin-top:12px;"><button class="btn sm" onclick="_doAddInvMember(\'' + iid + '\')">Add</button><button class="bs sm" onclick="this.closest(\'.modal-bg\').remove()">Cancel</button></div></div></div>';
      document.body.insertAdjacentHTML('beforeend', html);
    }

    async function _doAddInvMember(iid) {
      const inv = (db.investments||[]).find(x => x.id === iid);
      if (!inv) return;
      const cid = document.getElementById('invaddmember').value;
      const contact = db.contacts.find(c => c.id === cid);
      if (!contact) return;
      if (!inv.members) inv.members = [];
      inv.members.push({ id: 'm_' + Math.random().toString(36).substr(2, 9), contactId: cid, name: contact.name, role: 'member', joinedAt: Date.now() });
      await saveNow();
      _sendMemberInvite(contact, inv.name, 'an Investment');
      document.querySelector('.modal-bg:last-of-type')?.remove();
      toast(contact.name + ' added & invited');
      renderInvestments();
    }

      const inv = (db.investments||[]).find(x => x.id === iid);
      if (!inv) return;
      if (!confirm('Remove this member?')) return;
      inv.members = (inv.members||[]).filter(m => m.id !== mid);
      await saveNow();
      openInvestmentDetail(iid);

    function addInvestmentTx(iid) {
      const inv = (db.investments||[]).find(x => x.id === iid);
      if (!inv) return;
      const isPersonal = _isPersonalVenture(inv);
      const typeOptions = Object.entries(INV_TX_TYPES).map(([val, cfg]) =>
        `<option value="${val}">${cfg.label}</option>`
      ).join('');
      const byField = isPersonal ? '' : `<div class="fg"><label>By (who made this transaction)</label><select id="itxby"><option value="">— Self / General —</option>${(inv.members||[]).map(m => '<option value="'+m.id+'">'+esc(m.name)+'</option>').join('')}</select></div>`;
      const html = `<div class="modal-bg" onclick="this.remove()"><div class="modal" style="max-width:420px;" onclick="event.stopPropagation()">
        <div class="modal-title">Add Entry</div>
        <div style="font-size:13px;color:var(--muted);margin-bottom:12px;">${esc(inv.name)}</div>
        ${byField}
        <div class="fg"><label>Type</label><select id="itxtype">${typeOptions}</select></div>
        <div class="fg"><label>Amount *</label><input type="number" id="itxamt" min="0" step="0.01" placeholder="500"></div>
        <div class="fg"><label>Date</label><input type="date" id="itxdate" value="${new Date().toISOString().split('T')[0]}"></div>
        <div class="fg"><label>Note</label><input type="text" id="itxnote" placeholder="Optional note"></div>
        <div class="fg"><label>Receipt (optional)</label><input type="file" id="itxreceipt" accept="image/*,.pdf" style="font-size:13px;"></div>
        <div style="display:flex;gap:8px;margin-top:12px;"><button class="btn" onclick="saveInvestmentTx('${iid}')">Save</button><button class="bs" onclick="this.closest('.modal-bg').remove()">Cancel</button></div>
      </div></div>`;
      document.body.insertAdjacentHTML('beforeend', html);
    }

    function saveInvestmentTx(iid) {
      const inv = (db.investments||[]).find(x => x.id === iid);
      if (!inv) return;
      const amt = parseFloat(document.getElementById('itxamt').value) || 0;
      if (amt <= 0) { toast('Amount required'); return; }
      if (!inv.transactions) inv.transactions = [];
      const byEl = document.getElementById('itxby');
      const byMemberId = byEl ? (byEl.value || null) : null;
      const byMember = byMemberId ? (inv.members||[]).find(m => m.id === byMemberId) : null;
      const tx = {
        id: 'itx_' + Math.random().toString(36).substr(2, 9),
        type: document.getElementById('itxtype').value,
        amount: amt,
        date: document.getElementById('itxdate').value,
        note: document.getElementById('itxnote').value.trim(),
        byMemberId: byMemberId,
        byName: byMember ? byMember.name : '',
        receipt: null,
        createdAt: Date.now()
      };
      // Handle receipt upload
      const fileInput = document.getElementById('itxreceipt');
      const file = fileInput && fileInput.files[0];
      if (file) {
        if (file.size > 5 * 1024 * 1024) { toast('Receipt too large (max 5MB)'); return; }
        const reader = new FileReader();
        reader.onload = e => {
          tx.receipt = { name: file.name, type: file.type, data: e.target.result };
          inv.transactions.push(tx);
          save();
          document.querySelector('.modal-bg:last-of-type')?.remove();
          toast('Entry recorded with receipt');
          renderInvestments();
        };
        reader.readAsDataURL(file);
      } else {
        inv.transactions.push(tx);
        save();
        document.querySelector('.modal-bg:last-of-type')?.remove();
        toast('Entry recorded');
        renderInvestments();
      }
    }

    function handleProfilePhotoUpload(event) {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = e => {
        curUser().photo = e.target.result;
        save();
        renderSettings();
        toast('Photo updated');

      reader.readAsDataURL(file);
    }

    function handleLogoUpload(event) {

      const reader = new FileReader();

        db.settings.logoData = e.target.result;
        toast('Logo loaded (not saved yet)');
      };
      reader.readAsDataURL(file);
    }

    function handleUserLogoUpload(event) {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = e => {
        curUser().logoData = e.target.result;
        save();
        renderSettings();
        toast('Invoice logo updated');
      };
      reader.readAsDataURL(file);
    }

    function saveInvoiceDisplaySettings() {
      const u = curUser();
      if (!u.invoiceShow) u.invoiceShow = {};
      ['logo','displayName','businessName','email','phone','address'].forEach(k => {
        u.invoiceShow[k] = document.getElementById(`pinvshow_${k}`)?.checked || false;

      save();
      logAudit('update_invoice_display', { uid: u.id });

    }

    async function sendTestEmail() {
      const resultDiv = document.getElementById('testEmailResult');
      resultDiv.innerHTML = '<p style="color:var(--muted);font-size:13px;">Sending test email…</p>';

      const res = await fetch('/api/auth/reset-request', {
        method: 'POST',
        credentials: 'include',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: curUser().email })
      }).then(r => r.json()).catch(e => ({ ok: false, error: e.message }));

      logEmail('test', curUser().email, res.ok ? 'sent' : 'failed', res.error || null);

      if (res.ok) {
        resultDiv.innerHTML = `<div style="padding:10px 14px;background:rgba(74,222,128,.15);border-radius:8px;color:var(--green);font-size:13px;font-weight:600;">✓ Email sent successfully to ${esc(curUser().email)}</div>`;
      } else {
        resultDiv.innerHTML = `<div style="padding:10px 14px;background:rgba(248,113,113,.15);border-radius:8px;color:var(--red);font-size:13px;font-weight:600;">✗ Email failed: ${esc(res.error || 'Unknown error')}</div>`;
      }
    }

    async function saveProfile() {
      const u = curUser();
      const displayName = document.getElementById('pdisplayname').value.trim() || u.displayName;
      const newUsername = (document.getElementById('pusername')?.value||'').trim().replace(/\s+/g,'_');
      const newEmail = (document.getElementById('pemail')?.value||'').trim();
      if (!displayName) { alert('Display name is required.'); return; }
      if (!newEmail || !newEmail.includes('@')) { alert('A valid email is required.'); return; }
      // Update local state
      u.displayName = displayName;
      if (newUsername) u.username = newUsername;
      u.email = newEmail;
      u.phone = document.getElementById('pphone').value;
      u.address = document.getElementById('paddr').value;
      u.notifPrefs = {
        inapp: document.getElementById('pnotif_inapp')?.checked ?? (u.notifPrefs?.inapp !== false),
        email: document.getElementById('pnotif_email')?.checked ?? (u.notifPrefs?.email !== false),
        sms:   document.getElementById('pnotif_sms')?.checked   ?? (u.notifPrefs?.sms   || false)
      };
      u.discoverable = document.getElementById('pdiscoverable').checked;
      updateUserInfo();
      logAudit('update_profile', { uid: u.id });
      // Also update the server users table so changes persist across reloads
      if (_IS_SERVER) {
        try {
          // saveNow: push the full blob immediately so phone/address/notifPrefs
          // don't get lost if the user reloads before the debounce fires.
          await saveNow();
          const _tok = localStorage.getItem('mxi_token');
          const _headers = { 'Content-Type': 'application/json' };
          if (_tok) _headers['Authorization'] = 'Bearer ' + _tok;
          const res = await fetch('/api/auth/profile', {
            method: 'POST', credentials: 'include', headers: _headers,
            body: JSON.stringify({ displayName, username: newUsername || u.username, email: newEmail })
          });
          const data = await res.json();
          if (!data.ok) { toast('⚠️ ' + (data.error || 'Profile sync failed'), 4000); return; }
          toast('Profile saved');
        } catch (e) {
          toast('⚠️ Saved locally but server sync failed', 4000);
        }
      } else {
        save();
        toast('Profile saved');
      }
    }

    // ============ AUTH HELPERS ============
    function isLoggedIn() {
      // sessionUserId undefined → backward compat; auto-assign admin and treat as logged in
      if (db.settings.sessionUserId === undefined) {
        db.settings.sessionUserId = db.settings.currentUserId || 'admin_001';
        save();
        return true;
      }
      // sessionUserId explicitly null → logged out
      if (db.settings.sessionUserId === null) return false;
      // Verify the user record still exists
      return !!(db.users.find(u => u.id === db.settings.sessionUserId));
    }

    // ============ API LAYER ============
    // On Vercel: uses real fetch() calls to /api/* endpoints.
    // On file:// (local dev without server): falls back to localStorage ops.
    const API = {

      // POST /api/auth/login
      async login({ email, password }) {
        if (!_IS_SERVER) {
          // localStorage fallback
          const u = db.users.find(u =>
            (u.email === email.trim() || u.username === email.trim()) &&
            u._pw === password && u.status === 'active'
          );
          if (!u) return { ok: false, error: 'Invalid email or password.' };
          db.settings.sessionUserId = u.id; save();
          return { ok: true, user: { id: u.id, displayName: u.displayName, email: u.email, role: u.role } };
        }
        try {
          const res = await fetch('/api/auth/login', {
            method: 'POST', credentials: 'include',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
          });
          const json = await res.json();
          if (json.ok && json.user) {
            // Store Bearer token for sync fallback
            if (json.token) localStorage.setItem('mxi_token', json.token);
            // Ensure the returned user is in our local db
            db.settings = db.settings || {};
            db.settings.sessionUserId = json.user.id;
            if (!db.users) db.users = [];
            const existing = db.users.find(u => u.id === json.user.id);
            if (!existing) db.users.push({ ...json.user, displayName: json.user.displayName,
              status: 'active', notifPrefs: { inapp: true, email: true, sms: false },
              discoverable: true, invoiceShow: {}, logoData: '' });
          }
          return json;
        } catch (e) { return { ok: false, error: 'Network error. Please try again.' }; }
      },

      // POST /api/auth/signup
      async signup({ displayName, email, password }) {
        if (!_IS_SERVER) {
          if (!displayName?.trim())               return { ok: false, error: 'Name is required.' };
          if (!email?.trim()||!email.includes('@'))return { ok: false, error: 'A valid email is required.' };
          if (!password||password.length < 6)     return { ok: false, error: 'Password must be at least 6 characters.' };
          if (db.users.find(u => u.email === email.trim())) return { ok: false, error: 'Email already exists.' };
          const u = { id: uuid(), role: 'standard', displayName: displayName.trim(),
            username: email.trim().split('@')[0], email: email.trim(), _pw: password,
            phone: '', address: '', photo: '', status: 'active',
            notifPrefs: { inapp: true, email: true, sms: false }, discoverable: true,
            createdAt: Date.now(), invoiceShow: {}, logoData: '' };
          db.users.push(u); db.settings.sessionUserId = u.id; save();
          return { ok: true, user: { id: u.id, displayName: u.displayName, email: u.email, role: u.role } };
        }
        try {
          const res = await fetch('/api/auth/signup', {
            method: 'POST', credentials: 'include',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ displayName, email, password })
          });
          const json = await res.json();
          if (json.ok && json.user) {
            if (json.token) localStorage.setItem('mxi_token', json.token);
            db.settings = db.settings || {};
            db.settings.sessionUserId = json.user.id;
            if (!db.users) db.users = [];
            db.users.push({ ...json.user, status: 'active',
              notifPrefs: { inapp: true, email: true, sms: false },
              discoverable: true, invoiceShow: {}, logoData: '' });
          }
          return json;
        } catch (e) { return { ok: false, error: 'Network error. Please try again.' }; }
      },

    let _fpRateLimit = null;
    async function doForgotPassword() {
      const email = document.getElementById('fp_email')?.value || '';
      const btn = document.getElementById('fpBtn');
      const errEl = document.getElementById('fp_err');
      const msgEl = document.getElementById('fp_msg');
      errEl.style.display = 'none';
      msgEl.style.display = 'none';

      if (!email.trim()) {
        errEl.textContent = 'Please enter your email address.';
        errEl.style.display = 'block';
        return;
      }

      if (_fpRateLimit) {
        errEl.textContent = 'Please wait before requesting another reset link.';
        errEl.style.display = 'block';
        return;
      }

      if (btn) { btn.disabled = true; btn.textContent = 'Sending…'; }
      const res = await API.resetRequest({ email });
      if (btn) { btn.disabled = false; btn.textContent = 'Send Reset Link'; }

      if (!res.ok) {
        errEl.textContent = res.error || 'Failed to send reset link.';
        errEl.style.display = 'block';
        return;
      }

      msgEl.textContent = res.message || 'Check your email for a password reset link.';
      msgEl.style.display = 'block';

      // Rate limit: disable button for 60 seconds
      _fpRateLimit = true;
      if (btn) btn.disabled = true;
      let countdown = 60;
      const timer = setInterval(() => {
        countdown--;
        if (btn) btn.textContent = `Try again in ${countdown}s`;
        if (countdown <= 0) {
          clearInterval(timer);
          _fpRateLimit = false;
          if (btn) { btn.disabled = false; btn.textContent = 'Send Reset Link'; }
        }
      }, 1000);
    }

        pending:   '<span class="badge" style="background:rgba(251,191,36,.18);color:#d97706;">Pending</span>',
        accepted:  '<span class="badge badge-green">Accepted</span>',

      res.invites.forEach(inv => {
        const badge = _statusBadge[inv.status] || inv.status;
        const dateStr = new Date(inv.createdAt).toLocaleDateString();
        let actions = '';
        if (inv.status === 'pending' || inv.status === 'expired') {

      });
      tbl += '</tbody></table></div>';

    // Shared-with-me record management — persisted in localStorage
    let _sharedHidden   = new Set(JSON.parse(localStorage.getItem('mxi_sh_hidden') || '[]'));
    let _sharedOffsets  = JSON.parse(localStorage.getItem('mxi_sh_off') || '{}'); // {token: amount}
    let _sharedNoLedger = new Set(JSON.parse(localStorage.getItem('mxi_sh_noledger') || '[]')); // tokens excluded from ledger

      localStorage.setItem('mxi_sh_hidden',   JSON.stringify([..._sharedHidden]));

    // ── Unified Record Layer helpers ─────────────────────────────────────────
    // Flip sender's txType to recipient's perspective for storage in db.entries
    function _flipTxType(t) {
      return {
        they_owe_you: 'you_owe_them',
        you_owe_them: 'they_owe_you',
        invoice:      'invoice',
        bill:         'bill',
        lend:         'borrow',
        borrow:       'lend',
        they_paid_you:'you_paid_them',
        you_paid_them:'they_paid_you',
        gift:         'gift'
      }[t] || t;
    }

    // Insert a confirmed shared record into db.entries with isShared:true
    // Idempotent — will not re-insert if shareToken already present
    function _insertSharedEntry(r) {
      if (!r || !r.token) return;
      const entry = r.entry;
      if (!entry) return;
      const u = curUser();
      if (!u) return;

      // Resolve contact ID from sender name/email
      const senderEmail = (entry.fromEmail || entry.fromName || '').toLowerCase().trim();
      const senderName  = entry._resolvedFromName || entry.fromName || '';
      // Prefer a non-email display name — check if fromName looks like an email
      const _looksLikeEmail = senderName.includes('@');
      // Try to find existing contact by email first (most reliable), then by name
      let contact = db.contacts.find(c =>
        c.userId === u.id && senderEmail && (c.email || '').toLowerCase().trim() === senderEmail
      ) || db.contacts.find(c =>
        c.userId === u.id && !_looksLikeEmail && (c.name || '').toLowerCase().trim() === senderName.toLowerCase().trim()
      );
      // Use the contact's name (not the email) for display
      const dispName = contact ? contact.name : (_looksLikeEmail ? senderEmail.split('@')[0] : senderName);

      // Auto-create contact if none found — confirming a shared record establishes
      // a relationship; without a cId the entry never appears in getLedger totals
      if (!contact && (dispName || senderEmail)) {
        contact = {
          id: uuid(), userId: u.id,
          name: dispName || senderEmail.split('@')[0],
          email: senderEmail || '',
          notes: 'Auto-created from confirmed shared record',
          tags: [], startToy: 0, startYot: 0,
          createdAt: Date.now()
        };
        db.contacts.push(contact);
      }

      const siteUrl = entry.siteUrl || 'https://moneyinteractions.com';

      // Idempotency: if entry already exists (e.g. inserted by migration before confirm),
      // UPDATE it — remove noLedger and assign cId — instead of bailing silently.
      // This handles the case where migration inserted the entry with noLedger:true
      // before our fix, and the user is now clicking "Confirm & Track".
      const existing = db.entries.find(e => e.shareToken === r.token);
      if (existing) {
        delete existing.noLedger;
        if (!existing.cId && contact) existing.cId = contact.id;
        // Don't save() here — caller batches all updates then saves once
        return;
      }

      const isSettlementReceipt = entry.txType === 'they_paid_you' || entry.txType === 'you_paid_them' || entry.linkedInvoiceId;
      const newEntry = {
        id:           uuid(),
        userId:       u.id,
        cId:          contact ? contact.id : null,
        amount:       entry.amount,
        txType:       _flipTxType(entry.txType || 'they_owe_you'),
        senderTxType: entry.txType || 'they_owe_you', // original sender perspective
        date:         entry.date || new Date().toISOString().slice(0,10),
        status:       isSettlementReceipt ? 'payment' : (entry.status || 'posted'),
        notes:        entry.note || '',
        invoiceNumber:entry.invoiceNumber || '',
        isShared:     true,          // KEY: unified record layer
        isReceipt:    isSettlementReceipt || false,
        shareToken:   r.token,       // link back to share_tokens
        // Always use the sender's name from the token (their actual current name),
        // not the locally-stored contact name which may be stale or an old display name.
        fromName:     entry.fromName || dispName,
        fromEmail:    entry.fromEmail || '',
        fromSiteUrl:  siteUrl,
        currency:     entry.currency || 'USD',
        // noLedger NOT set — confirmed shared records are ledger-active by default
        // (user chose "Confirm & Track" — they want this in their balance)
        sharedAt:     r.sharedAt || null,
        createdAt:    r.sharedAt ? new Date(r.sharedAt).getTime() : Date.now()
      };
      db.entries.push(newEntry);
      // Don't save() here — caller batches all inserts then saves once
    }

    // Preview handler for proof-of-payment file upload
    let _shMarkPaidProofData = null;
    let _shMarkPaidProofFilename = null;
    function _sharedMarkPaidPreviewProof(input) {
      const file = input.files[0];
      const preview = document.getElementById('shMarkPaidProofPreview');
      const errEl   = document.getElementById('shMarkPaidErr');
      _shMarkPaidProofData = null;
      _shMarkPaidProofFilename = null;
      if (!file) { if (preview) preview.style.display = 'none'; return; }
      // Validate 2MB max
      if (file.size > 2 * 1024 * 1024) {
        if (errEl) { errEl.textContent = 'File too large — 2MB maximum.'; errEl.style.display = 'block'; }
        input.value = '';
        if (preview) preview.style.display = 'none';
        return;
      }
      if (errEl) errEl.style.display = 'none';
      const reader = new FileReader();
      reader.onload = e => {
        _shMarkPaidProofData = e.target.result;
        _shMarkPaidProofFilename = file.name;
        if (preview) {
          if (file.type === 'application/pdf') {
            preview.innerHTML = `<div style="display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;font-size:12px;">

              <span>${esc(file.name)}</span>
              <button onclick="_shMarkPaidClearProof()" style="margin-left:auto;background:none;border:none;color:var(--red);cursor:pointer;font-size:14px;">✕</button>
            </div>`;
          } else {
            preview.innerHTML = `<div style="position:relative;display:inline-block;">
              <img src="${e.target.result}" style="max-width:100%;max-height:160px;border-radius:6px;border:1px solid var(--border);">
              <button onclick="_shMarkPaidClearProof()" style="position:absolute;top:4px;right:4px;background:rgba(0,0,0,.6);border:none;color:#fff;border-radius:50%;width:22px;height:22px;font-size:12px;cursor:pointer;line-height:1;">✕</button>

    function _shMarkPaidClearProof() {
      _shMarkPaidProofData = null;
      _shMarkPaidProofFilename = null;
      const input = document.getElementById('shMarkPaidProof');
      if (input) input.value = '';
      const preview = document.getElementById('shMarkPaidProofPreview');
      if (preview) { preview.innerHTML = ''; preview.style.display = 'none'; }

    async function _sharedMarkPaidSubmit(token, remainingAmt, totalAmt) {
      const fullAmt = remainingAmt; // "full" in context = remaining balance
      const rawVal = (document.getElementById('shMarkPaidAmt')?.value || '').trim();
      const errEl  = document.getElementById('shMarkPaidErr');
      const btn    = document.getElementById('shMarkPaidBtn');
      const amt    = rawVal === '' ? fullAmt : parseFloat(rawVal);
      if (isNaN(amt) || amt <= 0) {
        if (errEl) { errEl.textContent = 'Enter a valid amount greater than zero.'; errEl.style.display = 'block'; }
        return;
      }
      if (errEl) errEl.style.display = 'none';
      if (btn) { btn.disabled = true; btn.textContent = '⏳ Saving…'; }
      try {
        const bodyPayload = { action: 'mark-paid', token, settledAmt: amt, totalAmt: totalAmt || fullAmt };
        // Include proof data if uploaded
        if (_shMarkPaidProofData) {
          bodyPayload.proofData     = _shMarkPaidProofData;
          bodyPayload.proofFilename = _shMarkPaidProofFilename || 'proof';
        }
        const res = await fetch('/api/share', {
          method: 'POST', credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(bodyPayload)
        });
        const data = await res.json();
        if (data.ok) {
          // Clear proof state
          _shMarkPaidProofData = null;
          _shMarkPaidProofFilename = null;
          document.getElementById('shMarkPaidBg')?.remove();
          const newStatus  = data.status || (amt >= fullAmt ? 'settled' : 'partially_settled');
          const remaining  = data.remaining != null ? data.remaining : Math.max(0, fullAmt - amt);
          // Update in-memory cache — accumulate settled amount, not overwrite
          const _prevPaidCache = parseFloat(data.totalSettled || 0);
          const accumulatedAmt = _prevPaidCache > 0 ? _prevPaidCache : (totalAmt - remaining);
          const r = (_cachedSharedRecords || []).find(x => x.token === token);
          if (r && r.entry) {
            r.entry.status     = newStatus;
            r.entry.settledAmt = accumulatedAmt;
            r.entry.remaining  = remaining;
          }
          // Sync unified record layer
          const _se = db.entries.find(e => e.shareToken === token);
          if (_se) {
            _se.status     = newStatus;
            _se.settledAmt = accumulatedAmt;
            _se.remaining  = remaining;
            save();
          }
          toast('Payment recorded — awaiting confirmation');
          _loadSharedWithMe();
          if (_curPage === 'entries') renderEntries();
          if (_curPage === 'dash') renderDash();
          // Reconciliation check — find entry_id from cached shared records
          const _shRec = (_cachedSharedRecords || []).find(x => x.token === token);
          if (_shRec && _shRec.entry && _shRec.entry.id) _checkReconciliation(_shRec.entry.id);
        } else {
          toast(data.error || 'Failed to record settlement');
          if (btn) { btn.disabled = false; btn.textContent = '✅ Confirm Payment'; }
        }
      } catch(_) {
        toast('Failed to record settlement');
        if (btn) { btn.disabled = false; btn.textContent = '✅ Confirm Payment'; }
      }
    }

    // ── Settlement Review Modal (for sender to review proof and confirm/reject) ──

        const res = await fetch(`/api/share?t=${encodeURIComponent(token)}`, { credentials: 'include' });
        const data = await res.json();
        if (!data.ok) { toast('Could not load settlement details.'); return; }
        const entry   = data.entry || {};
        const pending = entry.pendingSettlement;
        const isPending = pending || entry.settlementPending;
        const isConfirmed = entry.settlementConfirmed;
        // Allow viewing proof even after confirmed/rejected
        if (!isPending && !isConfirmed && !entry.settlementProof) { toast('No settlement details to review.'); return; }

        const paymentAmt = pending ? parseFloat(pending.amount || 0) : parseFloat(entry.settledAmt || 0);
        const recipientName = pending?.recipientName || entry.contactName || 'Recipient';
        const proof     = entry.settlementProof || null;
        const totalAmt  = parseFloat(entry.amount || 0);
        const cumSettled = parseFloat(entry.settledAmt || 0);
        const remaining = parseFloat(entry.remaining || 0);
        const viewOnly  = !isPending; // already confirmed/rejected — view mode only

        // Build proof preview HTML
        let proofHtml = '<p style="color:var(--muted);font-size:13px;">No proof uploaded.</p>';

              <span style="font-size:24px;">📄</span>
              <div>
                <div style="font-size:13px;font-weight:600;">${esc(proof.filename || 'proof.pdf')}</div>
                <a href="${proof.data}" download="${esc(proof.filename || 'proof.pdf')}" style="font-size:12px;color:var(--accent);">Download PDF</a>
              </div>
            </div>`;
          } else {
            proofHtml = `<img src="${proof.data}" style="max-width:100%;max-height:300px;border-radius:8px;border:1px solid var(--border);cursor:pointer;" onclick="window.open(this.src,'_blank')">`;
          }
        }

        const statusLabel = isConfirmed ? '<span style="color:var(--green);font-weight:700;">✅ Confirmed</span>'
          : entry.settlementPending === false && !isConfirmed ? '<span style="color:var(--red);font-weight:700;">❌ Rejected</span>'
          : '<span style="color:#d97706;font-weight:700;">⏳ Pending</span>';

        document.getElementById('reviewSettlementBg')?.remove();
        const d = document.createElement('div');
        d.innerHTML = `<div id="reviewSettlementBg" style="position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:2000;display:flex;align-items:center;justify-content:center;padding:16px;" onclick="if(event.target===this)this.remove()">
          <div style="background:var(--card);border-radius:14px;max-width:440px;width:100%;padding:24px;box-shadow:0 20px 60px rgba(0,0,0,.25);max-height:90vh;overflow-y:auto;" onclick="event.stopPropagation()">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
              <h3 style="margin:0;font-size:16px;">${viewOnly ? 'Payment Details' : 'Review Payment'}</h3>
              <button class="gh sm" onclick="document.getElementById('reviewSettlementBg').remove()">✕</button>
            </div>
            ${viewOnly ? `<div style="margin-bottom:14px;">${statusLabel}</div>` : ''}
            <div style="background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:12px 14px;margin-bottom:14px;font-size:13px;line-height:1.8;">
              <div style="display:flex;justify-content:space-between;"><span style="color:var(--muted);">Paid by</span><strong>${esc(recipientName)}</strong></div>
              <div style="display:flex;justify-content:space-between;"><span style="color:var(--muted);">Payment amount</span><span style="font-weight:700;color:var(--green);">${fmt(paymentAmt)}</span></div>
              <div style="display:flex;justify-content:space-between;"><span style="color:var(--muted);">Total</span><span>${fmt(totalAmt)}</span></div>
              <div style="display:flex;justify-content:space-between;border-top:1px solid var(--border);margin-top:6px;padding-top:6px;"><span style="color:var(--muted);">Remaining</span><span style="font-weight:600;">${fmt(remaining)}</span></div>
            </div>
            <div style="margin-bottom:14px;">
              <label style="font-size:13px;font-weight:600;display:block;margin-bottom:8px;">Proof of Payment</label>
              ${proofHtml}
            </div>
            <div id="reviewSettlementErr" style="color:var(--red);font-size:12px;margin-bottom:12px;display:none;"></div>
            ${viewOnly ? `<div style="display:flex;gap:8px;justify-content:flex-end;border-top:1px solid var(--border);padding-top:14px;">
              <button class="bs sm" onclick="document.getElementById('reviewSettlementBg').remove()">Close</button>
            </div>` : `<div style="display:flex;gap:8px;justify-content:flex-end;border-top:1px solid var(--border);padding-top:14px;">
              <button class="bs sm" id="reviewSettlementRejectBtn" onclick="_reviewSettlementAction('${token}','reject')" style="color:var(--red);">Reject</button>
              <button class="btn sm" id="reviewSettlementConfirmBtn" onclick="_reviewSettlementAction('${token}','confirm')">Confirm Settlement</button>
            </div>`}
          </div>
        </div>`;
        document.body.appendChild(d.firstChild);
      } catch (e) {
        toast('Could not load settlement details.');
      }
    }

    async function _reviewSettlementAction(token, action) {
      const confirmBtn = document.getElementById('reviewSettlementConfirmBtn');
      const rejectBtn  = document.getElementById('reviewSettlementRejectBtn');
      const errEl      = document.getElementById('reviewSettlementErr');
      const apiAction  = action === 'confirm' ? 'confirm-settlement' : 'reject-settlement';
      const label      = action === 'confirm' ? 'Confirming…' : 'Rejecting…';

      if (action === 'reject' && !confirm('Reject this payment? The payer will be notified.')) return;

      if (confirmBtn) { confirmBtn.disabled = true; }
      if (rejectBtn)  { rejectBtn.disabled = true; }
      if (confirmBtn && action === 'confirm') confirmBtn.textContent = label;
      if (rejectBtn  && action === 'reject')  rejectBtn.textContent  = label;

      try {
        const res = await fetch('/api/share', {
          method: 'POST', credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: apiAction, token })
        });
        const data = await res.json();
        if (data.ok) {
          document.getElementById('reviewSettlementBg')?.remove();
          const msg = action === 'confirm'
            ? 'Settlement confirmed — reloading…'
            : 'Settlement rejected — payer notified';
          toast(msg);
          // Server already updated notif types + share token state.
          // Force full reload from server so everything syncs cleanly.
          window._pendingSettlements = {};
          window._settlementProofs = {};
          _loadCompleted = false;
          await load(); // pulls fresh data with updated notifs from server
          await _syncSentShareStatuses(); // re-reads share tokens
          _loadSharedWithMe();
          initApp();
          // Reconciliation check on confirm
          if (action === 'confirm' && data.entryId) _checkReconciliation(data.entryId);
        } else {
          if (errEl) { errEl.textContent = data.error || 'Action failed.'; errEl.style.display = 'block'; }
          if (confirmBtn) { confirmBtn.disabled = false; confirmBtn.textContent = 'Confirm Settlement'; }
          if (rejectBtn)  { rejectBtn.disabled  = false; rejectBtn.textContent  = 'Reject'; }
        }
      } catch (_) {
        if (errEl) { errEl.textContent = 'Network error — please try again.'; errEl.style.display = 'block'; }
        if (confirmBtn) { confirmBtn.disabled = false; confirmBtn.textContent = 'Confirm Settlement'; }
        if (rejectBtn)  { rejectBtn.disabled  = false; rejectBtn.textContent  = 'Reject'; }
      }
    }

    // Mark an invoice as fulfilled (sender action — invoice mode only)
    async function markFulfilled(eid) {
      const e = db.entries.find(x => x.id === eid); if (!e) return;
      if (!isInvoiceMode(e)) return toast('Fulfill is only available for invoices.');

      // Instant status change — no confirm dialog, no friction
      try {
        const res = await fetch('/api/share', {
          method: 'POST', credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'mark-fulfilled', entryId: eid })
        });
        const data = await res.json();
        if (data.ok) {
          e.status      = 'fulfilled';
          e.fulfilledAt = Date.now();
          try { await saveNow(); } catch(_) { save(); }
          logAudit('mark_fulfilled', { eid });
          toast('✅ Fulfilled');
          refreshCurPage();
          // Show optional details panel
          setTimeout(() => _showFulfillDetails(eid), 200);
        } else {
          toast('Failed: ' + (data.error || 'Unknown error'));
        }
      } catch (_) {
        toast('Network error — please try again.');
      }
    }

    async function _acceptShare(token) {
      const btn = document.getElementById('shareAcceptBtn');
      if (btn) { btn.disabled = true; btn.textContent = 'Linking…'; }
      try {
        await fetch('/api/share', {
          method: 'POST', credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'link', token })
        });
        sessionStorage.removeItem('pendingShareToken');
        sessionStorage.setItem('justLinkedShare', '1');
        // Auto-add sender as contact (immediate) — also runs as catch-up in _loadSharedWithMe
        if (_pendingShareEntry?.fromName && !_impersonatingDataUserId) {
          const u = curUser();
          if (u) {
            const nameLower = (_pendingShareEntry.fromName || '').toLowerCase().trim();
            const exists = db.contacts.find(c =>
              c.userId === u.id && (c.name || '').toLowerCase().trim() === nameLower
            );
            if (!exists) {
              db.contacts.push({
                id: uuid(), userId: u.id,
                name: _pendingShareEntry.fromName,
                email: _pendingShareEntry.fromEmail || '',
                phone: '', address: '', notes: 'Added from shared record',
                tags: [], archived: false, photo: '', linkedUserId: null,
                createdAt: Date.now()
              });
              try { await saveNow(); } catch(saveErr) { console.warn('[acceptShare] contact save failed:', saveErr); }
            }
          }
        }
        _pendingShareEntry = null;
      } catch(_) {}
      document.getElementById('shareConsentBg')?.remove();
      nav('dash');
    }

    // Confirm a shared record (Confirm & Track) — moves it into full tracking flow
    async function doConfirmShared(token) {
      try {
        const res = await fetch('/api/share', {
          method: 'POST', credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'confirm-shared', token })
        });
        const data = await res.json();
        if (!data.ok) return toast('Could not confirm record.');
        // Update local cache
        const r = _cachedSharedRecords.find(x => x.token === token);
        if (r) {
          r.confirmed = true;
          _insertSharedEntry(r); // ── Unified Record Layer: insert into db.entries
          // saveNow() MUST be called here — _loadSharedWithMe's migration loop finds
          // the entry already present and skips it, so saveNow() would never fire there.
          try { await saveNow(); } catch(_) { save(); }
        }
        toast('✅ Record confirmed — now tracked in Entries.');
        _loadSharedWithMe();
        if (_curPage === 'entries') renderEntries();
      } catch (_) { toast('Network error — please try again.'); }
    }

    // Dismiss a shared record — keeps it in Shared With You but hides the banner
    async function doDismissShared(token) {
      try {
        const res = await fetch('/api/share', {
          method: 'POST', credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'dismiss-shared', token })
        });
        const data = await res.json();
        if (!data.ok) return toast('Could not dismiss record.');
        // Update local cache
        const r = _cachedSharedRecords.find(x => x.token === token);
        if (r && r.entry) r.entry.dismissed = true;
        // ── Sync unified record layer: remove isShared entry from db.entries ─
        const _dimIdx = db.entries.findIndex(e => e.shareToken === token);
        if (_dimIdx !== -1) { db.entries.splice(_dimIdx, 1); save(); }
        toast('Record dismissed — stays in Shared With You only.');
        _loadSharedWithMe();
      } catch (_) { toast('Network error — please try again.'); }
    }

    // ── Notification polling ──────────────────────────────────────────────
    // Uses lightweight /api/notifs?since= endpoint instead of fetching the
    // entire data blob. Only returns new notifications since last poll.
    let _lastPollAt = 0;
    let _lastNotifTs = 0; // timestamp of newest known notification
    let _authFailed = false; // stop polling on auth failure
    async function _pollNotifs() {
      if (!_IS_SERVER || !curUser() || _authFailed) return;
      try {
        const _pollHeaders = {};
        const _pollTok = localStorage.getItem('mxi_token');
        if (_pollTok) _pollHeaders['Authorization'] = 'Bearer ' + _pollTok;
        const res = await fetch(`/api/notifs?since=${_lastNotifTs}`, { credentials: 'include', headers: _pollHeaders });
        if (res.status === 401) { _authFailed = true; return; }
        if (!res.ok) return;
        const { notifs, count } = await res.json();
        if (!Array.isArray(notifs) || notifs.length === 0) return;
        const existing = new Set((db.notifs || []).map(n => n.id));
        const incoming = notifs.filter(n => !existing.has(n.id));
        if (incoming.length === 0) return;
        // Track newest timestamp for next poll
        incoming.forEach(n => { if ((n.createdAt || 0) > _lastNotifTs) _lastNotifTs = n.createdAt; });
        db.notifs = [...(db.notifs || []), ...incoming];
        save();
        renderNav();
        if (_curPage === 'notifs') renderNotifs();
        else {
          const badge = document.querySelector('.nav-badge');
          if (badge) badge.classList.add('badge-pulse');
          setTimeout(() => badge?.classList.remove('badge-pulse'), 2000);
        }
      } catch (_) {}
    }

    // ── Sync sent-share statuses ──────────────────────────────────────────
    // Polls /api/share?sent=1 and updates the sender's own entry statuses
    // when recipients have viewed or confirmed the shared records.
    // Rules: status only moves forward (posted → viewed → accepted) —
    // never backwards, and never overrides settled/voided.
    const _SHARE_STATUS_ORDER = ['draft','posted','sent','viewed','accepted','rejected','disputed','partially_settled','settled','fulfilled','closed','voided'];
    // Track pending settlements per entry — maps entryId → shareToken
    window._pendingSettlements = {};

    async function _syncSentShareStatuses() {
      if (!_IS_SERVER || _impersonatingDataUserId || _authFailed) return;
      const u = curUser(); if (!u) return;
      try {
        const _sstHeaders = {};
        const _sstTok = localStorage.getItem('mxi_token');
        if (_sstTok) _sstHeaders['Authorization'] = 'Bearer ' + _sstTok;
        const res = await fetch('/api/share?sent=1', { credentials: 'include', headers: _sstHeaders });
        if (res.status === 401) { _authFailed = true; return; }
        if (!res.ok) return;
        const { sent } = await res.json();
        if (!Array.isArray(sent)) return;
        let changed = false;
        const prevPending = JSON.stringify(window._pendingSettlements);
        window._pendingSettlements = {};
        sent.forEach(tok => {
          if (!tok.entryId) return;
          const entry = db.entries.find(e => e.id === tok.entryId && e.userId === u.id);
          if (!entry) return;
          // Track pending settlements so we can show review buttons on entries
          // Also track confirmed settlements with proof for "view proof" access
          const ed = tok.entry || {};
          if (ed.settlementPending && ed.pendingSettlement) {
            window._pendingSettlements[tok.entryId] = tok.token;
          } else if (ed.settlementProof && !window._pendingSettlements[tok.entryId]) {
            // Store for "View Proof" button (non-pending, has proof)
            window._settlementProofs = window._settlementProofs || {};
            window._settlementProofs[tok.entryId] = tok.token;
          }
          // Determine target status from share token state
          let targetStatus = null;
          if (tok.confirmed)                       targetStatus = 'accepted';
          else if (tok.viewed && !tok.confirmed)   targetStatus = 'viewed';
          if (!targetStatus) return;
          const curIdx = _SHARE_STATUS_ORDER.indexOf(entry.status || 'posted');
          const newIdx = _SHARE_STATUS_ORDER.indexOf(targetStatus);
          if (newIdx > curIdx) {
            entry.status = targetStatus;
            changed = true;
            // Push in-app notification for status transitions — with persistent dedup
            // Track notified transitions in db.settings to survive reloads
            if (!db.settings._notifiedTransitions) db.settings._notifiedTransitions = {};
            const _transKey = entry.id + ':' + targetStatus;
            if (!db.settings._notifiedTransitions[_transKey]) {
              db.settings._notifiedTransitions[_transKey] = Date.now();
              const _cname = (db.contacts.find(c => c.id === entry.cId) || {}).name || 'Someone';
              const _eref  = entry.invoiceNumber || entry.docRef || entry.description || ('Entry #' + (entry.id||'').slice(-4));
              if (targetStatus === 'viewed') {
                db.notifs.push({
                  id: uuid(), userId: u.id, cId: entry.cId, eid: entry.id,
                  type: 'viewed', msg: `${_cname} viewed ${_eref}`,
                  channel: 'in-app', sent: false, who: 'them', sentTo: [],
                  read: false, createdAt: Date.now()
                });
              } else if (targetStatus === 'accepted') {
                db.notifs.push({
                  id: uuid(), userId: u.id, cId: entry.cId, eid: entry.id,
                  type: 'confirmed', msg: `${_cname} accepted/confirmed ${_eref}`,
                  channel: 'in-app', sent: false, who: 'them', sentTo: [],
                  read: false, createdAt: Date.now()
                });
              }
            }
          }
          // Notify sender when recipient submits a settlement/payment proof
          if (ed.settlementPending && ed.pendingSettlement) {
            const _alreadyNotified = (db.notifs||[]).some(n => n.type === 'settlement_pending' && n.eid === tok.entryId);
            if (!_alreadyNotified) {
              const _cname2 = (db.contacts.find(c => c.id === entry.cId) || {}).name || 'Someone';
              const _eref2  = entry.invoiceNumber || entry.docRef || entry.description || ('Entry #' + (entry.id||'').slice(-4));
              db.notifs.push({
                id: uuid(), userId: u.id, cId: entry.cId, eid: tok.entryId,
                type: 'settlement_pending',
                msg: `${_cname2} submitted a payment for ${_eref2} — review required`,
                channel: 'in-app', sent: false, who: 'them', sentTo: [],
                read: false, createdAt: Date.now()
              });
              changed = true;
            }
          }
        });
        const pendingChanged = JSON.stringify(window._pendingSettlements) !== prevPending;
        if (changed || pendingChanged) {
          if (changed) {
            // Use debounced save only — saveNow here causes feedback loops between
            // devices where status sync → save → other device detects change → reloads → repeats
            save();
            renderNav();
          }
          if (_curPage === 'entries' || _curPage === 'dash' || _curPage === 'notifs') refreshCurPage();
        }
      } catch (_) {}
    }

    function _startNotifPolling() {
      if (!_IS_SERVER) return;
      // Seed _lastNotifTs from existing notifs so first poll only fetches new ones
      (db.notifs || []).forEach(n => { if ((n.createdAt || 0) > _lastNotifTs) _lastNotifTs = n.createdAt; });
      // Poll every 30 seconds
      setInterval(_pollNotifs, 15_000);
      // Sync sent-share statuses immediately on load, then every 30 seconds
      _syncSentShareStatuses();
      setInterval(_syncSentShareStatuses, 30_000);
      // Process scheduled reminders every 60 seconds
      setInterval(_processScheduledReminders, 60_000);
      _processScheduledReminders();
      // Auto-sync removed — freshness polling handles cross-device sync.
      // Manual saves (saveNow) still push to server immediately.
      // Also re-check immediately when the user returns to the tab
      document.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'visible') {
          const now = Date.now();
          if (now - _lastPollAt > 5_000) { _lastPollAt = now; _pollNotifs(); _syncSentShareStatuses(); }
        }
      });
    }

    async function doResetPassword(token) {
      const pw = document.getElementById('rp_pw')?.value || '';
      const pwconf = document.getElementById('rp_pwconf')?.value || '';
      const btn = document.querySelector('.modal .btn');
      const errEl = document.getElementById('rp_err');
      errEl.style.display = 'none';

      if (!pw || !pwconf) {
        errEl.textContent = 'Please enter both passwords.';
        errEl.style.display = 'block';
        return;
      }

      if (pw !== pwconf) {
        errEl.textContent = 'Passwords do not match.';
        errEl.style.display = 'block';
        return;
      }

      if (pw.length < 6) {
        errEl.textContent = 'Password must be at least 6 characters.';
        errEl.style.display = 'block';
        return;
      }

      if (btn) { btn.disabled = true; btn.textContent = 'Updating…'; }
      const res = await API.resetConfirm({ token, password: pw });
      if (btn) { btn.disabled = false; btn.textContent = 'Update Password'; }

      if (!res.ok) {
        errEl.textContent = res.error || 'Failed to reset password.';
        errEl.style.display = 'block';
        return;
      }

      // Success
      const msgDiv = document.createElement('div');
      msgDiv.style.cssText = 'text-align:center;color:var(--green);font-size:14px;margin-bottom:10px;font-weight:600;';
      msgDiv.textContent = '✓ Password updated. You can now log in.';
      errEl.parentElement.insertBefore(msgDiv, errEl);

      // Redirect to login after 2s
      setTimeout(() => {
        window.location.href = '/';
      }, 2000);
    }

    window.addEventListener('load', async () => {
      // Check if this is a password reset page
      const params = new URLSearchParams(window.location.search);
      if (params.has('token')) {
        await load();
        showResetPasswordPage();
        return;
      }

      // ?register=1 or ?login=1 — auto-open modal after landing page renders
      const _autoModal = params.get('register') ? 'signup' : params.get('login') ? 'login' : null;

      // Try server session first; fall back to localStorage
      if (_IS_SERVER) {
        const session = await API.getSession();
        if (session.ok) {
          await load();
          await _linkPendingShare();
          _handleJoinGroupLink();
          initApp();
          _processPendingJoinGroup();
          return;
        }
        // No valid server session — show landing, then open modal if requested
        _handleJoinGroupLink(); // store pending join before showing login
        await load();
        renderLandingPage();
        // Check for invite token in URL — takes priority over auto-modal
        if (params.get('invite')) {
          setTimeout(() => _checkInviteParam(), 120);
          return;
        }
        if (_autoModal === 'signup') setTimeout(openSignupModal, 120);
        else if (_autoModal === 'login') setTimeout(openLoginModal, 120);
        return;
      }
      // Local file mode
      await load();
      if (isLoggedIn()) {
        await _linkPendingShare(); // process any pending share token even if already logged in
        initApp();
      } else {
        renderLandingPage();
        // Check for invite token in URL — takes priority over auto-modal
        if (params.get('invite')) {
          setTimeout(() => _checkInviteParam(), 120);
        } else if (_autoModal === 'signup') setTimeout(openSignupModal, 120);
        else if (_autoModal === 'login') setTimeout(openLoginModal, 120);
      }
    });
  </script>
</body>
</html>
