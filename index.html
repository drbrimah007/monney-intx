    async function saveProfile() {
      const u = curUser();
      const displayName = document.getElementById('pdisplayname').value.trim() || u.displayName;
      const newUsername = (document.getElementById('pusername')?.value||'').trim().replace(/\s+/g,'_');
      const newEmail = (document.getElementById('pemail')?.value||'').trim();
      if (!displayName) { alert('Display name is required.'); return; }
      if (!newEmail || !newEmail.includes('@')) { alert('A valid email is required.'); return; }
      // Update local state
      u.displayName = displayName;
      if (newUsername) u.username = newUsername;
      u.email = newEmail;
      u.phone = document.getElementById('pphone').value;
      u.address = document.getElementById('paddr').value;
      u.notifPrefs = {
        inapp: document.getElementById('pnotif_inapp')?.checked ?? (u.notifPrefs?.inapp !== false),
        email: document.getElementById('pnotif_email')?.checked ?? (u.notifPrefs?.email !== false),
        sms:   document.getElementById('pnotif_sms')?.checked   ?? (u.notifPrefs?.sms   || false)
      };
      u.discoverable = document.getElementById('pdiscoverable').checked;
      updateUserInfo();
      logAudit('update_profile', { uid: u.id });
      // Also update the server users table so changes persist across reloads
      if (_IS_SERVER) {
        try {
          // saveNow: push the full blob immediately so phone/address/notifPrefs
          // don't get lost if the user reloads before the debounce fires.
          await saveNow();
          const _tok = localStorage.getItem('mxi_token');
          const _headers = { 'Content-Type': 'application/json' };
          if (_tok) _headers['Authorization'] = 'Bearer ' + _tok;
          const res = await fetch('/api/auth/profile', {
            method: 'POST', credentials: 'include', headers: _headers,
            body: JSON.stringify({ displayName, username: newUsername || u.username, email: newEmail })
          });
          const data = await res.json();
          if (!data.ok) { toast('⚠️ ' + (data.error || 'Profile sync failed'), 4000); return; }
          toast('Profile saved');
        } catch (e) {
          toast('⚠️ Saved locally but server sync failed', 4000);
        }
      } else {
        save();
        toast('Profile saved');
      }
    }

    // ============ AUTH HELPERS ============
    function isLoggedIn() {
      // sessionUserId undefined → backward compat; auto-assign admin and treat as logged in
      if (db.settings.sessionUserId === undefined) {
        db.settings.sessionUserId = db.settings.currentUserId || 'admin_001';
        save();
        return true;
      }
      // sessionUserId explicitly null → logged out
      if (db.settings.sessionUserId === null) return false;
      // Verify the user record still exists
      return !!(db.users.find(u => u.id === db.settings.sessionUserId));
    }

    // ============ API LAYER ============
    // On Vercel: uses real fetch() calls to /api/* endpoints.
    // On file:// (local dev without server): falls back to localStorage ops.
    const API = {

      // POST /api/auth/login
      async login({ email, password }) {
        if (!_IS_SERVER) {
          // localStorage fallback
          const u = db.users.find(u =>
            (u.email === email.trim() || u.username === email.trim()) &&
            u._pw === password && u.status === 'active'
          );
          if (!u) return { ok: false, error: 'Invalid email or password.' };
          db.settings.sessionUserId = u.id; save();
          return { ok: true, user: { id: u.id, displayName: u.displayName, email: u.email, role: u.role } };
        }
        try {
          const res = await fetch('/api/auth/login', {
            method: 'POST', credentials: 'include',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
          });
          const json = await res.json();
          if (json.ok && json.user) {
            // Store Bearer token for sync fallback
            if (json.token) localStorage.setItem('mxi_token', json.token);
            // Ensure the returned user is in our local db
            db.settings = db.settings || {};
            db.settings.sessionUserId = json.user.id;
            if (!db.users) db.users = [];
            const existing = db.users.find(u => u.id === json.user.id);
            if (!existing) db.users.push({ ...json.user, displayName: json.user.displayName,
              status: 'active', notifPrefs: { inapp: true, email: true, sms: false },
              discoverable: true, invoiceShow: {}, logoData: '' });
          }
          return json;
        } catch (e) { return { ok: false, error: 'Network error. Please try again.' }; }
      },

      // POST /api/auth/signup
      async signup({ displayName, email, password }) {
        if (!_IS_SERVER) {
          if (!displayName?.trim())               return { ok: false, error: 'Name is required.' };
          if (!email?.trim()||!email.includes('@'))return { ok: false, error: 'A valid email is required.' };
          if (!password||password.length < 6)     return { ok: false, error: 'Password must be at least 6 characters.' };
          if (db.users.find(u => u.email === email.trim())) return { ok: false, error: 'Email already exists.' };
          const u = { id: uuid(), role: 'standard', displayName: displayName.trim(),
            username: email.trim().split('@')[0], email: email.trim(), _pw: password,
            phone: '', address: '', photo: '', status: 'active',
            notifPrefs: { inapp: true, email: true, sms: false }, discoverable: true,
            createdAt: Date.now(), invoiceShow: {}, logoData: '' };
          db.users.push(u); db.settings.sessionUserId = u.id; save();
          return { ok: true, user: { id: u.id, displayName: u.displayName, email: u.email, role: u.role } };
        }
        try {
          const res = await fetch('/api/auth/signup', {
            method: 'POST', credentials: 'include',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ displayName, email, password })
          });
          const json = await res.json();
          if (json.ok && json.user) {
            if (json.token) localStorage.setItem('mxi_token', json.token);
            db.settings = db.settings || {};
            db.settings.sessionUserId = json.user.id;
            if (!db.users) db.users = [];
            db.users.push({ ...json.user, status: 'active',
              notifPrefs: { inapp: true, email: true, sms: false },
              discoverable: true, invoiceShow: {}, logoData: '' });
          }
          return json;
        } catch (e) { return { ok: false, error: 'Network error. Please try again.' }; }
      },

        db.settings.sessionUserId = null;

    let _fpRateLimit = null;
    async function doForgotPassword() {
      const email = document.getElementById('fp_email')?.value || '';
      const btn = document.getElementById('fpBtn');
      const errEl = document.getElementById('fp_err');
      const msgEl = document.getElementById('fp_msg');
      errEl.style.display = 'none';
      msgEl.style.display = 'none';

      if (!email.trim()) {
        errEl.textContent = 'Please enter your email address.';
        errEl.style.display = 'block';
        return;
      }

      if (_fpRateLimit) {
        errEl.textContent = 'Please wait before requesting another reset link.';
        errEl.style.display = 'block';
        return;
      }

      if (btn) { btn.disabled = true; btn.textContent = 'Sending…'; }
      const res = await API.resetRequest({ email });
      if (btn) { btn.disabled = false; btn.textContent = 'Send Reset Link'; }

      if (!res.ok) {
        errEl.textContent = res.error || 'Failed to send reset link.';
        errEl.style.display = 'block';
        return;
      }

      msgEl.textContent = res.message || 'Check your email for a password reset link.';
      msgEl.style.display = 'block';

      // Rate limit: disable button for 60 seconds
      _fpRateLimit = true;
      if (btn) btn.disabled = true;
      let countdown = 60;
      const timer = setInterval(() => {
        countdown--;
        if (btn) btn.textContent = `Try again in ${countdown}s`;
        if (countdown <= 0) {
          clearInterval(timer);
          _fpRateLimit = false;
          if (btn) { btn.disabled = false; btn.textContent = 'Send Reset Link'; }
        }
      }, 1000);
    }

      const res = await API.login({ email, password: pw });
      if (btn) { btn.disabled = false; btn.textContent = 'Log In'; }
      if (!res.ok) {
        errEl.textContent = res.error;

      closeAuthModal();
      _loadCompleted = false; // reset so load() runs fresh for new session

    // Send invite from Contact Panel
    async function _sendInvite(contactId) {
      const c = db.contacts.find(x => x.id === contactId);
      if (!c || !c.email) { toast('Contact has no email address.'); return; }
      const res = await API.inviteCreate({ email: c.email, name: c.name, contactId: c.id });
      if (res.alreadyRegistered) {
        c.linkedUserId = true;
        save();
        toast(`${res.linkedName || c.name} is already on the platform — linked!`);
        openCP(contactId);
        return;
      }
      if (!res.ok) { toast(res.error || 'Failed to send invite.'); return; }
      toast(`Invite sent to ${c.email}!`);
    }

    // Accept invite after signup — called from doSignup
    async function _acceptPendingInvite() {
      let inviteToken;
      try { inviteToken = sessionStorage.getItem('pendingInviteToken'); } catch(_) {}
      if (!inviteToken) return;
      try {
        const res = await API.inviteAccept(inviteToken);
        sessionStorage.removeItem('pendingInviteToken');
        if (res.ok && res.inviterName) {
          setTimeout(() => toast(`Welcome! You've been connected with ${res.inviterName}.`), 500);
        }
      } catch(_) { sessionStorage.removeItem('pendingInviteToken'); }
    }

    // Check for ?invite=TOKEN on page load and open invite-aware signup
    async function _checkInviteParam() {
      const params = new URLSearchParams(window.location.search);
      const inviteToken = params.get('invite');
      if (!inviteToken) return false;

      const res = await API.inviteCheck(inviteToken);
      if (!res.ok) {
        toast(res.error || 'This invite link is no longer valid.');
        window.history.replaceState({}, '', window.location.pathname);
        return false;

      sessionStorage.setItem('pendingInviteToken', inviteToken);
      window.history.replaceState({}, '', window.location.pathname);
      _openInviteSignupModal(res.inviterName, res.email, res.name);
      return true;

    // Invite management section — renders in settings
    async function _renderInvitesSection() {
      const container = document.getElementById('invitesSection');
      if (!container) return;
      container.innerHTML = '<p style="color:var(--muted);font-size:13px;">Loading invites...</p>';

      const res = await API.inviteList();
      if (!res.ok || !res.invites || res.invites.length === 0) {
        container.innerHTML = '<p style="color:var(--muted);font-size:13px;">No invites sent yet. You can invite contacts from their profile page.</p>';
        return;
      }

      const _statusBadge = {
        pending:   '<span class="badge" style="background:rgba(251,191,36,.18);color:#d97706;">Pending</span>',
        accepted:  '<span class="badge badge-green">Accepted</span>',
        expired:   '<span class="badge" style="background:rgba(239,68,68,.12);color:#dc2626;">Expired</span>',
        cancelled: '<span class="badge" style="background:var(--bg3);color:var(--muted);">Cancelled</span>'
      };

      let tbl = '<div class="tbl-wrap"><table style="font-size:13px;"><thead><tr><th>Name</th><th>Email</th><th>Status</th><th>Sent</th><th>Actions</th></tr></thead><tbody>';
      res.invites.forEach(inv => {
        const badge = _statusBadge[inv.status] || inv.status;
        const dateStr = new Date(inv.createdAt).toLocaleDateString();
        let actions = '';
        if (inv.status === 'pending' || inv.status === 'expired') {
          actions += `<button class="bs sm" onclick="_resendInvite('${inv.token}')">Resend</button> `;
        }
        if (inv.status === 'pending') {
          actions += `<button class="bs sm" style="color:var(--red);" onclick="_cancelInvite('${inv.token}')">Cancel</button>`;
        }
        tbl += `<tr><td>${inv.name || '\u2014'}</td><td>${inv.email}</td><td>${badge}</td><td>${dateStr}</td><td>${actions}</td></tr>`;
      });
      tbl += '</tbody></table></div>';
      container.innerHTML = tbl;
    }

    // Called after login/signup — fetches the pending share entry and shows
    // an Accept / Decline modal. Actual linking only happens on explicit accept.
    async function _linkPendingShare() {
      let token;
      try { token = sessionStorage.getItem('pendingShareToken'); } catch(_) {}
      if (!token) return;
      try {
        const r = await fetch('/api/share?t=' + encodeURIComponent(token), { credentials: 'include' });
        const d = await r.json();
        if (!d.ok) { sessionStorage.removeItem('pendingShareToken'); return; }
        _showShareConsentModal(token, d.entry);
      } catch(_) { sessionStorage.removeItem('pendingShareToken'); }
    }

    let _pendingShareEntry   = null; // holds entry data during consent flow
    let _cachedSharedRecords = []; // pending/unconfirmed shared records — confirmed ones live in db.entries (isShared:true)
    // Shared-with-me record management — persisted in localStorage
    let _sharedHidden   = new Set(JSON.parse(localStorage.getItem('mxi_sh_hidden') || '[]'));
    let _sharedOffsets  = JSON.parse(localStorage.getItem('mxi_sh_off') || '{}'); // {token: amount}
    let _sharedNoLedger = new Set(JSON.parse(localStorage.getItem('mxi_sh_noledger') || '[]')); // tokens excluded from ledger

    function _saveSharedPrefs() {
      localStorage.setItem('mxi_sh_hidden',   JSON.stringify([..._sharedHidden]));
      localStorage.setItem('mxi_sh_off',      JSON.stringify(_sharedOffsets));

    // ── Unified Record Layer helpers ─────────────────────────────────────────
    // Flip sender's txType to recipient's perspective for storage in db.entries
    function _flipTxType(t) {
      return {
        they_owe_you: 'you_owe_them',
        you_owe_them: 'they_owe_you',
        invoice:      'invoice',
        bill:         'bill',
        lend:         'borrow',
        borrow:       'lend',
        they_paid_you:'you_paid_them',
        you_paid_them:'they_paid_you',
        gift:         'gift'
      }[t] || t;
    }

    // Insert a confirmed shared record into db.entries with isShared:true
    // Idempotent — will not re-insert if shareToken already present
    function _insertSharedEntry(r) {
      if (!r || !r.token) return;
      const entry = r.entry;
      if (!entry) return;
      const u = curUser();
      if (!u) return;

      // Resolve contact ID from sender name/email
      const senderEmail = (entry.fromEmail || entry.fromName || '').toLowerCase().trim();
      const senderName  = entry._resolvedFromName || entry.fromName || '';
      // Prefer a non-email display name — check if fromName looks like an email
      const _looksLikeEmail = senderName.includes('@');
      // Try to find existing contact by email first (most reliable), then by name
      let contact = db.contacts.find(c =>
        c.userId === u.id && senderEmail && (c.email || '').toLowerCase().trim() === senderEmail
      ) || db.contacts.find(c =>
        c.userId === u.id && !_looksLikeEmail && (c.name || '').toLowerCase().trim() === senderName.toLowerCase().trim()
      );
      // Use the contact's name (not the email) for display
      const dispName = contact ? contact.name : (_looksLikeEmail ? senderEmail.split('@')[0] : senderName);

      // Auto-create contact if none found — confirming a shared record establishes
      // a relationship; without a cId the entry never appears in getLedger totals
      if (!contact && (dispName || senderEmail)) {
        contact = {
          id: uuid(), userId: u.id,
          name: dispName || senderEmail.split('@')[0],
          email: senderEmail || '',
          notes: 'Auto-created from confirmed shared record',
          tags: [], startToy: 0, startYot: 0,
          createdAt: Date.now()
        };
        db.contacts.push(contact);
      }

      const siteUrl = entry.siteUrl || 'https://moneyinteractions.com';

      // Idempotency: if entry already exists (e.g. inserted by migration before confirm),
      // UPDATE it — remove noLedger and assign cId — instead of bailing silently.
      // This handles the case where migration inserted the entry with noLedger:true
      // before our fix, and the user is now clicking "Confirm & Track".
      const existing = db.entries.find(e => e.shareToken === r.token);
      if (existing) {
        delete existing.noLedger;
        if (!existing.cId && contact) existing.cId = contact.id;
        // Don't save() here — caller batches all updates then saves once
        return;
      }

      const isSettlementReceipt = entry.txType === 'they_paid_you' || entry.txType === 'you_paid_them' || entry.linkedInvoiceId;
      const newEntry = {
        id:           uuid(),
        userId:       u.id,
        cId:          contact ? contact.id : null,
        amount:       entry.amount,
        txType:       _flipTxType(entry.txType || 'they_owe_you'),
        senderTxType: entry.txType || 'they_owe_you', // original sender perspective
        date:         entry.date || new Date().toISOString().slice(0,10),
        status:       isSettlementReceipt ? 'payment' : (entry.status || 'posted'),
        notes:        entry.note || '',
        invoiceNumber:entry.invoiceNumber || '',
        isShared:     true,          // KEY: unified record layer
        isReceipt:    isSettlementReceipt || false,
        shareToken:   r.token,       // link back to share_tokens
        // Always use the sender's name from the token (their actual current name),
        // not the locally-stored contact name which may be stale or an old display name.
        fromName:     entry.fromName || dispName,
        fromEmail:    entry.fromEmail || '',
        fromSiteUrl:  siteUrl,
        currency:     entry.currency || 'USD',
        // noLedger NOT set — confirmed shared records are ledger-active by default
        // (user chose "Confirm & Track" — they want this in their balance)
        sharedAt:     r.sharedAt || null,
        createdAt:    r.sharedAt ? new Date(r.sharedAt).getTime() : Date.now()
      };
      db.entries.push(newEntry);
      // Don't save() here — caller batches all inserts then saves once
    }

    // Preview handler for proof-of-payment file upload
    let _shMarkPaidProofData = null;
    let _shMarkPaidProofFilename = null;
    function _sharedMarkPaidPreviewProof(input) {
      const file = input.files[0];
      const preview = document.getElementById('shMarkPaidProofPreview');
      const errEl   = document.getElementById('shMarkPaidErr');
      _shMarkPaidProofData = null;
      _shMarkPaidProofFilename = null;
      if (!file) { if (preview) preview.style.display = 'none'; return; }

      if (file.size > 2 * 1024 * 1024) {
        if (errEl) { errEl.textContent = 'File too large — 2MB maximum.'; errEl.style.display = 'block'; }
        input.value = '';
        if (preview) preview.style.display = 'none';
        return;
      }

      const reader = new FileReader();
      reader.onload = e => {
        _shMarkPaidProofData = e.target.result;
        _shMarkPaidProofFilename = file.name;
        if (preview) {
          if (file.type === 'application/pdf') {
            preview.innerHTML = `<div style="display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;font-size:12px;">

    async function _sharedMarkPaidSubmit(token, remainingAmt, totalAmt) {
      const fullAmt = remainingAmt; // "full" in context = remaining balance
      const rawVal = (document.getElementById('shMarkPaidAmt')?.value || '').trim();
      const errEl  = document.getElementById('shMarkPaidErr');
      const btn    = document.getElementById('shMarkPaidBtn');
      const amt    = rawVal === '' ? fullAmt : parseFloat(rawVal);
      if (isNaN(amt) || amt <= 0) {
        if (errEl) { errEl.textContent = 'Enter a valid amount greater than zero.'; errEl.style.display = 'block'; }
        return;
      }
      if (errEl) errEl.style.display = 'none';
      if (btn) { btn.disabled = true; btn.textContent = '⏳ Saving…'; }
      try {
        const bodyPayload = { action: 'mark-paid', token, settledAmt: amt, totalAmt: totalAmt || fullAmt };
        // Include proof data if uploaded
        if (_shMarkPaidProofData) {
          bodyPayload.proofData     = _shMarkPaidProofData;
          bodyPayload.proofFilename = _shMarkPaidProofFilename || 'proof';
        }
        const res = await fetch('/api/share', {
          method: 'POST', credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(bodyPayload)
        });
        const data = await res.json();
        if (data.ok) {
          // Clear proof state
          _shMarkPaidProofData = null;
          _shMarkPaidProofFilename = null;
          document.getElementById('shMarkPaidBg')?.remove();
          const newStatus  = data.status || (amt >= fullAmt ? 'settled' : 'partially_settled');
          const remaining  = data.remaining != null ? data.remaining : Math.max(0, fullAmt - amt);
          // Update in-memory cache — accumulate settled amount, not overwrite
          const _prevPaidCache = parseFloat(data.totalSettled || 0);
          const accumulatedAmt = _prevPaidCache > 0 ? _prevPaidCache : (totalAmt - remaining);
          const r = (_cachedSharedRecords || []).find(x => x.token === token);
          if (r && r.entry) {
            r.entry.status     = newStatus;
            r.entry.settledAmt = accumulatedAmt;
            r.entry.remaining  = remaining;
          }
          // Sync unified record layer
          const _se = db.entries.find(e => e.shareToken === token);
          if (_se) {
            _se.status     = newStatus;
            _se.settledAmt = accumulatedAmt;
            _se.remaining  = remaining;
            save();
          }
          toast('Payment recorded — awaiting confirmation');
          _loadSharedWithMe();
          if (_curPage === 'entries') renderEntries();
          if (_curPage === 'dash') renderDash();
          // Reconciliation check — find entry_id from cached shared records
          const _shRec = (_cachedSharedRecords || []).find(x => x.token === token);
          if (_shRec && _shRec.entry && _shRec.entry.id) _checkReconciliation(_shRec.entry.id);
        } else {
          toast(data.error || 'Failed to record settlement');
          if (btn) { btn.disabled = false; btn.textContent = '✅ Confirm Payment'; }
        }
      } catch(_) {
        toast('Failed to record settlement');
        if (btn) { btn.disabled = false; btn.textContent = '✅ Confirm Payment'; }
      }
    }

        document.getElementById('reviewSettlementBg')?.remove();

    async function _reviewSettlementAction(token, action) {
      const confirmBtn = document.getElementById('reviewSettlementConfirmBtn');
      const rejectBtn  = document.getElementById('reviewSettlementRejectBtn');
      const errEl      = document.getElementById('reviewSettlementErr');
      const apiAction  = action === 'confirm' ? 'confirm-settlement' : 'reject-settlement';
      const label      = action === 'confirm' ? 'Confirming…' : 'Rejecting…';

      if (action === 'reject' && !confirm('Reject this payment? The payer will be notified.')) return;

      if (confirmBtn) { confirmBtn.disabled = true; }
      if (rejectBtn)  { rejectBtn.disabled = true; }
      if (confirmBtn && action === 'confirm') confirmBtn.textContent = label;
      if (rejectBtn  && action === 'reject')  rejectBtn.textContent  = label;

      try {
        const res = await fetch('/api/share', {
          method: 'POST', credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: apiAction, token })
        });
        const data = await res.json();
        if (data.ok) {
          document.getElementById('reviewSettlementBg')?.remove();
          const msg = action === 'confirm'
            ? 'Settlement confirmed — reloading…'
            : 'Settlement rejected — payer notified';
          toast(msg);
          // Server already updated notif types + share token state.
          // Force full reload from server so everything syncs cleanly.
          window._pendingSettlements = {};
          window._settlementProofs = {};
          _loadCompleted = false;
          await load(); // pulls fresh data with updated notifs from server
          await _syncSentShareStatuses(); // re-reads share tokens
          _loadSharedWithMe();
          initApp();
          // Reconciliation check on confirm
          if (action === 'confirm' && data.entryId) _checkReconciliation(data.entryId);
        } else {
          if (errEl) { errEl.textContent = data.error || 'Action failed.'; errEl.style.display = 'block'; }
          if (confirmBtn) { confirmBtn.disabled = false; confirmBtn.textContent = 'Confirm Settlement'; }
          if (rejectBtn)  { rejectBtn.disabled  = false; rejectBtn.textContent  = 'Reject'; }
        }
      } catch (_) {
        if (errEl) { errEl.textContent = 'Network error — please try again.'; errEl.style.display = 'block'; }
        if (confirmBtn) { confirmBtn.disabled = false; confirmBtn.textContent = 'Confirm Settlement'; }
        if (rejectBtn)  { rejectBtn.disabled  = false; rejectBtn.textContent  = 'Reject'; }
      }
    }

    // Mark an invoice as fulfilled (sender action — invoice mode only)
    async function markFulfilled(eid) {
      const e = db.entries.find(x => x.id === eid); if (!e) return;
      if (!isInvoiceMode(e)) return toast('Mark Fulfilled is only available for invoices.');
      if (!confirm('Mark this invoice as Fulfilled? This records that the goods/services have been fully delivered. This cannot be undone.')) return;
      try {
        const res = await fetch('/api/share', {
          method: 'POST', credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'mark-fulfilled', entryId: eid })
        });
        const data = await res.json();
        if (data.ok) {
          e.status      = 'fulfilled';
          e.fulfilledAt = Date.now();
          try { await saveNow(); } catch(_) { save(); }
          logAudit('mark_fulfilled', { eid });
          toast('✅ Invoice marked as Fulfilled');
          refreshCurPage();
        } else {
          toast('Failed to mark as fulfilled: ' + (data.error || 'Unknown error'));
        }
      } catch (_) {
        toast('Network error — please try again.');
      }
    }

    async function _acceptShare(token) {
      const btn = document.getElementById('shareAcceptBtn');
      if (btn) { btn.disabled = true; btn.textContent = 'Linking…'; }
      try {
        await fetch('/api/share', {
          method: 'POST', credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'link', token })
        });
        sessionStorage.removeItem('pendingShareToken');
        sessionStorage.setItem('justLinkedShare', '1');
        // Auto-add sender as contact (immediate) — also runs as catch-up in _loadSharedWithMe
        if (_pendingShareEntry?.fromName && !_impersonatingDataUserId) {
          const u = curUser();
          if (u) {
            const nameLower = (_pendingShareEntry.fromName || '').toLowerCase().trim();
            const exists = db.contacts.find(c =>
              c.userId === u.id && (c.name || '').toLowerCase().trim() === nameLower
            );
            if (!exists) {
              db.contacts.push({
                id: uuid(), userId: u.id,
                name: _pendingShareEntry.fromName,
                email: _pendingShareEntry.fromEmail || '',
                phone: '', address: '', notes: 'Added from shared record',
                tags: [], archived: false, photo: '', linkedUserId: null,
                createdAt: Date.now()
              });
              try { await saveNow(); } catch(saveErr) { console.warn('[acceptShare] contact save failed:', saveErr); }
            }
          }
        }
        _pendingShareEntry = null;
      } catch(_) {}
      document.getElementById('shareConsentBg')?.remove();
      nav('dash');
    }

    function _declineShare() {
      try { sessionStorage.removeItem('pendingShareToken'); } catch(_) {}
      document.getElementById('shareConsentBg')?.remove();
      toast('Record declined — nothing was added to your account.');
    }

    // Open a contact's detail view by ID (used by clickable names in Shared With You)
    // openCP() opens a modal overlay — works from any page, no navigation required
    function cLink_open(cId) {
      if (!cId) return;
      openCP(cId);
    }

    // Confirm a shared record (Confirm & Track) — moves it into full tracking flow
    async function doConfirmShared(token) {
      try {
        const res = await fetch('/api/share', {
          method: 'POST', credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'confirm-shared', token })
        });
        const data = await res.json();
        if (!data.ok) return toast('Could not confirm record.');
        // Update local cache
        const r = _cachedSharedRecords.find(x => x.token === token);
        if (r) {
          r.confirmed = true;
          _insertSharedEntry(r); // ── Unified Record Layer: insert into db.entries
          // saveNow() MUST be called here — _loadSharedWithMe's migration loop finds
          // the entry already present and skips it, so saveNow() would never fire there.
          try { await saveNow(); } catch(_) { save(); }
        }
        toast('✅ Record confirmed — now tracked in Entries.');
        _loadSharedWithMe();
        if (_curPage === 'entries') renderEntries();
      } catch (_) { toast('Network error — please try again.'); }
    }

    // Dismiss a shared record — keeps it in Shared With You but hides the banner
    async function doDismissShared(token) {
      try {
        const res = await fetch('/api/share', {
          method: 'POST', credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'dismiss-shared', token })
        });
        const data = await res.json();
        if (!data.ok) return toast('Could not dismiss record.');
        // Update local cache
        const r = _cachedSharedRecords.find(x => x.token === token);
        if (r && r.entry) r.entry.dismissed = true;
        // ── Sync unified record layer: remove isShared entry from db.entries ─
        const _dimIdx = db.entries.findIndex(e => e.shareToken === token);
        if (_dimIdx !== -1) { db.entries.splice(_dimIdx, 1); save(); }
        toast('Record dismissed — stays in Shared With You only.');
        _loadSharedWithMe();
      } catch (_) { toast('Network error — please try again.'); }
    }

    async function doLogout() {
      db.settings.impersonating = null;
      await API.logout(); // clears cookie + localStorage
      db = defDB();
      document.getElementById('shell').classList.add('hidden');
      renderLandingPage();

    function initApp() {
      document.getElementById('landing').classList.remove('active');
      document.getElementById('landing').innerHTML = '';
      document.getElementById('shell').classList.remove('hidden');
      updateUserInfo();
      renderImpersonateBanner();
      renderNav();
      // Handle deep link: ?entry=ID — open that entry's invoice directly
      const _dlParams = new URLSearchParams(window.location.search);
      const _dlEntry  = _dlParams.get('entry');
      if (_dlEntry && db.entries.find(x => x.id === _dlEntry)) {
        window.history.replaceState({}, '', window.location.pathname);
        nav('entries');
        setTimeout(() => openEntryInvoice(_dlEntry), 250);
      } else {
        // Restore page from URL hash (survives refresh)
        const hashPage = (location.hash || '').replace('#', '').trim();
        nav(hashPage || 'dash');
      }
      // Support browser back/forward
      window.addEventListener('hashchange', () => {
        const p = (location.hash || '').replace('#', '').trim();
        if (p && p !== _curPage) nav(p, true);
      });
      // Show username prompt if user hasn't set one yet
      setTimeout(checkAndShowUsernamePrompt, 300);
      // Start background notification polling
      _startNotifPolling();
      // Backfill share tokens for existing entries that pre-date auto-linking (fire-and-forget)
      if (_IS_SERVER && curRole() === 'standard') {
        setTimeout(() => {
          // Backfill: create share tokens for sender's existing entries
          fetch('/api/share', {
            method: 'POST', credentials: 'include',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'backfill' })
          }).catch(() => {});
          // Claim-pending: auto-link any tokens sent to this user's email before they registered
          fetch('/api/share', {
            method: 'POST', credentials: 'include',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'claim-pending' })
          }).then(r => r.json()).then(d => {
            if (d.claimed > 0) {
              // New records were just linked — refresh shared panel
              _loadSharedWithMe();
            }
          }).catch(() => {});
        }, 2000); // slight delay so initApp finishes rendering first
      }
    }

    // ── Notification polling ──────────────────────────────────────────────
    // Uses lightweight /api/notifs?since= endpoint instead of fetching the
    // entire data blob. Only returns new notifications since last poll.
    let _lastPollAt = 0;
    let _lastNotifTs = 0; // timestamp of newest known notification
    let _authFailed = false; // stop polling on auth failure
    async function _pollNotifs() {
      if (!_IS_SERVER || !curUser() || _authFailed) return;
      try {
        const _pollHeaders = {};
        const _pollTok = localStorage.getItem('mxi_token');
        if (_pollTok) _pollHeaders['Authorization'] = 'Bearer ' + _pollTok;
        const res = await fetch(`/api/notifs?since=${_lastNotifTs}`, { credentials: 'include', headers: _pollHeaders });
        if (res.status === 401) { _authFailed = true; return; }
        if (!res.ok) return;
        const { notifs, count } = await res.json();
        if (!Array.isArray(notifs) || notifs.length === 0) return;
        const existing = new Set((db.notifs || []).map(n => n.id));
        const incoming = notifs.filter(n => !existing.has(n.id));
        if (incoming.length === 0) return;
        // Track newest timestamp for next poll
        incoming.forEach(n => { if ((n.createdAt || 0) > _lastNotifTs) _lastNotifTs = n.createdAt; });
        db.notifs = [...(db.notifs || []), ...incoming];
        save();
        renderNav();
        if (_curPage === 'notifs') renderNotifs();
        else {
          const badge = document.querySelector('.nav-badge');
          if (badge) badge.classList.add('badge-pulse');
          setTimeout(() => badge?.classList.remove('badge-pulse'), 2000);
        }
      } catch (_) {}
    }

    // ── Sync sent-share statuses ──────────────────────────────────────────
    // Polls /api/share?sent=1 and updates the sender's own entry statuses
    // when recipients have viewed or confirmed the shared records.
    // Rules: status only moves forward (posted → viewed → accepted) —
    // never backwards, and never overrides settled/voided.
    const _SHARE_STATUS_ORDER = ['draft','posted','sent','viewed','accepted','rejected','disputed','partially_settled','settled','fulfilled','closed','voided'];
    // Track pending settlements per entry — maps entryId → shareToken
    window._pendingSettlements = {};

    async function _syncSentShareStatuses() {
      if (!_IS_SERVER || _impersonatingDataUserId || _authFailed) return;
      const u = curUser(); if (!u) return;
      try {
        const _sstHeaders = {};
        const _sstTok = localStorage.getItem('mxi_token');
        if (_sstTok) _sstHeaders['Authorization'] = 'Bearer ' + _sstTok;
        const res = await fetch('/api/share?sent=1', { credentials: 'include', headers: _sstHeaders });
        if (res.status === 401) { _authFailed = true; return; }
        if (!res.ok) return;
        const { sent } = await res.json();
        if (!Array.isArray(sent)) return;
        let changed = false;
        const prevPending = JSON.stringify(window._pendingSettlements);
        window._pendingSettlements = {};
        sent.forEach(tok => {
          if (!tok.entryId) return;
          const entry = db.entries.find(e => e.id === tok.entryId && e.userId === u.id);
          if (!entry) return;
          // Track pending settlements so we can show review buttons on entries
          // Also track confirmed settlements with proof for "view proof" access
          const ed = tok.entry || {};
          if (ed.settlementPending && ed.pendingSettlement) {
            window._pendingSettlements[tok.entryId] = tok.token;
          } else if (ed.settlementProof && !window._pendingSettlements[tok.entryId]) {
            // Store for "View Proof" button (non-pending, has proof)
            window._settlementProofs = window._settlementProofs || {};
            window._settlementProofs[tok.entryId] = tok.token;
          }
          // Determine target status from share token state
          let targetStatus = null;
          if (tok.confirmed)                       targetStatus = 'accepted';
          else if (tok.viewed && !tok.confirmed)   targetStatus = 'viewed';
          if (!targetStatus) return;
          const curIdx = _SHARE_STATUS_ORDER.indexOf(entry.status || 'posted');
          const newIdx = _SHARE_STATUS_ORDER.indexOf(targetStatus);
          if (newIdx > curIdx) {
            entry.status = targetStatus;
            changed = true;
          }
        });
        const pendingChanged = JSON.stringify(window._pendingSettlements) !== prevPending;
        if (changed || pendingChanged) {
          if (changed) save();
          if (_curPage === 'entries' || _curPage === 'dash') refreshCurPage();
        }
      } catch (_) {}
    }

    function _startNotifPolling() {
      if (!_IS_SERVER) return;
      // Seed _lastNotifTs from existing notifs so first poll only fetches new ones
      (db.notifs || []).forEach(n => { if ((n.createdAt || 0) > _lastNotifTs) _lastNotifTs = n.createdAt; });
      // Poll every 30 seconds
      setInterval(_pollNotifs, 30_000);
      // Sync sent-share statuses immediately on load, then every 60 seconds
      _syncSentShareStatuses();
      setInterval(_syncSentShareStatuses, 60_000);
      // Auto-sync to server every 5 minutes so blob stays fresh for reconciliation
      setInterval(() => { if (!_authFailed) saveNow().catch(() => {}); }, 300_000);
      // Also re-check immediately when the user returns to the tab
      document.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'visible') {
          const now = Date.now();
          if (now - _lastPollAt > 10_000) { _lastPollAt = now; _pollNotifs(); _syncSentShareStatuses(); }
        }
      });
    }

    function showResetPasswordPage() {
      const params = new URLSearchParams(window.location.search);
      const token = params.get('token');
      if (!token) { renderLandingPage(); return; }

      document.getElementById('shell').classList.add('hidden');
      const lp = document.getElementById('landing');
      lp.classList.add('active');
      lp.innerHTML = `
        <div class="lp-topnav">
          <div class="lp-topnav-brand">
            <img src="${esc(db.settings?.logoData || 'money.png')}" style="height:56px;border-radius:6px"
                 onerror="this.style.display='none';this.nextElementSibling.style.display=''"
                 alt="logo">
            <strong style="display:none">${esc(db.settings?.appName || 'Money IntX')}</strong>
          </div>
        </div>
        <div style="flex:1;display:flex;align-items:center;justify-content:center;padding:40px 16px;">
          <div class="modal auth-modal" style="max-width:400px;">
            <div class="modal-title" style="margin-bottom:20px;">Set New Password</div>

            <div class="fg">
              <label>New Password</label>

            </div>
            <div class="fg">
              <label>Confirm Password</label>
              <input id="rp_pwconf" type="password" placeholder="••••••••" autocomplete="new-password" onkeydown="if(event.key==='Enter')doResetPassword('${esc(token)}')">
            </div>
            <div id="rp_err" class="err" style="margin-bottom:10px;display:none"></div>
            <button class="btn" style="width:100%" onclick="doResetPassword('${esc(token)}')">Update Password</button>
            <p style="text-align:center;font-size:12px;color:var(--muted);margin-top:14px;">
              <button class="gh sm" style="color:var(--accent);font-weight:600" onclick="window.location.href='/'">Back to Login</button>
            </p>
          </div>
        </div>
      `;
      setTimeout(() => document.getElementById('rp_pw')?.focus(), 80);
    }

    async function doResetPassword(token) {
      const pw = document.getElementById('rp_pw')?.value || '';
      const pwconf = document.getElementById('rp_pwconf')?.value || '';
      const btn = document.querySelector('.modal .btn');
      const errEl = document.getElementById('rp_err');
      errEl.style.display = 'none';

      if (!pw || !pwconf) {
        errEl.textContent = 'Please enter both passwords.';
        errEl.style.display = 'block';
        return;
      }

      if (pw !== pwconf) {
        errEl.textContent = 'Passwords do not match.';
        errEl.style.display = 'block';
        return;
      }

      if (pw.length < 6) {
        errEl.textContent = 'Password must be at least 6 characters.';
        errEl.style.display = 'block';
        return;
      }

      if (btn) { btn.disabled = true; btn.textContent = 'Updating…'; }
      const res = await API.resetConfirm({ token, password: pw });
      if (btn) { btn.disabled = false; btn.textContent = 'Update Password'; }

      if (!res.ok) {
        errEl.textContent = res.error || 'Failed to reset password.';
        errEl.style.display = 'block';
        return;
      }

      // Success
      const msgDiv = document.createElement('div');
      msgDiv.style.cssText = 'text-align:center;color:var(--green);font-size:14px;margin-bottom:10px;font-weight:600;';
      msgDiv.textContent = '✓ Password updated. You can now log in.';
      errEl.parentElement.insertBefore(msgDiv, errEl);

      // Redirect to login after 2s
      setTimeout(() => {
        window.location.href = '/';
      }, 2000);
    }

    // ============ INIT ============
    window.addEventListener('load', async () => {
      // Check if this is a password reset page
      const params = new URLSearchParams(window.location.search);
      if (params.has('token')) {
        await load();
        showResetPasswordPage();
        return;
      }

      // ?register=1 or ?login=1 — auto-open modal after landing page renders
      const _autoModal = params.get('register') ? 'signup' : params.get('login') ? 'login' : null;

      // Try server session first; fall back to localStorage
      if (_IS_SERVER) {
        const session = await API.getSession();
        if (session.ok) {
          await load();
          await _linkPendingShare(); // process any pending share token even if already logged in
          initApp();
          return;
        }
        // No valid server session — show landing, then open modal if requested
        await load();
        renderLandingPage();
        // Check for invite token in URL — takes priority over auto-modal
        if (params.get('invite')) {
          setTimeout(() => _checkInviteParam(), 120);
          return;
        }
        if (_autoModal === 'signup') setTimeout(openSignupModal, 120);
        else if (_autoModal === 'login') setTimeout(openLoginModal, 120);
        return;
      }
      // Local file mode
      await load();
      if (isLoggedIn()) {
        await _linkPendingShare(); // process any pending share token even if already logged in
        initApp();
      } else {
        renderLandingPage();
        // Check for invite token in URL — takes priority over auto-modal
        if (params.get('invite')) {
          setTimeout(() => _checkInviteParam(), 120);
        } else if (_autoModal === 'signup') setTimeout(openSignupModal, 120);
        else if (_autoModal === 'login') setTimeout(openLoginModal, 120);
      }
    });
  </script>
