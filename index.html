          html += `<tr style="background:${isPending?'rgba(251,191,36,.05)':'rgba(108,99,255,.04)'};"${_sm&&window._selectedEntries.has(_selSharedId)?' class="row-selected"':''}>
            ${_sm ? `<td class="sel-col"><input type="checkbox" class="sel-cb entry-sel-cb" data-id="${esc(_selSharedId)}" ${window._selectedEntries.has(_selSharedId)?'checked':''} onchange="_toggleEntrySelect('${esc(_selSharedId)}')"></td>` : ''}
            <td>${nameHtmlE} ${sharedPill}${_sNoLedgPill}</td>
            <td class="hide-mobile"><span style="color:var(--muted);">—</span></td>
            <td>${_sAmtHtml}</td>
            <td class="hide-mobile"><span style="font-weight:700;color:${dirColor}">${esc(dirLabel)}</span></td>
            <td>${dt}</td>
            <td>${statusBadge(e?.status||'posted', e)}</td>
            <td><div class="action-menu"><button class="action-menu-btn" onclick="toggleActionMenu(this)">⋮</button><div class="action-dropdown">
              <a href="${esc(siteUrl)}/view?t=${esc(r.token)}" target="_blank" style="display:block;padding:8px 14px;font-size:13px;color:var(--accent);text-decoration:none;font-weight:600;">👁 View</a>
              ${isPending && !_isSettlementEntry(r.entry) ? `<button onclick="doConfirmShared('${esc(r.token)}')" style="color:#16a34a;font-weight:700;">✅ Confirm &amp; Track</button><button onclick="doDismissShared('${esc(r.token)}')" style="color:var(--red);">✕ Dismiss</button>` : ''}
              ${!isSettledE ? `<button onclick="_sharedMarkPaid('${esc(r.token)}')" style="color:var(--green);font-weight:700;">💰 Record Payment</button>` : ''}
              ${(e?.txType === 'you_owe_them' || e?.txType === 'borrow') && !isSettledE ? `<button onclick="_selfRemindMe('${esc(r.token)}')" style="color:var(--accent);font-weight:700;">⏰ Remind Me</button>` : ''}
              ${_sNoLedger
                ? `<button onclick="_sharedNoLedger.delete('${esc(r.token)}');_saveSharedPrefs();toast('📊 Restored to ledger');renderEntries();">📊 Restore to Ledger</button>`
                : `<button onclick="_sharedNoLedger.add('${esc(r.token)}');_saveSharedPrefs();toast('⊘ Removed from ledger');renderEntries();">⊘ Rm Ledger</button>`}
              <button onclick="_sharedExpire('${esc(r.token)}')">⏰ Expire</button>
            </div></div></td>
          </tr>`;
        } else if (isSharedEntry) {
          // ── Confirmed shared entry (isShared:true in db.entries) ────────
          // txType is already flipped to recipient's perspective, but invoice/bill stay as-is.
          // Use recipient-perspective color: invoice/bill/they_owe_you = red (recipient owes).
          const e = item;
          const rawAmt    = parseFloat(e.amount || 0);
          const dt        = e.date ? new Date(e.date).toLocaleDateString() : '—';
          const dirLabel  = TXL[e.txType] || e.txType;
          // For shared entries, use recipient color perspective (invoice = they owe = red/danger)
          const _sharedSenderTx = e.senderTxType || e.txType;
          const dirColor  = (_sharedSenderTx==='they_owe_you'||_sharedSenderTx==='invoice'||_sharedSenderTx==='bill'||_sharedSenderTx==='lend')
            ? 'var(--red)' : 'var(--green)';
          const dispName  = e.fromName || '—';
          const _senderCE = (() => {
            const nl = dispName.toLowerCase().trim();
            const ef = (e.fromEmail || '').toLowerCase().trim();
            return db.contacts.find(c => c.userId === u.id && (
              (c.name||'').toLowerCase().trim() === nl ||
              (ef && (c.email||'').toLowerCase().trim() === ef)
            )) || null;
          })();
          const nameHtmlSE = _senderCE
            ? `<a href="#" onclick="cLink_open('${_senderCE.id}');return false;" style="color:var(--accent);text-decoration:none;font-weight:700;">${esc(dispName)}</a>`
            : `<strong>${esc(dispName)}</strong>`;
          const sharedPillSE = `<span style="font-size:10px;background:rgba(108,99,255,.12);color:var(--accent);border-radius:4px;padding:1px 5px;margin-left:3px;">🔗 Shared</span>`;
          const isSettledSE   = e.status === 'settled' || e.status === 'paid' || e.status === 'fulfilled';
          const isTerminalSE  = isSettledSE || e.status === 'cancelled' || e.status === 'voided';
          const _noLedgPillSE = e.noLedger ? `<span title="Excluded from ledger balance" style="font-size:9px;background:rgba(245,158,11,.15);color:#b45309;border-radius:3px;padding:1px 4px;margin-left:3px;font-weight:700;">⊘ Ledger</span>` : '';
          const viewUrl = `${e.fromSiteUrl||'https://moneyinteractions.com'}/view?t=${esc(e.shareToken)}`;
          // Remind: shown when sender's original txType was you_owe_them or borrow
          // (meaning from recipient's perspective: they_owe_you/lend — they owe recipient)
          const isRemindableSE = (e.senderTxType === 'you_owe_them' || e.senderTxType === 'borrow') && !isTerminalSE;
          // Amount cell with paid/remaining breakdown
          const _sePaid = parseFloat(e.settledAmt || 0);
          const _seRem  = e.remaining != null ? parseFloat(e.remaining) : Math.max(0, rawAmt - _sePaid);
          const _seAmtHtml = _sePaid > 0
            ? `<strong>${fmt(rawAmt)}</strong><div class="mobile-label" style="font-size:11px;font-weight:700;color:${dirColor};margin-top:2px;">${esc(dirLabel)}</div><div style="font-size:11px;color:var(--muted);margin-top:1px;">Paid&nbsp;${fmt(_sePaid)}</div><div style="font-size:11px;font-weight:700;color:${_seRem<=0?'var(--green)':'var(--amber)'};">Bal&nbsp;${fmt(_seRem)}</div>`
            : `<strong>${fmt(rawAmt)}</strong><div class="mobile-label" style="font-size:11px;font-weight:700;color:${dirColor};margin-top:2px;">${esc(dirLabel)}</div>`;
          html += `<tr style="background:rgba(108,99,255,.04);"${_sm&&window._selectedEntries.has(e.id)?' class="row-selected"':''}>
            ${_sm ? `<td class="sel-col"><input type="checkbox" class="sel-cb entry-sel-cb" data-id="${e.id}" ${window._selectedEntries.has(e.id)?'checked':''} onchange="_toggleEntrySelect('${e.id}')"></td>` : ''}
            <td>${nameHtmlSE} ${sharedPillSE}${_noLedgPillSE}</td>
            <td class="hide-mobile"><span style="color:var(--muted);">—</span></td>
            <td>${_seAmtHtml}</td>
            <td class="hide-mobile"><span style="font-weight:700;color:${dirColor}">${esc(dirLabel)}</span></td>
            <td>${dt}</td>
            <td>${statusBadge(e.status || 'posted', e)}</td>
            <td><div class="action-menu"><button class="action-menu-btn" onclick="toggleActionMenu(this)">⋮</button><div class="action-dropdown">
              <a href="${viewUrl}" target="_blank" style="display:block;padding:8px 14px;font-size:13px;color:var(--accent);text-decoration:none;font-weight:600;">👁 View</a>
              ${!isTerminalSE ? `<button onclick="_sharedMarkPaid('${esc(e.shareToken)}')" style="color:var(--green);font-weight:700;">💰 Record Payment</button>` : ''}
              ${isRemindableSE ? `<button onclick="_selfRemindMe('${esc(e.shareToken)}')" style="color:var(--accent);font-weight:700;">⏰ Remind Me</button>` : ''}
              ${e.noLedger
                ? `<button onclick="(function(){var _se=db.entries.find(x=>x.id==='${e.id}');if(_se){delete _se.noLedger;save();toast('📊 Restored to ledger');renderEntries();}})()">📊 Restore to Ledger</button>`
                : `<button onclick="(function(){var _se=db.entries.find(x=>x.id==='${e.id}');if(_se){_se.noLedger=true;save();toast('⊘ Removed from ledger');renderEntries();}})()">⊘ Rm Ledger</button>`}
              <button onclick="_sharedExpire('${esc(e.shareToken)}')">⏰ Expire</button>
              <button onclick="delEntry('${esc(e.id)}')" style="color:var(--red);">🗑 Delete</button>
            </div></div></td>
          </tr>`;
        } else {
          // ── Own entry row ───────────────────────────────────────────────
          const e = item;
          const c = db.contacts.find(x => x.id === e.cId);
          const _isSel = _sm && window._selectedEntries.has(e.id);
          const _isRcpt = e.isReceipt || (e.settledByRecipient && e.linkedInvoiceId);
          const _noLedgPill = (e.noLedger && !_isRcpt) ? `<span title="Excluded from ledger balance" style="font-size:9px;background:rgba(245,158,11,.15);color:#b45309;border-radius:3px;padding:1px 4px;margin-left:3px;font-weight:700;">⊘ Ledger</span>` : '';
          const _rcptPill = _isRcpt ? `<span style="font-size:9px;background:rgba(22,163,74,.1);color:#16a34a;border-radius:3px;padding:1px 4px;margin-left:3px;font-weight:700;">📋 Receipt</span>` : '';
          html += `<tr${_isSel?' class="row-selected"':''}>
            ${_sm ? `<td class="sel-col"><input type="checkbox" class="sel-cb entry-sel-cb" data-id="${e.id}" ${_isSel?'checked':''} onchange="_toggleEntrySelect('${e.id}')"></td>` : ''}
            <td>${cLink(e.cId, c?.name || '—')}${_noLedgPill}${_rcptPill}</td>
            <td class="hide-mobile">${(()=>{ const lbl = e.invoiceNumber || (e.entryNum ? '#'+String(e.entryNum).padStart(4,'0') : null); return lbl ? `<button class="gh sm" style="font-size:12px;font-weight:700;color:var(--accent);padding:2px 6px;" onclick="openEntryInvoice('${e.id}')" title="View record">${esc(lbl)}</button>` : '<span style="color:var(--muted);">—</span>'; })()}</td>
            <td>${_fmtAmtCell(e.id,`<div class="mobile-label" style="font-size:11px;font-weight:700;color:${txTypeColor(e.txType)};margin-top:2px;">${esc(TXL[e.txType]||e.txType)}</div>`)}</td>
            <td class="hide-mobile"><button class="gh sm" style="font-size:13px;padding:2px 6px;font-weight:700;color:${txTypeColor(e.txType)};" onclick="openEntryInvoice('${e.id}')" title="View record">${esc(TXL[e.txType]||e.txType)}</button></td>
            <td>${new Date(e.date).toLocaleDateString()}</td>
            <td>${statusBadge(e.status, e)}${_isRcpt ? '' : _reminderBadge(e.reminderCount, e.id)}${!_isRcpt && window._pendingSettlements?.[e.id] ? `<span class="badge" style="background:rgba(245,158,11,.12);color:#d97706;font-size:10px;margin-left:4px;cursor:pointer;" onclick="_reviewSettlement('${window._pendingSettlements[e.id]}')">⏳ Review Payment</span>` : ''}</td>
            <td>${_isRcpt ? `<div class="action-menu"><button class="action-menu-btn" onclick="toggleActionMenu(this)">⋮</button><div class="action-dropdown"><button onclick="openEntryInvoice('${e.id}')">📄 View</button><button onclick="delEntry('${e.id}')" style="color:var(--red);">🗑 Delete</button></div></div>` : `<div class="action-menu"><button class="action-menu-btn" onclick="toggleActionMenu(this)">⋮</button><div class="action-dropdown">
              <button onclick="openEntryInvoice('${e.id}')">📄 View</button>
              <button onclick="editEntry('${e.id}')">✏️ Edit</button>
              ${window._pendingSettlements?.[e.id] ? `<button onclick="_reviewSettlement('${window._pendingSettlements[e.id]}')" style="color:#d97706;font-weight:700;">⏳ Review Payment</button>` : (window._settlementProofs?.[e.id] ? `<button onclick="_reviewSettlement('${window._settlementProofs[e.id]}')">📎 View Proof</button>` : '')}
              ${(isInvoiceMode(e) || e.txType === 'they_owe_you' || e.txType === 'you_owe_them') && e.status !== 'settled' && e.status !== 'voided' && e.status !== 'fulfilled' && e.status !== 'cancelled' ? `<button onclick="recordSettlement('${e.id}')">💰 Settle</button>` : ''}
              ${isInvoiceMode(e) && e.status !== 'fulfilled' && e.status !== 'voided' && e.status !== 'cancelled' ? `<button onclick="markFulfilled('${e.id}')" style="color:#16a34a;font-weight:700;">✅ Mark Fulfilled</button>` : ''}
              <button onclick="openNotifyModal('${e.id}')">🔔 Send Reminder</button>
              <button onclick="openShareModal('${e.id}')">🔗 Share</button>
              <button onclick="duplicateEntry('${e.id}')">📋 Duplicate</button>
              <button onclick="toggleArchiveEntry('${e.id}')">${e.archived ? '📤 Unarchive' : '📥 Archive'}</button>
              ${e.status !== 'voided' && e.status !== 'fulfilled' ? `<button onclick="voidEntry('${e.id}')" style="color:var(--amber);">🚫 Void</button>` : ''}
              <button onclick="${e.status==='closed' ? 'reopenEntry' : 'openCloseModal'}('${e.id}')">${e.status==='closed' ? '🔓 Reopen' : '🔒 Close Record'}</button>
              ${e.noLedger ? `<button onclick="(function(){var _e=db.entries.find(x=>x.id==='${e.id}');if(_e){delete _e.noLedger;save();toast('Restored to ledger');renderEntries();}})()">📊 Restore to Ledger</button>` : `<button onclick="(function(){var _e=db.entries.find(x=>x.id==='${e.id}');if(_e){_e.noLedger=true;save();toast('Removed from ledger');renderEntries();}})()">⊘ Remove from Ledger</button>`}
              <button onclick="delEntry('${e.id}')" style="color: var(--red);">🗑 Delete</button>
            </div></div>`}</td>
          </tr>`;
        }
      });

      html += `</tbody></table></div>`;
      html += `<p style="font-size: 12px; color: var(--muted); margin-top: 12px;">Page ${p.page} of ${p.pages}</p>

      // Placeholder for Shared With You section below entries (dashboard-style)
      if (isStd) {
        html += `<div id="entries-shared-with-me" style="margin-top:0;"></div>`;

      document.getElementById('content').innerHTML = html;

      // ── Floating bulk action bar — injected to body so it's truly fixed ──
      document.getElementById('_bulkBar')?.remove();
      if (_sm) {
        const _bulkEl = document.createElement('div');
        const _initVis = window._selectedEntries.size > 0 ? ' visible' : '';
        _bulkEl.innerHTML = `<div id="_bulkBar" class="bulk-bar${_initVis}">
          <span class="bulk-count" id="_bulkCount">${window._selectedEntries.size} selected</span>

          <button onclick="_bulkAction('unarchive')">📤 Unarchive</button>
          <button onclick="_bulkAction('void')" style="color:var(--amber);border-color:var(--amber);">🚫 Void</button>

          <button onclick="_bulkAction('ledger')">📊 Restore Ledger</button>
          <button onclick="_bulkAction('delete')" class="bulk-del">🗑 Delete</button>
          <button onclick="_toggleSelectMode()" class="bulk-cancel">✕ Cancel</button>
        </div>`;
        document.body.appendChild(_bulkEl.firstElementChild);
      }
      // Load/refresh shared-with-me data (updates both tab counts and the section below)
      // Skip if we were called FROM _loadSharedWithMe to prevent infinite loop
      if (isStd && !window._sharedLoadInProgress) {
        _loadSharedWithMe();
      }
      // Attach debounced search handler
      const searchInput = document.getElementById('entries_search_input');
      if (searchInput) {
        searchInput.addEventListener('input', debounceSearch('_search_entries', () => {
          PG.entries = 1;
          renderEntries();
          const inp = document.getElementById('entries_search_input');
          if (inp) { inp.focus(); try { const l = inp.value.length; inp.setSelectionRange(l, l); } catch(_) {} }
        }));
      }
    }

    // ── ENTRY FORM (new + edit) ────────────────────────────────────────
    // Holds the currently active template for the open entry form
    let _entryTpl = null;
    let _entryFormCid = null; // preserves contact across template switch
    let _entryDirection = null; // 'they_owe_you' | 'you_owe_them' — set by direction picker

    function txOpts(allowed, sel) {
      const all = [['they_owe_you','They Owe Me'],['they_paid_you','They Settled Me'],['you_owe_them','I Owe Them'],['you_paid_them','I Settled Them']];
      const list = allowed && allowed.length ? all.filter(([k])=>allowed.includes(k)) : all;
      return list.map(([k,v])=>`<option value="${k}" ${sel===k?'selected':''}>${v}</option>`).join('');
    }

    // Settlement-only statuses — must only be reached via recordSettlement(), never via direct dropdown
    const _SETTLEMENT_STATUSES = new Set(['settled','paid','partially_settled']);

    function statusOpts(sel, excludeSettlement) {
      // excludeSettlement=true: hide settled/paid/partially_settled from dropdowns in entry forms
      // so the only path to those statuses is the recordSettlement() payment flow.
      // If the current status IS a settlement status, show it as a disabled read-only option
      // so the user can see the state but cannot manually toggle it back.
      let opts = '';
      if (excludeSettlement && _SETTLEMENT_STATUSES.has(sel)) {
        const label = ENTRY_STATUS[sel] || sel;
        opts += `<option value="${sel}" selected disabled>🔒 ${label} (via settlement flow)</option>`;
      }
      Object.entries(ENTRY_STATUS).forEach(([k,v]) => {
        if (excludeSettlement && _SETTLEMENT_STATUSES.has(k)) return; // block manual selection
        opts += `<option value="${k}" ${sel===k?'selected':''}>${v}</option>`;
      });
      return opts;
    }

    function entryFormBody(cid, tpl, existingEntry, direction) {
      const e = existingEntry;
      const u = curUser();
      const contacts = curRole()==='admin' ? db.contacts : db.contacts.filter(c=>c.userId===u.id);
      const cOpts = contacts.map(c=>`<option value="${c.id}" ${(cid||e?.cId)===c.id?'selected':''}>${esc(c.name)}</option>`).join('');
      const allowedTx = tpl?.fields?.filter(f=>f.ledgerEffect).map(f=>f.ledgerEffect) || [];
      const dateVal = e ? new Date(e.date).toISOString().split('T')[0] : new Date().toISOString().split('T')[0];
      // Effective direction: from param, or infer from existing entry's txType
      const effDir = direction || (e ? (
        (e.txType==='they_owe_you'||e.txType==='invoice'||e.txType==='bill'||e.txType==='they_paid_you') ? 'they_owe_you' : 'you_owe_them'
      ) : null);

      let html = '';
      // ── Template selector ────────────────────────────────────────────
      const allMyTpls = curRole()==='admin' ? db.templates : db.templates.filter(t=>t.userId===u.id&&!t.archived);
      // Filter templates to match the selected direction
      const myTpls = effDir === 'they_owe_you'
        ? allMyTpls.filter(t => !t.txType || t.txType==='they_owe_you' || t.txType==='invoice' || t.txType==='bill')
        : effDir === 'you_owe_them'
        ? allMyTpls.filter(t => t.txType==='you_owe_them')
        : allMyTpls;
      html += `<div class="fg" style="margin-bottom:6px;">
        <label style="font-weight:700;">Template</label>
        <select id="ne_tpl" onchange="switchEntryTemplate(this.value,'${cid||''}')">
          <option value="">📋 Simple / Personal Record</option>
          ${myTpls.map(t=>`<option value="${t.id}" ${tpl?.id===t.id?'selected':''}>${esc(t.name)}</option>`).join('')}
        </select>
      </div>`;
      // ── Active template banner ────────────────────────────────────────
      if (tpl) {
        html += `<div style="background:rgba(108,99,255,.15);border:1px solid var(--accent);border-radius:8px;padding:8px 14px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;">
          <span style="font-size:13px;font-weight:700;color:var(--accent);">📋 Using template: ${esc(tpl.name)}</span>
          ${tpl.desc?`<span style="font-size:12px;color:var(--muted);">${esc(tpl.desc)}</span>`:''}
        </div>`;
      }
      html += `<hr style="border:none;border-top:1px solid var(--border);margin:8px 0 14px;">`;
      // ── Core fields ──────────────────────────────────────────────────
      html += `<div class="fg"><label>Contact *</label>
        <div style="display:flex;gap:8px;align-items:flex-start;">
          ${buildContactSearch(contacts, cid||e?.cId||'', 'necon')}
          <button type="button" class="btn sm" onclick="openQuickContactModal()" style="flex-shrink:0;padding:10px 14px;">+ New</button>
        </div>
      </div>`;
      if (tpl) {
        // Transaction type + document number are fixed by the template.
        // In edit mode use the already-assigned invoice number, not the template counter.
        const docNum = e?.invoiceNumber || `${tpl.invoicePrefix||'INV-'}${String(tpl.invoiceNextNum||1).padStart(4,'0')}`;
        const txLabel = TXL[tpl.txType] || tpl.txType || 'Invoice';
        const txColor = (tpl.txType==='invoice'||tpl.txType==='bill'||tpl.txType==='they_owe_you') ? 'var(--green)' : 'var(--red)';
        html += `<div style="display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;">
          <div style="flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 14px;">
            <div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px;">Transaction Type</div>
            <div style="font-weight:700;color:${txColor};">${esc(txLabel)}</div>
          </div>
          <div style="flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 14px;">
            <div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px;">Document #</div>
            <div style="font-weight:700;font-size:16px;">${esc(docNum)}</div>
          </div>
        </div>`;
      } else {
        // Blank entry — transaction type is pre-scoped by the direction selected
        const preSel = e?.txType || (effDir==='they_owe_you' ? 'they_owe_you' : effDir==='you_owe_them' ? 'you_owe_them' : '');
        const dirTxFilter = effDir==='they_owe_you' ? ['they_owe_you','they_paid_you'] : effDir==='you_owe_them' ? ['you_owe_them','you_paid_them'] : [];
        html += `<div class="fg"><label>Transaction Type *</label><select id="netx"><option value="">Select...</option>${txOpts(dirTxFilter, preSel)}</select></div>`;
        html += `<div class="fg"><label>Amount *</label><input type="number" id="neamt" value="${e?.amount||''}" min="0" max="9999999" step="0.01" placeholder="0.00"></div>`;
      }
      html += `<div class="grid2"><div class="fg"><label>Date</label><input type="date" id="nedate" value="${dateVal}"></div>
        <div class="fg"><label>Status</label><select id="nests">${statusOpts(e?.status||'posted', true)}</select></div></div>`;
      // ── Notify on Save toggle ────────────────────────────────────────────
      html += `<div style="border-top:1px solid var(--border);margin-top:10px;padding-top:10px;">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
          <button type="button" id="ne_notify_btn" class="bs sm" style="font-size:12px;" onclick="toggleFormNotify('ne')">🔔 Notify on Save</button>
          <span id="ne_notify_sw" style="font-size:11px;color:var(--muted);">Off</span>
        </div>
        <div id="ne_notify_wrap" style="display:none;">
          <div class="fg" style="margin-bottom:8px;">
            <label style="font-size:12px;font-weight:600;">Message</label>
            <textarea id="ne_notify_msg" rows="2" style="width:100%;box-sizing:border-box;padding:10px;border:1px solid var(--border);border-radius:8px;background:var(--bg2);color:var(--text);font-size:14px;resize:vertical;" placeholder="Add a note for the recipient..."></textarea>
          </div>
          <div class="fg" style="margin-bottom:8px;">
            <label style="font-size:12px;font-weight:600;display:block;margin-bottom:4px;">Notify</label>
            <div style="display:inline-flex;border:1px solid var(--border);border-radius:8px;overflow:hidden;">
              <button type="button" id="ne_nwho_them" style="padding:6px 14px;font-size:12px;background:var(--accent);color:#fff;border:none;cursor:pointer;font-weight:600;" onclick="_setFormNwho('ne','them')">Contact</button>
              <button type="button" id="ne_nwho_you" style="padding:6px 14px;font-size:12px;background:var(--bg3);color:var(--text);border:none;border-left:1px solid var(--border);cursor:pointer;" onclick="_setFormNwho('ne','you')">You</button>
              <button type="button" id="ne_nwho_both" style="padding:6px 14px;font-size:12px;background:var(--bg3);color:var(--text);border:none;border-left:1px solid var(--border);cursor:pointer;" onclick="_setFormNwho('ne','both')">Both</button>
            </div>
          </div>
          <div id="ne_notify_email_wrap" style="display:none;">
            <div style="background:#fff8e1;border:1px solid #ffe082;border-radius:6px;padding:8px 12px;font-size:12px;color:#795548;">
              ⚠️ Contact has no email. <input type="email" id="ne_notify_email" placeholder="Enter email" style="width:100%;margin-top:4px;padding:6px 8px;border:1px solid var(--border);border-radius:6px;font-size:12px;">
            </div>
          </div>
        </div>
      </div>`;
      // ── Template-driven fields ────────────────────────────────────────
      if (tpl && tpl.fields && tpl.fields.length > 0) {
        html += `<div id="tplFieldsWrap" style="border-top:1px solid var(--border);margin-top:6px;padding-top:14px;">
          <div style="font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px;">Template Fields</div>`;
        tpl.fields.filter(f=>f.visible!==false).forEach(f => {
          const fid = 'tplf_'+f.id;
          // A field is "computed" whenever it has calculators — adding a calculator means the field
          // is auto-calculated; if the user wants a plain editable input they should not add calculators.
          const hasCalcs = (f.calculators||[]).length > 0;
          const isComputed = hasCalcs;
          // For edit mode: get saved value from templateData
          const savedField = e?.templateData?.[f.id];
          const savedVal   = savedField?.value;
          if (isComputed) {
            // Computed result display — pre-seed with stored value; runTplCalcs() will refresh
            const initVal = (savedVal !== undefined && savedVal !== null) ? parseFloat(savedVal)||0 : 0;
            const initHtml = initVal
              ? `<span style="font-size:18px;font-weight:800;color:var(--green);">${fmt(initVal)}</span>`
              : `<span style="color:var(--muted);font-style:italic;font-size:13px;font-weight:400;">Enter values above to calculate…</span>`;
            html += `<div class="fg">
              <label style="display:flex;align-items:center;gap:6px;">${esc(f.label)}
                <span style="font-size:10px;background:rgba(108,99,255,.18);color:var(--accent);border-radius:4px;padding:1px 6px;font-weight:700;letter-spacing:.03em;">COMPUTED</span>
              </label>
              <div id="${fid}" data-computed="${initVal}" data-fieldid="${f.id}"
                style="background:var(--bg3);border:1px solid var(--accent);border-radius:8px;padding:10px 14px;min-height:42px;display:flex;align-items:center;">
                ${initHtml}
              </div>
            </div>`;
          } else if (_isNumericField(f)) {
            // ── Numeric / legacy number / dropdown ────────────────────────
            if (f.type==='dropdown') {
              const dropSaved = savedVal !== undefined ? String(savedVal) : '';
              html += `<div class="fg"><label>${esc(f.label)}</label>
                <select id="${fid}" data-fieldid="${f.id}" onchange="runTplCalcs()">
                  <option value="">Select…</option>
                  ${(f.dropdownOptions||[]).map(o=>{const v=o.numericValue||o.label; return `<option value="${v}" ${dropSaved===String(v)?'selected':''}>${esc(o.label)}${o.numericValue?` ($${o.numericValue})`:''}</option>`;}).join('')}
                </select></div>`;
            } else {
              const numVal = savedVal !== undefined ? savedVal : (f.defaultValue||'');
              html += `<div class="fg"><label>${esc(f.label)}${f.ledgerEffect?` <span style="font-size:10px;color:var(--green);">[affects ledger]</span>`:''}</label>
                <input type="number" id="${fid}" data-fieldid="${f.id}" value="${numVal}"
                  min="0" step="0.01" placeholder="0.00" oninput="runTplCalcs()" onchange="runTplCalcs()"></div>`;
            }
          } else if (_isPairedField(f)) {
            // ── Paired field: structured text+number rows ─────────────────
            const savedRows = savedField?.rows || [];
            // Ensure at least one blank row to start
            const rows = savedRows.length ? savedRows : [{text:'', numeric:'', qty:null}];
            const txtLbl = f.label || f.textLabel || 'Item';
            const numLbl = f.numericLabel || 'Amount';
            html += `<div class="fg">
              <div style="border:1px solid var(--border);border-radius:8px;overflow:hidden;">
                <div style="display:grid;grid-template-columns:1fr 56px auto;background:var(--bg3);padding:6px 10px;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--border);">
                  <span>${esc(txtLbl)}${f.ledgerEffect?` <span style="font-size:10px;color:var(--green);text-transform:none;">[ledger]</span>`:''}</span><span style="text-align:center;">Qty</span><span style="min-width:110px;text-align:right;">${esc(numLbl)}</span>
                </div>
                <div id="${fid}_rows" data-fieldid="${f.id}">
                  ${rows.map((r,ri) => `<div class="paired-row" style="display:flex;gap:6px;padding:6px 10px;border-bottom:1px solid var(--border);" data-row="${ri}">
                    <input type="text" class="pr-text" placeholder="${esc(txtLbl)}" value="${esc(String(r.text||''))}" style="flex:2;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:7px 10px;font-size:14px;color:var(--text);" oninput="runTplCalcs()">
                    <input type="number" class="pr-qty" placeholder="—" value="${r.qty||''}" step="any" min="0" style="width:52px;flex-shrink:0;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:7px 6px;font-size:14px;color:var(--text);text-align:center;" oninput="runTplCalcs()" onchange="runTplCalcs()">
                    <input type="number" class="pr-num" placeholder="0.00" value="${r.numeric||''}" step="0.01" min="0" style="flex:1;min-width:90px;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:7px 10px;font-size:14px;color:var(--text);" oninput="runTplCalcs()" onchange="runTplCalcs()">
                    <button type="button" class="gh sm" onclick="removePairedRow(this)" style="flex-shrink:0;padding:6px 8px;font-size:14px;">✕</button>
                  </div>`).join('')}
                </div>
                ${f.repeatable!==false ? `<div style="padding:6px 10px;">
                  <button type="button" class="bs sm" onclick="addPairedRow('${fid}_rows')">+ Add Row</button>
                </div>` : ''}
              </div>
            </div>`;
          } else if (f.type==='date') {
            const dateVal2 = savedVal ? String(savedVal).split('T')[0] : '';
            html += `<div class="fg"><label>${esc(f.label)}</label>
              <input type="date" id="${fid}" data-fieldid="${f.id}" value="${dateVal2}"></div>`;
          } else {
            // Plain text input (type === 'text' or unknown)
            const txtVal = savedVal !== undefined ? String(savedVal) : (f.defaultValue||'');
            html += `<div class="fg"><label>${esc(f.label)}</label>
              <input type="text" id="${fid}" data-fieldid="${f.id}"
                value="${esc(txtVal)}" placeholder="${esc(f.label)}"></div>`;
          }
        });
        html += `</div>`;
      }
      // Notify toggle removed — reminders are a separate explicit action via "Send Reminder"
      // on existing entries, not auto-triggered when creating/editing.
      return html;
    }

    function openNewEntry(cid = null) {
      _entryTpl = null;
      _entryFormCid = cid;
      _entryDirection = null;
      // Step 1: show direction picker first — progression is blocked until direction is selected
      const d = document.createElement('div');
      d.innerHTML = `<div class="modal-bg" id="entryModalBg" onclick="if(event.target===this)closeEntryModal()">
        <div class="modal" style="max-width:460px;" onclick="event.stopPropagation()">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;">
            <div class="modal-title" style="margin:0;">New Entry</div>
            <button class="gh sm" onclick="closeEntryModal()">✕</button>
          </div>
          <div style="font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:14px;">Select Transaction Direction *</div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:8px;">
            <button onclick="selectEntryDirection('they_owe_you')" style="background:rgba(74,222,128,.08);border:2px solid var(--green);border-radius:12px;padding:22px 12px;cursor:pointer;text-align:center;transition:background .15s;">
              <div style="font-size:26px;margin-bottom:10px;">📥</div>
              <div style="font-size:15px;font-weight:800;color:var(--green);margin-bottom:4px;">They Owe Me</div>
              <div style="font-size:11px;color:var(--muted);line-height:1.4;">Invoice, bill, or debt owed to you</div>
            </button>
            <button onclick="selectEntryDirection('you_owe_them')" style="background:rgba(248,113,113,.08);border:2px solid var(--red);border-radius:12px;padding:22px 12px;cursor:pointer;text-align:center;transition:background .15s;">
              <div style="font-size:26px;margin-bottom:10px;">📤</div>
              <div style="font-size:15px;font-weight:800;color:var(--red);margin-bottom:4px;">I Owe Them</div>
              <div style="font-size:11px;color:var(--muted);line-height:1.4;">A bill or debt you owe to them</div>
            </button>
          </div>
          <div style="font-size:11px;color:var(--muted);text-align:center;margin-top:8px;">You must choose a direction before continuing.</div>
        </div></div>`;
      document.body.appendChild(d.firstChild);
    }

    // Called when user picks a direction — replaces the picker with the full entry form
    function selectEntryDirection(dir) {
      _entryDirection = dir;
      const modal = document.getElementById('entryModalBg');
      if (!modal) return;
      const inner = modal.querySelector('.modal');
      if (!inner) return;
      const dirLabel = dir === 'they_owe_you' ? '📥 They Owe Me' : '📤 I Owe Them';
      const dirColor = dir === 'they_owe_you' ? 'var(--green)' : 'var(--red)';
      const dirBg    = dir === 'they_owe_you' ? 'rgba(74,222,128,.12)' : 'rgba(248,113,113,.12)';
      inner.style.maxWidth = '580px';
      inner.innerHTML = `
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
          <div>
            <div class="modal-title" style="margin:0 0 5px;">Add Entry</div>
            <span style="font-size:12px;font-weight:700;padding:3px 10px;border-radius:6px;background:${dirBg};color:${dirColor};">${dirLabel}</span>
          </div>
          <button class="gh sm" onclick="closeEntryModal()">✕</button>
        </div>
        <div class="entry-type-tabs">
          <button type="button" class="entry-type-tab active">📋 One-Time Entry</button>
          <button type="button" class="entry-type-tab" onclick="switchToRecurring()">🔁 Make Recurring</button>
        </div>
        <div id="entryFormBody">${entryFormBody(_entryFormCid, null, null, dir)}</div>
        <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px;border-top:1px solid var(--border);padding-top:14px;">
          <button class="bs" onclick="closeEntryModal()">Cancel</button>
          <button class="btn" onclick="saveNewEntry()">Save Entry</button>
        </div>`;
      if (_entryTpl) runTplCalcs();
    }

    function closeEntryModal() {
      document.getElementById('entryModalBg')?.remove();
    }
    // Switch from entry form to recurring form, carrying over contact + direction
    function switchToRecurring() {
      const cid = document.getElementById('necon')?.value || _entryFormCid || null;
      closeEntryModal();
      openNewRecurring(cid);
    }

    // ── Paired-field row management ──────────────────────────────────────
    function addPairedRow(containerId) {
      const c = document.getElementById(containerId);
      if (!c) return;
      const ri = c.querySelectorAll('.paired-row').length;
      const row = document.createElement('div');
      row.className = 'paired-row';
      row.style.cssText = 'display:flex;gap:6px;padding:6px 10px;border-bottom:1px solid var(--border);';
      row.dataset.row = ri;
      row.innerHTML = `
        <input type="text"   class="pr-text" placeholder="Description" style="flex:2;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:7px 10px;font-size:14px;color:var(--text);" oninput="runTplCalcs()">
        <input type="number" class="pr-qty"  placeholder="—" step="any" min="0" style="width:52px;flex-shrink:0;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:7px 6px;font-size:14px;color:var(--text);text-align:center;" oninput="runTplCalcs()" onchange="runTplCalcs()">
        <input type="number" class="pr-num"  placeholder="0.00" step="0.01" min="0" style="flex:1;min-width:90px;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:7px 10px;font-size:14px;color:var(--text);" oninput="runTplCalcs()" onchange="runTplCalcs()">
        <button type="button" class="gh sm" onclick="removePairedRow(this)" style="flex-shrink:0;padding:6px 8px;font-size:14px;">✕</button>`;
      c.appendChild(row);
    }

    function removePairedRow(btn) {
      const row = btn.closest('.paired-row');
      const container = row?.parentElement;
      if (!container) return;
      // Keep at least one row
      if (container.querySelectorAll('.paired-row').length > 1) {
        row.remove();
        runTplCalcs();
      } else {
        // Clear the last row instead of removing it
        row.querySelector('.pr-text').value = '';
        const _qtyInp = row.querySelector('.pr-qty'); if (_qtyInp) _qtyInp.value = '';
        row.querySelector('.pr-num').value  = '';
        runTplCalcs();
      }
    }

    // Live calculator engine — runs on every numeric input change
    function runTplCalcs() {
      const tpl = _entryTpl;
      if (!tpl || !tpl.fields) return;

      // Step 1: seed vals from all user inputs.
      // Paired fields contribute their row-numeric total; other fields contribute their input value.
      const vals = {};
      tpl.fields.forEach(f => {
        if (_isPairedField(f)) {
          const container = document.getElementById('tplf_' + f.id + '_rows');
          let total = 0;
          if (container) container.querySelectorAll('.paired-row').forEach(row => {
            const _qty = parseFloat(row.querySelector('.pr-qty')?.value) || null;
            const _price = parseFloat(row.querySelector('.pr-num')?.value) || 0;
            total += _qty ? _qty * _price : _price;
          });
          vals[f.id] = total;
          return;
        }
        const el = document.getElementById('tplf_' + f.id);
        if (!el || el.tagName === 'DIV') return; // skip computed display divs
        vals[f.id] = parseFloat(el.value) || 0;
      });

      // Step 2: multi-pass computation.
      //
      // A single left-to-right pass fails when a computed field (e.g. "Total")
      // references another computed field (e.g. "Tax") that appears LATER in the
      // field order. On pass 1, "Tax" hasn't been computed yet so vals[tax] = 0.
      // Running the pass again uses the now-populated vals to get the right number.
      //
      // We repeat up to 4 times and stop early once vals stops changing (convergence).
      // This handles any chain depth regardless of how the user ordered their fields.
      //
      // DOM is only written on the final pass so the screen never shows interim values.

      const _runOnePass = () => {
        tpl.fields.forEach(f => {
          const el = document.getElementById('tplf_' + f.id);
          if (!el || el.tagName !== 'DIV') return;
          const calcs = f.calculators || [];
          if (!calcs.length) return;

          calcs.forEach(c => {
            let val = 0;
            switch (c.operation) {
              case 'multiply': {
                const tv = c.targetFieldId ? (vals[c.targetFieldId] || 0) : 0;
                val = tv * (parseFloat(c.operand) || 0);
                break;
              }
              case 'add': {
                const tv = c.targetFieldId ? (vals[c.targetFieldId] || 0) : 0;
                val = (vals[f.id] || 0) + tv;
                break;
              }
              case 'subtract': {
                const tv = c.targetFieldId ? (vals[c.targetFieldId] || 0) : 0;
                val = tv - (vals[f.id] || 0);
                break;
              }
              case 'aggregate':
                val = 0;
                tpl.fields.forEach(sf => {
                  if (sf.id === f.id) return;
                  if (sf.excludeFromAggregate) return;
                  // include: numeric types (all legacy + new), paired (row totals seeded into vals), computed results
                  if (_isNumericField(sf) || _isPairedField(sf) || (sf.calculators||[]).length > 0)
                    val += vals[sf.id] || 0;
                });
                break;
              case 'select_aggregate':
                val = (c.targetFieldIds || []).reduce((s, fid) => {
                  if (fid === f.id) return s;
                  return s + (vals[fid] || 0);
                }, 0);
                break;
            }
            vals[f.id] = val; // write back immediately — later fields in same pass see it
          });
        });
      };

      // Run passes until convergence or 4 iterations
      let prev = '';
      for (let pass = 0; pass < 4; pass++) {
        const snap = JSON.stringify(vals);
        if (pass > 0 && snap === prev) break; // converged — stop early
        prev = snap;
        _runOnePass();
      }

      // Final pass: write converged vals to the DOM
      tpl.fields.forEach(f => {
        const el = document.getElementById('tplf_' + f.id);
        if (!el || el.tagName !== 'DIV') return;
        const calcs = f.calculators || [];
        if (!calcs.length) return;

        // Determine what to display: last visible calculator result
        let displayVal = vals[f.id] || 0;
        let hasVisible = calcs.some(c => c.resultVisible !== false);

        el.dataset.computed = displayVal;

        if (f.isFinalTotal && hasVisible) {
          el.style.border    = '2px solid var(--green)';
          el.style.background = 'rgba(74,222,128,.08)';
          el.innerHTML = `<div style="width:100%;">
            <div style="font-size:9px;font-weight:700;color:var(--green);text-transform:uppercase;letter-spacing:.08em;margin-bottom:2px;">★ Invoice Total</div>
            <span style="font-size:22px;font-weight:900;color:var(--green);">${fmt(displayVal)}</span>
          </div>`;
        } else {
          el.style.border    = '';
          el.style.background = '';
          el.innerHTML = hasVisible
            ? `<span style="font-size:18px;font-weight:800;color:var(--green);">${fmt(displayVal)}</span>`
            : `<span style="color:var(--muted);font-style:italic;font-size:13px;font-weight:400;">(hidden result)</span>`;
        }
      });
    }

    function switchEntryTemplate(tid, preserveCid) {
      const hasData = (document.getElementById('neamt')?.value||'').trim() ||
                      (document.getElementById('nenote')?.value||'').trim();
      if (hasData && tid && _entryTpl?.id !== tid) {
        if (!confirm('Switching templates will replace the current entry form. Any unsaved field data will be cleared. Continue?')) {
          document.getElementById('ne_tpl').value = _entryTpl?.id||'';
          return;
        }
      }
      _entryTpl = tid ? (db.templates.find(x=>x.id===tid)||null) : null;
      const cid = preserveCid || document.getElementById('necon')?.value || _entryFormCid || null;
      _entryFormCid = cid;
      const body = document.getElementById('entryFormBody');
      if (body) { body.innerHTML = entryFormBody(cid, _entryTpl, null); runTplCalcs(); }
    }

    // ── Amount resolver ──────────────────────────────────────────────────────
    // Returns the correct invoice amount from the currently-rendered form.
    // Priority: (1) field marked isFinalTotal → (2) last aggregate field → (3) sum all computed
    function _getEntryAmountFromForm(tpl) {
      if (!tpl || !tpl.fields) return 0;
      // Priority 1: explicit Final Total field
      const finalF = tpl.fields.find(f => f.isFinalTotal);
      if (finalF) {
        if (_isPairedField(finalF)) {
          // Paired final total: sum all row numeric values
          const container = document.getElementById('tplf_' + finalF.id + '_rows');
          if (container) {
            let total = 0;
            container.querySelectorAll('.paired-row').forEach(row => {
              const _qty = parseFloat(row.querySelector('.pr-qty')?.value) || null;
              const _price = parseFloat(row.querySelector('.pr-num')?.value) || 0;
              total += _qty ? _qty * _price : _price;
            });
            return total;
          }
        } else {
          const el = document.getElementById('tplf_' + finalF.id);
          if (el) {
            return el.tagName === 'DIV'
              ? (parseFloat(el.dataset.computed) || 0)
              : (parseFloat(el.value) || 0);
          }
        }
      }
      // Priority 2: last computed field that has an 'aggregate' calculator
      let aggVal = null;
      tpl.fields.forEach(f => {
        const el = document.getElementById('tplf_' + f.id);
        if (!el || el.tagName !== 'DIV') return;
        (f.calculators || []).forEach(c => {
          if (c.operation === 'aggregate' || c.operation === 'select_aggregate')
            aggVal = parseFloat(el.dataset.computed) || 0;
        });
      });
      if (aggVal !== null) return aggVal;
      // Priority 3: sum all computed field values
      let sum = 0;
      tpl.fields.forEach(f => {
        const el = document.getElementById('tplf_' + f.id);
        if (el && el.tagName === 'DIV') sum += parseFloat(el.dataset.computed) || 0;
      });
      return sum;
    }

    async function saveNewEntry() {
      const cid    = document.getElementById('necon')?.value.trim();
      const note   = document.getElementById('nenote')?.value.trim()||'';
      const _rawStatus = document.getElementById('nests')?.value.trim()||'posted';
      // Settlement statuses must only be set via recordSettlement() — block direct form submission
      const status = _SETTLEMENT_STATUSES.has(_rawStatus) ? 'posted' : _rawStatus;
      const dateStr = document.getElementById('nedate')?.value;
      const date   = dateStr ? new Date(dateStr).getTime() : Date.now();
      if (!cid) return alert('Contact required');

      let txType, amount, invoiceNumber = null;

      if (_entryTpl) {
        // Template entry — txType + amount come from template
        txType = _entryTpl.txType || 'invoice';
        // No longer block save for missing Final Total — fall back gracefully to last aggregate or sum
        // (removed confirm() dialog: was causing false-positive blocks on mobile)
        // Amount = final total field (if designated), else last aggregate, else sum all computed
        amount = _getEntryAmountFromForm(_entryTpl);
        // Generate invoice number and increment the template counter
        const tpl = db.templates.find(x => x.id === _entryTpl.id);
        if (tpl) {
          invoiceNumber = `${tpl.invoicePrefix||'INV-'}${String(tpl.invoiceNextNum||1).padStart(4,'0')}`;
          tpl.invoiceNextNum = (tpl.invoiceNextNum || 1) + 1;
        }
      } else {
        // Blank entry — manual txType + amount
        txType = document.getElementById('netx')?.value.trim();
        const amt = document.getElementById('neamt')?.value.trim();
        if (!txType) return alert('Transaction type required');
        const amtErr = valAmt(amt); if (amtErr) return alert(amtErr);
        amount = parseFloat(amt);
      }

      // Collect template field data — inputs by value, computed displays by data-computed
      const tplData = {};
      if (_entryTpl) {
        (_entryTpl.fields||[]).forEach(f => {
          if (_isPairedField(f)) {
            // Paired: collect rows array + numeric total for calc reference
            const container = document.getElementById('tplf_'+f.id+'_rows');
            const rows = [];
            let numericTotal = 0;
            if (container) {
              container.querySelectorAll('.paired-row').forEach(row => {
                const txt   = row.querySelector('.pr-text')?.value.trim()||'';
                const qty   = parseFloat(row.querySelector('.pr-qty')?.value) || null;
                const num   = parseFloat(row.querySelector('.pr-num')?.value)||0;
                const eff   = qty ? qty * num : num;
                if (txt || num) { rows.push({text:txt, numeric:num, qty: qty||null}); numericTotal += eff; }
              });
            }
            tplData[f.id] = {
              label: f.label, textLabel: f.textLabel||'Item', numericLabel: f.numericLabel||'Amount',
              type: 'paired', rows, value: numericTotal,
              ledgerEffect: f.ledgerEffect||null, isFinalTotal: f.isFinalTotal||false
            };
          } else {
            const el = document.getElementById('tplf_'+f.id);
            if (!el) return;
            const isDiv = el.tagName === 'DIV';
            tplData[f.id] = {
              label:        f.label,
              value:        isDiv ? (parseFloat(el.dataset.computed) || 0) : el.value,
              ledgerEffect: f.ledgerEffect || null,
              computed:     isDiv,
              isFinalTotal: f.isFinalTotal || false
            };
          }
        });
      }

      db.settings.entryCounter = (db.settings.entryCounter || 0) + 1;
      const entryNum = db.settings.entryCounter;
      // Freeze template snapshot so future template edits don't affect this entry
      const templateSnapshot = _entryTpl ? JSON.parse(JSON.stringify({
        id: _entryTpl.id, name: _entryTpl.name, txType: _entryTpl.txType,
        invoicePrefix: _entryTpl.invoicePrefix, fields: _entryTpl.fields
      })) : null;
      const newEid = uuid();
      const contact = db.contacts.find(c => c.id === cid);
      db.entries.push({ id:newEid, userId:curUser().id, cId:cid, txType, amount,
        note, date, status:safeStatus(status), archived:false, shared:false, responses:[],
        templateId:_entryTpl?.id||null, templateData:tplData,
        templateSnapshot, invoiceNumber, entryNum, createdAt:Date.now(),
        currency: db.settings.currency || 'USD' });
      logAudit('add_entry',{cid,txType,amount,tpl:_entryTpl?.name||null,invoiceNumber});
      await saveNow(); // immediate sync for cross-device consistency

      // Auto-create a share token whenever the contact has an email OR an established linkedUserId.
      // The backend will look up whether that email belongs to a registered user and auto-link if so.
      // This ensures new contacts with matching emails receive records immediately (confirmed=false → banner).
      if ((contact?.linkedUserId || contact?.email) && _IS_SERVER) {
        const u = curUser();
        const siteUrl = db.settings?.siteUrl || window.location.origin;
        fetch('/api/share', {
          method: 'POST', credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            action: 'create', entryId: newEid,
            contactName: contact.name || '',
            contactEmail: contact.email || '',   // ← direct email for user lookup
            fromName:  u.displayName || u.email || (db.settings?.appName || 'Money IntX'),
            fromEmail: u.email || '',
            txType, amount, date, note, invoiceNumber,
            status: safeStatus(status),
            currency: db.settings.currency || 'USD',
            appName: db.settings?.appName || 'Money IntX',
            siteUrl, tagline: db.settings?.tagline || 'Making Money Matters Memorable'
          })
        }).catch(() => {});
      }

      // Auto-notify removed — use "Send Reminder" on existing entries instead.
      closeEntryModal();
      toast(`Entry saved${invoiceNumber ? ' — ' + invoiceNumber : ''}`);
      // Always navigate to dashboard so Recent Entries refreshes (fixes mobile stale view)
      nav('dash');
    }

    function duplicateEntry(eid) {
      const orig = db.entries.find(x => x.id === eid);
      if (!orig) return;
      db.settings.entryCounter = (db.settings.entryCounter || 0) + 1;
      const newId = uuid();
      const newEntry = {
        id: newId,
        userId: orig.userId,
        cId: orig.cId,
        txType: orig.txType,
        amount: orig.amount,
        note: '', // fresh note — don't copy old references
        templateId: orig.templateId || null,
        templateData: orig.templateData ? JSON.parse(JSON.stringify(orig.templateData)) : {},
        templateSnapshot: orig.templateSnapshot ? JSON.parse(JSON.stringify(orig.templateSnapshot)) : null,
        date: Date.now(),
        status: 'draft',
        createdAt: Date.now(),
        entryNum: db.settings.entryCounter,
        invoiceNumber: null, // new invoice gets its own number
        archived: false,
        shared: false,
        responses: [],
        reminderCount: 0,
        lastReminderAt: null,
        currency: orig.currency || db.settings.currency || 'USD'
      };
      db.entries.push(newEntry);
      save();
      logAudit('duplicate_entry', { from: eid, to: newId });
      toast('Entry duplicated as draft');
      editEntry(newId);
    }

      const e = db.entries.find(x => x.id === eid);

      const c = db.contacts.find(x => x.id === e.cId);

          await fetch('/api/share', {

            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              action: 'owner-close',
              entryId: eid,
              closedMsg: msg
            })
          });
        } catch (_) {}

        // Send notification email to contact if they have an email
        try {
          const u = curUser();
          const appName = db.settings?.appName || 'Money IntX';
          const siteUrl = db.settings?.siteUrl || window.location.origin;
          // Find the share token for this entry so we can include the link
          const stRes = await fetch('/api/share', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              action: 'create',
              entryId: eid,
              contactName: c?.name || '',
              fromName: u?.name || u?.email || '',
              fromEmail: u?.email || '',
              txType: e.txType,
              amount: e.amount,
              date: e.date,
              note: e.note || '',
              invoiceNumber: e.invoiceNumber || '',
              status: 'closed',
              appName,
              siteUrl
            })
          });
          const stData = await stRes.json();
          const shareUrl = stData.shareUrl || '';

          if (c?.email) {
            const closingNote = msg ? `\n\n"${msg}"` : '';
            await fetch('/api/email', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                to: c.email,
                subject: `${u?.name || appName} has closed a record`,
                text: `Hi ${c.name},\n\n${u?.name || 'The sender'} has closed the following record:${closingNote}\n\nAmount: ${fmt(e.amount, e.currency)}\n\nYou can view the record and close it from your side here:\n${shareUrl}\n\n— ${appName}`,
                appName, siteUrl
              })
            });
          }
        } catch (_) {}
      }
    }

    function reopenEntry(eid) {
      if (!confirm('Reopen this record?')) return;
      const e = db.entries.find(x => x.id === eid);
      if (!e) return;
      e.status = 'posted';
      delete e.closedAt;
      delete e.closedMsg;
      delete e.closedByRecipient;
      delete e.closedByRecipientAt;
      save();
      logAudit('reopen_entry', { eid });
      toast('Record reopened');
      refreshCurPage();
    }

    /* ══════════════════════════════════════════════════════════════════
       BULK SELECTION — state, toggle helpers, bulk action dispatcher
       ══════════════════════════════════════════════════════════════════ */
    window._selectedEntries = window._selectedEntries || new Set();
    window._selectMode      = window._selectMode      || false;

    function _toggleSelectMode() {
      window._selectMode = !window._selectMode;
      if (!window._selectMode) window._selectedEntries = new Set();
      renderEntries();
    }

    // Called by each row's checkbox — updates selection and refreshes bar only
    function _toggleEntrySelect(id) {
      if (window._selectedEntries.has(id)) window._selectedEntries.delete(id);
      else window._selectedEntries.add(id);
      _updateBulkBar();
    }

    // Select / deselect all ids on current page
    function _selectAllEntries(ids) {
      const allSel = ids.length > 0 && ids.every(id => window._selectedEntries.has(id));
      ids.forEach(id => allSel ? window._selectedEntries.delete(id) : window._selectedEntries.add(id));
      // Sync checkboxes without full re-render
      document.querySelectorAll('.entry-sel-cb').forEach(cb => {
        cb.checked = window._selectedEntries.has(cb.dataset.id);
        cb.closest('tr')?.classList.toggle('row-selected', cb.checked);
      });
      const selAllCb = document.getElementById('_selAllCb');
      if (selAllCb) selAllCb.checked = !allSel;
      _updateBulkBar();
    }

    // Refresh bulk bar without re-rendering the whole table
    function _updateBulkBar() {
      const n = window._selectedEntries.size;
      const bar = document.getElementById('_bulkBar');
      if (!bar) return;
      document.getElementById('_bulkCount').textContent = n + ' selected';
      bar.classList.toggle('visible', n > 0);
      // Keep checkboxes and row highlight in sync
      document.querySelectorAll('.entry-sel-cb').forEach(cb => {
        const sel = window._selectedEntries.has(cb.dataset.id);
        cb.checked = sel;
        cb.closest('tr')?.classList.toggle('row-selected', sel);
      });
      const allCbs = [...document.querySelectorAll('.entry-sel-cb')];
      const selAllCb = document.getElementById('_selAllCb');
      if (selAllCb) selAllCb.checked = allCbs.length > 0 && allCbs.every(cb => cb.checked);
    }

    // Bulk action dispatcher
    function _bulkAction(action) {
      const ids = [...window._selectedEntries];
      if (ids.length === 0) return toast('No entries selected');
      // Own entries: IDs found in db.entries
      const ownIds = ids.filter(id => db.entries.find(e => e.id === id));
      // Shared records: IDs that are tokens found in _cachedSharedRecords
      const sharedRecs = ids.map(id => _cachedSharedRecords.find(r => r.token === id)).filter(Boolean);

      if (action === 'delete') {
        if (!confirm('Delete ' + ownIds.length + ' entr' + (ownIds.length === 1 ? 'y' : 'ies') + '? This cannot be undone.')) return;
        ownIds.forEach(id => {
          const e = db.entries.find(x => x.id === id);
          // Dismiss shared-with-me entries on the server so the migration
          // in _loadSharedWithMe won't immediately re-insert them
          if (e?.isShared && e?.shareToken) {
            fetch('/api/share', {
              method: 'POST', credentials: 'include',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ action: 'dismiss-shared', token: e.shareToken })
            }).catch(() => {});
            const _cr = (_cachedSharedRecords || []).find(x => x.token === e.shareToken);
            if (_cr && _cr.entry) _cr.entry.dismissed = true;
          }
          if (e?.linkedInvoiceId) { _syncInvoiceStatus(e.linkedInvoiceId); _pushShareStatus(e.linkedInvoiceId); }
          db.entries = db.entries.filter(x => x.id !== id);
        });
        logAudit('bulk_delete', { count: ownIds.length });
        toast('🗑 ' + ownIds.length + ' entries deleted');

      } else if (action === 'archive') {
        ownIds.forEach(id => { const e = db.entries.find(x => x.id === id); if (e) e.archived = true; });
        logAudit('bulk_archive', { count: ownIds.length });
        toast('📥 ' + ownIds.length + ' entries archived');

      } else if (action === 'unarchive') {
        ownIds.forEach(id => { const e = db.entries.find(x => x.id === id); if (e) e.archived = false; });
        logAudit('bulk_unarchive', { count: ownIds.length });
        toast('📤 ' + ownIds.length + ' entries unarchived');

      } else if (action === 'void') {
        if (!confirm('Void ' + ownIds.length + ' entr' + (ownIds.length === 1 ? 'y' : 'ies') + '?')) return;
        ownIds.forEach(id => {
          const e = db.entries.find(x => x.id === id);
          if (e) {
            e.status = 'voided';
            if (e.linkedInvoiceId) { _syncInvoiceStatus(e.linkedInvoiceId); _pushShareStatus(e.linkedInvoiceId); }
          }
        });
        logAudit('bulk_void', { count: ownIds.length });
        toast('🚫 ' + ownIds.length + ' entries voided');

      } else if (action === 'noledger') {
        ownIds.forEach(id => { const e = db.entries.find(x => x.id === id); if (e) e.noLedger = true; });
        sharedRecs.forEach(r => { _sharedNoLedger.add(r.token); });
        _saveSharedPrefs();
        const _nlCount = ownIds.length + sharedRecs.length;
        logAudit('bulk_noledger', { count: _nlCount });
        toast('⊘ ' + _nlCount + ' entries removed from ledger balance');

      } else if (action === 'ledger') {
        ownIds.forEach(id => { const e = db.entries.find(x => x.id === id); if (e) delete e.noLedger; });
        sharedRecs.forEach(r => { _sharedNoLedger.delete(r.token); });
        _saveSharedPrefs();
        const _rlCount = ownIds.length + sharedRecs.length;
        logAudit('bulk_restore_ledger', { count: _rlCount });
        toast('📊 ' + _rlCount + ' entries restored to ledger');
      }

      save();
      window._selectedEntries = new Set();
      window._selectMode = false;
      renderEntries();
    }

    function delEntry(eid) {
      if (!confirm('Delete this entry?')) return;
      const e = db.entries.find(x => x.id === eid);
      // If this is a shared-with-me entry, tell the server to mark it dismissed
      // so the migration in _loadSharedWithMe won't immediately re-insert it
      if (e?.isShared && e?.shareToken) {
        fetch('/api/share', {
          method: 'POST', credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'dismiss-shared', token: e.shareToken })
        }).catch(() => {});
        // Also mark local cache so any in-progress render skips it
        const _cr = (_cachedSharedRecords || []).find(x => x.token === e.shareToken);
        if (_cr && _cr.entry) _cr.entry.dismissed = true;
      }
      const linkedInv = e?.linkedInvoiceId;
      db.entries = db.entries.filter(x => x.id !== eid);
      // If deleted entry was a settlement, resync the linked invoice
      if (linkedInv) { _syncInvoiceStatus(linkedInv); _pushShareStatus(linkedInv); }
      save();
      logAudit('delete_entry', { eid });
      toast('Entry deleted');
      refreshCurPage();
    }

    // Sends an explicit reminder for an existing entry (sender action only).
    // Logs as type 'reminder' — distinct from the original send/share event.
    async function _sendReminder(eid, message, who) {
      if (!_canSendEmail('reminder_' + eid)) return;
      // Disable submit button while sending
      const _remBtn = document.querySelector('#notifyModalBg .btn.sm, .notify-send-btn');
      if (_remBtn) { _remBtn.disabled = true; _remBtn.textContent = 'Sending…'; }
      try {
      const e = db.entries.find(x => x.id === eid);
      if (!e) return;
      let contact = db.contacts.find(x => x.id === e.cId);
      // Fallback: find same-name contact with email if the linked one has none
      if (!contact?.email && contact?.name) {
        const _nL = contact.name.toLowerCase().trim();
        const _bc = db.contacts.find(x => x.id !== contact.id &&
          (x.name||'').toLowerCase().trim() === _nL && x.email);
        if (_bc) contact = _bc;
      }
      if (!contact?.email) {
        const _nL = (contact?.name||'').toLowerCase().trim();
        for (const r of _cachedSharedRecords) {
          if ((r.entry?.fromName||'').toLowerCase().trim() === _nL && r.entry?.fromEmail) {
            contact = { ...(contact||{}), name: contact?.name||r.entry.fromName, email: r.entry.fromEmail };
            break;
          }
        }
      }
      const u = curUser();
      // Determine recipient email(s) first so we can store them with the record
      const recipientEmail = contact?.email || '';
      const myEmail = u.email || '';
      const toAddresses = [];
      if (who === 'them' || who === 'both') { if (recipientEmail) toAddresses.push(recipientEmail); }
      if (who === 'you' || who === 'both')  { if (myEmail)        toAddresses.push(myEmail); }
      // Save in-app notification record (with full context)
      const _notifNow = Date.now();
      db.notifs.push({
        id: uuid(), userId: u.id, cId: e.cId, eid,
        type: 'reminder', isReminder: true,
        msg: message, channel: 'email', sent: false,
        who, sentTo: toAddresses,
        read: false, createdAt: _notifNow
      });
      // Update activity metadata — reminderCount tracks explicit Send Reminder actions
      e.lastActivityAt     = _notifNow;
      e.lastReminderAt     = _notifNow;
      e.lastReminderMethod = 'email';
      e.reminderCount      = (e.reminderCount || 0) + 1;
      save();
      logAudit('send_reminder', { eid, to: who });
      if (toAddresses.length === 0) {
        toast('⚠️ No email on record for this contact — notification saved but not emailed.', 4000);
        return;
      }
      // Generate a public share link so recipient can view without needing to log in
      const _siteUrl = db.settings?.siteUrl || window.location.origin;
      let _viewUrl = _siteUrl + '?entry=' + eid; // fallback (owner deep-link)

      // LOOP GUARD: isShared entries were confirmed FROM someone else — we must NOT
      // create a new outbound share token pointing back to that sender.
      // Doing so would create a reverse share that auto-confirms (because contact
      // has linkedUserId), immediately appearing in the sender's inbox as a new
      // record, which triggers their own notifications → infinite loop.
      // Instead, reuse the existing shareToken as the view URL.
      if (e.isShared && e.shareToken) {
        _viewUrl = (e.fromSiteUrl || _siteUrl) + '/view?t=' + e.shareToken;
      } else {
        try {
          // Include current settlement state so resent link shows latest status
          const _invSt = isInvoiceMode(e) ? _getInvoiceSettlement(eid) : null;
          const _shareRes = await fetch('/api/share', {
            method: 'POST', credentials: 'include',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              action: 'create', entryId: eid,
              contactName: contact?.name || '',
              contactEmail: contact?.email || '',  // ← direct email for user lookup
              fromName: u.displayName || u.email || (db.settings?.appName || 'Money IntX'),
              fromEmail: u.email || '',
              txType: e.txType, amount: e.amount, date: e.date,
              note: e.note || '', invoiceNumber: e.invoiceNumber || null,
              status: e.status || 'posted',
              settledAmt: _invSt?.settled || 0,
              remaining:  _invSt?.remaining ?? e.amount,
              currency: e.currency || db.settings.currency || 'USD',
              appName: db.settings?.appName || 'Money IntX',
              siteUrl: _siteUrl,
              tagline: db.settings?.tagline || 'Making Money Matters Memorable'
            })
          });
          const _shareData = await _shareRes.json();
          if (_shareData.ok && _shareData.shareUrl) _viewUrl = _shareData.shareUrl;
        } catch(_) { /* keep fallback */ }
      }

      // Compute settlement breakdown for email
      const _emailSt    = _getInvoiceSettlement(eid);
      const _emailAmt   = (_emailSt.settled > 0 && _emailSt.remaining != null) ? _emailSt.remaining : (e.amount || null);
      const _emailTotal = _emailSt.total > 0 ? _emailSt.total : (e.amount || null);
      const _emailPaid  = _emailSt.settled > 0 ? _emailSt.settled : null;

      try {
        for (const addr of toAddresses) {
          await fetch('/api/email', {
            method: 'POST',
            credentials: 'include',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              action: 'send-reminder',
              recipientEmail: addr,
              fromName: u.displayName || u.email || (db.settings?.appName || 'Money IntX'),
              fromEmail: u.email || '',
              message,
              invoiceNumber: e.invoiceNumber || null,
              amount: _emailAmt,
              totalAmt: _emailTotal,
              paidAmt: _emailPaid,
              entryStatus: e.status || null,
              txType: e.txType || null,
              currency: e.currency || db.settings.currency || 'USD',
              viewUrl: _viewUrl,
              siteUrl: _siteUrl,
              appName: db.settings?.appName || 'Money IntX',
              tagline: db.settings?.tagline || 'Making Money Matters Memorable',
              logoData: db.settings?.logoData || ''
            })
          });
        }
        // Mark sent
        const notif = db.notifs.find(n => n.eid === eid && n.msg === message);
        if (notif) { notif.sent = true; save(); }
        toast('✅ Reminder sent');
      } catch(err) {
        console.error('send-reminder error:', err);

    function _saveSelfReminder(token) {
      const dateVal = document.getElementById('selfRemindDate')?.value;
      const noteVal = document.getElementById('selfRemindNote')?.value.trim() || '';
      if (!dateVal) return alert('Please select a date');
      const dbEntry = db.entries.find(e => e.shareToken === token);
      if (dbEntry) {
        dbEntry.selfReminder = { date: dateVal, note: noteVal, createdAt: Date.now() };
        save();
      }
      // Also store in localStorage for quick access
      const key = 'mxi_self_reminders';
      const reminders = JSON.parse(localStorage.getItem(key) || '{}');
      reminders[token] = { date: dateVal, note: noteVal, createdAt: Date.now() };
      localStorage.setItem(key, JSON.stringify(reminders));
      document.getElementById('selfRemindBg')?.remove();
      toast('⏰ Reminder set for ' + new Date(dateVal).toLocaleDateString());
      // Log as private self-reminder in notifs (not sent to anyone)
      db.notifs.push({
        id: uuid(), userId: curUser().id,
        cId: dbEntry?.cId || null, eid: dbEntry?.id || null,
        shareToken: token, type: 'self-reminder',
        msg: `Self-reminder: ${noteVal || 'Follow up on this record'}`,
        channel: 'local', sent: false, isReminder: false,
        who: 'you', sentTo: [],
        read: true, createdAt: Date.now()
      });
      save();
    }

    // ── Original shared-with-me reminder code ──────────────────────────────────
    // Preserved as _openSharedRemindModalLegacy for reference only.
    async function _openSharedRemindModalLegacy(token) {
      // Look up from _cachedSharedRecords first, fall back to db.entries (unified record layer)
      const r = (_cachedSharedRecords || []).find(x => x.token === token);
      const dbEntry = db.entries.find(e => e.shareToken === token);
      const hasData = (r && r.entry) || dbEntry;

      // Build a unified data object from whichever source has the data

      const senderName  = e._resolvedFromName || e.fromName || dbEntry?.fromName || 'them';
      // ownerEmail: the ACTUAL account email of the person who originally created the share.
      // This is the authoritative fallback: even if fromEmail was empty at share-creation time,
      // the server now includes the owner's real account email so reminders always reach the right person.
      const ownerEmail  = r?.ownerEmail || '';
      const senderEmail = e.fromEmail || dbEntry?.fromEmail || ownerEmail;
      // Self-send guard: if senderEmail somehow resolves to the current user's own email,
      // the reminder would loop back. Warn and clear so user must enter the correct address.
      const _myEmail = (curUser()?.email || '').toLowerCase().trim();
      const _isSelfSend = senderEmail && senderEmail.toLowerCase().trim() === _myEmail;
      const rawAmt      = parseFloat(e.amount || dbEntry?.amount || 0);
      const amtFmt      = fmt(rawAmt);
      const dateStr     = (e.date || dbEntry?.date) ? new Date(e.date || dbEntry?.date).toLocaleDateString() : '';
      const u           = curUser();
      const myName      = u.displayName || u.email || (db.settings?.appName || 'Money IntX');
      const siteUrl     = e.siteUrl || dbEntry?.fromSiteUrl || db.settings?.siteUrl || window.location.origin;
      const shareLink   = `${siteUrl}/view?t=${token}`;
      const appName     = db.settings?.appName || 'Money IntX';
      const tagline     = db.settings?.tagline || 'Making Money Matters Memorable';
      // Default reminder message — addressed to the sender (the one who owes)
      const defaultMsg  = `Hi ${senderName},\n\nThis is a friendly reminder that you owe ${amtFmt}${dateStr ? ' (as of ' + dateStr + ')' : ''}.\n\nPlease review the record here:\n${shareLink}\n\nThank you.`;

      // Use the resolved email — prefer non-self email; warn user if self-send detected
      const _displayEmail = _isSelfSend ? '' : (senderEmail || '');

      const d = document.createElement('div');
      d.innerHTML = `<div class="modal-bg" id="shRemindBg" onclick="if(event.target===this)this.remove()">
        <div class="modal" style="max-width:500px;" onclick="event.stopPropagation()">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
            <div class="modal-title" style="margin:0;">Send Reminder</div>
            <button class="gh sm" onclick="document.getElementById('shRemindBg').remove()">✕</button>
          </div>
          ${_isSelfSend ? `<div style="background:#fff3cd;border:1px solid #ffc107;border-radius:8px;padding:10px 14px;margin-bottom:12px;">
            <div style="font-size:13px;color:#856404;font-weight:600;">⚠️ Self-send detected</div>
            <div style="font-size:12px;color:#856404;margin-top:3px;">The email on file matches your own account. Please enter the correct recipient email below.</div>
          </div>` : ''}
          <div style="background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:14px;">
            <div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px;">Sending Reminder To</div>
            <div style="font-weight:700;">${esc(senderName)} — ${amtFmt}</div>
            ${_displayEmail ? `<div style="font-size:12px;color:var(--muted);margin-top:2px;">→ ${esc(_displayEmail)}</div>` : `<div style="font-size:12px;color:var(--amber);margin-top:2px;">⚠️ No email on file — enter below</div>`}
          </div>
          <div class="fg"><label>Message</label><textarea id="sh_remind_msg" rows="5" style="width:100%;">${esc(defaultMsg)}</textarea></div>

            <div style="font-size:13px;color:#795548;margin-bottom:6px;">Enter ${esc(senderName)}'s email to send:</div>
            <input type="email" id="sh_remind_email" placeholder="Enter their email address"
              style="width:100%;box-sizing:border-box;padding:8px 10px;border:1px solid var(--border);border-radius:6px;font-size:13px;background:var(--bg2);color:var(--text);" />
          </div>` : ''}

            <button class="bs sm" onclick="document.getElementById('shRemindBg').remove()">Cancel</button>
            <button class="btn sm" onclick="_sendSharedReminder('${esc(token)}','${esc(_displayEmail)}',this.dataset.sn,${rawAmt})" data-sn="${esc(senderName)}">Send Reminder</button>
          </div>
          <div style="border-top:1px solid var(--border);margin-top:14px;padding-top:14px;">
            <div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px;">Or share directly</div>
            <div style="display:flex;gap:8px;align-items:center;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:8px 12px;">
              <span style="font-size:12px;color:var(--accent);flex:1;word-break:break-all;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(shareLink)}</span>
