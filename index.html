    // ── Balance Reconciliation Check (called after settlement actions) ───────
    async function _checkReconciliation(entryId) {
      if (!_IS_SERVER) return;
      try {
        const tok = localStorage.getItem('mxi_token');
        const headers = { 'Content-Type': 'application/json' };
        if (tok) headers['Authorization'] = 'Bearer ' + tok;
        const res = await fetch('/api/reconcile', {
          method: 'POST', credentials: 'include', headers,
          body: JSON.stringify({ action: 'check-entry', entryId })
        });
        const data = await res.json();
        if (data.ok && !data.balanced) {
          console.warn('[reconcile] Balance mismatch of $' + data.difference + ' — admin notified');
        }
      } catch (_) {}
    }

    // ── Admin: Run full reconciliation report ─────────────────────────────────
    async function _runReconciliation() {
      const btn = document.getElementById('reconcileBtn');
      const el  = document.getElementById('reconcileResults');
      if (!btn || !el) return;
      btn.disabled = true;
      btn.textContent = 'Syncing data...';
      el.innerHTML = '<p style="color:var(--muted);font-size:13px;">Syncing local data to server first...</p>';
      // Force sync current user's data to server before running reconciliation
      try { await saveNow(); } catch(_) {}
      btn.textContent = 'Checking...';
      el.innerHTML = '<p style="color:var(--muted);font-size:13px;">Running reconciliation...</p>';
      try {
        const _rHeaders = {};
        const _rTok = localStorage.getItem('mxi_token');
        if (_rTok) _rHeaders['Authorization'] = 'Bearer ' + _rTok;
        const res = await fetch('/api/reconcile', { credentials: 'include', headers: _rHeaders });
        const data = await res.json();
        if (!data.ok) {
          el.innerHTML = `<p style="color:var(--red);font-size:13px;">${esc(data.error || 'Reconciliation failed.')}</p>`;
          btn.disabled = false; btn.textContent = 'Run Reconciliation';
          return;
        }
        if (data.total === 0) {
          el.innerHTML = '<p style="color:var(--muted);font-size:13px;">No linked user pairs found. Share records between users to enable reconciliation.</p>';
          btn.disabled = false; btn.textContent = 'Run Reconciliation';
          return;
        }
        let html = '';
        if (data.mismatches === 0) {
          html += '<div style="padding:8px 12px;background:rgba(22,163,74,.08);border-radius:8px;color:#16a34a;font-weight:600;margin-bottom:12px;">All balanced — no mismatches found across ' + data.total + ' linked pair' + (data.total !== 1 ? 's' : '') + '.</div>';
        } else {
          html += '<div style="padding:8px 12px;background:rgba(239,68,68,.08);border-radius:8px;color:#dc2626;font-weight:600;margin-bottom:12px;">' + data.mismatches + ' mismatch' + (data.mismatches !== 1 ? 'es' : '') + ' found across ' + data.total + ' linked pair' + (data.total !== 1 ? 's' : '') + '.</div>';
        }
        html += '<div class="tbl-wrap"><table><thead><tr><th>User A</th><th>User B</th><th>A: TOY</th><th>A: YOT</th><th>B: TOY</th><th>B: YOT</th><th>Diff</th><th>Status</th></tr></thead><tbody>';
        data.pairs.forEach(function(p) {
          const rowStyle = p.mismatch ? 'background:rgba(239,68,68,.05);' : '';
          html += '<tr style="' + rowStyle + '">';
          html += '<td style="font-size:12px;">' + esc(p.userA.name) + '<br><span style="color:var(--muted);font-size:11px;">' + esc(p.userA.email) + '</span></td>';
          html += '<td style="font-size:12px;">' + esc(p.userB.name) + '<br><span style="color:var(--muted);font-size:11px;">' + esc(p.userB.email) + '</span></td>';
          html += '<td style="color:var(--green);font-weight:600;">' + fmt(p.balanceA.toy) + '</td>';
          html += '<td style="color:var(--red);font-weight:600;">' + fmt(p.balanceA.yot) + '</td>';
          html += '<td style="color:var(--green);font-weight:600;">' + fmt(p.balanceB.toy) + '</td>';
          html += '<td style="color:var(--red);font-weight:600;">' + fmt(p.balanceB.yot) + '</td>';
          html += '<td style="font-weight:700;color:' + (p.mismatch ? 'var(--red)' : 'var(--green)') + ';">' + fmt(p.difference) + '</td>';
          html += '<td>' + (p.mismatch ? '<span class="badge" style="background:rgba(239,68,68,.12);color:#dc2626;font-size:11px;">Mismatch</span>' : '<span class="badge" style="background:rgba(22,163,74,.12);color:#16a34a;font-size:11px;">Balanced</span>') + '</td>';
          html += '</tr>';
          if (p.warning) {
            html += '<tr style="background:rgba(245,158,11,.05);"><td colspan="8" style="font-size:11px;color:#b45309;padding:4px 12px;">⚠️ ' + esc(p.warning) + 'Ask user to sync via Settings.</td></tr>';
          }
        });
        html += '</tbody></table></div>';
        el.innerHTML = html;
      } catch (e) {
        el.innerHTML = '<p style="color:var(--red);font-size:13px;">Network error — could not run reconciliation.</p>';
      }
      btn.disabled = false;
      btn.textContent = 'Run Reconciliation';
    }

    async function _submitSettlement(eid, remainingAmt) {
      const e = db.entries.find(x => x.id === eid); if (!e) return;
      const rawVal   = (document.getElementById('settleAmt')?.value || '').trim();
      const errEl    = document.getElementById('settleErr');
      const btn      = document.getElementById('settleSubmitBtn');
      const parsedAmt = rawVal === '' ? remainingAmt : parseFloat(rawVal);
      if (isNaN(parsedAmt) || parsedAmt <= 0) {
        if (errEl) { errEl.textContent = 'Enter a valid amount greater than zero.'; errEl.style.display = 'block'; }
        return;
      }
      if (errEl) errEl.style.display = 'none';
      if (btn) { btn.disabled = true; btn.textContent = '⏳ Saving…'; }

      const docRef    = e.invoiceNumber || ('#' + String(e.entryNum||'?').padStart(4,'0'));
      const applyAmt  = Math.min(parsedAmt, remainingAmt);
      const overAmt   = Math.round((parsedAmt - applyAmt) * 100) / 100;
      const creditType = (e.txType==='they_owe_you'||e.txType==='invoice'||e.txType==='bill') ? 'they_paid_you' : 'you_paid_them';

      // Read optional settlement proof attachment
      const _settleAttachments = await _readAttachFiles('settleAttachDoc', 5);

      // Create linked settlement entry for the applied amount
      db.settings.entryCounter = (db.settings.entryCounter||0) + 1;
      db.entries.push({
        id: uuid(), userId: curUser().id, cId: e.cId, txType: creditType,
        amount: applyAmt,
        note: `Settlement for ${docRef}`,
        date: Date.now(), status: 'payment', archived: false, shared: false,
        responses: [], templateId: null, templateData: {},
        invoiceNumber: null, entryNum: db.settings.entryCounter, createdAt: Date.now(),
        linkedInvoiceId: eid,
        currency: e.currency || db.settings.currency || 'USD',
        attachments: _settleAttachments.length ? _settleAttachments : undefined
      });

      // Recompute invoice status from all linked settlements
      _syncInvoiceStatus(eid);
      _pushShareStatus(eid);

      // If overpayment: create a second receipt for the excess
      if (overAmt > 0.004) {
        db.settings.entryCounter = (db.settings.entryCounter||0) + 1;
        db.entries.push({
          id: uuid(), userId: curUser().id, cId: e.cId, txType: creditType,
          amount: overAmt,
          note: `Overpayment Receipt — excess beyond full balance of ${docRef}`,
          date: Date.now(), status: 'posted', archived: false, shared: false,
          responses: [], templateId: null, templateData: {},
          invoiceNumber: null, entryNum: db.settings.entryCounter, createdAt: Date.now(),
          isOverpayment: true, linkedInvoiceId: eid,
          currency: e.currency || db.settings.currency || 'USD'
        });
      }

      try { await saveNow(); } catch(saveErr) { console.warn('[settlement] saveNow failed:', saveErr); save(); }
      logAudit(overAmt > 0.004 ? 'record_settlement_overpayment' : 'record_settlement', { eid, applyAmt, overAmt });

      document.getElementById('settleBg')?.remove();
      document.getElementById('invoicePrintWrap')?.remove();

      if (overAmt > 0.004) {
        toast(`Settlement recorded. ${fmt(applyAmt, e.currency)} applied to ${docRef}. Overpayment receipt of ${fmt(overAmt, e.currency)} created.`);
      } else {
        toast(`Settlement of ${fmt(applyAmt, e.currency)} recorded`);
      }
      refreshCurPage();
      _checkReconciliation(eid);
    }

    function renderEntries() {
      const u = curUser();
      const role = curRole();
      // Any logged-in user (admin, standard, contact) can receive shared records.
      const isStd = _IS_SERVER && (role === 'standard' || role === 'admin' || role === 'contact');

      // Tab state: 'mine' | 'shared' | 'all' (default 'all')
      window._entriesTab = window._entriesTab || 'all';
      const tab = window._entriesTab;

      // ── Own entries ──────────────────────────────────────────────────────
      const allEntries = role === 'admin' ? db.entries : (role === 'standard' ? db.entries.filter(e => e.userId === u.id) : db.entries.filter(e => e.shared && e.cId));
      const q = (window._search_entries||'').toLowerCase().trim();
      const sortDesc = window._sort_entries !== false;
      let listed = allEntries.filter(e => e.status !== 'voided');
      if (q) listed = listed.filter(e => {
        const c = db.contacts.find(x => x.id === e.cId);
        const docNum = e.invoiceNumber || (e.entryNum ? '#'+String(e.entryNum).padStart(4,'0') : '');
        return (c?.name||'').toLowerCase().includes(q) || docNum.toLowerCase().includes(q) ||
               (TXL[e.txType]||'').toLowerCase().includes(q) || (ENTRY_STATUS[e.status]||'').toLowerCase().includes(q);
      });
      listed = [...listed].sort((a,b) => sortDesc ? (b.lastActivityAt||b.createdAt||new Date(b.date||0).getTime()||0)-(a.lastActivityAt||a.createdAt||new Date(a.date||0).getTime()||0) : (a.lastActivityAt||a.createdAt||new Date(a.date||0).getTime()||0)-(b.lastActivityAt||b.createdAt||new Date(b.date||0).getTime()||0));

      // ── Confirmed shared-with-me records ─────────────────────────────────
      const _recipDirLabelE = t => ({
        they_owe_you:'You Owe', invoice:'Invoice Due', bill:'Bill Due',
        you_owe_them:'Owed To You', lend:'You Borrowed', borrow:'Owed To You',
        they_paid_you:'I Settled Them', you_paid_them:'They Settled Me', gift:'Gift'
      }[t] || 'Shared');
      const _recipDirColorE = t => (t==='they_owe_you'||t==='invoice'||t==='bill'||t==='lend') ? 'var(--red)' : 'var(--green)';

      // ── Pending (unconfirmed) shared-with-me records ─────────────────────
      // Confirmed shared records are now in db.entries with isShared:true —
      // this array only holds records not yet confirmed (showing ⏳ Pending pill).
      let confirmedShared = isStd ? _cachedSharedRecords.filter(r =>
        !r.confirmed && !r.recipientClosed && !(r.entry?.dismissed)
      ) : [];
      if (q) confirmedShared = confirmedShared.filter(r => {
        const e = r.entry;
        const dn = (e?._resolvedFromName || e?.fromName || '').toLowerCase();
        return dn.includes(q) || (e?.amount||'').toString().includes(q) ||
               (_recipDirLabelE(e?.txType)||'').toLowerCase().includes(q);
      });
      confirmedShared = [...confirmedShared].sort((a,b) => {
        const aTs = a.sharedAt ? new Date(a.sharedAt).getTime() : 0;
        const bTs = b.sharedAt ? new Date(b.sharedAt).getTime() : 0;
        return sortDesc ? bTs - aTs : aTs - bTs;
      });

      // ── Tab counts ───────────────────────────────────────────────────────
      const ownListed    = listed.filter(e => !e.isShared);
      const isSharedList = listed.filter(e => e.isShared);
      const mineCount    = ownListed.length;
      const sharedCount  = isSharedList.length + confirmedShared.length;
      const allCount     = mineCount + sharedCount;

      PG['entries'] = PG['entries'] || 1;
      if (q) PG['entries'] = 1;

      // ── Determine what to paginate based on tab ──────────────────────────
      // 'mine'   → own entries only (no isShared)
      // 'shared' → isShared db.entries + any pending unconfirmed rows
      // 'all'    → everything merged by timestamp
      function _entryTs(item) {
        if (item.token) return item.sharedAt ? new Date(item.sharedAt).getTime() : 0; // pending shared
        return item.lastActivityAt || item.createdAt || new Date(item.date||0).getTime() || 0;
      }
      const _sortFn = (a,b) => sortDesc ? _entryTs(b)-_entryTs(a) : _entryTs(a)-_entryTs(b);
      const tabListed = tab === 'shared'
        ? [...isSharedList, ...confirmedShared].sort(_sortFn)
        : tab === 'mine'
          ? ownListed
          : [...ownListed, ...isSharedList, ...confirmedShared].sort(_sortFn);
      const p = paginate(tabListed, 'entries');
      // Store exportable entries (real db entries only, not pending shared tokens)
      window._exportableEntries = tabListed.filter(item => !item.token);

      // ── Header + tabs ────────────────────────────────────────────────────
      const tabBtnStyle = (t) => `padding:7px 14px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;` +
        (tab===t ? 'background:var(--accent);color:#fff;' : 'background:var(--bg3);color:var(--muted);');

      let html = `<div class="page-header"><h2>Entries</h2>`;
      if (role === 'admin' || role === 'standard') html += `<button class="btn sm" onclick="openNewEntry()">+ Add Entry</button>`;
      html += `</div>`;

      // Tabs — only show for standard users with shared records or server mode
      if (isStd) {
        html += `<div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;">
          <button style="${tabBtnStyle('all')}" onclick="window._entriesTab='all';PG.entries=1;renderEntries()">All (${allCount})</button>
          <button style="${tabBtnStyle('mine')}" onclick="window._entriesTab='mine';PG.entries=1;renderEntries()">Mine (${mineCount})</button>
          <button style="${tabBtnStyle('shared')}" onclick="window._entriesTab='shared';PG.entries=1;renderEntries()">🔗 Shared With Me (${sharedCount})</button>
        </div>`;
      }

      const _sm = window._selectMode || false;
      // Collect IDs of all selectable rows visible on this page (for select-all)
      // Includes own entries, isShared entries, AND pending shared rows (using token as ID)
      const _selPageIds = p.items.map(item => item.token || item.id);
      // Store page IDs in window so the onchange handler can reference without quote conflicts
      window._entryPageIds = _selPageIds;

      html += `<div class="card">
        <div style="display:flex;gap:8px;align-items:center;margin-bottom:12px;flex-wrap:wrap;">
          <input type="search" id="entries_search_input" placeholder="Search entries…" value="${esc(window._search_entries||'')}" style="flex:1;min-width:180px;max-width:340px;">
          <button class="bs sm${sortDesc?' on':''}" onclick="window._sort_entries=!${sortDesc};renderEntries()" title="Sort order">${sortDesc?'↓ Latest first':'↑ Oldest first'}</button>
          <button class="bs sm${_sm?' on':''}" onclick="_toggleSelectMode()" title="Select entries for bulk actions" style="${_sm?'background:var(--accent);color:#fff;border-color:var(--accent);':''}">☑ Select</button>
          <button class="bs sm" onclick="_exportCSV(window._exportableEntries||[],'entries-export.csv')" title="Export filtered entries as CSV">📥 Export CSV</button>
          <button class="bs sm" onclick="_printEntriesTable()" title="Export entries as PDF">📄 Export PDF</button>
          <button class="bs sm" onclick="_exportLedgerCSV()" title="Export ledger summary as CSV">📥 Export Ledger</button>
        </div>
        <div class="tbl-wrap"><table><thead><tr>
          ${_sm ? `<th class="sel-col"><input type="checkbox" class="sel-cb" id="_selAllCb" title="Select all" onchange="_selectAllEntries(window._entryPageIds)"></th>` : ''}
          <th>Contact</th><th class="hide-mobile">Doc #</th><th>Amount</th><th class="hide-mobile">Type</th><th>Date</th><th>Status</th><th style="width:80px;">Action</th>
        </tr></thead><tbody>`;

      p.items.forEach(item => {
        // Three row types:
        // 1. isSharedRow   — pending unconfirmed record from _cachedSharedRecords (item.token)
        // 2. isSharedEntry — confirmed shared record now in db.entries (item.isShared === true)
        // 3. own entry     — regular own entry
        const isSharedRow   = item.token !== undefined;
        const isSharedEntry = !isSharedRow && item.isShared === true;

        if (isSharedRow) {
          // ── Shared-with-me row ──────────────────────────────────────────
          const r = item;
          const e = r.entry;
          const rawAmt  = parseFloat(e?.amount||0);
          const dt      = e?.date ? new Date(e.date).toLocaleDateString() : '—';
          const dirLabel = _recipDirLabelE(e?.txType);
          const dirColor = _recipDirColorE(e?.txType);
          const siteUrl  = e?.siteUrl || 'https://moneyinteractions.com';
          // Unified sender identity: prefer resolved name over raw email
          const _dispName = e?._resolvedFromName || e?.fromName || '—';
          const _senderC = (() => {
            const nl = _dispName.toLowerCase().trim();
            const emailFb = (e?.fromName||'').toLowerCase().trim();
            return db.contacts.find(c => c.userId === u.id && (
              (c.name||'').toLowerCase().trim() === nl ||
              (c.email||'').toLowerCase().trim() === emailFb
            )) || null;
          })();
          const nameHtmlE = _senderC
            ? `<a href="#" onclick="cLink_open('${_senderC.id}');return false;" style="color:var(--accent);text-decoration:none;font-weight:700;">${esc(_dispName)}</a>`
            : `<strong>${esc(_dispName)}</strong>`;
          const _isSettlementShared = e?.linkedInvoiceId || e?.settledByRecipient || e?.txType === 'they_paid_you' || e?.txType === 'you_paid_them';
          const isPending = !r.confirmed && !(e?.dismissed) && !_isSettlementShared;
          const sharedPill = _isSettlementShared
            ? `<span style="font-size:9px;background:rgba(22,163,74,.1);color:#16a34a;border-radius:3px;padding:1px 5px;margin-left:3px;font-weight:700;">📋 Receipt</span>`
            : isPending
            ? `<span style="font-size:10px;background:rgba(251,191,36,.18);color:#d97706;border-radius:4px;padding:1px 5px;margin-left:3px;">⏳ Pending</span>`
            : `<span style="font-size:10px;background:rgba(108,99,255,.12);color:var(--accent);border-radius:4px;padding:1px 5px;margin-left:3px;">🔗 Shared</span>`;
          const isSettledE = e?.status === 'settled' || e?.status === 'paid' || e?.status === 'fulfilled' || e?.status === 'cancelled';
          const _selSharedId = r.token; // use token as id for shared rows
          const _sNoLedger = _sharedNoLedger.has(r.token);
          const _sNoLedgPill = _sNoLedger ? `<span title="Excluded from ledger balance" style="font-size:9px;background:rgba(245,158,11,.15);color:#b45309;border-radius:3px;padding:1px 4px;margin-left:3px;font-weight:700;">⊘ Ledger</span>` : '';
          const _sPaid = parseFloat(e?.settledAmt || 0);
          const _sRem  = parseFloat(e?.remaining  != null ? e.remaining : (e?.amount||0));
          const _sAmtHtml = _sPaid > 0
            ? `<strong>${fmt(rawAmt)}</strong><div class="mobile-label" style="font-size:11px;font-weight:700;color:${dirColor};margin-top:2px;">${esc(dirLabel)}</div><div style="font-size:11px;color:var(--muted);margin-top:1px;">Paid&nbsp;${fmt(_sPaid)}</div><div style="font-size:11px;font-weight:700;color:${_sRem<=0?'var(--green)':'var(--amber)'};">Bal&nbsp;${fmt(_sRem)}</div>`
            : `<strong>${fmt(rawAmt)}</strong><div class="mobile-label" style="font-size:11px;font-weight:700;color:${dirColor};margin-top:2px;">${esc(dirLabel)}</div>`;
          html += `<tr style="background:${isPending?'rgba(251,191,36,.05)':'rgba(108,99,255,.04)'};"${_sm&&window._selectedEntries.has(_selSharedId)?' class="row-selected"':''}>
            ${_sm ? `<td class="sel-col"><input type="checkbox" class="sel-cb entry-sel-cb" data-id="${esc(_selSharedId)}" ${window._selectedEntries.has(_selSharedId)?'checked':''} onchange="_toggleEntrySelect('${esc(_selSharedId)}')"></td>` : ''}
            <td>${nameHtmlE} ${sharedPill}${_sNoLedgPill}</td>
            <td class="hide-mobile"><span style="color:var(--muted);">—</span></td>
            <td>${_sAmtHtml}</td>
            <td class="hide-mobile"><span style="font-weight:700;color:${dirColor}">${esc(dirLabel)}</span></td>
            <td>${dt}</td>
            <td>${statusBadge(e?.status||'posted', e)}${_reminderBadge(e?.reminderCount, r.token)}</td>
            <td><div class="action-menu"><button class="action-menu-btn" onclick="toggleActionMenu(this)">⋮</button><div class="action-dropdown">${_pendingSharedMenuHtml(r)}</div></div></td>
          </tr>`;
        } else if (isSharedEntry) {
          // ── Confirmed shared entry (isShared:true in db.entries) ────────
          // txType is already flipped to recipient's perspective, but invoice/bill stay as-is.
          // Use recipient-perspective color: invoice/bill/they_owe_you = red (recipient owes).
          const e = item;
          const rawAmt    = parseFloat(e.amount || 0);
          const dt        = e.date ? new Date(e.date).toLocaleDateString() : '—';
          const dirLabel  = TXL[e.txType] || e.txType;
          // For shared entries, use recipient color perspective (invoice = they owe = red/danger)
          const _sharedSenderTx = e.senderTxType || e.txType;
          const dirColor  = (_sharedSenderTx==='they_owe_you'||_sharedSenderTx==='invoice'||_sharedSenderTx==='bill'||_sharedSenderTx==='lend')
            ? 'var(--red)' : 'var(--green)';
          const dispName  = e.fromName || '—';
          const _senderCE = (() => {
            const nl = dispName.toLowerCase().trim();
            const ef = (e.fromEmail || '').toLowerCase().trim();
            return db.contacts.find(c => c.userId === u.id && (
              (c.name||'').toLowerCase().trim() === nl ||
              (ef && (c.email||'').toLowerCase().trim() === ef)
            )) || null;
          })();
          const nameHtmlSE = _senderCE
            ? `<a href="#" onclick="cLink_open('${_senderCE.id}');return false;" style="color:var(--accent);text-decoration:none;font-weight:700;">${esc(dispName)}</a>`
            : `<strong>${esc(dispName)}</strong>`;
          const sharedPillSE = `<span style="font-size:10px;background:rgba(108,99,255,.12);color:var(--accent);border-radius:4px;padding:1px 5px;margin-left:3px;">🔗 Shared</span>`;
          const isSettledSE   = e.status === 'settled' || e.status === 'paid' || e.status === 'fulfilled';
          const isTerminalSE  = isSettledSE || e.status === 'cancelled' || e.status === 'voided';
          const _noLedgPillSE = e.noLedger ? `<span title="Excluded from ledger balance" style="font-size:9px;background:rgba(245,158,11,.15);color:#b45309;border-radius:3px;padding:1px 4px;margin-left:3px;font-weight:700;">⊘ Ledger</span>` : '';
          const viewUrl = `${e.fromSiteUrl||'https://moneyinteractions.com'}/view?t=${esc(e.shareToken)}`;
          // Remind: shown when sender's original txType was you_owe_them or borrow
          // (meaning from recipient's perspective: they_owe_you/lend — they owe recipient)
          const isRemindableSE = (e.senderTxType === 'you_owe_them' || e.senderTxType === 'borrow') && !isTerminalSE;
          // Amount cell with paid/remaining breakdown
          const _sePaid = parseFloat(e.settledAmt || 0);
          const _seRem  = e.remaining != null ? parseFloat(e.remaining) : Math.max(0, rawAmt - _sePaid);
          const _seAmtHtml = _sePaid > 0
            ? `<strong>${fmt(rawAmt)}</strong><div class="mobile-label" style="font-size:11px;font-weight:700;color:${dirColor};margin-top:2px;">${esc(dirLabel)}</div><div style="font-size:11px;color:var(--muted);margin-top:1px;">Paid&nbsp;${fmt(_sePaid)}</div><div style="font-size:11px;font-weight:700;color:${_seRem<=0?'var(--green)':'var(--amber)'};">Bal&nbsp;${fmt(_seRem)}</div>`
            : `<strong>${fmt(rawAmt)}</strong><div class="mobile-label" style="font-size:11px;font-weight:700;color:${dirColor};margin-top:2px;">${esc(dirLabel)}</div>`;
          html += `<tr style="background:rgba(108,99,255,.04);"${_sm&&window._selectedEntries.has(e.id)?' class="row-selected"':''}>
            ${_sm ? `<td class="sel-col"><input type="checkbox" class="sel-cb entry-sel-cb" data-id="${e.id}" ${window._selectedEntries.has(e.id)?'checked':''} onchange="_toggleEntrySelect('${e.id}')"></td>` : ''}
            <td>${nameHtmlSE} ${sharedPillSE}${_noLedgPillSE}</td>
            <td class="hide-mobile"><span style="color:var(--muted);">—</span></td>
            <td>${_seAmtHtml}</td>
            <td class="hide-mobile"><span style="font-weight:700;color:${dirColor}">${esc(dirLabel)}</span></td>
            <td>${dt}</td>
            <td>${statusBadge(e.status || 'posted', e)}${_reminderBadge(e.reminderCount, e.id)}</td>
            <td><div class="action-menu"><button class="action-menu-btn" onclick="toggleActionMenu(this)">⋮</button><div class="action-dropdown">${_sharedEntryMenuHtml(e.id)}</div></div></td>
          </tr>`;
        } else {
          // ── Own entry row ───────────────────────────────────────────────
          const e = item;
          const c = db.contacts.find(x => x.id === e.cId);
          const _isSel = _sm && window._selectedEntries.has(e.id);
          const _isRcpt = e.isReceipt || (e.settledByRecipient && e.linkedInvoiceId);
          const _noLedgPill = (e.noLedger && !_isRcpt) ? `<span title="Excluded from ledger balance" style="font-size:9px;background:rgba(245,158,11,.15);color:#b45309;border-radius:3px;padding:1px 4px;margin-left:3px;font-weight:700;">⊘ Ledger</span>` : '';
          const _rcptPill = _isRcpt ? `<span style="font-size:9px;background:rgba(22,163,74,.1);color:#16a34a;border-radius:3px;padding:1px 4px;margin-left:3px;font-weight:700;">📋 Receipt</span>` : '';
          html += `<tr${_isSel?' class="row-selected"':''}>
            ${_sm ? `<td class="sel-col"><input type="checkbox" class="sel-cb entry-sel-cb" data-id="${e.id}" ${_isSel?'checked':''} onchange="_toggleEntrySelect('${e.id}')"></td>` : ''}
            <td>${cLink(e.cId, c?.name || '—')}${_noLedgPill}${_rcptPill}</td>
            <td class="hide-mobile">${(()=>{ const lbl = e.invoiceNumber || (e.entryNum ? '#'+String(e.entryNum).padStart(4,'0') : null); return lbl ? `<button class="gh sm" style="font-size:12px;font-weight:700;color:var(--accent);padding:2px 6px;" onclick="openEntryInvoice('${e.id}')" title="View record">${esc(lbl)}</button>` : '<span style="color:var(--muted);">—</span>'; })()}</td>
            <td>${_fmtAmtCell(e.id,`<div class="mobile-label" style="font-size:11px;font-weight:700;color:${txTypeColor(e.txType)};margin-top:2px;">${esc(TXL[e.txType]||e.txType)}</div>`)}</td>
            <td class="hide-mobile"><button class="gh sm" style="font-size:13px;padding:2px 6px;font-weight:700;color:${txTypeColor(e.txType)};" onclick="openEntryInvoice('${e.id}')" title="View record">${esc(TXL[e.txType]||e.txType)}</button></td>
            <td>${new Date(e.date).toLocaleDateString()}</td>
            <td>${statusBadge(e.status, e)}${_isRcpt ? '' : _reminderBadge(e.reminderCount, e.id)}${!_isRcpt && window._pendingSettlements?.[e.id] ? `<span class="badge" style="background:rgba(245,158,11,.12);color:#d97706;font-size:10px;margin-left:4px;cursor:pointer;" onclick="_reviewSettlement('${window._pendingSettlements[e.id]}')">⏳ Review Payment</span>` : ''}</td>
            <td>${_isRcpt
              ? `<div class="action-menu"><button class="action-menu-btn" onclick="toggleActionMenu(this)">⋮</button><div class="action-dropdown"><button onclick="openEntryInvoice('${e.id}')">View</button><button onclick="delEntry('${e.id}')" style="color:var(--red);">Delete</button></div></div>`
              : `<div class="action-menu"><button class="action-menu-btn" onclick="toggleActionMenu(this)">⋮</button><div class="action-dropdown">${_entryMenuHtml(e.id,'')}</div></div>`
            }</td>
          </tr>`;
        }
      });

      html += `</tbody></table></div>`;
      html += `<p style="font-size: 12px; color: var(--muted); margin-top: 12px;">Page ${p.page} of ${p.pages}</p>
        <div style="display: flex; gap: 8px; margin-top: 8px;">
          <button class="bs sm" onclick="PG['entries'] = Math.max(1, (PG['entries']||1)-1); renderEntries()" ${p.page === 1 ? 'disabled' : ''}>← Prev</button>
          <button class="bs sm" onclick="PG['entries'] = Math.min(${p.pages}, (PG['entries']||1)+1); renderEntries()" ${p.page === p.pages ? 'disabled' : ''}>Next →</button>
        </div>`;
      html += '</div>';

      // Shared records integrated into entries table via tabs — no separate panel needed
      document.getElementById('content').innerHTML = html;

      // ── Floating bulk action bar — injected to body so it's truly fixed ──
      document.getElementById('_bulkBar')?.remove();
      if (_sm) {
        const _bulkEl = document.createElement('div');
        const _initVis = window._selectedEntries.size > 0 ? ' visible' : '';
        _bulkEl.innerHTML = `<div id="_bulkBar" class="bulk-bar${_initVis}">
          <span class="bulk-count" id="_bulkCount">${window._selectedEntries.size} selected</span>
          <button onclick="_bulkAction('archive')">📥 Archive</button>
          <button onclick="_bulkAction('unarchive')">📤 Unarchive</button>
          <button onclick="_bulkAction('void')" style="color:var(--amber);border-color:var(--amber);">🚫 Void</button>
          <button onclick="_bulkAction('noledger')">⊘ Rm Ledger</button>
          <button onclick="_bulkAction('ledger')">📊 Restore Ledger</button>
          <button onclick="_bulkAction('delete')" class="bulk-del">🗑 Delete</button>
          <button onclick="_toggleSelectMode()" class="bulk-cancel">✕ Cancel</button>
        </div>`;
        document.body.appendChild(_bulkEl.firstElementChild);
      }
      // Load/refresh shared-with-me data (updates both tab counts and the section below)
      // Skip if we were called FROM _loadSharedWithMe to prevent infinite loop
      if (isStd && !window._sharedLoadInProgress) {
        _loadSharedWithMe();
      }
      // Attach debounced search handler
      const searchInput = document.getElementById('entries_search_input');
      if (searchInput) {
        searchInput.addEventListener('input', debounceSearch('_search_entries', () => {
          PG.entries = 1;
          renderEntries();
          const inp = document.getElementById('entries_search_input');
          if (inp) { inp.focus(); try { const l = inp.value.length; inp.setSelectionRange(l, l); } catch(_) {} }
        }));
      }
    }

    // ── ENTRY FORM (new + edit) ────────────────────────────────────────
    // Holds the currently active template for the open entry form
    let _entryTpl = null;
    let _entryFormCid = null; // preserves contact across template switch
    let _entryDirection = null; // 'they_owe_you' | 'you_owe_them' — set by direction picker

    function txOpts(allowed, sel) {
      const all = [['they_owe_you','They Owe Me'],['they_paid_you','They Settled Me'],['you_owe_them','I Owe Them'],['you_paid_them','I Settled Them']];
      const list = allowed && allowed.length ? all.filter(([k])=>allowed.includes(k)) : all;
      return list.map(([k,v])=>`<option value="${k}" ${sel===k?'selected':''}>${v}</option>`).join('');
    }

    // Settlement-only statuses — must only be reached via recordSettlement(), never via direct dropdown
    const _SETTLEMENT_STATUSES = new Set(['settled','paid','partially_settled']);

    function statusOpts(sel, excludeSettlement) {
      // excludeSettlement=true: hide settled/paid/partially_settled from dropdowns in entry forms
      // so the only path to those statuses is the recordSettlement() payment flow.
      // If the current status IS a settlement status, show it as a disabled read-only option
      // so the user can see the state but cannot manually toggle it back.
      let opts = '';
      if (excludeSettlement && _SETTLEMENT_STATUSES.has(sel)) {
        const label = ENTRY_STATUS[sel] || sel;
        opts += `<option value="${sel}" selected disabled>🔒 ${label} (via settlement flow)</option>`;
      }
      Object.entries(ENTRY_STATUS).forEach(([k,v]) => {
        if (excludeSettlement && _SETTLEMENT_STATUSES.has(k)) return; // block manual selection
        opts += `<option value="${k}" ${sel===k?'selected':''}>${v}</option>`;
      });
      return opts;
    }

    function entryFormBody(cid, tpl, existingEntry, direction) {
      const e = existingEntry;
      const u = curUser();
      const contacts = curRole()==='admin' ? db.contacts : db.contacts.filter(c=>c.userId===u.id);

    // ── Read file attachments from a file input, return Promise<Array> ──
    function _readAttachFiles(inputId, maxSizeMB) {
      const input = document.getElementById(inputId);
      if (!input || !input.files || input.files.length === 0) return Promise.resolve([]);
      const maxBytes = (maxSizeMB || 5) * 1024 * 1024;
      const promises = [];
      for (let i = 0; i < input.files.length; i++) {
        const file = input.files[i];
        if (file.size > maxBytes) { toast(file.name + ' is too large (max ' + maxSizeMB + ' MB)'); continue; }
        promises.push(new Promise(resolve => {
          const reader = new FileReader();
          reader.onload = ev => resolve({ name: file.name, type: file.type, data: ev.target.result });
          reader.onerror = () => resolve(null);
          reader.readAsDataURL(file);
        }));
      }
      return Promise.all(promises).then(arr => arr.filter(Boolean));
    }

    // ── Collect kept existing attachments (excluding removed ones) ───────
    function _keptExistingAttachments(entry) {
      if (!entry || !entry.attachments) return [];
      const kept = [];
      document.querySelectorAll('.ne-existing-att').forEach(el => {
        if (el.dataset.removed !== '1') {
          const idx = parseInt(el.dataset.attIdx, 10);
          if (!isNaN(idx) && entry.attachments[idx]) kept.push(entry.attachments[idx]);
        }
      });
      return kept;
    }

    // ── Paired-field row management ──────────────────────────────────────
    function addPairedRow(containerId) {
      const c = document.getElementById(containerId);
      if (!c) return;
      const ri = c.querySelectorAll('.paired-row').length;
      const row = document.createElement('div');
      row.className = 'paired-row';
      row.style.cssText = 'display:grid;grid-template-columns:1fr 68px 120px 36px;align-items:center;gap:6px;padding:6px 10px;border-bottom:1px solid var(--border);';
      row.dataset.row = ri;

        <input type="text"   class="pr-text" placeholder="Description" style="width:100%;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:7px 10px;font-size:14px;color:var(--text);" oninput="runTplCalcs()">

        <input type="number" class="pr-num"  placeholder="0.00" step="0.01" min="0" style="width:100%;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:7px 10px;font-size:14px;color:var(--text);" oninput="runTplCalcs()" onchange="runTplCalcs()">

    function removePairedRow(btn) {
      const row = btn.closest('.paired-row');
      const container = row?.parentElement;
      if (!container) return;
      // Keep at least one row
      if (container.querySelectorAll('.paired-row').length > 1) {
        row.remove();
        runTplCalcs();
      } else {
        // Clear the last row instead of removing it
        row.querySelector('.pr-text').value = '';
        const _qtyInp = row.querySelector('.pr-qty'); if (_qtyInp) _qtyInp.value = '';
        row.querySelector('.pr-num').value  = '';
        runTplCalcs();
      }
    }

    // Live calculator engine — runs on every numeric input change
    function runTplCalcs() {
      const tpl = _entryTpl;
      if (!tpl || !tpl.fields) return;

      // Step 1: seed vals from all user inputs.
      // Paired fields contribute their row-numeric total; other fields contribute their input value.
      const vals = {};
      tpl.fields.forEach(f => {
        if (_isPairedField(f)) {
          const container = document.getElementById('tplf_' + f.id + '_rows');
          let total = 0;
          if (container) container.querySelectorAll('.paired-row').forEach(row => {
            const _qty = parseFloat(row.querySelector('.pr-qty')?.value) || null;
            const _price = parseFloat(row.querySelector('.pr-num')?.value) || 0;
            total += _qty ? _qty * _price : _price;
          });
          vals[f.id] = total;
          return;
        }
        const el = document.getElementById('tplf_' + f.id);
        if (!el || el.tagName === 'DIV') return; // skip computed display divs
        vals[f.id] = parseFloat(el.value) || 0;
      });

      // Step 2: multi-pass computation.
      //
      // A single left-to-right pass fails when a computed field (e.g. "Total")
      // references another computed field (e.g. "Tax") that appears LATER in the
      // field order. On pass 1, "Tax" hasn't been computed yet so vals[tax] = 0.
      // Running the pass again uses the now-populated vals to get the right number.
      //
      // We repeat up to 4 times and stop early once vals stops changing (convergence).
      // This handles any chain depth regardless of how the user ordered their fields.
      //
      // DOM is only written on the final pass so the screen never shows interim values.

      const _runOnePass = () => {
        tpl.fields.forEach(f => {
          const el = document.getElementById('tplf_' + f.id);
          if (!el || el.tagName !== 'DIV') return;
          const calcs = f.calculators || [];
          if (!calcs.length) return;

          calcs.forEach(c => {
            let val = 0;
            switch (c.operation) {
              case 'multiply': {
                const tv = c.targetFieldId ? (vals[c.targetFieldId] || 0) : 0;
                val = tv * (parseFloat(c.operand) || 0);
                break;
              }
              case 'add': {
                const tv = c.targetFieldId ? (vals[c.targetFieldId] || 0) : 0;
                val = (vals[f.id] || 0) + tv;
                break;
              }
              case 'subtract': {
                const tv = c.targetFieldId ? (vals[c.targetFieldId] || 0) : 0;
                val = tv - (vals[f.id] || 0);
                break;
              }
              case 'aggregate':
                val = 0;
                tpl.fields.forEach(sf => {
                  if (sf.id === f.id) return;
                  if (sf.excludeFromAggregate) return;
                  // include: numeric types (all legacy + new), paired (row totals seeded into vals), computed results
                  if (_isNumericField(sf) || _isPairedField(sf) || (sf.calculators||[]).length > 0)
                    val += vals[sf.id] || 0;
                });
                break;
              case 'select_aggregate':
                val = (c.targetFieldIds || []).reduce((s, fid) => {
                  if (fid === f.id) return s;
                  return s + (vals[fid] || 0);
                }, 0);
                break;
            }
            vals[f.id] = val; // write back immediately — later fields in same pass see it
          });
        });
      };

      // Run passes until convergence or 4 iterations
      let prev = '';
      for (let pass = 0; pass < 4; pass++) {
        const snap = JSON.stringify(vals);
        if (pass > 0 && snap === prev) break; // converged — stop early
        prev = snap;
        _runOnePass();
      }

      // Final pass: write converged vals to the DOM
      tpl.fields.forEach(f => {
        const el = document.getElementById('tplf_' + f.id);
        if (!el || el.tagName !== 'DIV') return;
        const calcs = f.calculators || [];
        if (!calcs.length) return;

        // Determine what to display: last visible calculator result
        let displayVal = vals[f.id] || 0;
        let hasVisible = calcs.some(c => c.resultVisible !== false);

        el.dataset.computed = displayVal;

        if (f.isFinalTotal && hasVisible) {
          el.style.border    = '2px solid var(--green)';
          el.style.background = 'rgba(74,222,128,.08)';
          el.innerHTML = `<div style="width:100%;">
            <div style="font-size:9px;font-weight:700;color:var(--green);text-transform:uppercase;letter-spacing:.08em;margin-bottom:2px;">★ Invoice Total</div>
            <span style="font-size:22px;font-weight:900;color:var(--green);">${fmt(displayVal)}</span>
          </div>`;
        } else {
          el.style.border    = '';
          el.style.background = '';
          el.innerHTML = hasVisible
            ? `<span style="font-size:18px;font-weight:800;color:var(--green);">${fmt(displayVal)}</span>`
            : `<span style="color:var(--muted);font-style:italic;font-size:13px;font-weight:400;">(hidden result)</span>`;
        }
      });
    }

    function switchEntryTemplate(tid, preserveCid) {
      const hasData = (document.getElementById('neamt')?.value||'').trim() ||
                      (document.getElementById('nenote')?.value||'').trim();
      if (hasData && tid && _entryTpl?.id !== tid) {
        if (!confirm('Switching templates will replace the current entry form. Any unsaved field data will be cleared. Continue?')) {
          document.getElementById('ne_tpl').value = _entryTpl?.id||'';
          return;
        }
      }
      _entryTpl = tid ? (db.templates.find(x=>x.id===tid)||null) : null;
      const cid = preserveCid || document.getElementById('necon')?.value || _entryFormCid || null;
      _entryFormCid = cid;
      const body = document.getElementById('entryFormBody');
      if (body) { body.innerHTML = entryFormBody(cid, _entryTpl, null); runTplCalcs(); }
    }

    // ── Amount resolver ──────────────────────────────────────────────────────
    // Returns the correct invoice amount from the currently-rendered form.
    // Priority: (1) field marked isFinalTotal → (2) last aggregate field → (3) sum all computed
    function _getEntryAmountFromForm(tpl) {
      if (!tpl || !tpl.fields) return 0;
      // Priority 1: explicit Final Total field
      const finalF = tpl.fields.find(f => f.isFinalTotal);
      if (finalF) {
        if (_isPairedField(finalF)) {
          // Paired final total: sum all row numeric values
          const container = document.getElementById('tplf_' + finalF.id + '_rows');
          if (container) {
            let total = 0;
            container.querySelectorAll('.paired-row').forEach(row => {
              const _qty = parseFloat(row.querySelector('.pr-qty')?.value) || null;
              const _price = parseFloat(row.querySelector('.pr-num')?.value) || 0;
              total += _qty ? _qty * _price : _price;
            });
            return total;
          }
        } else {
          const el = document.getElementById('tplf_' + finalF.id);
          if (el) {
            return el.tagName === 'DIV'
              ? (parseFloat(el.dataset.computed) || 0)
              : (parseFloat(el.value) || 0);
          }
        }
      }
      // Priority 2: last computed field that has an 'aggregate' calculator
      let aggVal = null;
      tpl.fields.forEach(f => {
        const el = document.getElementById('tplf_' + f.id);
        if (!el || el.tagName !== 'DIV') return;
        (f.calculators || []).forEach(c => {
          if (c.operation === 'aggregate' || c.operation === 'select_aggregate')
            aggVal = parseFloat(el.dataset.computed) || 0;
        });
      });
      if (aggVal !== null) return aggVal;
      // Priority 3: sum all computed field values
      let sum = 0;
      tpl.fields.forEach(f => {
        const el = document.getElementById('tplf_' + f.id);
        if (el && el.tagName === 'DIV') sum += parseFloat(el.dataset.computed) || 0;
      });
      return sum;
    }

    async function saveNewEntry() {
      const cid    = document.getElementById('necon')?.value.trim();
      const note   = document.getElementById('nenote')?.value.trim()||'';
      const _rawStatus = document.getElementById('nests')?.value.trim()||'posted';
      // Settlement statuses must only be set via recordSettlement() — block direct form submission
      const status = _SETTLEMENT_STATUSES.has(_rawStatus) ? 'posted' : _rawStatus;
      const dateStr = document.getElementById('nedate')?.value;
      const date   = dateStr ? new Date(dateStr).getTime() : Date.now();
      if (!cid) return alert('Contact required');
      // Capture notify-on-save values BEFORE the modal is closed
      const _neNotifyOn  = document.getElementById('ne_notify_btn')?.classList.contains('on') || false;
      const _neNotifyMsg = document.getElementById('ne_notify_msg')?.value.trim() || '';
      const _neNotifyWho = window._formNwho_ne || 'them';
      const _neInlineEmail = document.getElementById('ne_notify_email')?.value.trim() || '';

      let txType, amount, invoiceNumber = null;

      if (_entryTpl) {
        // Template entry — txType + amount come from template
        txType = _entryTpl.txType || 'invoice';
        // No longer block save for missing Final Total — fall back gracefully to last aggregate or sum
        // (removed confirm() dialog: was causing false-positive blocks on mobile)
        // Amount = final total field (if designated), else last aggregate, else sum all computed
        amount = _getEntryAmountFromForm(_entryTpl);
        // Generate invoice number and increment the template counter
        const tpl = db.templates.find(x => x.id === _entryTpl.id);
        if (tpl) {
          invoiceNumber = `${tpl.invoicePrefix||'INV-'}${String(tpl.invoiceNextNum||1).padStart(4,'0')}`;
          tpl.invoiceNextNum = (tpl.invoiceNextNum || 1) + 1;
        }
      } else {
        // Blank entry — manual txType + amount
        txType = document.getElementById('netx')?.value.trim();
        const amt = document.getElementById('neamt')?.value.trim();
        if (!txType) return alert('Transaction type required');
        const amtErr = valAmt(amt); if (amtErr) return alert(amtErr);
        amount = parseFloat(amt);
      }

      // Collect template field data — inputs by value, computed displays by data-computed
      const tplData = {};
      if (_entryTpl) {
        (_entryTpl.fields||[]).forEach(f => {
          if (_isPairedField(f)) {
            // Paired: collect rows array + numeric total for calc reference
            const container = document.getElementById('tplf_'+f.id+'_rows');
            const rows = [];
            let numericTotal = 0;
            if (container) {
              container.querySelectorAll('.paired-row').forEach(row => {
                const txt   = row.querySelector('.pr-text')?.value.trim()||'';
                const qty   = parseFloat(row.querySelector('.pr-qty')?.value) || null;
                const num   = parseFloat(row.querySelector('.pr-num')?.value)||0;
                const eff   = qty ? qty * num : num;
                if (txt || num) { rows.push({text:txt, numeric:num, qty: qty||null}); numericTotal += eff; }
              });
            }
            tplData[f.id] = {
              label: f.label, textLabel: f.textLabel||'Item', numericLabel: f.numericLabel||'Amount',
              type: 'paired', rows, value: numericTotal,
              ledgerEffect: f.ledgerEffect||null, isFinalTotal: f.isFinalTotal||false
            };
          } else {
            const el = document.getElementById('tplf_'+f.id);
            if (!el) return;
            const isDiv = el.tagName === 'DIV';
            tplData[f.id] = {
              label:        f.label,
              value:        isDiv ? (parseFloat(el.dataset.computed) || 0) : el.value,
              ledgerEffect: f.ledgerEffect || null,
              computed:     isDiv,
              isFinalTotal: f.isFinalTotal || false
            };
          }
        });
      }

      db.settings.entryCounter = (db.settings.entryCounter || 0) + 1;
      const entryNum = db.settings.entryCounter;
      // Freeze template snapshot so future template edits don't affect this entry
      const templateSnapshot = _entryTpl ? JSON.parse(JSON.stringify({
        id: _entryTpl.id, name: _entryTpl.name, txType: _entryTpl.txType,
        invoicePrefix: _entryTpl.invoicePrefix, fields: _entryTpl.fields
      })) : null;
      const newEid = uuid();
      const contact = db.contacts.find(c => c.id === cid);
      // Read optional file attachments
      const _newAttachments = await _readAttachFiles('neAttachDoc', 5);
      db.entries.push({ id:newEid, userId:curUser().id, cId:cid, txType, amount,
        note, date, status:safeStatus(status), archived:false, shared:false, responses:[],
        templateId:_entryTpl?.id||null, templateData:tplData,
        templateSnapshot, invoiceNumber, entryNum, createdAt:Date.now(),
        currency: db.settings.currency || 'USD',
        attachments: _newAttachments.length ? _newAttachments : undefined });
      logAudit('add_entry',{cid,txType,amount,tpl:_entryTpl?.name||null,invoiceNumber});
      await saveNow(); // immediate sync for cross-device consistency

      // Auto-create a share token whenever the contact has an email OR an established linkedUserId.
      // The backend will look up whether that email belongs to a registered user and auto-link if so.
      // This ensures new contacts with matching emails receive records immediately (confirmed=false → banner).
      if ((contact?.linkedUserId || contact?.email) && _IS_SERVER) {
        const u = curUser();
        const siteUrl = db.settings?.siteUrl || window.location.origin;
        fetch('/api/share', {
          method: 'POST', credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            action: 'create', entryId: newEid,
            contactName: contact.name || '',
            contactEmail: contact.email || '',   // ← direct email for user lookup
            fromName:  u.displayName || u.email || (db.settings?.appName || 'Money IntX'),
            fromEmail: u.email || '',
            txType, amount, date, note, invoiceNumber,
            status: safeStatus(status),
            currency: db.settings.currency || 'USD',
            appName: db.settings?.appName || 'Money IntX',
            siteUrl, tagline: db.settings?.tagline || 'Making Money Matters Memorable'
          })
        }).catch(() => {});
      }

      closeEntryModal();
      toast(`Entry saved${invoiceNumber ? ' — ' + invoiceNumber : ''}`);
      // Always navigate to dashboard so Recent Entries refreshes (fixes mobile stale view)
      nav('dash');

      // Wire up "Notify on Save" — if the toggle was on, send the notification now
      if (_neNotifyOn && _IS_SERVER) {
        // Save inline email if the contact had none
        if (_neInlineEmail) {
          const _ct = db.contacts.find(c => c.id === cid);
          if (_ct && !_ct.email) { _ct.email = _neInlineEmail; saveNow(); }
        }
        const _notifyMsg = _neNotifyMsg || (invoiceNumber ? `Invoice ${invoiceNumber} has been created for your records.` : 'A new record has been created for your account.');
        _sendReminder(newEid, _notifyMsg, _neNotifyWho, { isInitial: true });
      }
    }

    async function saveEditEntry(eid) {

        // ── Template entry save ───────────────────────────────────────────

        const dateStr = document.getElementById('nedate')?.value;

        // Collect updated template field values

        (_entryTpl.fields||[]).forEach(f => {

              });
            }
            tplData[f.id] = {
              label: f.label, textLabel: f.textLabel||'Item', numericLabel: f.numericLabel||'Amount',
              type: 'paired', rows, value: numericTotal,

          } else {
            const el = document.getElementById('tplf_'+f.id);
            if (!el) return;
            const isDiv = el.tagName === 'DIV';
            tplData[f.id] = {
              label: f.label,
              value: isDiv ? (parseFloat(el.dataset.computed)||0) : el.value,
              ledgerEffect: f.ledgerEffect||null,
              computed: isDiv,
              isFinalTotal: f.isFinalTotal || false
            };
          }
        });

        // Derive amount: final total field first, then last aggregate, then sum all computed
        const aggVal = _getEntryAmountFromForm(_entryTpl);

        e.cId = cid; e.note = note; e.status = safeStatus(status);
        e.date = dateStr ? new Date(dateStr).getTime() : e.date;

        e.templateSnapshot = JSON.parse(JSON.stringify({

        const dateStr = document.getElementById('eedate')?.value;

        e.note = note; e.status = safeStatus(status);

    function duplicateEntry(eid) {

      if (!orig) return;
      db.settings.entryCounter = (db.settings.entryCounter || 0) + 1;
      const newId = uuid();
      const newEntry = {
        id: newId,
        userId: orig.userId,
        cId: orig.cId,
        txType: orig.txType,
        amount: orig.amount,
        note: '', // fresh note — don't copy old references
        templateId: orig.templateId || null,
        templateData: orig.templateData ? JSON.parse(JSON.stringify(orig.templateData)) : {},
        templateSnapshot: orig.templateSnapshot ? JSON.parse(JSON.stringify(orig.templateSnapshot)) : null,
        date: Date.now(),
        status: 'draft',
        createdAt: Date.now(),
        entryNum: db.settings.entryCounter,
        invoiceNumber: null, // new invoice gets its own number
        archived: false,
        shared: false,
        responses: [],
        reminderCount: 0,
        lastReminderAt: null,
        currency: orig.currency || db.settings.currency || 'USD'
      };
      db.entries.push(newEntry);
      save();
      logAudit('duplicate_entry', { from: eid, to: newId });
      toast('Entry duplicated as draft');
      editEntry(newId);
    }

    function toggleArchiveEntry(eid) {
      const e = db.entries.find(x => x.id === eid);
      if (e) {
        e.archived = !e.archived;
        save();
        logAudit(e.archived ? 'archive_entry' : 'unarchive_entry', { eid });
        renderEntries();
      }
    }

    // ── Structured action menu builder ───────────────────────────────────
    // cpCid: contact-panel contact ID (truthy when called from contact panel)
    function _entryMenuHtml(eid, cpCid) {
      const e = db.entries.find(x => x.id === eid);
      if (!e) return '';
      const pre = cpCid ? `closeCPModal();` : '';
      const isInv = isInvoiceMode(e);
      const st = e.status || 'posted';
      const settled  = st === 'settled' || st === 'voided' || st === 'cancelled' || st === 'fulfilled';
      const canSettle = (isInv || e.txType === 'they_owe_you' || e.txType === 'you_owe_them')
                        && !settled;
      const canFulfill = isInv && st !== 'fulfilled' && st !== 'voided' && st !== 'cancelled';
      const isFulfilled = isInv && st === 'fulfilled';
      const isLocked = st === 'closed';
      const pendingTok = window._pendingSettlements?.[eid];
      const proofTok   = window._settlementProofs?.[eid];

      let html = '';

      // ── Section 1: Basic ─────────────────────────────────────────────
      html += `<button onclick="${pre}openEntryInvoice('${eid}')">View</button>`;
      html += `<button onclick="${pre}editEntry('${eid}')">Edit</button>`;
      html += `<button onclick="${pre}openShareModal('${eid}')">Share</button>`;

      // ── Section 2: Workflow ──────────────────────────────────────────
      html += `<hr style="border:none;border-top:1px solid var(--border);margin:4px 0;">`;
      if (pendingTok) {
        html += `<button onclick="${pre}_reviewSettlement('${pendingTok}')" style="color:#d97706;font-weight:700;">Review Payment</button>`;
      } else if (proofTok) {
        html += `<button onclick="${pre}_reviewSettlement('${proofTok}')">View Proof</button>`;
      }
      if (canSettle) {
        html += `<button onclick="${pre}recordSettlement('${eid}')">Settle</button>`;
      }
      if (canFulfill) {
        html += `<button onclick="${pre}markFulfilled('${eid}')" style="color:#16a34a;font-weight:700;">Fulfill</button>`;
      }
      if (isFulfilled) {
        html += `<button onclick="${pre}editFulfillDetails('${eid}')">Edit Fulfillment</button>`;
      }
      // Whoever owes gets "Remind Me", whoever is owed gets "Send Reminder"
      // Sender recorded "I Owe Them" (you_owe_them) → sender OWES → Remind Me
      // Sender recorded "They Owe Me" / Invoice / Bill → sender is OWED → Send Reminder
      const _senderOwes = e.txType === 'you_owe_them' || e.txType === 'you_paid_them';
      if (!settled) {
        if (_senderOwes) {
          html += `<button onclick="${pre}_selfRemindMe('${eid}')">Remind Me</button>`;
        } else {
          html += `<button onclick="${pre}openNotifyModal('${eid}')">Send Reminder</button>`;
        }
      }

      // ── Section 3: More Actions ──────────────────────────────────────
      html += `<hr style="border:none;border-top:1px solid var(--border);margin:4px 0;">`;
      html += `<button onclick="_openMoreActionsModal('${eid}','${cpCid||''}')">More Actions →</button>`;

      return html;
    }

              style="display:block;width:100%;text-align:left;background:none;border:none;color:var(--text);padding:10px 18px;cursor:pointer;font-size:13px;">

    // ── Receiver action menu for confirmed shared entries (isShared:true in db.entries) ──
    function _sharedEntryMenuHtml(eid) {
      const e = db.entries.find(x => x.id === eid);
      if (!e || !e.isShared) return '';
      const st = e.status || 'posted';
      const isTerminal = st === 'settled' || st === 'voided' || st === 'fulfilled' || st === 'cancelled' || st === 'payment';
      const siteUrl = e.fromSiteUrl || db.settings?.siteUrl || window.location.origin;
      const viewUrl = e.shareToken ? siteUrl + '/view?t=' + e.shareToken : '#';
      // Receiver's txType is already flipped. Use senderTxType to determine who owes.
      // If sender recorded "they_owe_you" → receiver OWES → Remind Me
      // If sender recorded "you_owe_them" → receiver is OWED → Send Reminder
      const _senderTx = e.senderTxType || e.txType;
      const _receiverOwes = _senderTx === 'they_owe_you' || _senderTx === 'invoice' || _senderTx === 'bill' || _senderTx === 'lend';

      let html = '';
      html += `<a href="${esc(viewUrl)}" target="_blank" style="display:block;padding:8px 14px;font-size:13px;color:var(--accent);text-decoration:none;font-weight:600;">View</a>`;
      if (!isTerminal) {
        html += `<button onclick="_sharedMarkPaid('${esc(e.shareToken)}')" style="color:var(--green);font-weight:700;">Record Payment</button>`;
      }
      if (!isTerminal) {
        if (_receiverOwes) {
          html += `<button onclick="_selfRemindMe('${esc(e.shareToken)}')">Remind Me</button>`;
        } else {
          html += `<button onclick="openNotifyModal('${eid}')">Send Reminder</button>`;
        }
      }
      html += `<hr style="border:none;border-top:1px solid var(--border);margin:4px 0;">`;
      html += e.noLedger
        ? `<button onclick="(function(){var _se=db.entries.find(x=>x.id==='${e.id}');if(_se){delete _se.noLedger;save();toast('Restored to ledger');refreshCurPage();}})()">Restore to Ledger</button>`
        : `<button onclick="(function(){var _se=db.entries.find(x=>x.id==='${e.id}');if(_se){_se.noLedger=true;save();toast('Removed from ledger');refreshCurPage();}})()">Rm Ledger</button>`;
      html += `<button onclick="_sharedExpire('${esc(e.shareToken)}')">Expire</button>`;
      html += `<button onclick="delEntry('${esc(e.id)}')" style="color:var(--red);">Delete</button>`;
      return html;
    }

    // ── Receiver action menu for PENDING (unconfirmed) shared records ──
    function _pendingSharedMenuHtml(r) {
      if (!r || !r.token) return '';
      const e = r.entry;
      const siteUrl = e?.siteUrl || db.settings?.siteUrl || 'https://moneyinteractions.com';
      const isSettled = e?.status === 'settled' || e?.status === 'paid' || e?.status === 'fulfilled' || e?.status === 'cancelled';
      const _isReceipt = e?.linkedInvoiceId || e?.settledByRecipient || e?.txType === 'they_paid_you' || e?.txType === 'you_paid_them';
      const isPending = !r.confirmed && !e?.dismissed && !_isReceipt;
      // Sender's txType (not flipped yet for pending records)
      // If sender recorded "they_owe_you" → receiver OWES → Remind Me
      // If sender recorded "you_owe_them" → receiver is OWED → Send Reminder
      const _receiverOwes = e?.txType === 'they_owe_you' || e?.txType === 'invoice' || e?.txType === 'bill' || e?.txType === 'lend';

      let html = '';
      html += `<a href="${esc(siteUrl)}/view?t=${esc(r.token)}" target="_blank" style="display:block;padding:8px 14px;font-size:13px;color:var(--accent);text-decoration:none;font-weight:600;">View</a>`;
      if (isPending && !_isSettlementEntry(e)) {
        html += `<button onclick="doConfirmShared('${esc(r.token)}')" style="color:#16a34a;font-weight:700;">Confirm &amp; Track</button>`;
        html += `<button onclick="doDismissShared('${esc(r.token)}')" style="color:var(--red);">Dismiss</button>`;
      }
      if (!isSettled) {
        html += `<button onclick="_sharedMarkPaid('${esc(r.token)}')" style="color:var(--green);font-weight:700;">Record Payment</button>`;
      }
      if (!isSettled) {
        if (_receiverOwes) {
          html += `<button onclick="_selfRemindMe('${esc(r.token)}')">Remind Me</button>`;
        } else {
          html += `<button onclick="_sharedSendReminder('${esc(r.token)}')">Send Reminder</button>`;
        }
      }
      html += `<hr style="border:none;border-top:1px solid var(--border);margin:4px 0;">`;
      const _sNoLedger = _sharedNoLedger.has(r.token);
      html += _sNoLedger
        ? `<button onclick="_sharedNoLedger.delete('${esc(r.token)}');_saveSharedPrefs();toast('Restored to ledger');refreshCurPage();">Restore to Ledger</button>`
        : `<button onclick="_sharedNoLedger.add('${esc(r.token)}');_saveSharedPrefs();toast('Removed from ledger');refreshCurPage();">Rm Ledger</button>`;
      html += `<button onclick="_sharedExpire('${esc(r.token)}')">Expire</button>`;
      return html;
    }

    function voidEntry(eid) {
      if (!confirm('Cancel this invoice?')) return;
      const e = db.entries.find(x => x.id === eid);
      if (e) {
        e.status = 'voided';
        // If this was a settlement credit, resync the linked invoice
        if (e.linkedInvoiceId) { _syncInvoiceStatus(e.linkedInvoiceId); _pushShareStatus(e.linkedInvoiceId); }
        save();
        logAudit('void_entry', { eid });
        refreshCurPage();
      }
    }

    function openCloseModal(eid) {
      const e = db.entries.find(x => x.id === eid);
      if (!e) return;
      const c = db.contacts.find(x => x.id === e.cId);
      const d = document.createElement('div');
      d.innerHTML = `<div class="modal-bg" id="closeModalBg" onclick="if(event.target===this)this.remove()">
        <div class="modal" style="max-width:460px;" onclick="event.stopPropagation()">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
            <div class="modal-title" style="margin:0;">🔒 Close Record</div>
            <button class="gh sm" onclick="document.getElementById('closeModalBg').remove()">✕</button>
          </div>
          <div style="background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:14px;">
            <div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px;">Record</div>
            <div style="font-weight:700;">${esc(c?.name||'—')} — ${_fmtAmtLine(eid)}</div>
          </div>
          <p style="font-size:13px;color:var(--muted);margin-bottom:14px;">

            <textarea id="closeMsgInput" rows="3" placeholder="e.g. This matter has been resolved." style="width:100%;"></textarea>
          </div>
          <div style="display:flex;gap:10px;margin-top:4px;">
            <button class="bs" style="flex:1;" onclick="document.getElementById('closeModalBg').remove()">Cancel</button>

    async function doCloseEntry(eid) {
      const msg = (document.getElementById('closeMsgInput')?.value || '').trim();
      const e = db.entries.find(x => x.id === eid);
      if (!e) return;
      const c = db.contacts.find(x => x.id === e.cId);

      // 1. Update local entry
      e.status = 'closed';
      e.closedAt = Date.now();
      e.closedMsg = msg;
      e.closedByRecipient = false;
      save();
      logAudit('close_entry', { eid, msg });

      // 2. Close the modal
      document.getElementById('closeModalBg')?.remove();
      toast('Record closed');
      refreshCurPage();

      // 3. Update share_tokens snapshot + trigger email to contact (non-blocking)
      if (_IS_SERVER) {
        try {
          await fetch('/api/share', {
            method: 'POST',
            credentials: 'include',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              action: 'owner-close',
              entryId: eid,
              closedMsg: msg
            })
          });
        } catch (_) {}

        // Send notification email to contact if they have an email
        try {
          const u = curUser();
          const appName = db.settings?.appName || 'Money IntX';
          const siteUrl = db.settings?.siteUrl || window.location.origin;
          // Find the share token for this entry so we can include the link
          const stRes = await fetch('/api/share', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              action: 'create',
              entryId: eid,
              contactName: c?.name || '',
              fromName: u?.name || u?.email || '',
              fromEmail: u?.email || '',
              txType: e.txType,
              amount: e.amount,
              date: e.date,
              note: e.note || '',
              invoiceNumber: e.invoiceNumber || '',
              status: 'closed',
              appName,
              siteUrl
            })
          });
          const stData = await stRes.json();
          const shareUrl = stData.shareUrl || '';

          if (c?.email) {
            const closingNote = msg ? `\n\n"${msg}"` : '';
            await fetch('/api/email', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                to: c.email,
                subject: `${u?.name || appName} has closed a record`,
                text: `Hi ${c.name},\n\n${u?.name || 'The sender'} has closed the following record:${closingNote}\n\nAmount: ${fmt(e.amount, e.currency)}\n\nYou can view the record and close it from your side here:\n${shareUrl}\n\n— ${appName}`,
                appName, siteUrl
              })
            });
          }
        } catch (_) {}
      }
    }

    function reopenEntry(eid) {
      if (!confirm('Reopen this record?')) return;
      const e = db.entries.find(x => x.id === eid);
      if (!e) return;
      e.status = 'posted';
      delete e.closedAt;
      delete e.closedMsg;
      delete e.closedByRecipient;
      delete e.closedByRecipientAt;
      save();
      logAudit('reopen_entry', { eid });
      toast('Record reopened');
      refreshCurPage();
    }

    /* ══════════════════════════════════════════════════════════════════
       BULK SELECTION — state, toggle helpers, bulk action dispatcher
       ══════════════════════════════════════════════════════════════════ */
    window._selectedEntries = window._selectedEntries || new Set();
    window._selectMode      = window._selectMode      || false;

    function _toggleSelectMode() {
      window._selectMode = !window._selectMode;
      if (!window._selectMode) window._selectedEntries = new Set();
      renderEntries();
    }

    // Called by each row's checkbox — updates selection and refreshes bar only
    function _toggleEntrySelect(id) {
      if (window._selectedEntries.has(id)) window._selectedEntries.delete(id);
      else window._selectedEntries.add(id);
      _updateBulkBar();
    }

    // Select / deselect all ids on current page
    function _selectAllEntries(ids) {
      const allSel = ids.length > 0 && ids.every(id => window._selectedEntries.has(id));
      ids.forEach(id => allSel ? window._selectedEntries.delete(id) : window._selectedEntries.add(id));
      // Sync checkboxes without full re-render
      document.querySelectorAll('.entry-sel-cb').forEach(cb => {
        cb.checked = window._selectedEntries.has(cb.dataset.id);
        cb.closest('tr')?.classList.toggle('row-selected', cb.checked);
      });
      const selAllCb = document.getElementById('_selAllCb');
      if (selAllCb) selAllCb.checked = !allSel;
      _updateBulkBar();
    }

    // Refresh bulk bar without re-rendering the whole table
    function _updateBulkBar() {
      const n = window._selectedEntries.size;
      const bar = document.getElementById('_bulkBar');
      if (!bar) return;
      document.getElementById('_bulkCount').textContent = n + ' selected';
      bar.classList.toggle('visible', n > 0);
      // Keep checkboxes and row highlight in sync
      document.querySelectorAll('.entry-sel-cb').forEach(cb => {
        const sel = window._selectedEntries.has(cb.dataset.id);
        cb.checked = sel;
        cb.closest('tr')?.classList.toggle('row-selected', sel);
      });
      const allCbs = [...document.querySelectorAll('.entry-sel-cb')];
      const selAllCb = document.getElementById('_selAllCb');
      if (selAllCb) selAllCb.checked = allCbs.length > 0 && allCbs.every(cb => cb.checked);
    }

    // Bulk action dispatcher
    function _bulkAction(action) {
      const ids = [...window._selectedEntries];
      if (ids.length === 0) return toast('No entries selected');
      // Own entries: IDs found in db.entries
      const ownIds = ids.filter(id => db.entries.find(e => e.id === id));
      // Shared records: IDs that are tokens found in _cachedSharedRecords
      const sharedRecs = ids.map(id => _cachedSharedRecords.find(r => r.token === id)).filter(Boolean);

      if (action === 'delete') {
        if (!confirm('Delete ' + ownIds.length + ' entr' + (ownIds.length === 1 ? 'y' : 'ies') + '? This cannot be undone.')) return;
        ownIds.forEach(id => {
          const e = db.entries.find(x => x.id === id);
          // Dismiss shared-with-me entries on the server so the migration
          // in _loadSharedWithMe won't immediately re-insert them
          if (e?.isShared && e?.shareToken) {
            fetch('/api/share', {
              method: 'POST', credentials: 'include',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ action: 'dismiss-shared', token: e.shareToken })
            }).catch(() => {});
            const _cr = (_cachedSharedRecords || []).find(x => x.token === e.shareToken);
            if (_cr && _cr.entry) _cr.entry.dismissed = true;
          }
          if (e?.linkedInvoiceId) { _syncInvoiceStatus(e.linkedInvoiceId); _pushShareStatus(e.linkedInvoiceId); }
          db.entries = db.entries.filter(x => x.id !== id);
        });
        logAudit('bulk_delete', { count: ownIds.length });
        toast('🗑 ' + ownIds.length + ' entries deleted');

      } else if (action === 'archive') {
        ownIds.forEach(id => { const e = db.entries.find(x => x.id === id); if (e) e.archived = true; });
        logAudit('bulk_archive', { count: ownIds.length });
        toast('📥 ' + ownIds.length + ' entries archived');

      } else if (action === 'unarchive') {
        ownIds.forEach(id => { const e = db.entries.find(x => x.id === id); if (e) e.archived = false; });
        logAudit('bulk_unarchive', { count: ownIds.length });
        toast('📤 ' + ownIds.length + ' entries unarchived');

      } else if (action === 'void') {
        if (!confirm('Void ' + ownIds.length + ' entr' + (ownIds.length === 1 ? 'y' : 'ies') + '?')) return;
        ownIds.forEach(id => {
          const e = db.entries.find(x => x.id === id);
          if (e) {
            e.status = 'voided';
            if (e.linkedInvoiceId) { _syncInvoiceStatus(e.linkedInvoiceId); _pushShareStatus(e.linkedInvoiceId); }
          }
        });
        logAudit('bulk_void', { count: ownIds.length });
        toast('🚫 ' + ownIds.length + ' entries voided');

      } else if (action === 'noledger') {
        ownIds.forEach(id => { const e = db.entries.find(x => x.id === id); if (e) e.noLedger = true; });
        sharedRecs.forEach(r => { _sharedNoLedger.add(r.token); });
        _saveSharedPrefs();
        const _nlCount = ownIds.length + sharedRecs.length;
        logAudit('bulk_noledger', { count: _nlCount });
        toast('⊘ ' + _nlCount + ' entries removed from ledger balance');

      } else if (action === 'ledger') {
        ownIds.forEach(id => { const e = db.entries.find(x => x.id === id); if (e) delete e.noLedger; });
        sharedRecs.forEach(r => { _sharedNoLedger.delete(r.token); });
        _saveSharedPrefs();
        const _rlCount = ownIds.length + sharedRecs.length;
        logAudit('bulk_restore_ledger', { count: _rlCount });
        toast('📊 ' + _rlCount + ' entries restored to ledger');
      }

      save();
      window._selectedEntries = new Set();
      window._selectMode = false;
      renderEntries();
    }

    function delEntry(eid) {
      if (!confirm('Delete this entry?')) return;
      const e = db.entries.find(x => x.id === eid);
      // If this is a shared-with-me entry, tell the server to mark it dismissed
      // so the migration in _loadSharedWithMe won't immediately re-insert it
      if (e?.isShared && e?.shareToken) {
        fetch('/api/share', {
          method: 'POST', credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'dismiss-shared', token: e.shareToken })
        }).catch(() => {});
        // Also mark local cache so any in-progress render skips it
        const _cr = (_cachedSharedRecords || []).find(x => x.token === e.shareToken);
        if (_cr && _cr.entry) _cr.entry.dismissed = true;
      }
      const linkedInv = e?.linkedInvoiceId;
      db.entries = db.entries.filter(x => x.id !== eid);
      // If deleted entry was a settlement, resync the linked invoice
      if (linkedInv) { _syncInvoiceStatus(linkedInv); _pushShareStatus(linkedInv); }
      save();
      logAudit('delete_entry', { eid });
      toast('Entry deleted');
      refreshCurPage();
    }
