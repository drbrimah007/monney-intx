    function removePairedRow(btn) {
      const row = btn.closest('.paired-row');
      const container = row?.parentElement;
      if (!container) return;
      // Keep at least one row
      if (container.querySelectorAll('.paired-row').length > 1) {
        row.remove();
        runTplCalcs();
      } else {
        // Clear the last row instead of removing it
        row.querySelector('.pr-text').value = '';
        row.querySelector('.pr-num').value  = '';
        runTplCalcs();
      }
    }

    // Live calculator engine — runs on every numeric input change
    function runTplCalcs() {
      const tpl = _entryTpl;
      if (!tpl || !tpl.fields) return;

      // Step 1: seed vals from all user inputs.
      // Paired fields contribute their row-numeric total; other fields contribute their input value.
      const vals = {};
      tpl.fields.forEach(f => {
        if (_isPairedField(f)) {
          const container = document.getElementById('tplf_' + f.id + '_rows');
          let total = 0;
          if (container) container.querySelectorAll('.pr-num').forEach(inp => { total += parseFloat(inp.value)||0; });
          vals[f.id] = total;
          return;
        }
        const el = document.getElementById('tplf_' + f.id);
        if (!el || el.tagName === 'DIV') return; // skip computed display divs
        vals[f.id] = parseFloat(el.value) || 0;
      });

      // Step 2: multi-pass computation.
      //
      // A single left-to-right pass fails when a computed field (e.g. "Total")
      // references another computed field (e.g. "Tax") that appears LATER in the
      // field order. On pass 1, "Tax" hasn't been computed yet so vals[tax] = 0.
      // Running the pass again uses the now-populated vals to get the right number.
      //
      // We repeat up to 4 times and stop early once vals stops changing (convergence).
      // This handles any chain depth regardless of how the user ordered their fields.
      //
      // DOM is only written on the final pass so the screen never shows interim values.

      const _runOnePass = () => {
        tpl.fields.forEach(f => {
          const el = document.getElementById('tplf_' + f.id);
          if (!el || el.tagName !== 'DIV') return;
          const calcs = f.calculators || [];
          if (!calcs.length) return;

          calcs.forEach(c => {
            let val = 0;
            switch (c.operation) {
              case 'multiply': {
                const tv = c.targetFieldId ? (vals[c.targetFieldId] || 0) : 0;
                val = tv * (parseFloat(c.operand) || 0);
                break;
              }
              case 'add': {
                const tv = c.targetFieldId ? (vals[c.targetFieldId] || 0) : 0;
                val = (vals[f.id] || 0) + tv;
                break;
              }
              case 'subtract': {
                const tv = c.targetFieldId ? (vals[c.targetFieldId] || 0) : 0;
                val = tv - (vals[f.id] || 0);
                break;
              }
              case 'aggregate':
                val = 0;
                tpl.fields.forEach(sf => {
                  if (sf.id === f.id) return;
                  if (sf.excludeFromAggregate) return;
                  // include: numeric types (all legacy + new), paired (row totals seeded into vals), computed results
                  if (_isNumericField(sf) || _isPairedField(sf) || (sf.calculators||[]).length > 0)
                    val += vals[sf.id] || 0;
                });
                break;
              case 'select_aggregate':
                val = (c.targetFieldIds || []).reduce((s, fid) => {
                  if (fid === f.id) return s;
                  return s + (vals[fid] || 0);
                }, 0);
                break;
            }
            vals[f.id] = val; // write back immediately — later fields in same pass see it
          });
        });
      };

      // Run passes until convergence or 4 iterations
      let prev = '';
      for (let pass = 0; pass < 4; pass++) {
        const snap = JSON.stringify(vals);
        if (pass > 0 && snap === prev) break; // converged — stop early
        prev = snap;
        _runOnePass();
      }

      // Final pass: write converged vals to the DOM
      tpl.fields.forEach(f => {
        const el = document.getElementById('tplf_' + f.id);
        if (!el || el.tagName !== 'DIV') return;
        const calcs = f.calculators || [];
        if (!calcs.length) return;

        // Determine what to display: last visible calculator result
        let displayVal = vals[f.id] || 0;
        let hasVisible = calcs.some(c => c.resultVisible !== false);

        el.dataset.computed = displayVal;

        if (f.isFinalTotal && hasVisible) {
          el.style.border    = '2px solid var(--green)';
          el.style.background = 'rgba(74,222,128,.08)';
          el.innerHTML = `<div style="width:100%;">
            <div style="font-size:9px;font-weight:700;color:var(--green);text-transform:uppercase;letter-spacing:.08em;margin-bottom:2px;">★ Invoice Total</div>
            <span style="font-size:22px;font-weight:900;color:var(--green);">${fmt(displayVal)}</span>
          </div>`;
        } else {
          el.style.border    = '';
          el.style.background = '';
          el.innerHTML = hasVisible
            ? `<span style="font-size:18px;font-weight:800;color:var(--green);">${fmt(displayVal)}</span>`
            : `<span style="color:var(--muted);font-style:italic;font-size:13px;font-weight:400;">(hidden result)</span>`;
        }
      });
    }

    function switchEntryTemplate(tid, preserveCid) {
      const hasData = (document.getElementById('neamt')?.value||'').trim() ||
                      (document.getElementById('nenote')?.value||'').trim();
      if (hasData && tid && _entryTpl?.id !== tid) {
        if (!confirm('Switching templates will replace the current entry form. Any unsaved field data will be cleared. Continue?')) {
          document.getElementById('ne_tpl').value = _entryTpl?.id||'';
          return;
        }
      }
      _entryTpl = tid ? (db.templates.find(x=>x.id===tid)||null) : null;
      const cid = preserveCid || document.getElementById('necon')?.value || _entryFormCid || null;
      _entryFormCid = cid;
      const body = document.getElementById('entryFormBody');
      if (body) { body.innerHTML = entryFormBody(cid, _entryTpl, null); runTplCalcs(); }
    }

    // ── Amount resolver ──────────────────────────────────────────────────────
    // Returns the correct invoice amount from the currently-rendered form.
    // Priority: (1) field marked isFinalTotal → (2) last aggregate field → (3) sum all computed
    function _getEntryAmountFromForm(tpl) {
      if (!tpl || !tpl.fields) return 0;
      // Priority 1: explicit Final Total field
      const finalF = tpl.fields.find(f => f.isFinalTotal);
      if (finalF) {
        if (_isPairedField(finalF)) {
          // Paired final total: sum all row numeric values
          const container = document.getElementById('tplf_' + finalF.id + '_rows');
          if (container) {
            let total = 0;
            container.querySelectorAll('.pr-num').forEach(inp => { total += parseFloat(inp.value)||0; });
            return total;
          }
        } else {
          const el = document.getElementById('tplf_' + finalF.id);
          if (el) {
            return el.tagName === 'DIV'
              ? (parseFloat(el.dataset.computed) || 0)
              : (parseFloat(el.value) || 0);
          }
        }
      }
      // Priority 2: last computed field that has an 'aggregate' calculator
      let aggVal = null;
      tpl.fields.forEach(f => {
        const el = document.getElementById('tplf_' + f.id);
        if (!el || el.tagName !== 'DIV') return;
        (f.calculators || []).forEach(c => {
          if (c.operation === 'aggregate' || c.operation === 'select_aggregate')
            aggVal = parseFloat(el.dataset.computed) || 0;
        });
      });
      if (aggVal !== null) return aggVal;
      // Priority 3: sum all computed field values
      let sum = 0;
      tpl.fields.forEach(f => {
        const el = document.getElementById('tplf_' + f.id);
        if (el && el.tagName === 'DIV') sum += parseFloat(el.dataset.computed) || 0;
      });
      return sum;
    }

    async function saveNewEntry() {
      const cid    = document.getElementById('necon')?.value.trim();
      const note   = document.getElementById('nenote')?.value.trim()||'';
      const status = document.getElementById('nests')?.value.trim()||'posted';
      const dateStr = document.getElementById('nedate')?.value;
      const date   = dateStr ? new Date(dateStr).getTime() : Date.now();
      if (!cid) return alert('Contact required');

      let txType, amount, invoiceNumber = null;

      if (_entryTpl) {
        // Template entry — txType + amount come from template
        txType = _entryTpl.txType || 'invoice';
        // No longer block save for missing Final Total — fall back gracefully to last aggregate or sum
        // (removed confirm() dialog: was causing false-positive blocks on mobile)
        // Amount = final total field (if designated), else last aggregate, else sum all computed
        amount = _getEntryAmountFromForm(_entryTpl);
        // Generate invoice number and increment the template counter
        const tpl = db.templates.find(x => x.id === _entryTpl.id);
        if (tpl) {
          invoiceNumber = `${tpl.invoicePrefix||'INV-'}${String(tpl.invoiceNextNum||1).padStart(4,'0')}`;
          tpl.invoiceNextNum = (tpl.invoiceNextNum || 1) + 1;
        }
      } else {
        // Blank entry — manual txType + amount
        txType = document.getElementById('netx')?.value.trim();
        const amt = document.getElementById('neamt')?.value.trim();
        if (!txType) return alert('Transaction type required');
        const amtErr = valAmt(amt); if (amtErr) return alert(amtErr);
        amount = parseFloat(amt);
      }

      // Collect template field data — inputs by value, computed displays by data-computed
      const tplData = {};
      if (_entryTpl) {
        (_entryTpl.fields||[]).forEach(f => {
          if (_isPairedField(f)) {
            // Paired: collect rows array + numeric total for calc reference
            const container = document.getElementById('tplf_'+f.id+'_rows');
            const rows = [];
            let numericTotal = 0;
            if (container) {
              container.querySelectorAll('.paired-row').forEach(row => {
                const txt = row.querySelector('.pr-text')?.value.trim()||'';
                const num = parseFloat(row.querySelector('.pr-num')?.value)||0;
                if (txt || num) { rows.push({text:txt, numeric:num}); numericTotal += num; }
              });
            }
            tplData[f.id] = {
              label: f.label, textLabel: f.textLabel||'Item', numericLabel: f.numericLabel||'Amount',
              type: 'paired', rows, value: numericTotal,
              ledgerEffect: f.ledgerEffect||null, isFinalTotal: f.isFinalTotal||false
            };
          } else {
            const el = document.getElementById('tplf_'+f.id);
            if (!el) return;
            const isDiv = el.tagName === 'DIV';
            tplData[f.id] = {
              label:        f.label,
              value:        isDiv ? (parseFloat(el.dataset.computed) || 0) : el.value,
              ledgerEffect: f.ledgerEffect || null,
              computed:     isDiv,
              isFinalTotal: f.isFinalTotal || false
            };
          }
        });
      }

      db.settings.entryCounter = (db.settings.entryCounter || 0) + 1;
      const entryNum = db.settings.entryCounter;
      // Freeze template snapshot so future template edits don't affect this entry
      const templateSnapshot = _entryTpl ? JSON.parse(JSON.stringify({
        id: _entryTpl.id, name: _entryTpl.name, txType: _entryTpl.txType,
        invoicePrefix: _entryTpl.invoicePrefix, fields: _entryTpl.fields
      })) : null;
      const newEid = uuid();
      const contact = db.contacts.find(c => c.id === cid);
      db.entries.push({ id:newEid, userId:curUser().id, cId:cid, txType, amount,
        note, date, status:safeStatus(status), archived:false, shared:false, responses:[],
        templateId:_entryTpl?.id||null, templateData:tplData,
        templateSnapshot, invoiceNumber, entryNum, createdAt:Date.now() });
      logAudit('add_entry',{cid,txType,amount,tpl:_entryTpl?.name||null,invoiceNumber});
      await saveNow(); // immediate sync for cross-device consistency

      // If this contact has accepted a previous record (linkedUserId is set),
      // auto-create and auto-link a share token — no consent step needed,
      // relationship already established. Works regardless of email used.
      if (contact?.linkedUserId && _IS_SERVER) {
        const u = curUser();
        const siteUrl = db.settings?.siteUrl || window.location.origin;
        fetch('/api/share', {
          method: 'POST', credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            action: 'create', entryId: newEid,
            contactName: contact.name || '',
            fromName:  u.displayName || u.email || (db.settings?.appName || 'Money Intx'),
            fromEmail: u.email || '',
            txType, amount, date, note, invoiceNumber,
            status: safeStatus(status),
            appName: db.settings?.appName || 'Money Intx',
            siteUrl, tagline: db.settings?.tagline || 'Making Money Matters Memorable'
          })
        }).catch(() => {});
      }

      // Notify contact if toggle is on

    function saveEditEntry(eid) {
      const e = db.entries.find(x => x.id === eid);
      if (!e) return;

      if (_entryTpl && e.templateId) {
        // ── Template entry save ───────────────────────────────────────────
        const cid    = document.getElementById('necon')?.value.trim();
        const note   = document.getElementById('nenote')?.value.trim()||'';
        const status = document.getElementById('nests')?.value.trim()||'posted';
        const dateStr = document.getElementById('nedate')?.value;
        if (!cid) return alert('Contact required');

        // Collect updated template field values
        const tplData = {};
        (_entryTpl.fields||[]).forEach(f => {
          if (_isPairedField(f)) {
            const container = document.getElementById('tplf_'+f.id+'_rows');
            const rows = [];
            let numericTotal = 0;
            if (container) {
              container.querySelectorAll('.paired-row').forEach(row => {
                const txt = row.querySelector('.pr-text')?.value.trim()||'';
                const num = parseFloat(row.querySelector('.pr-num')?.value)||0;
                if (txt || num) { rows.push({text:txt, numeric:num}); numericTotal += num; }
              });
            }
            tplData[f.id] = {
              label: f.label, textLabel: f.textLabel||'Item', numericLabel: f.numericLabel||'Amount',
              type: 'paired', rows, value: numericTotal,
              ledgerEffect: f.ledgerEffect||null, isFinalTotal: f.isFinalTotal||false
            };
          } else {
            const el = document.getElementById('tplf_'+f.id);
            if (!el) return;
            const isDiv = el.tagName === 'DIV';
            tplData[f.id] = {
              label: f.label,
              value: isDiv ? (parseFloat(el.dataset.computed)||0) : el.value,
              ledgerEffect: f.ledgerEffect||null,
              computed: isDiv,
              isFinalTotal: f.isFinalTotal || false
            };
          }
        });

        // Derive amount: final total field first, then last aggregate, then sum all computed
        const aggVal = _getEntryAmountFromForm(_entryTpl);

        e.cId = cid; e.note = note; e.status = safeStatus(status);
        e.date = dateStr ? new Date(dateStr).getTime() : e.date;
        e.amount = aggVal;
        e.templateData = tplData;
        // Refresh snapshot to freeze current template state at edit time
        e.templateSnapshot = JSON.parse(JSON.stringify({
          id: _entryTpl.id, name: _entryTpl.name, txType: _entryTpl.txType,
          invoicePrefix: _entryTpl.invoicePrefix, fields: _entryTpl.fields
        }));
        save(); logAudit('edit_entry', {eid, cid, amount: aggVal, tpl: _entryTpl.name});
        document.getElementById('editEntryBg')?.remove();
        toast('Entry updated');
        refreshCurPage();

      } else {
        // ── Manual entry save ─────────────────────────────────────────────
        const cid    = document.getElementById('eecon')?.value.trim();
        const txType = document.getElementById('eetx')?.value.trim();
        const amt    = document.getElementById('eeamt')?.value.trim();
        const note   = document.getElementById('eenote')?.value.trim()||'';
        const status = document.getElementById('eests')?.value.trim()||'posted';
        const dateStr = document.getElementById('eedate')?.value;
        const amtErr = valAmt(amt);
        if (amtErr) return alert(amtErr);
        if (!txType) return alert('Transaction type required');
        e.cId = cid; e.txType = txType; e.amount = parseFloat(amt);
        e.note = note; e.status = safeStatus(status);
        e.date = dateStr ? new Date(dateStr).getTime() : e.date;
        save(); logAudit('edit_entry', {eid, cid, txType, amount: amt});
        document.getElementById('editEntryBg')?.remove();
        toast('Entry updated');
        refreshCurPage();
      }
    }

    async function doCloseEntry(eid) {
      const msg = (document.getElementById('closeMsgInput')?.value || '').trim();
      const e = db.entries.find(x => x.id === eid);
      if (!e) return;
      const c = db.contacts.find(x => x.id === e.cId);

      // 1. Update local entry
      e.status = 'closed';
      e.closedAt = Date.now();
      e.closedMsg = msg;
      e.closedByRecipient = false;
      save();
      logAudit('close_entry', { eid, msg });

      // 2. Close the modal
      document.getElementById('closeModalBg')?.remove();
      toast('Record closed');
      refreshCurPage();

      // 3. Update share_tokens snapshot + trigger email to contact (non-blocking)
      if (_IS_SERVER) {
        try {
          await fetch('/api/share', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              action: 'owner-close',
              entryId: eid,
              closedMsg: msg
            })
          });
        } catch (_) {}

        // Send notification email to contact if they have an email
        try {
          const u = curUser();
          const appName = db.settings?.appName || 'Money Intx';
          const siteUrl = db.settings?.siteUrl || window.location.origin;
          // Find the share token for this entry so we can include the link
          const stRes = await fetch('/api/share', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              action: 'create',
              entryId: eid,
              contactName: c?.name || '',
              fromName: u?.name || u?.email || '',
              fromEmail: u?.email || '',
              txType: e.txType,
              amount: e.amount,
              date: e.date,
              note: e.note || '',
              invoiceNumber: e.invoiceNumber || '',
              status: 'closed',
              appName,
              siteUrl
            })
          });
          const stData = await stRes.json();
          const shareUrl = stData.shareUrl || '';

          if (c?.email) {
            const closingNote = msg ? `\n\n"${msg}"` : '';
            await fetch('/api/email', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                to: c.email,
                subject: `${u?.name || appName} has closed a record`,
                text: `Hi ${c.name},\n\n${u?.name || 'The sender'} has closed the following record:${closingNote}\n\nAmount: ${fmt(e.amount)}\n\nYou can view the record and close it from your side here:\n${shareUrl}\n\n— ${appName}`,
                appName, siteUrl
              })
            });
          }
        } catch (_) {}
      }
    }

    // Shared helper — saves to db.notifs AND calls the email API
    async function _sendNotificationForEntry(eid, message, who) {
      const e = db.entries.find(x => x.id === eid);
      if (!e) return;
      const contact = db.contacts.find(x => x.id === e.cId);
      const u = curUser();
      // Determine recipient email(s) first so we can store them with the record
      const recipientEmail = contact?.email || '';
      const myEmail = u.email || '';
      const toAddresses = [];
      if (who === 'them' || who === 'both') { if (recipientEmail) toAddresses.push(recipientEmail); }
      if (who === 'you' || who === 'both')  { if (myEmail)        toAddresses.push(myEmail); }
      // Save in-app notification record (with full context)
      db.notifs.push({
        id: uuid(), userId: u.id, cId: e.cId, eid,
        msg: message, channel: 'email', sent: false,
        who, sentTo: toAddresses,
        read: false, createdAt: Date.now()
      });
      save();
      logAudit('send_notification', { eid, to: who });
      if (toAddresses.length === 0) {
        toast('⚠️ No email on record for this contact — notification saved but not emailed.', 4000);
        return;
      }
      // Generate a public share link so recipient can view without needing to log in
      const _siteUrl = db.settings?.siteUrl || window.location.origin;
      let _viewUrl = _siteUrl + '?entry=' + eid; // fallback (owner deep-link)
      try {
        // Include current settlement state so resent link shows latest status
        const _invSt = isInvoiceMode(e) ? _getInvoiceSettlement(eid) : null;
        const _shareRes = await fetch('/api/share', {
          method: 'POST', credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            action: 'create', entryId: eid,
            contactName: contact?.name || '',
            fromName: u.displayName || u.email || (db.settings?.appName || 'Money Intx'),
            fromEmail: u.email || '',
            txType: e.txType, amount: e.amount, date: e.date,
            note: e.note || '', invoiceNumber: e.invoiceNumber || null,
            status: e.status || 'posted',
            settledAmt: _invSt?.settled || 0,
            remaining:  _invSt?.remaining ?? e.amount,
            appName: db.settings?.appName || 'Money Intx',
            siteUrl: _siteUrl,
            tagline: db.settings?.tagline || 'Making Money Matters Memorable'
          })
        });
        const _shareData = await _shareRes.json();
        if (_shareData.ok && _shareData.shareUrl) _viewUrl = _shareData.shareUrl;
      } catch(_) { /* keep fallback */ }

      try {
        for (const addr of toAddresses) {
          await fetch('/api/email', {
            method: 'POST',
            credentials: 'include',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              action: 'send-reminder',
              recipientEmail: addr,
              fromName: u.displayName || u.email || (db.settings?.appName || 'Money Intx'),
              fromEmail: u.email || '',
              message,
              invoiceNumber: e.invoiceNumber || null,
              amount: e.amount || null,
              txType: e.txType || null,
              viewUrl: _viewUrl,
              siteUrl: _siteUrl,
              appName: db.settings?.appName || 'Money Intx',
              tagline: db.settings?.tagline || 'Making Money Matters Memorable',
              logoData: db.settings?.logoData || ''
            })
          });
        }
        // Mark sent
        const notif = db.notifs.find(n => n.eid === eid && n.msg === message);
        if (notif) { notif.sent = true; save(); }
        toast('✅ Notification emailed');
      } catch(err) {
        console.error('send-reminder error:', err);
        toast('⚠️ Saved but email failed — check console');
      }
    }

    function sendNotification(eid) {
      const who = window._notifyWhoVal || 'them';
      const message = document.getElementById('notify_msg')?.value.trim() || '';
      if (!message) return alert('Message required');
      // If the user provided an inline email for a contact without one, save it now
      if (who === 'them' || who === 'both') {
        const inlineEmail = document.getElementById('notify_contact_email')?.value.trim() || '';
        if (inlineEmail) {
          const en = db.entries.find(x => x.id === eid);
          if (en) {
            const ct = db.contacts.find(x => x.id === en.cId);
            if (ct && !ct.email) { ct.email = inlineEmail; save(); }
          }
        }
      }
      document.getElementById('notifyModalBg')?.remove();
      _sendNotificationForEntry(eid, message, who);
    }

    // Unified notify toggle — prefix is 'ne' (entry form) or 'r' (recurring form)
    function _toggleNotify(prefix) {
      const btn  = document.getElementById(prefix + '_notify_btn');
      const sw   = document.getElementById(prefix + '_notify_sw');
      const wrap = document.getElementById(prefix + '_notify_wrap');
      if (!btn || !wrap) return;
      const turningOn = !btn.classList.contains('on');
      btn.classList.toggle('on', turningOn);
      if (sw) sw.classList.toggle('on', turningOn);
      wrap.style.display = turningOn ? 'block' : 'none';
      if (turningOn) {
        // Reset who selector to 'them' and update email prompt
        _setFormNwho(prefix, window['_formNwho_' + prefix] || 'them');
      }
    }

    // Who-to-notify selector for inline form notify sections
    function _setFormNwho(prefix, val) {
      window['_formNwho_' + prefix] = val;
      ['them','you','both'].forEach(v => {
        const b = document.getElementById(prefix + '_nwho_' + v);
        if (!b) return;
        const active = v === val;
        b.style.background = active ? 'var(--accent)' : 'var(--bg3)';
        b.style.color      = active ? '#fff'          : 'var(--text)';
        b.style.fontWeight = active ? '600'           : '400';
      });
      // Show/hide email prompt: only relevant when contact is in the audience
      const emailWrap = document.getElementById(prefix + '_notify_email_wrap');
      if (!emailWrap) return;
      if (val === 'you') {
        emailWrap.style.display = 'none';
      } else {
        const conId = prefix === 'ne' ? 'necon' : 'rcon';
        const cid = document.getElementById(conId)?.value || '';
        const c = cid ? db.contacts.find(x => x.id === cid) : null;
        emailWrap.style.display = (!c?.email) ? 'block' : 'none';
      }
    }

    // Keep _toggleRNotify as alias for backward compat
    function _toggleRNotify() { _toggleNotify('r'); }

    // Send a notification for a recurring record (no entryId yet)
    async function _sendRecurringNotif(rid, message, who) {
      who = who || 'them';
      const r = db.recurring.find(x => x.id === rid);
      if (!r) return;
      const contact = db.contacts.find(x => x.id === r.cId);
      const u = curUser();
      const appName  = db.settings?.appName  || 'Money Intx';
      const siteUrl  = db.settings?.siteUrl  || window.location.origin;
      const tagline  = db.settings?.tagline  || 'Making Money Matters Memorable';
      const logoData = db.settings?.logoData || '';
      // Build list of addresses based on who
      const toAddresses = [];
      if (who === 'them' || who === 'both') {
        if (contact?.email) toAddresses.push(contact.email);
        else { toast('⚠️ No email on record for contact — not emailed.', 4000); }
      }
      if (who === 'you' || who === 'both') {
        if (u.email) toAddresses.push(u.email);
      }
      if (toAddresses.length === 0) return;
      try {
        for (const addr of toAddresses) {
          await fetch('/api/email', {
            method: 'POST', credentials: 'include',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              action: 'send-reminder',
              recipientEmail: addr,
              fromName: u.displayName || u.email || appName,
              fromEmail: u.email || '',
              message,
              amount: r.amount || null,
              txType: r.txType || null,
              viewUrl: siteUrl,
              siteUrl, appName, tagline, logoData
            })
          });
        }
        toast('✅ Notification sent');
      } catch(err) {
        console.error('recurring notify error:', err);
        toast('⚠️ Email failed — check console');
      }
    }

    async function loadPublicTemplate(tid, tname) {
      // Find in server cache first, fall back to local db
      const src = (window._tdbCache||[]).find(x => x.id === tid) || db.templates.find(x => x.id === tid);
      if (!src) return;
      if (!confirm(`Copy "${src.name}" to your templates?\nYou will get your own editable copy. The original will not be changed.`)) return;
      const u = curUser();
      const copy = JSON.parse(JSON.stringify(src)); // deep clone
      copy.id           = uuid();
      copy.userId       = u.id;
      copy.isPublic     = false;    // copied template is private by default
      copy.copiedFrom   = src.id;
      copy.copiedFromName = src.name;
      copy.createdAt    = Date.now();
      copy.invoiceNextNum = copy.invoiceStartNum || 1; // reset number counter
      // Regenerate field IDs to avoid collisions
      copy.fields = (copy.fields||[]).map(f => ({ ...f, id: uuid() }));
      db.templates.push(copy);
      // Force immediate sync (bypass debounce) so template appears on all devices right away
      localStorage.setItem('mxi_v2', JSON.stringify(db));
      if (_IS_SERVER) await _syncToServer();
      logAudit('load_public_template', { srcId: tid, copyId: copy.id, name: copy.name });
      toast(`"${copy.name}" copied to your templates.`);
      nav('templates');
    }

          <div class="fg">
            <label>Starting Number <span style="color:var(--muted);font-weight:400;">(next number to issue)</span></label>
            <input type="number" id="tplstartnum" value="${t.invoiceNextNum||t.invoiceStartNum||1}" min="1" step="1">
          </div>
        </div>
        ${!isNew ? `<div style="margin-top:12px;padding:12px 14px;background:var(--bg3);border-radius:8px;border:1px solid var(--border);">
          <div style="display:flex;align-items:center;justify-content:space-between;">
            <div>
              <div style="font-size:14px;font-weight:600;">Share to Public Template DB</div>
              <div style="font-size:12px;color:var(--muted);margin-top:2px;">Others can browse, preview, and copy this template. Your display name will be shown as creator.</div>
            </div>
            <label class="toggle"><input type="checkbox" id="tplpublic" ${t.isPublic?'checked':''}><span class="slider"></span></label>
          </div>
        </div>` : ''}
        ${isNew ? `<button class="btn sm" style="margin-top:8px;" onclick="createTplAndContinue()">Create & Add Fields →</button>` :
          `<button class="bs sm" style="margin-top:8px;" onclick="saveTplMeta()">Save Info</button>`}
      </div>`;

      if (!isNew) {
        html += `<div class="card">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
            <div class="section-title" style="margin:0;">Fields</div>
            <button class="btn sm" onclick="openAddFieldModal('${t.id}')">+ Add Field</button>
          </div>`;
        // ── Validation banners ───────────────────────────────────────────
        const hasComputedFields = fields.some(f => (f.calculators||[]).length > 0);
        const finalTotalFields  = fields.filter(f => f.isFinalTotal);
        if (hasComputedFields && finalTotalFields.length === 0) {
          html += `<div style="background:rgba(251,191,36,.1);border:1px solid var(--yellow);border-radius:8px;padding:10px 14px;margin-bottom:14px;display:flex;gap:10px;align-items:flex-start;">
            <span style="font-size:16px;">⚠️</span>
            <div style="font-size:13px;">
              <strong style="color:var(--yellow);">No Final Total field set.</strong>
              This template has computed fields but none is marked as the <em>Final Total</em>.
              Open a computed field → Options → check <strong>Final Total</strong> to designate which value drives the invoice amount, entry list, and settlement math.
            </div>
          </div>`;
        }
        if (finalTotalFields.length > 1) {
          html += `<div style="background:rgba(248,113,113,.1);border:1px solid var(--red);border-radius:8px;padding:10px 14px;margin-bottom:14px;font-size:13px;">
            <strong style="color:var(--red);">⚠️ Multiple Final Total fields.</strong>
            Only one field should be marked as Final Total (currently: ${finalTotalFields.map(f=>esc(f.label)).join(', ')}).
            Edit the fields to keep exactly one.
          </div>`;
        }
        if (fields.length === 0) {
          html += `<p style="color:var(--muted);font-size:14px;padding:12px 0;">No fields yet. Add fields to define what this template captures.</p>`;
        } else {
          fields.forEach((f, idx) => {
            const opts = (f.dropdownOptions||[]);
            const calcs= (f.calculators||[]);
            html += `<div style="border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:10px;">
              <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;">
                <div style="flex:1;">
                  <div style="font-weight:700;font-size:15px;">${esc(f.label||'Unnamed')}</div>
                  <div style="font-size:12px;color:var(--muted);margin-top:3px;display:flex;gap:10px;flex-wrap:wrap;">
                    <span>Type: ${_isPairedField(f) ? 'Paired' : _isNumericField(f) ? 'Numeric' : 'Text'}</span>
                    ${_isPairedField(f) ? `<span style="color:var(--blue);">${esc(f.textLabel||'Item')} + ${esc(f.numericLabel||'Amount')}${f.repeatable!==false?' · Repeatable':''}</span>` : ''}
                    ${_isNumericField(f)&&f.defaultValue!==undefined&&f.defaultValue!==''?`<span>Default: $${f.defaultValue}</span>`:''}
                    ${f.ledgerEffect?`<span style="color:var(--green);">Ledger: ${LEDGER_FX[f.ledgerEffect]||f.ledgerEffect}</span>`:''}
                    ${f.repeatable?`<span class="badge badge-yellow">Repeatable</span>`:''}
                    ${f.editableAtExecution===false?`<span class="badge badge-gray">Locked</span>`:''}
                    ${f.visible===false?`<span class="badge badge-gray">Hidden</span>`:''}
                    ${f.excludeFromAggregate?`<span class="badge badge-yellow" title="Excluded from Run Aggregate">Excl. Agg.</span>`:''}
                    ${f.isFinalTotal?`<span class="badge" style="background:rgba(74,222,128,.18);color:#4ade80;border:1px solid #4ade80;" title="This field drives the invoice total, entry amount, and settlement basis">★ Final Total</span>`:''}
                  </div>
                  ${opts.length>0?`<div style="margin-top:8px;display:flex;gap:4px;flex-wrap:wrap;">${opts.map(o=>`<span style="background:var(--bg3);border:1px solid var(--border);border-radius:5px;padding:2px 8px;font-size:11px;">${esc(o.label)}${o.numericValue?` · $${o.numericValue}`:''}</span>`).join('')}</div>`:''}
                  ${calcs.length>0?`<div style="margin-top:6px;font-size:12px;color:var(--blue);">Calculators: ${calcs.map(c=>{
                    let target = '';
                    if (c.operation === 'select_aggregate') {
                      const names = (c.targetFieldIds||[]).map(fid=>{const ff=t.fields.find(x=>x.id===fid); return ff?esc(ff.label):fid;});
                      target = names.length ? ` → [${names.join(', ')}]` : '';
                    } else if (c.targetFieldId) {
                      const targetF = t.fields.find(x=>x.id===c.targetFieldId);
                      target = targetF ? ` → ${esc(targetF.label)}` : '';
                    }
                    const vis = c.resultVisible===false ? ' 🔒hidden' : '';
                    return `${esc(c.name||'?')} (${CALC_OPS[c.operation]||c.operation}${target}${vis})`;
                  }).join(', ')}</div>`:''}
                </div>
                <div style="display:flex;gap:4px;flex-shrink:0;">
                  ${idx>0?`<button class="bs sm" title="Move up" onclick="moveTplField('${t.id}',${idx},-1)">↑</button>`:''}
                  ${idx<fields.length-1?`<button class="bs sm" title="Move down" onclick="moveTplField('${t.id}',${idx},1)">↓</button>`:''}
                  <button class="bs sm" onclick="openEditFieldModal('${t.id}','${f.id}')">Edit</button>
                  <button class="bs sm" style="color:var(--red);" onclick="delTplField('${t.id}','${f.id}')">✕</button>
                </div>
              </div>
            </div>`;
          });
        }
        html += `</div>`;
      }
      document.getElementById('content').innerHTML = html;
    }

    function _readTplInfoFields() {
      return {
        name:           (document.getElementById('tplname')?.value||'').trim(),
        desc:           (document.getElementById('tpldesc')?.value||'').trim(),
        txType:         document.getElementById('tpltxtype')?.value || 'invoice',
        invoicePrefix:  (document.getElementById('tplprefix')?.value||'INV-').trim(),
        invoiceNextNum: parseInt(document.getElementById('tplstartnum')?.value||'1', 10) || 1,
      };
    }

    function createTplAndContinue() {
      const meta = _readTplInfoFields();
      if (!meta.name) { alert('Template name required'); return; }
      const t = {
        id: uuid(), userId: curUser().id, fields: [], archived: false, createdAt: Date.now(),
        ...meta,
        invoiceStartNum: meta.invoiceNextNum
      };
      db.templates.push(t);
      save(); logAudit('add_template', { name: meta.name }); toast('Template created');
      _editTid = t.id;
      renderTemplateBuilder(t);
    }

    function saveTplMeta() {
      const t = db.templates.find(x => x.id === _editTid);
      if (!t) return;
      const meta = _readTplInfoFields();
      if (!meta.name) { alert('Name required'); return; }
      const wasPublic = t.isPublic;
      const isPublic = document.getElementById('tplpublic')?.checked || false;
      Object.assign(t, meta);
      t.isPublic = isPublic;
      if (isPublic && !t.creatorName) {
        const u = curUser();
        t.creatorId   = u.id;
        t.creatorName = u.displayName || u.username || 'Unknown';
      }
      save(); logAudit('edit_template', { tid: t.id, name: meta.name, isPublic }); toast('Template saved');
      window._tdbCache = null; // invalidate Template DB cache so it re-fetches on next visit
      renderTemplateBuilder(t);
    }

    function moveTplField(tid, idx, dir) {
      const t = db.templates.find(x=>x.id===tid); if(!t)return;
      const arr = t.fields; const target = idx+dir;
      if(target<0||target>=arr.length)return;
      [arr[idx],arr[target]]=[arr[target],arr[idx]];
      save(); renderTemplateBuilder(t);
    }

    function delTplField(tid, fid) {
      const t = db.templates.find(x=>x.id===tid); if(!t)return;
      if(!confirm('Remove this field?'))return;
      t.fields = t.fields.filter(f=>f.id!==fid);
      save(); renderTemplateBuilder(t);
    }

    // ── ADD / EDIT FIELD MODAL ─────────────────────────────────────────
    // Build <option> list of numeric fields AND computed/result fields in a template
    // — excluding the field being edited (anti-circular) and fields after self in order (prevents forward refs)
    function calcTargetFieldOpts(tid, selfFid, selId) {
      const t = db.templates.find(x=>x.id===tid);
      // Include: numeric fields, paired fields (by their row total), and computed result fields
      // Exclude: text fields (no numeric value) and the field being edited itself
      const candidates = (t?.fields||[]).filter(f =>
        f.id !== selfFid && _isCalcField(f) && !_isTextField(f)
      );
      if (!candidates.length) return `<option value="">— no numeric/result fields yet —</option>`;
      return `<option value="">— none —</option>` +
        candidates.map(f => {
          const tag = _isPairedField(f) ? ' [paired total]' : (f.calculators||[]).length > 0 ? ' [result]' : '';
          return `<option value="${f.id}" ${selId===f.id?'selected':''}>${esc(f.label)}${tag}</option>`;
        }).join('');
    }

    // Build checkbox list for select_aggregate — multi-select of numeric/paired/result fields
    function calcSelectAggCheckboxes(tid, selfFid, selIds) {
      const t = db.templates.find(x=>x.id===tid);
      const candidates = (t?.fields||[]).filter(f =>
        f.id !== selfFid && _isCalcField(f) && !_isTextField(f)
      );
      if (!candidates.length) return `<p style="color:var(--muted);font-size:12px;">No numeric or result fields yet.</p>`;
      return candidates.map(f => {
        const tag = _isPairedField(f) ? ' [paired total]' : (f.calculators||[]).length > 0 ? ' [result]' : '';
        const checked = (selIds||[]).includes(f.id) ? 'checked' : '';
        return `<label style="display:flex;align-items:center;gap:8px;padding:4px 0;font-size:13px;cursor:pointer;">
          <input type="checkbox" class="sagg_check" value="${f.id}" ${checked}>
          ${esc(f.label)}${tag ? ` <span style="font-size:10px;color:var(--accent);font-weight:700;">${tag}</span>` : ''}
        </label>`;
      }).join('');
    }

    function fieldModalHtml(tid, fid) {
      const t   = db.templates.find(x=>x.id===tid); if(!t)return'';
      const f   = fid ? t.fields.find(x=>x.id===fid) : null;
      const isNew = !f;
      // Normalise legacy types → display type
      let ftype = f?.type||'text';
      if (ftype==='number'||ftype==='dropdown') ftype='numeric';
      if (ftype==='date') ftype='text';
      // Legacy: old computed result fields used type:'text' with calculators — show in Numeric panel
      if (ftype==='text' && (f?.calculators||[]).length > 0) ftype='numeric';
      const calcs = f?.calculators||[];
      const isN = ftype==='numeric', isP = ftype==='paired', isT = ftype==='text';

      const calcRows = calcs.map((c,i) => {
        const isSAgg = c.operation === 'select_aggregate';
        const isAgg  = c.operation === 'aggregate';
        return `<div style="border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:10px;" id="fcalc_${i}">
          <div class="grid2">
            <div class="fg"><label>Result Name *</label>
              <input value="${esc(c.name||'')}" oninput="updateCalc(${i},'name',this.value)" placeholder="e.g. Tax"></div>
            <div class="fg"><label>Operation</label>
              <select onchange="updateCalc(${i},'operation',this.value);onCalcOpChange(this,${i},'${tid}','${fid||''}')">
                ${Object.entries(CALC_OPS).map(([k,v])=>`<option value="${k}" ${c.operation===k?'selected':''}>${v}</option>`).join('')}
              </select></div>
            <div class="fg calc_operand_wrap_${i}" style="${isAgg||isSAgg?'display:none':''}">
              <label>Factor / Operand <span style="color:var(--muted);font-weight:400;">(0.1 = 10%)</span></label>
              <input type="number" value="${c.operand||''}" oninput="updateCalc(${i},'operand',this.value)" placeholder="e.g. 0.1" step="any"></div>
            <div class="fg calc_target_wrap_${i}" style="${isAgg||isSAgg?'display:none':''}">
              <label>Apply To Field</label>
              <select onchange="updateCalc(${i},'targetFieldId',this.value)">
                ${calcTargetFieldOpts(tid, fid, c.targetFieldId||'')}</select></div>
            <div class="fg calc_sagg_wrap_${i}" style="${isSAgg?'':'display:none'};grid-column:1/-1;">
              <label>Fields to Include in Selection Aggregate</label>
              <div style="border:1px solid var(--border);border-radius:6px;padding:10px;background:var(--bg3);max-height:180px;overflow-y:auto;">
                ${calcSelectAggCheckboxes(tid, fid, c.targetFieldIds||[])}</div></div>
            <div class="fg" style="grid-column:1/-1;"><label>Show Result to User</label>
              <select onchange="updateCalc(${i},'resultVisible',this.value==='yes')">
                <option value="yes" ${c.resultVisible!==false?'selected':''}>Yes — display result on entry form</option>
                <option value="no"  ${c.resultVisible===false?'selected':''}>No — hidden (usable in later calculations)</option>
              </select></div>
          </div>
          <button class="bs sm" style="color:var(--red);margin-top:4px;" onclick="removeCalc(${i})">✕ Remove</button>
        </div>`;
      }).join('');

      return `<div class="modal-bg" id="fieldModalBg" onclick="if(event.target===this)this.remove()">
        <div class="modal" style="max-width:680px;max-height:90vh;overflow-y:auto;" onclick="event.stopPropagation()">
          <div class="modal-title">${isNew?'Add Field':'Edit Field'}</div>

          <!-- Type selector always at top -->
          <div class="grid2" style="margin-bottom:12px;">
            <div class="fg">
              <label>Field Label *</label>
              <input id="fl_label" value="${esc(f?.label||'')}" placeholder="e.g. Items / Cost / Notes">
            </div>
            <div class="fg"><label>Field Type</label>
              <select id="fl_type" onchange="onFldTypeChange(this.value)">
                ${Object.entries(FIELD_TYPES).map(([k,v])=>`<option value="${k}" ${ftype===k?'selected':''}>${v}</option>`).join('')}
              </select>
            </div>
          </div>

          <!-- ═══ TEXT PANEL ═══════════════════════════════════════ -->
          <div id="fl_panel_text" style="display:${isT?'block':'none'}">
            <p style="color:var(--muted);font-size:13px;margin-bottom:10px;">
              Text fields hold descriptive content only. They appear on the form and invoice but do not participate in calculations.
            </p>
            <div style="padding:10px 12px;background:var(--bg3);border-radius:8px;border:1px solid var(--border);display:inline-flex;">
              <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px;">
                <input type="checkbox" id="fl_visible_t" ${f?.visible!==false?'checked':''} style="width:auto;flex-shrink:0;">
                Visible on invoice
              </label>
            </div>
          </div>

          <!-- ═══ NUMERIC PANEL ════════════════════════════════════ -->
          <div id="fl_panel_numeric" style="display:${isN?'block':'none'}">
            <div class="grid2" style="margin-bottom:8px;">
              <div class="fg"><label>Default Value</label>
                <input type="number" id="fl_defval" value="${esc(String(f?.defaultValue||''))}" placeholder="0.00" min="0" step="0.01"></div>
              <div class="fg"><label>Add to Ledger</label>
                <select id="fl_ledger">
                  ${Object.entries(LEDGER_FX).map(([k,v])=>`<option value="${k}" ${(f?.ledgerEffect||'')==k?'selected':''}>${v}</option>`).join('')}
                </select>
                <span style="font-size:11px;color:var(--muted);margin-top:3px;line-height:1.4;">When set, this field's value posts a real balance-affecting record to the contact's ledger. Use this only on the final total field — not on subtotals or display-only fields. Default: no ledger effect.</span>
              </div>
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px 20px;margin-bottom:14px;padding:12px;background:var(--bg3);border-radius:8px;border:1px solid var(--border);">
              <label style="display:flex;align-items:flex-start;gap:8px;cursor:pointer;font-size:13px;line-height:1.3;">
                <input type="checkbox" id="fl_visible_n" ${f?.visible!==false?'checked':''} style="width:auto;margin-top:2px;flex-shrink:0;">
                <span>Visible on invoice</span>
              </label>
              <label style="display:flex;align-items:flex-start;gap:8px;cursor:pointer;font-size:13px;line-height:1.3;">
                <input type="checkbox" id="fl_editable" ${f?.editableAtExecution!==false?'checked':''} style="width:auto;margin-top:2px;flex-shrink:0;">
                <span>Editable at entry time</span>
              </label>
              <label style="display:flex;align-items:flex-start;gap:8px;cursor:pointer;font-size:13px;line-height:1.3;" title="Run Aggregate calculator will skip this field.">
                <input type="checkbox" id="fl_excludeagg" ${f?.excludeFromAggregate?'checked':''} style="width:auto;margin-top:2px;flex-shrink:0;">
                <span>Exclude from aggregate</span>
              </label>
              <label style="display:flex;align-items:flex-start;gap:8px;cursor:pointer;font-size:13px;line-height:1.3;" title="This field's value drives the invoice total, entry amount, and settlement basis.">
                <input type="checkbox" id="fl_finaltotal" ${f?.isFinalTotal?'checked':''} style="width:auto;margin-top:2px;flex-shrink:0;">
                <span><strong>Final Total</strong><br><span style="font-size:11px;color:var(--green);">invoice amount basis</span></span>
              </label>
            </div>
            <div style="border-top:1px solid var(--border);padding-top:12px;margin-top:4px;">
              <div style="font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px;">Calculators</div>
              <p style="color:var(--muted);font-size:12px;margin-bottom:10px;">This field can compute a result from other numeric fields. Results can be chained into later calculators.</p>
              <div id="fl_calc_list">${calcRows}</div>
              <button class="bs sm" onclick="addCalc('${tid}','${fid||''}')">+ Add Calculator</button>
            </div>
          </div>

          <!-- ═══ PAIRED PANEL ═════════════════════════════════════ -->
          <div id="fl_panel_paired" style="display:${isP?'block':'none'}">
            <p style="color:var(--muted);font-size:13px;margin-bottom:10px;">
              Paired fields create structured rows: each row has a text description and a numeric value. They render as a table on the invoice.
            </p>
            <div class="grid2" style="margin-bottom:8px;">
              <div class="fg"><label>Text Column Label</label>
                <input id="fl_textlabel" value="${esc(f?.textLabel||'Item')}" placeholder="e.g. Item / Service / Description"></div>
              <div class="fg"><label>Numeric Column Label</label>
                <input id="fl_numlabel" value="${esc(f?.numericLabel||'Amount')}" placeholder="e.g. Cost / Amount / Charge"></div>
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px 20px;margin-bottom:12px;padding:12px;background:var(--bg3);border-radius:8px;border:1px solid var(--border);">
              <label style="display:flex;align-items:flex-start;gap:8px;cursor:pointer;font-size:13px;line-height:1.3;">
                <input type="checkbox" id="fl_repeat_p" ${f?.repeatable!==false?'checked':''} style="width:auto;margin-top:2px;flex-shrink:0;">
                <span>Repeatable rows</span>
              </label>
              <label style="display:flex;align-items:flex-start;gap:8px;cursor:pointer;font-size:13px;line-height:1.3;">
                <input type="checkbox" id="fl_visible_p" ${f?.visible!==false?'checked':''} style="width:auto;margin-top:2px;flex-shrink:0;">
                <span>Visible on invoice</span>
              </label>
              <label style="display:flex;align-items:flex-start;gap:8px;cursor:pointer;font-size:13px;line-height:1.3;" title="Run Aggregate will skip the numeric total of this paired field.">
                <input type="checkbox" id="fl_excludeagg_p" ${f?.excludeFromAggregate?'checked':''} style="width:auto;margin-top:2px;flex-shrink:0;">
                <span>Exclude from aggregate</span>
              </label>
              <label style="display:flex;align-items:flex-start;gap:8px;cursor:pointer;font-size:13px;line-height:1.3;" title="Use this field's numeric total as the invoice amount.">
                <input type="checkbox" id="fl_finaltotal_p" ${f?.isFinalTotal?'checked':''} style="width:auto;margin-top:2px;flex-shrink:0;">
                <span><strong>Final Total</strong><br><span style="font-size:11px;color:var(--green);">invoice amount basis</span></span>
              </label>
            </div>
            <div class="fg"><label>Add to Ledger (on numeric total)</label>
              <select id="fl_ledger_p">
                ${Object.entries(LEDGER_FX).map(([k,v])=>`<option value="${k}" ${(f?.ledgerEffect||'')==k?'selected':''}>${v}</option>`).join('')}
              </select>
              <span style="font-size:11px;color:var(--muted);margin-top:3px;line-height:1.4;">When set, the sum of this field's rows posts a real balance-affecting record to the contact's ledger. Typically set only on the final total field.</span>
            </div>
          </div>

          <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:20px;border-top:1px solid var(--border);padding-top:16px;">
            <button class="bs" onclick="document.getElementById('fieldModalBg').remove()">Cancel</button>
            <button class="btn" onclick="saveFieldModal('${tid}','${fid||''}')">Save Field</button>
          </div>
        </div></div>`;
    }

    // Temporary field state while modal is open
    let _fldOpts = [];
    let _fldCalcs = [];

    function openAddFieldModal(tid) {
      _fldOpts = []; _fldCalcs = [];
      const d = document.createElement('div');
      d.innerHTML = fieldModalHtml(tid, null);
      document.body.appendChild(d.firstChild);
    }

    function openEditFieldModal(tid, fid) {
      const t = db.templates.find(x=>x.id===tid);
      const f = t?.fields.find(x=>x.id===fid);
      _fldOpts  = f ? JSON.parse(JSON.stringify(f.dropdownOptions||[])) : [];
      _fldCalcs = f ? JSON.parse(JSON.stringify(f.calculators||[])) : [];
      const d = document.createElement('div');
      d.innerHTML = fieldModalHtml(tid, fid);
      document.body.appendChild(d.firstChild);
    }

    function switchFldTab(name, btn) {
      document.querySelectorAll('#fldTabs .tab').forEach(b=>b.classList.remove('on'));
      btn.classList.add('on');
      ['basic','options','calc'].forEach(n => {
        const el = document.getElementById('fldTab_'+n);
        if(el) el.style.display = n===name?'block':'none';
      });
    }

    function onFldTypeChange(val) {
      ['text','numeric','paired'].forEach(t => {
        const p = document.getElementById('fl_panel_'+t);
        if (p) p.style.display = (t===val) ? 'block' : 'none';
      });
    }

    function addFldOpt() {

    // Toggle visibility of operand/target vs aggregate checkboxes based on selected operation
    function onCalcOpChange(sel, i, tid, selfFid) {
      const isAgg  = sel.value === 'aggregate';
      const isSAgg = sel.value === 'select_aggregate';
      const operWrap  = document.querySelector(`.calc_operand_wrap_${i}`);
      const targWrap  = document.querySelector(`.calc_target_wrap_${i}`);
      const saggWrap  = document.querySelector(`.calc_sagg_wrap_${i}`);
      if (operWrap) operWrap.style.display = (isAgg || isSAgg) ? 'none' : '';
      if (targWrap) targWrap.style.display = (isAgg || isSAgg) ? 'none' : '';
      if (saggWrap) {
        saggWrap.style.display = isSAgg ? '' : 'none';
        // Populate checkboxes if this is first time showing select_aggregate
        if (isSAgg && saggWrap.querySelector('.sagg_check') === null) {
          saggWrap.querySelector('div').innerHTML = calcSelectAggCheckboxes(tid, selfFid, _fldCalcs[i]?.targetFieldIds||[]);
        }
      }
      if (_fldCalcs[i]) _fldCalcs[i].operation = sel.value;
    }

    function saveFieldModal(tid, fid) {
      const t = db.templates.find(x=>x.id===tid); if(!t)return;
      let label = document.getElementById('fl_label')?.value.trim();
      if (!label) { alert('Field label required.'); return; }
      const type = document.getElementById('fl_type')?.value||'text';

      let field;

      if (type === 'text') {
        // ── TEXT: description only, no calculations ──────────────────────
        field = {
          id: fid||uuid(), label, type,
          visible: document.getElementById('fl_visible_t')?.checked !== false,
          calculators: [], dropdownOptions: []
        };

      } else if (type === 'numeric') {
        // ── NUMERIC: standalone number, supports calculators ─────────────
        const defVal = document.getElementById('fl_defval')?.value||'';
        // Sync calculator rows
        document.querySelectorAll('[id^=fcalc_]').forEach((row,i) => {
          if(!_fldCalcs[i]) return;
          const inputs  = row.querySelectorAll('input[type=text],input:not([type])');
          const numInps = row.querySelectorAll('input[type=number]');
          const selects = row.querySelectorAll('select');
          if(inputs[0])  _fldCalcs[i].name         = inputs[0].value.trim();
          if(numInps[0]) _fldCalcs[i].operand       = parseFloat(numInps[0].value)||0;
          if(selects[0]) _fldCalcs[i].operation     = selects[0].value;
          if(selects[1]) _fldCalcs[i].targetFieldId = selects[1]?.value||'';
          if(selects[2]) _fldCalcs[i].resultVisible = selects[2]?.value !== 'no';
          if(_fldCalcs[i].operation === 'select_aggregate')
            _fldCalcs[i].targetFieldIds = Array.from(row.querySelectorAll('.sagg_check:checked')).map(cb=>cb.value);
        });
        const isFinalTotal = document.getElementById('fl_finaltotal')?.checked||false;
        if (isFinalTotal) t.fields.forEach(of => { if(of.id!==(fid||'__new__')) of.isFinalTotal=false; });
        field = {
          id: fid||uuid(), label, type,
          defaultValue: defVal!==''?parseFloat(defVal)||defVal:'',
          ledgerEffect: document.getElementById('fl_ledger')?.value||null,
          visible: document.getElementById('fl_visible_n')?.checked !== false,
          editableAtExecution: document.getElementById('fl_editable')?.checked !== false,
          excludeFromAggregate: document.getElementById('fl_excludeagg')?.checked||false,
          isFinalTotal,
          calculators: _fldCalcs.filter(c=>c.operation),
          dropdownOptions: []
        };

      } else {
        // ── PAIRED: text+number rows ─────────────────────────────────────
        const isFinalTotal_p = document.getElementById('fl_finaltotal_p')?.checked||false;
        if (isFinalTotal_p) t.fields.forEach(of => { if(of.id!==(fid||'__new__')) of.isFinalTotal=false; });
        field = {
          id: fid||uuid(), label, type,
          textLabel:   document.getElementById('fl_textlabel')?.value.trim()||'Item',
          numericLabel:document.getElementById('fl_numlabel')?.value.trim()||'Amount',
          repeatable:  document.getElementById('fl_repeat_p')?.checked !== false,
          visible:     document.getElementById('fl_visible_p')?.checked !== false,
          excludeFromAggregate: document.getElementById('fl_excludeagg_p')?.checked||false,
          ledgerEffect: document.getElementById('fl_ledger_p')?.value||null,
          isFinalTotal: isFinalTotal_p,
          calculators: [], dropdownOptions: []
        };
      }

      if(fid) { const idx=t.fields.findIndex(x=>x.id===fid); if(idx>=0) t.fields[idx]=field; }
      else    { t.fields.push(field); }
      save(); logAudit('edit_template_field',{tid,label,type});
      document.getElementById('fieldModalBg')?.remove();
      toast(fid?'Field updated':'Field added');
      renderTemplateBuilder(t);
    }

    function openNewRecurring(cid = null) {
      const body = recurringFormHtml(null);
      const d = document.createElement('div');
      d.innerHTML = `<div class="modal-bg" id="recModalBg" onclick="if(event.target===this)this.remove()">

            <button class="btn sm" onclick="saveNewRecurring()">Create</button>
          </div>
        </div></div>`;
      document.body.appendChild(d.firstChild);

    function saveNewRecurring() {
      const cid    = document.getElementById('rcon').value.trim();
      const name   = document.getElementById('rname').value.trim();
      const txType = document.getElementById('rtx').value.trim();
      const amt    = document.getElementById('ramt').value.trim();
      const freq   = document.getElementById('rfreq').value.trim();
      if (!cid)   return alert('Contact required');
      if (!name)  return alert('Name required');
      if (!txType)return alert('Type required');
      const amtErr = valAmt(amt); if (amtErr) return alert(amtErr);
      if (!freq)  return alert('Frequency required');
      if (freq === 'repeat_n') {
        const rt = parseInt(document.getElementById('rreptimes')?.value||0);
        if (!rt || rt < 1) return alert('Enter how many times to repeat');
      }
      const startDate   = new Date(document.getElementById('rstart').value||new Date()).getTime();
      const endDateStr  = document.getElementById('renddate')?.value;
      const endDate     = endDateStr ? new Date(endDateStr).getTime() : null;
      const repeatTimes = freq === 'repeat_n' ? parseInt(document.getElementById('rreptimes').value) : null;
      const newRid = uuid();
      db.recurring.push({ id:newRid, userId:curUser().id, cId:cid, name, txType, amount:parseFloat(amt),
        startDate, endDate, repeatTimes, freq, status:'active', archived:false, lastPosted:null, createdAt:Date.now() });
      save();
      logAudit('add_recurring', {cid, name, freq});
      // Notify contact if toggle is on
      const rNotifyOn  = document.getElementById('r_notify_btn')?.classList.contains('on');
      const rNotifyMsg = document.getElementById('r_notify_msg')?.value.trim();
      if (rNotifyOn && rNotifyMsg) {
        // Check for inline email if contact has none
        const rc = db.contacts.find(x => x.id === cid);
        const inlineEmail = document.getElementById('r_notify_contact_email')?.value.trim() || '';
        if (inlineEmail && rc && !rc.email) { rc.email = inlineEmail; save(); }
        const rNotifyWho = window._formNwho_r || 'them';
        _sendRecurringNotif(newRid, rNotifyMsg, rNotifyWho);
      }
      document.getElementById('recModalBg')?.remove();
      toast('Recurring created');
      renderRecurring();
    }

      if (!r) return;
      const body = recurringFormHtml(r);
      const d = document.createElement('div');
      d.innerHTML = `<div class="modal-bg" id="recModalBg" onclick="if(event.target===this)this.remove()">

          <div class="modal-title">Edit Recurring</div>

          </div>
        </div></div>`;
      document.body.appendChild(d.firstChild);
