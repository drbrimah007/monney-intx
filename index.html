    async function _sendSharedReminder(token, senderEmail, senderName, rawAmt) {
      if (!_canSendEmail('shremind_' + token)) return;
      const message = document.getElementById('sh_remind_msg')?.value.trim() || '';
      if (!message) return alert('Message required');
      const toEmail = senderEmail || document.getElementById('sh_remind_email')?.value.trim() || '';
      if (!toEmail) return alert(`Enter ${senderName || 'the sender'}'s email to send the reminder`);
      // Final self-send guard: never allow sending to your own email
      const _myEmailFinal = (curUser()?.email || '').toLowerCase().trim();
      if (toEmail.toLowerCase().trim() === _myEmailFinal) {
        return alert('⚠️ The destination email matches your own account. Please enter the correct recipient email.');
      }
      const r = (_cachedSharedRecords || []).find(x => x.token === token);
      const e = r?.entry;
      const dbEntry = db.entries.find(x => x.shareToken === token);
      const u = curUser();
      const siteUrl  = e?.siteUrl || dbEntry?.fromSiteUrl || db.settings?.siteUrl || window.location.origin;
      const appName  = db.settings?.appName || 'Money IntX';
      const tagline  = db.settings?.tagline || 'Making Money Matters Memorable';
      const shareLink = `${siteUrl}/view?t=${token}`;
      document.getElementById('shRemindBg')?.remove();
      try {
        await fetch('/api/email', {
          method: 'POST', credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            action: 'send-reminder',
            recipientEmail: toEmail,
            fromName: u.displayName || u.email || appName,
            fromEmail: u.email || '',
            message,
            invoiceNumber: e?.invoiceNumber || null,
            amount: rawAmt,
            totalAmt: rawAmt,
            paidAmt: 0,
            entryStatus: e?.status || 'posted',
            txType: 'you_owe_them',   // recipient's perspective: they owe me → "you owe them" label shown to sender
            currency: e?.currency || dbEntry?.currency || db.settings.currency || 'USD',
            viewUrl: shareLink,
            siteUrl,
            appName,
            tagline,
            logoData: db.settings?.logoData || ''
          })
        });
        // Notify the ORIGINAL SHARE OWNER (sender) — push in-app notification.
        // The server-side log-reminder also increments reminderCount on the sender's entry.
        // Fire-and-forget: non-critical, reminder was already sent via email above.
        fetch('/api/share', {
          method: 'POST', credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            action: 'log-reminder',
            token,
            recipientName: u.displayName || u.email || 'Your contact'
          })
        }).catch(() => {});

        // Update local activity metadata on our own isShared entry (timestamps only, no reminderCount
        // — reminderCount lives on the SENDER's entry so the flag shows on their side)
        const _actNow   = Date.now();
        const _dbEntry  = db.entries.find(x => x.shareToken === token);
        if (_dbEntry) {
          _dbEntry.lastActivityAt     = _actNow;
          _dbEntry.lastReminderAt     = _actNow;
          _dbEntry.lastReminderMethod = 'email';
          // NOTE: do NOT increment _dbEntry.reminderCount here — that would show the 🚩 flag
          // on the RECIPIENT's page. The flag belongs on the SENDER's page (server-side above).
        }
        // Also update the in-memory cached record so sort is live
        if (r) {
          r.lastActivityAt = _actNow;
          r.lastReminderAt = _actNow;
        }
        // Log reminder to db.notifs for history tracking (shows in our Notifications page)
        db.notifs.push({
          id: uuid(), userId: u.id,
          cId: _dbEntry?.cId || null,
          eid: _dbEntry?.id || null,
          shareToken: token,
          msg: message, channel: 'email', sent: true,
          isReminder: true, who: 'them', sentTo: [toEmail],
          read: true, createdAt: _actNow
        });
        save();
        toast('✅ Reminder sent to ' + senderName);
      } catch(err) {
        toast('⚠️ Reminder failed — check connection');
      }
    }

    function sendNotification(eid) {
      if (!_canSendEmail('notify_' + eid)) return;
      const who = window._notifyWhoVal || 'them';
      const message = document.getElementById('notify_msg')?.value.trim() || '';
      if (!message) return alert('Message required');
      // If the user provided an inline email for a contact without one, save it now
      if (who === 'them' || who === 'both') {
        const inlineEmail = document.getElementById('notify_contact_email')?.value.trim() || '';
        if (inlineEmail) {
          const en = db.entries.find(x => x.id === eid);
          if (en) {
            const ct = db.contacts.find(x => x.id === en.cId);
            if (ct && !ct.email) { ct.email = inlineEmail; saveNow(); } // saveNow: persist email immediately
          }
        }
      }
      document.getElementById('notifyModalBg')?.remove();
      _sendReminder(eid, message, who).then(() => refreshCurPage());
    }

    // Unified notify toggle — prefix is 'ne' (entry form) or 'r' (recurring form)
    function _toggleNotify(prefix) {
      const btn  = document.getElementById(prefix + '_notify_btn');
      const sw   = document.getElementById(prefix + '_notify_sw');
      const wrap = document.getElementById(prefix + '_notify_wrap');
      if (!btn || !wrap) return;
      const turningOn = !btn.classList.contains('on');
      btn.classList.toggle('on', turningOn);
      if (sw) sw.classList.toggle('on', turningOn);
      wrap.style.display = turningOn ? 'block' : 'none';
      if (turningOn) {
        // Reset who selector to 'them' and update email prompt
        _setFormNwho(prefix, window['_formNwho_' + prefix] || 'them');
      }
    }

    // Who-to-notify selector for inline form notify sections
    // Toggle the inline "Notify on Save" section in new entry / recurring forms
    function toggleFormNotify(prefix) {
      const btn  = document.getElementById(prefix + '_notify_btn');
      const sw   = document.getElementById(prefix + '_notify_sw');
      const wrap = document.getElementById(prefix + '_notify_wrap');
      if (!btn || !wrap) return;
      const turningOn = wrap.style.display === 'none';
      btn.classList.toggle('on', turningOn);
      if (sw) sw.textContent = turningOn ? 'On' : 'Off';
      wrap.style.display = turningOn ? 'block' : 'none';
      if (turningOn) {
        _setFormNwho(prefix, window['_formNwho_' + prefix] || 'them');
      }
    }

    function _setFormNwho(prefix, val) {
      window['_formNwho_' + prefix] = val;
      ['them','you','both'].forEach(v => {
        const b = document.getElementById(prefix + '_nwho_' + v);
        if (!b) return;
        const active = v === val;
        b.style.background = active ? 'var(--accent)' : 'var(--bg3)';
        b.style.color      = active ? '#fff'          : 'var(--text)';
        b.style.fontWeight = active ? '600'           : '400';
      });
      // Show/hide email prompt: only relevant when contact is in the audience
      const emailWrap = document.getElementById(prefix + '_notify_email_wrap');
      if (!emailWrap) return;
      if (val === 'you') {
        emailWrap.style.display = 'none';
      } else {
        const conId = prefix === 'ne' ? 'necon' : 'rcon';
        const cid = document.getElementById(conId)?.value || '';
        const c = cid ? db.contacts.find(x => x.id === cid) : null;
        emailWrap.style.display = (!c?.email) ? 'block' : 'none';
      }
    }

    // Keep _toggleRNotify as alias for backward compat
    function _toggleRNotify() { _toggleNotify('r'); }

    // Send a notification for a recurring record (no entryId yet)
    async function _sendRecurringNotif(rid, message, who) {
      if (!_canSendEmail('recnotif_' + rid)) return;
      who = who || 'them';
      const r = db.recurring.find(x => x.id === rid);
      if (!r) return;
      const contact = db.contacts.find(x => x.id === r.cId);
      const u = curUser();
      const appName  = db.settings?.appName  || 'Money IntX';
      const siteUrl  = db.settings?.siteUrl  || window.location.origin;
      const tagline  = db.settings?.tagline  || 'Making Money Matters Memorable';
      const logoData = db.settings?.logoData || '';
      // Build list of addresses based on who
      const toAddresses = [];
      if (who === 'them' || who === 'both') {
        if (contact?.email) toAddresses.push(contact.email);
        else { toast('⚠️ No email on record for contact — not emailed.', 4000); }
      }
      if (who === 'you' || who === 'both') {
        if (u.email) toAddresses.push(u.email);
      }
      if (toAddresses.length === 0) return;
      try {
        for (const addr of toAddresses) {
          await fetch('/api/email', {
            method: 'POST', credentials: 'include',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              action: 'send-reminder',
              recipientEmail: addr,
              fromName: u.displayName || u.email || appName,
              fromEmail: u.email || '',
              message,
              amount: r.amount || null,
              txType: r.txType || null,
              currency: r.currency || db.settings.currency || 'USD',
              viewUrl: siteUrl,
              siteUrl, appName, tagline, logoData
            })
          });
        }
        toast('✅ Notification sent');
      } catch(err) {
        console.error('recurring notify error:', err);
        toast('⚠️ Email failed — check console');
      }
    }

            </div>

    // ============ PAGE: TEMPLATES ============
    // ── TEMPLATE FIELD TYPES ─────────────────────────────────────────────
    // Three clean types for new fields. Legacy 'number'/'dropdown'/'date'
    // data is handled transparently via the helper functions below.

      text:    'Text (description only)',
      numeric: 'Numeric (standalone number)',
      paired:  'Paired (text + number row)'

    // Type-test helpers — treat legacy 'number'/'dropdown' as numeric
    const _isNumericField = f => f.type==='numeric'||f.type==='number'||f.type==='dropdown';
    const _isPairedField  = f => f.type==='paired';
    const _isTextField    = f => !_isNumericField(f) && !_isPairedField(f);
    // A field that can appear in calculators / aggregation
    const _isCalcField    = f => _isNumericField(f) || _isPairedField(f) || (f.calculators||[]).length > 0;
    const LEDGER_FX   = { '':'No ledger effect', they_owe_you:'They Owe Me (+)', they_paid_you:'They Settled Me (−)',
                          you_owe_them:'I Owe Them (+)', you_paid_them:'I Settled Them (−)' };
    const CALC_OPS    = { multiply:'Multiply by factor', add:'Add to field', subtract:'Subtract from field', aggregate:'Run Aggregate (all non-excluded)', select_aggregate:'Run Selection Aggregate (choose fields)' };

    function renderTemplates() {
      const u = curUser();
      const showAll = curRole() === 'admin';

        <label style="display:inline-flex;align-items:center;gap:5px;font-size:13px;cursor:pointer;flex-shrink:0;white-space:nowrap;padding:6px 10px;background:var(--bg3);border-radius:8px;border:1px solid var(--border);">
          <input type="checkbox" ${showArchived?'checked':''} onchange="window._tmplShowArch=this.checked;PG.templates=1;renderTemplates()" style="width:15px;height:15px;cursor:pointer;accent-color:var(--accent);"> Show Archived

                <div style="font-size:16px;font-weight:700;">${esc(t.name)}${t.archived?` <span class="badge badge-gray">Archived</span>`:''} ${t.isPublic?`<span class="badge badge-blue" style="font-size:10px;">🌐 Public</span>`:''}</div>
                ${t.desc?`<div style="color:var(--muted);font-size:13px;margin-top:2px;">${esc(t.desc)}</div>`:''}
                ${t.copiedFrom?`<div style="font-size:11px;color:var(--muted);margin-top:2px;font-style:italic;">📋 Copied from public template${t.copiedFromName?' "'+esc(t.copiedFromName)+'"':''}</div>`:''}
                <div style="margin-top:8px;display:flex;gap:8px;flex-wrap:wrap;">
                  <span class="badge badge-blue">${fCount} field${fCount!==1?'s':''}</span>
                  ${showAll&&owner?`<span class="badge badge-gray">Owner: ${esc(owner.displayName)}</span>`:''}
                </div>
              </div>
              <div style="display:flex;gap:6px;flex-shrink:0;flex-wrap:wrap;">
                ${!t.archived?`<button class="btn sm" onclick="useTemplateForEntry('${t.id}')">▶ Use Template</button>`:''}
                <button class="bs sm" onclick="openTemplateBuilder('${t.id}')">✏️ Edit Fields</button>
                <div class="action-menu"><button class="action-menu-btn" onclick="toggleActionMenu(this)">⋮</button>
                  <div class="action-dropdown">
                    <button onclick="toggleArchiveTemplate('${t.id}')">${t.archived?'📤 Unarchive':'📦 Archive'}</button>
                    <button onclick="delTemplate('${t.id}')" style="color:var(--red);">🗑 Delete</button>
                  </div>
                </div>
              </div>
            </div>
            ${fCount>0?`<div style="margin-top:12px;border-top:1px solid var(--border);padding-top:10px;display:flex;flex-wrap:wrap;gap:6px;">
              ${(t.fields||[]).map(f=>`<span style="background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:3px 10px;font-size:12px;">${esc(f.label||'?')} <span style="color:var(--muted);">[${FIELD_TYPES[f.type]||f.type}]</span></span>`).join('')}
            </div>`:''}

    // ── TEMPLATE BUILDER ───────────────────────────────────────────────
    let _editTid = null; // template being edited

    // ── PUBLIC TEMPLATE DB ─────────────────────────────────────────────

    window._tdbCache = window._tdbCache || null;

    async function renderTemplateDB() {
      const content = document.getElementById('content');

      // Skeleton while loading
      if (!window._tdbCache) {

      const listed = q
        ? window._tdbCache.filter(t => (t.name||'').toLowerCase().includes(q) || (t.desc||'').toLowerCase().includes(q) || (t.creatorName||'').toLowerCase().includes(q))

      } else {

                <div style="margin-top:8px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;">
                  ${txLabel ? `<span class="badge badge-blue">${esc(txLabel)}</span>` : ''}
                  <span class="badge badge-gray">${fCount} field${fCount!==1?'s':''}</span>
                  ${t.creatorName ? `<span style="font-size:12px;color:var(--muted);">by <strong>${esc(t.creatorName)}</strong></span>` : ''}

                  ${(t.fields||[]).slice(0,6).map(f=>`<span style="background:var(--bg3);border:1px solid var(--border);border-radius:5px;padding:2px 8px;font-size:11px;">${esc(f.label||'?')}</span>`).join('')}
                  ${fCount > 6 ? `<span style="font-size:11px;color:var(--muted);">+${fCount-6} more</span>` : ''}
                </div>` : ''}

        });

      }

    }

    async function loadPublicTemplate(tid, tname) {
      // Find in server cache first, fall back to local db
      const src = (window._tdbCache||[]).find(x => x.id === tid) || db.templates.find(x => x.id === tid);
      if (!src) return;
      if (!confirm(`Copy "${src.name}" to your templates?\nYou will get your own editable copy. The original will not be changed.`)) return;
      const u = curUser();
      const copy = JSON.parse(JSON.stringify(src)); // deep clone
      copy.id           = uuid();
      copy.userId       = u.id;
      copy.isPublic     = false;    // copied template is private by default
      copy.copiedFrom   = src.id;
      copy.copiedFromName = src.name;
      copy.createdAt    = Date.now();
      copy.invoiceNextNum = copy.invoiceStartNum || 1; // reset number counter
      // Regenerate field IDs to avoid collisions
      copy.fields = (copy.fields||[]).map(f => ({ ...f, id: uuid() }));
      db.templates.push(copy);
      // Force immediate sync (bypass debounce) so template appears on all devices right away
      localStorage.setItem('mxi_v2', JSON.stringify(db));
      if (_IS_SERVER) await _syncToServer();
      logAudit('load_public_template', { srcId: tid, copyId: copy.id, name: copy.name });
      toast(`"${copy.name}" copied to your templates.`);
      nav('templates');
    }

                  <div style="font-weight:700;font-size:15px;">${esc(f.label||'Unnamed')}</div>
                  <div style="font-size:12px;color:var(--muted);margin-top:3px;display:flex;gap:10px;flex-wrap:wrap;">
                    <span>Type: ${_isPairedField(f) ? 'Paired' : _isNumericField(f) ? 'Numeric' : 'Text'}</span>
                    ${_isPairedField(f) ? `<span style="color:var(--blue);">${esc(f.textLabel||'Item')} + ${esc(f.numericLabel||'Amount')}${f.repeatable!==false?' · Repeatable':''}</span>` : ''}
                    ${_isNumericField(f)&&f.defaultValue!==undefined&&f.defaultValue!==''?`<span>Default: $${f.defaultValue}</span>`:''}
                    ${f.ledgerEffect?`<span style="color:var(--green);">Ledger: ${LEDGER_FX[f.ledgerEffect]||f.ledgerEffect}</span>`:''}
                    ${f.repeatable?`<span class="badge badge-yellow">Repeatable</span>`:''}
                    ${f.editableAtExecution===false?`<span class="badge badge-gray">Locked</span>`:''}
                    ${f.visible===false?`<span class="badge badge-gray">Hidden</span>`:''}
                    ${f.excludeFromAggregate?`<span class="badge badge-yellow" title="Excluded from Run Aggregate">Excl. Agg.</span>`:''}
                    ${f.isFinalTotal?`<span class="badge" style="background:rgba(74,222,128,.18);color:#4ade80;border:1px solid #4ade80;" title="This field drives the invoice total, entry amount, and settlement basis">★ Final Total</span>`:''}
                  </div>
                  ${opts.length>0?`<div style="margin-top:8px;display:flex;gap:4px;flex-wrap:wrap;">${opts.map(o=>`<span style="background:var(--bg3);border:1px solid var(--border);border-radius:5px;padding:2px 8px;font-size:11px;">${esc(o.label)}${o.numericValue?` · $${o.numericValue}`:''}</span>`).join('')}</div>`:''}
                  ${calcs.length>0?`<div style="margin-top:6px;font-size:12px;color:var(--blue);">Calculators: ${calcs.map(c=>{
                    let target = '';
                    if (c.operation === 'select_aggregate') {
                      const names = (c.targetFieldIds||[]).map(fid=>{const ff=t.fields.find(x=>x.id===fid); return ff?esc(ff.label):fid;});
                      target = names.length ? ` → [${names.join(', ')}]` : '';
                    } else if (c.targetFieldId) {
                      const targetF = t.fields.find(x=>x.id===c.targetFieldId);
                      target = targetF ? ` → ${esc(targetF.label)}` : '';
                    }
                    const vis = c.resultVisible===false ? ' 🔒hidden' : '';
                    return `${esc(c.name||'?')} (${CALC_OPS[c.operation]||c.operation}${target}${vis})`;
                  }).join(', ')}</div>`:''}
                </div>
                <div style="display:flex;gap:4px;flex-shrink:0;">
                  ${idx>0?`<button class="bs sm" title="Move up" onclick="moveTplField('${t.id}',${idx},-1)">↑</button>`:''}
                  ${idx<fields.length-1?`<button class="bs sm" title="Move down" onclick="moveTplField('${t.id}',${idx},1)">↓</button>`:''}
                  <button class="bs sm" onclick="openEditFieldModal('${t.id}','${f.id}')">Edit</button>
                  <button class="bs sm" style="color:var(--red);" onclick="delTplField('${t.id}','${f.id}')">✕</button>
                </div>
              </div>
            </div>`;
          });
        }
        html += `</div>`;
      }
      document.getElementById('content').innerHTML = html;
    }

    function _readTplInfoFields() {
      return {
        name:           (document.getElementById('tplname')?.value||'').trim(),
        desc:           (document.getElementById('tpldesc')?.value||'').trim(),
        txType:         document.getElementById('tpltxtype')?.value || 'invoice',
        invoicePrefix:  (document.getElementById('tplprefix')?.value||'INV-').trim(),
        invoiceNextNum: parseInt(document.getElementById('tplstartnum')?.value||'1', 10) || 1,
      };
    }

    function createTplAndContinue() {
      const meta = _readTplInfoFields();
      if (!meta.name) { alert('Template name required'); return; }
      const t = {
        id: uuid(), userId: curUser().id, fields: [], archived: false, createdAt: Date.now(),
        ...meta,
        invoiceStartNum: meta.invoiceNextNum
      };
      db.templates.push(t);
      save(); logAudit('add_template', { name: meta.name }); toast('Template created');
      _editTid = t.id;
      renderTemplateBuilder(t);
    }

    function saveTplMeta() {
      const t = db.templates.find(x => x.id === _editTid);
      if (!t) return;
      const meta = _readTplInfoFields();
      if (!meta.name) { alert('Name required'); return; }
      const wasPublic = t.isPublic;
      const isPublic = document.getElementById('tplpublic')?.checked || false;
      Object.assign(t, meta);
      t.isPublic = isPublic;
      if (isPublic && !t.creatorName) {
        const u = curUser();
        t.creatorId   = u.id;
        t.creatorName = u.displayName || u.username || 'Unknown';
      }
      save(); logAudit('edit_template', { tid: t.id, name: meta.name, isPublic }); toast('Template saved');
      window._tdbCache = null; // invalidate Template DB cache so it re-fetches on next visit
      renderTemplateBuilder(t);
    }

    function moveTplField(tid, idx, dir) {
      const t = db.templates.find(x=>x.id===tid); if(!t)return;
      const arr = t.fields; const target = idx+dir;
      if(target<0||target>=arr.length)return;
      [arr[idx],arr[target]]=[arr[target],arr[idx]];
      save(); renderTemplateBuilder(t);
    }

    function delTplField(tid, fid) {
      const t = db.templates.find(x=>x.id===tid); if(!t)return;
      if(!confirm('Remove this field?'))return;
      t.fields = t.fields.filter(f=>f.id!==fid);
      save(); renderTemplateBuilder(t);
    }

    // ── ADD / EDIT FIELD MODAL ─────────────────────────────────────────
    // Build <option> list of numeric fields AND computed/result fields in a template
    // — excluding the field being edited (anti-circular) and fields after self in order (prevents forward refs)
    function calcTargetFieldOpts(tid, selfFid, selId) {
      const t = db.templates.find(x=>x.id===tid);
      // Include: numeric fields, paired fields (by their row total), and computed result fields
      // Exclude: text fields (no numeric value) and the field being edited itself
      const candidates = (t?.fields||[]).filter(f =>
        f.id !== selfFid && _isCalcField(f) && !_isTextField(f)
      );
      if (!candidates.length) return `<option value="">— no numeric/result fields yet —</option>`;
      return `<option value="">— none —</option>` +
        candidates.map(f => {
          const tag = _isPairedField(f) ? ' [paired total]' : (f.calculators||[]).length > 0 ? ' [result]' : '';
          return `<option value="${f.id}" ${selId===f.id?'selected':''}>${esc(f.label)}${tag}</option>`;
        }).join('');
    }

    // Build checkbox list for select_aggregate — multi-select of numeric/paired/result fields
    function calcSelectAggCheckboxes(tid, selfFid, selIds) {
      const t = db.templates.find(x=>x.id===tid);
      const candidates = (t?.fields||[]).filter(f =>
        f.id !== selfFid && _isCalcField(f) && !_isTextField(f)
      );
      if (!candidates.length) return `<p style="color:var(--muted);font-size:12px;">No numeric or result fields yet.</p>`;
      return candidates.map(f => {
        const tag = _isPairedField(f) ? ' [paired total]' : (f.calculators||[]).length > 0 ? ' [result]' : '';
        const checked = (selIds||[]).includes(f.id) ? 'checked' : '';
        return `<label style="display:flex;align-items:center;gap:8px;padding:4px 0;font-size:13px;cursor:pointer;">
          <input type="checkbox" class="sagg_check" value="${f.id}" ${checked}>
          ${esc(f.label)}${tag ? ` <span style="font-size:10px;color:var(--accent);font-weight:700;">${tag}</span>` : ''}
        </label>`;
      }).join('');
    }

    function fieldModalHtml(tid, fid) {
      const t   = db.templates.find(x=>x.id===tid); if(!t)return'';
      const f   = fid ? t.fields.find(x=>x.id===fid) : null;
      const isNew = !f;
      // Normalise legacy types → display type
      let ftype = f?.type||'text';
      if (ftype==='number'||ftype==='dropdown') ftype='numeric';
      if (ftype==='date') ftype='text';
      // Legacy: old computed result fields used type:'text' with calculators — show in Numeric panel
      if (ftype==='text' && (f?.calculators||[]).length > 0) ftype='numeric';
      const calcs = f?.calculators||[];
      const isN = ftype==='numeric', isP = ftype==='paired', isT = ftype==='text';

      const calcRows = calcs.map((c,i) => {
        const isSAgg = c.operation === 'select_aggregate';
        const isAgg  = c.operation === 'aggregate';
        return `<div style="border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:10px;" id="fcalc_${i}">
          <div class="grid2">
            <div class="fg"><label>Result Name *</label>
              <input value="${esc(c.name||'')}" oninput="updateCalc(${i},'name',this.value)" placeholder="e.g. Tax"></div>
            <div class="fg"><label>Operation</label>
              <select onchange="updateCalc(${i},'operation',this.value);onCalcOpChange(this,${i},'${tid}','${fid||''}')">
                ${Object.entries(CALC_OPS).map(([k,v])=>`<option value="${k}" ${c.operation===k?'selected':''}>${v}</option>`).join('')}
              </select></div>
            <div class="fg calc_operand_wrap_${i}" style="${isAgg||isSAgg?'display:none':''}">
              <label>Factor / Operand <span style="color:var(--muted);font-weight:400;">(0.1 = 10%)</span></label>
              <input type="number" value="${c.operand||''}" oninput="updateCalc(${i},'operand',this.value)" placeholder="e.g. 0.1" step="any"></div>
            <div class="fg calc_target_wrap_${i}" style="${isAgg||isSAgg?'display:none':''}">
              <label>Apply To Field</label>
              <select onchange="updateCalc(${i},'targetFieldId',this.value)">
                ${calcTargetFieldOpts(tid, fid, c.targetFieldId||'')}</select></div>
            <div class="fg calc_sagg_wrap_${i}" style="${isSAgg?'':'display:none'};grid-column:1/-1;">
              <label>Fields to Include in Selection Aggregate</label>
              <div style="border:1px solid var(--border);border-radius:6px;padding:10px;background:var(--bg3);max-height:180px;overflow-y:auto;">
                ${calcSelectAggCheckboxes(tid, fid, c.targetFieldIds||[])}</div></div>
            <div class="fg" style="grid-column:1/-1;"><label>Show Result to User</label>
              <select onchange="updateCalc(${i},'resultVisible',this.value==='yes')">
                <option value="yes" ${c.resultVisible!==false?'selected':''}>Yes — display result on entry form</option>
                <option value="no"  ${c.resultVisible===false?'selected':''}>No — hidden (usable in later calculations)</option>
              </select></div>
          </div>
          <button class="bs sm" style="color:var(--red);margin-top:4px;" onclick="removeCalc(${i})">✕ Remove</button>
        </div>`;
      }).join('');

      return `<div class="modal-bg" id="fieldModalBg" onclick="if(event.target===this)this.remove()">
        <div class="modal" style="max-width:680px;max-height:90vh;overflow-y:auto;" onclick="event.stopPropagation()">
          <div class="modal-title">${isNew?'Add Field':'Edit Field'}</div>

          <!-- Type selector always at top -->
          <div class="grid2" style="margin-bottom:12px;">
            <div class="fg">
              <label>Field Label *</label>
              <input id="fl_label" value="${esc(f?.label||'')}" placeholder="e.g. Items / Cost / Notes">
            </div>
            <div class="fg"><label>Field Type</label>
              <select id="fl_type" onchange="onFldTypeChange(this.value)">
                ${Object.entries(FIELD_TYPES).map(([k,v])=>`<option value="${k}" ${ftype===k?'selected':''}>${v}</option>`).join('')}
              </select>
            </div>
          </div>

          <!-- ═══ TEXT PANEL ═══════════════════════════════════════ -->
          <div id="fl_panel_text" style="display:${isT?'block':'none'}">
            <p style="color:var(--muted);font-size:13px;margin-bottom:10px;">
              Text fields hold descriptive content only. They appear on the form and invoice but do not participate in calculations.
            </p>
            <div style="padding:10px 12px;background:var(--bg3);border-radius:8px;border:1px solid var(--border);display:inline-flex;">
              <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px;">
                <input type="checkbox" id="fl_visible_t" ${f?.visible!==false?'checked':''} style="width:auto;flex-shrink:0;">
                Visible on invoice
              </label>
            </div>
          </div>

          <!-- ═══ NUMERIC PANEL ════════════════════════════════════ -->
          <div id="fl_panel_numeric" style="display:${isN?'block':'none'}">
            <div class="grid2" style="margin-bottom:8px;">
              <div class="fg"><label>Default Value</label>
                <input type="number" id="fl_defval" value="${esc(String(f?.defaultValue||''))}" placeholder="0.00" min="0" step="0.01"></div>
              <div class="fg"><label>Add to Ledger</label>
                <select id="fl_ledger">
                  ${Object.entries(LEDGER_FX).map(([k,v])=>`<option value="${k}" ${(f?.ledgerEffect||'')==k?'selected':''}>${v}</option>`).join('')}
                </select>
                <span style="font-size:11px;color:var(--muted);margin-top:3px;line-height:1.4;">When set, this field's value posts a real balance-affecting record to the contact's ledger. Use this only on the final total field — not on subtotals or display-only fields. Default: no ledger effect.</span>
              </div>
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px 20px;margin-bottom:14px;padding:12px;background:var(--bg3);border-radius:8px;border:1px solid var(--border);">
              <label style="display:flex;align-items:flex-start;gap:8px;cursor:pointer;font-size:13px;line-height:1.3;">
                <input type="checkbox" id="fl_visible_n" ${f?.visible!==false?'checked':''} style="width:auto;margin-top:2px;flex-shrink:0;">
                <span>Visible on invoice</span>
              </label>
              <label style="display:flex;align-items:flex-start;gap:8px;cursor:pointer;font-size:13px;line-height:1.3;">
                <input type="checkbox" id="fl_editable" ${f?.editableAtExecution!==false?'checked':''} style="width:auto;margin-top:2px;flex-shrink:0;">
                <span>Editable at entry time</span>
              </label>
              <label style="display:flex;align-items:flex-start;gap:8px;cursor:pointer;font-size:13px;line-height:1.3;" title="Run Aggregate calculator will skip this field.">
                <input type="checkbox" id="fl_excludeagg" ${f?.excludeFromAggregate?'checked':''} style="width:auto;margin-top:2px;flex-shrink:0;">
                <span>Exclude from aggregate</span>
              </label>
              <label style="display:flex;align-items:flex-start;gap:8px;cursor:pointer;font-size:13px;line-height:1.3;" title="This field's value drives the invoice total, entry amount, and settlement basis.">
                <input type="checkbox" id="fl_finaltotal" ${f?.isFinalTotal?'checked':''} style="width:auto;margin-top:2px;flex-shrink:0;">
                <span><strong>Final Total</strong><br><span style="font-size:11px;color:var(--green);">invoice amount basis</span></span>
              </label>
            </div>
            <div style="border-top:1px solid var(--border);padding-top:12px;margin-top:4px;">
              <div style="font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px;">Calculators</div>
              <p style="color:var(--muted);font-size:12px;margin-bottom:10px;">This field can compute a result from other numeric fields. Results can be chained into later calculators.</p>
              <div id="fl_calc_list">${calcRows}</div>
              <button class="bs sm" onclick="addCalc('${tid}','${fid||''}')">+ Add Calculator</button>
            </div>
          </div>

          <!-- ═══ PAIRED PANEL ═════════════════════════════════════ -->
          <div id="fl_panel_paired" style="display:${isP?'block':'none'}">
            <p style="color:var(--muted);font-size:13px;margin-bottom:10px;">
              Paired fields create structured rows: each row has a text description and a numeric value. They render as a table on the invoice.
            </p>
            <div class="grid2" style="margin-bottom:8px;">
              <div class="fg"><label>Text Column Label</label>
                <input id="fl_textlabel" value="${esc(f?.textLabel||'Item')}" placeholder="e.g. Item / Service / Description"></div>
              <div class="fg"><label>Numeric Column Label</label>
                <input id="fl_numlabel" value="${esc(f?.numericLabel||'Amount')}" placeholder="e.g. Cost / Amount / Charge"></div>
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px 20px;margin-bottom:12px;padding:12px;background:var(--bg3);border-radius:8px;border:1px solid var(--border);">
              <label style="display:flex;align-items:flex-start;gap:8px;cursor:pointer;font-size:13px;line-height:1.3;">
                <input type="checkbox" id="fl_repeat_p" ${f?.repeatable!==false?'checked':''} style="width:auto;margin-top:2px;flex-shrink:0;">
                <span>Repeatable rows</span>
              </label>
              <label style="display:flex;align-items:flex-start;gap:8px;cursor:pointer;font-size:13px;line-height:1.3;">
                <input type="checkbox" id="fl_visible_p" ${f?.visible!==false?'checked':''} style="width:auto;margin-top:2px;flex-shrink:0;">
                <span>Visible on invoice</span>
              </label>
              <label style="display:flex;align-items:flex-start;gap:8px;cursor:pointer;font-size:13px;line-height:1.3;" title="Run Aggregate will skip the numeric total of this paired field.">
                <input type="checkbox" id="fl_excludeagg_p" ${f?.excludeFromAggregate?'checked':''} style="width:auto;margin-top:2px;flex-shrink:0;">
                <span>Exclude from aggregate</span>
              </label>
              <label style="display:flex;align-items:flex-start;gap:8px;cursor:pointer;font-size:13px;line-height:1.3;" title="Use this field's numeric total as the invoice amount.">
                <input type="checkbox" id="fl_finaltotal_p" ${f?.isFinalTotal?'checked':''} style="width:auto;margin-top:2px;flex-shrink:0;">
                <span><strong>Final Total</strong><br><span style="font-size:11px;color:var(--green);">invoice amount basis</span></span>
              </label>
            </div>
            <div class="fg"><label>Add to Ledger (on numeric total)</label>
              <select id="fl_ledger_p">
                ${Object.entries(LEDGER_FX).map(([k,v])=>`<option value="${k}" ${(f?.ledgerEffect||'')==k?'selected':''}>${v}</option>`).join('')}
              </select>
              <span style="font-size:11px;color:var(--muted);margin-top:3px;line-height:1.4;">When set, the sum of this field's rows posts a real balance-affecting record to the contact's ledger. Typically set only on the final total field.</span>
            </div>
          </div>

          <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:20px;border-top:1px solid var(--border);padding-top:16px;">
            <button class="bs" onclick="document.getElementById('fieldModalBg').remove()">Cancel</button>
            <button class="btn" onclick="saveFieldModal('${tid}','${fid||''}')">Save Field</button>
          </div>
        </div></div>`;
    }

    // Temporary field state while modal is open
    let _fldOpts = [];
    let _fldCalcs = [];

    function openAddFieldModal(tid) {
      _fldOpts = []; _fldCalcs = [];
      const d = document.createElement('div');
      d.innerHTML = fieldModalHtml(tid, null);
      document.body.appendChild(d.firstChild);
    }

    function openEditFieldModal(tid, fid) {
      const t = db.templates.find(x=>x.id===tid);
      const f = t?.fields.find(x=>x.id===fid);
      _fldOpts  = f ? JSON.parse(JSON.stringify(f.dropdownOptions||[])) : [];
      _fldCalcs = f ? JSON.parse(JSON.stringify(f.calculators||[])) : [];
      const d = document.createElement('div');
      d.innerHTML = fieldModalHtml(tid, fid);
      document.body.appendChild(d.firstChild);
    }

    function switchFldTab(name, btn) {
      document.querySelectorAll('#fldTabs .tab').forEach(b=>b.classList.remove('on'));
      btn.classList.add('on');
      ['basic','options','calc'].forEach(n => {
        const el = document.getElementById('fldTab_'+n);
        if(el) el.style.display = n===name?'block':'none';
      });
    }

    function onFldTypeChange(val) {
      ['text','numeric','paired'].forEach(t => {
        const p = document.getElementById('fl_panel_'+t);
        if (p) p.style.display = (t===val) ? 'block' : 'none';
      });
    }

    function addFldOpt() {
      _fldOpts.push({label:'',numericValue:''});
      const list = document.getElementById('fl_opts_list');
      const i = _fldOpts.length-1;
      const div = document.createElement('div');
      div.className = 'frow'; div.id = 'fopt_'+i; div.style.marginBottom='8px';
      div.innerHTML = `<input placeholder="Option label" oninput="updateFldOpt(${i},'label',this.value)" style="flex:2;">
        <input type="number" placeholder="Value" oninput="updateFldOpt(${i},'numericValue',this.value)" style="flex:1;min-width:80px;">
        <button class="bs sm" onclick="removeFldOpt(${i})" style="flex-shrink:0;">✕</button>`;
      list.appendChild(div);
    }

    function updateFldOpt(i, key, val) { if(_fldOpts[i]) _fldOpts[i][key]=val; }
    function removeFldOpt(i) { _fldOpts.splice(i,1); const el=document.getElementById('fopt_'+i); if(el)el.remove(); }

    function addCalc(tid, selfFid) {
      _fldCalcs.push({name:'', operation:'multiply', operand:1, targetFieldId:'', targetFieldIds:[], resultVisible:true});
      const list = document.getElementById('fl_calc_list');
      const i = _fldCalcs.length - 1;
      const targetOpts = calcTargetFieldOpts(tid||'', selfFid||'', '');
      const div = document.createElement('div');
      div.style.cssText = 'border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:10px;';
      div.id = 'fcalc_' + i;
      div.innerHTML = `<div class="grid2">
        <div class="fg">
          <label>Result Name *</label>
          <input oninput="updateCalc(${i},'name',this.value)" placeholder="e.g. Service Fee">
        </div>
        <div class="fg">
          <label>Operation</label>
          <select onchange="onCalcOpChange(this,${i},'${tid}','${selfFid}')">
            ${Object.entries(CALC_OPS).map(([k,v])=>`<option value="${k}">${v}</option>`).join('')}
          </select>
        </div>
        <div class="fg calc_operand_wrap_${i}">
          <label>Factor / Operand <span style="color:var(--muted);font-weight:400;">(multiply: 0.1 = 10%)</span></label>
          <input type="number" oninput="updateCalc(${i},'operand',this.value)" placeholder="e.g. 0.1" step="any">
        </div>
        <div class="fg calc_target_wrap_${i}">
          <label>Apply To Field</label>
          <select onchange="updateCalc(${i},'targetFieldId',this.value)">${targetOpts}</select>
        </div>
        <div class="fg calc_sagg_wrap_${i}" style="display:none;grid-column:1/-1;">
          <label>Fields to Include in Selection Aggregate</label>
          <div style="border:1px solid var(--border);border-radius:6px;padding:10px;background:var(--bg3);max-height:180px;overflow-y:auto;">
            ${calcSelectAggCheckboxes(tid||'', selfFid||'', [])}
          </div>
        </div>
        <div class="fg" style="grid-column:1/-1;">
          <label>Show Result to User</label>
          <select onchange="updateCalc(${i},'resultVisible',this.value==='yes')">
            <option value="yes" selected>Yes — display result on entry form</option>
            <option value="no">No — hidden (usable in later calculations)</option>
          </select>
        </div>
      </div>
      <button class="bs sm" style="color:var(--red);margin-top:4px;" onclick="removeCalc(${i})">✕ Remove</button>`;
      list.appendChild(div);
    }

    function updateCalc(i, key, val) { if(_fldCalcs[i]) _fldCalcs[i][key]=val; }
    function removeCalc(i) { _fldCalcs.splice(i,1); const el=document.getElementById('fcalc_'+i); if(el)el.remove(); }

    // Toggle visibility of operand/target vs aggregate checkboxes based on selected operation
    function onCalcOpChange(sel, i, tid, selfFid) {
      const isAgg  = sel.value === 'aggregate';
      const isSAgg = sel.value === 'select_aggregate';
      const operWrap  = document.querySelector(`.calc_operand_wrap_${i}`);
      const targWrap  = document.querySelector(`.calc_target_wrap_${i}`);
      const saggWrap  = document.querySelector(`.calc_sagg_wrap_${i}`);
      if (operWrap) operWrap.style.display = (isAgg || isSAgg) ? 'none' : '';
      if (targWrap) targWrap.style.display = (isAgg || isSAgg) ? 'none' : '';
      if (saggWrap) {
        saggWrap.style.display = isSAgg ? '' : 'none';
        // Populate checkboxes if this is first time showing select_aggregate
        if (isSAgg && saggWrap.querySelector('.sagg_check') === null) {
          saggWrap.querySelector('div').innerHTML = calcSelectAggCheckboxes(tid, selfFid, _fldCalcs[i]?.targetFieldIds||[]);
        }
      }
      if (_fldCalcs[i]) _fldCalcs[i].operation = sel.value;
    }

    function saveFieldModal(tid, fid) {
      const t = db.templates.find(x=>x.id===tid); if(!t)return;
      let label = document.getElementById('fl_label')?.value.trim();
      if (!label) { alert('Field label required.'); return; }
      const type = document.getElementById('fl_type')?.value||'text';

      let field;

      if (type === 'text') {
        // ── TEXT: description only, no calculations ──────────────────────
        field = {
          id: fid||uuid(), label, type,
          visible: document.getElementById('fl_visible_t')?.checked !== false,
          calculators: [], dropdownOptions: []
        };

      } else if (type === 'numeric') {
        // ── NUMERIC: standalone number, supports calculators ─────────────
        const defVal = document.getElementById('fl_defval')?.value||'';
        // Sync calculator rows
        document.querySelectorAll('[id^=fcalc_]').forEach((row,i) => {
          if(!_fldCalcs[i]) return;
          const inputs  = row.querySelectorAll('input[type=text],input:not([type])');
          const numInps = row.querySelectorAll('input[type=number]');
          const selects = row.querySelectorAll('select');
          if(inputs[0])  _fldCalcs[i].name         = inputs[0].value.trim();
          if(numInps[0]) _fldCalcs[i].operand       = parseFloat(numInps[0].value)||0;
          if(selects[0]) _fldCalcs[i].operation     = selects[0].value;
          if(selects[1]) _fldCalcs[i].targetFieldId = selects[1]?.value||'';
          if(selects[2]) _fldCalcs[i].resultVisible = selects[2]?.value !== 'no';
          if(_fldCalcs[i].operation === 'select_aggregate')
            _fldCalcs[i].targetFieldIds = Array.from(row.querySelectorAll('.sagg_check:checked')).map(cb=>cb.value);
        });
        const isFinalTotal = document.getElementById('fl_finaltotal')?.checked||false;
        if (isFinalTotal) t.fields.forEach(of => { if(of.id!==(fid||'__new__')) of.isFinalTotal=false; });
        field = {
          id: fid||uuid(), label, type,
          defaultValue: defVal!==''?parseFloat(defVal)||defVal:'',
          ledgerEffect: document.getElementById('fl_ledger')?.value||null,
          visible: document.getElementById('fl_visible_n')?.checked !== false,
          editableAtExecution: document.getElementById('fl_editable')?.checked !== false,
          excludeFromAggregate: document.getElementById('fl_excludeagg')?.checked||false,
          isFinalTotal,
          calculators: _fldCalcs.filter(c=>c.operation),
          dropdownOptions: []
        };

      } else {
        // ── PAIRED: text+number rows ─────────────────────────────────────
        const isFinalTotal_p = document.getElementById('fl_finaltotal_p')?.checked||false;
        if (isFinalTotal_p) t.fields.forEach(of => { if(of.id!==(fid||'__new__')) of.isFinalTotal=false; });
        field = {
          id: fid||uuid(), label, type,
          textLabel:   document.getElementById('fl_textlabel')?.value.trim()||'Item',
          numericLabel:document.getElementById('fl_numlabel')?.value.trim()||'Amount',
          repeatable:  document.getElementById('fl_repeat_p')?.checked !== false,
          visible:     document.getElementById('fl_visible_p')?.checked !== false,
          excludeFromAggregate: document.getElementById('fl_excludeagg_p')?.checked||false,
          ledgerEffect: document.getElementById('fl_ledger_p')?.value||null,
          isFinalTotal: isFinalTotal_p,
          calculators: [], dropdownOptions: []
        };
      }

      if(fid) { const idx=t.fields.findIndex(x=>x.id===fid); if(idx>=0) t.fields[idx]=field; }
      else    { t.fields.push(field); }
      save(); logAudit('edit_template_field',{tid,label,type});
      document.getElementById('fieldModalBg')?.remove();
      toast(fid?'Field updated':'Field added');
      renderTemplateBuilder(t);
    }

    function saveNewRecurring() {
      const cid    = document.getElementById('rcon').value.trim();
      const name   = document.getElementById('rname').value.trim();
      const txType = document.getElementById('rtx').value.trim();
      const amt    = document.getElementById('ramt').value.trim();
      const freq   = document.getElementById('rfreq').value.trim();
      if (!cid)   return alert('Contact required');
      if (!name)  return alert('Name required');
      if (!txType)return alert('Type required');
      const amtErr = valAmt(amt); if (amtErr) return alert(amtErr);
      if (!freq)  return alert('Frequency required');
      if (freq === 'repeat_n') {
        const rt = parseInt(document.getElementById('rreptimes')?.value||0);
        if (!rt || rt < 1) return alert('Enter how many times to repeat');
      }
      const startDate   = new Date(document.getElementById('rstart').value||new Date()).getTime();
      const endDateStr  = document.getElementById('renddate')?.value;
      const endDate     = endDateStr ? new Date(endDateStr).getTime() : null;
      const repeatTimes = freq === 'repeat_n' ? parseInt(document.getElementById('rreptimes').value) : null;
      const newRid = uuid();
      db.recurring.push({ id:newRid, userId:curUser().id, cId:cid, name, txType, amount:parseFloat(amt),
        startDate, endDate, repeatTimes, freq, status:'active', archived:false, lastPosted:null, createdAt:Date.now() });
      save();
      logAudit('add_recurring', {cid, name, freq});
      // Notify contact if toggle is on
      const rNotifyOn  = document.getElementById('r_notify_btn')?.classList.contains('on');
      const rNotifyMsg = document.getElementById('r_notify_msg')?.value.trim();
      if (rNotifyOn && rNotifyMsg) {
        // Check for inline email if contact has none
        const rc = db.contacts.find(x => x.id === cid);
        const inlineEmail = document.getElementById('r_notify_contact_email')?.value.trim() || '';
        if (inlineEmail && rc && !rc.email) { rc.email = inlineEmail; save(); }
        const rNotifyWho = window._formNwho_r || 'them';
        _sendRecurringNotif(newRid, rNotifyMsg, rNotifyWho);
      }
      document.getElementById('recModalBg')?.remove();
      toast('Recurring created');
      renderRecurring();
    }

      const cid    = document.getElementById('rcon').value.trim();
      const name   = document.getElementById('rname').value.trim();

    // ============ PAGE: NOTIFICATIONS ============
    function renderNotifs() {
      const u = curUser();
      const isAdm = curRole() === 'admin';
      const notifs = (isAdm ? db.notifs : db.notifs.filter(n => n.userId === u.id))
                       .slice().sort((a, b) => (b.createdAt||0) - (a.createdAt||0));

      // Mark all unread notifications as read, then refresh nav badge
      let anyMarked = false;
      notifs.forEach(n => { if (!n.read) { n.read = true; anyMarked = true; } });
      if (anyMarked) { save(); renderNav(); }

      PG['notifs'] = PG['notifs'] || 1;
      const p = paginate(notifs, 'notifs');

      const whoLabel = w => w === 'them' ? 'Contact' : w === 'you' ? 'You' : w === 'both' ? 'Both' : '—';
      const eventBadge = t => {
        if (t === 'viewed')    return `<span class="badge" style="background:rgba(108,99,255,.12);color:var(--accent);font-size:11px;">👁 Viewed</span>`;
        if (t === 'confirmed') return `<span class="badge" style="background:rgba(22,163,74,.12);color:#16a34a;font-size:11px;">✅ Confirmed</span>`;
        if (t === 'closed')    return `<span class="badge badge-gray" style="font-size:11px;">🔒 Closed</span>`;
        if (t === 'reminder')  return `<span class="badge" style="background:rgba(239,68,68,.12);color:#dc2626;font-size:11px;">🚩 Reminder</span>`;
        if (t === 'self-reminder') return `<span class="badge" style="background:rgba(245,158,11,.12);color:#d97706;font-size:11px;">⏰ Self-Reminder</span>`;
        if (t === 'payment')   return `<span class="badge" style="background:rgba(22,163,74,.12);color:#16a34a;font-size:11px;">📋 Receipt</span>`;
        if (t === 'fulfilled') return `<span class="badge badge-green" style="font-size:11px;">✅ Fulfilled</span>`;
        if (t === 'settlement_pending')   return `<span class="badge" style="background:rgba(245,158,11,.12);color:#d97706;font-size:11px;">⏳ Review Payment</span>`;
        if (t === 'settlement_confirmed') return `<span class="badge" style="background:rgba(22,163,74,.12);color:#16a34a;font-size:11px;">✅ Payment Confirmed</span>`;
        if (t === 'settlement_rejected')  return `<span class="badge" style="background:rgba(239,68,68,.12);color:#dc2626;font-size:11px;">❌ Payment Rejected</span>`;
        if (t === 'notification')  return `<span class="badge badge-blue" style="font-size:11px;">📬 Notification</span>`;
        if (t === 'reconciliation_mismatch') return `<span class="badge" style="background:rgba(239,68,68,.12);color:#dc2626;font-size:11px;">⚠ Balance Mismatch</span>`;
        return `<span class="badge badge-blue" style="font-size:11px;">📤 Sent</span>`;
      };

      let html = `<div class="page-header"><h2>Notifications</h2></div><div class="card">`;
      if (notifs.length === 0) {
        html += '<p style="color: var(--muted);padding:16px 0;">No notifications sent yet.</p>';
      } else {
        html += `<div class="tbl-wrap"><table><thead><tr>
          <th>Contact</th>
          <th>Amount</th>
          <th class="hide-mobile">Message</th>
          <th class="hide-mobile">Sent To</th>
          <th class="hide-mobile">Date</th>
          <th>Event</th>
          <th style="width:36px;"></th>
        </tr></thead><tbody>`;
        p.items.forEach(n => {
          const c  = db.contacts.find(x => x.id === n.cId);
          const e  = db.entries.find(x => x.id === n.eid);
          const amtStr = e ? fmt(e.amount, e.currency) : '—';
          const sentTo = Array.isArray(n.sentTo) && n.sentTo.length
            ? n.sentTo.join(', ')
            : (n.who ? whoLabel(n.who) : '—');
          const dateStr = n.createdAt ? new Date(n.createdAt).toLocaleDateString() : '—';

    function delNotif(nid) {
      db.notifs = db.notifs.filter(x => x.id !== nid);

      renderNotifs();
    }

    // ============ PAGE: NEXT OF KIN ============
    // ── NOK HELPERS ────────────────────────────────────────────────────
    // Find linked contact for a NOK record (same user, name match or explicit id)
    function nokLinkedContact(n) {
      if (n.nokContactId) return db.contacts.find(c=>c.id===n.nokContactId)||null;
      // Fuzzy name match within same user's contacts
      const name = (n.fullName||'').toLowerCase().trim();
      return db.contacts.find(c=>c.userId===n.userId && c.name.toLowerCase().trim()===name)||null;
    }

    function renderNok() {
      const u = curUser();
      // Admin sees all NOK but scoped: admin's own NOK on their settings, others in user-management context
      // On the main NOK page: show current user's own NOK only (admin's own too)
      const noks = db.nok.filter(n => n.userId === u.id);
      PG['nok'] = PG['nok'] || 1;
      const p = paginate(noks, 'nok');

      let html = `<div class="page-header">
        <div>
          <h2>Next of Kin</h2>
          <p style="color:var(--muted);font-size:13px;margin-top:2px;">Designate trusted contacts who can receive your records. This releases <strong>information only</strong> — not money or assets.</p>
        </div>
        <button class="btn sm" onclick="openNokModal()">+ Add NOK</button>
      </div>`;

      if (noks.length === 0) {
        html += `<div class="card"><p style="color:var(--muted);text-align:center;padding:24px;">No Next of Kin designated yet. Add one to set up your information release plan.</p></div>`;
      } else {
        html += `<div style="display:flex;flex-direction:column;gap:12px;">`;
        p.items.forEach(n => {
          const linked = nokLinkedContact(n);
          html += `<div class="card">
            <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap;">
              <div>
                <div style="font-size:16px;font-weight:700;">${esc(n.fullName)}</div>
                <div style="font-size:13px;color:var(--muted);margin-top:2px;">${esc(n.relationship||'—')}</div>
                <div style="margin-top:8px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;">
                  ${n.email?`<span style="font-size:12px;">✉ ${esc(n.email)}</span>`:''}
                  ${n.phone?`<span style="font-size:12px;">📞 ${esc(n.phone)}</span>`:''}
                  ${linked
                    ? `<span style="font-size:12px;background:rgba(74,222,128,.12);color:var(--green);border-radius:5px;padding:2px 8px;border:1px solid rgba(74,222,128,.25);">
                        🔗 Linked: ${cLink(linked.id, linked.name)}</span>`
                    : `<span style="font-size:12px;color:var(--muted);">No linked contact record</span>`
                  }
                </div>
                ${n.notes?`<div style="margin-top:6px;font-size:12px;color:var(--muted);">${esc(n.notes)}</div>`:''}
              </div>
              <div style="display:flex;gap:6px;flex-shrink:0;">
                <button class="bs sm" onclick="openNokModal('${n.id}')">✏️ Edit</button>
                <button class="bs sm" style="color:var(--red);" onclick="delNok('${n.id}')">🗑</button>
              </div>
            </div>
          </div>`;
        });
        html += `</div>`;
        if (p.pages > 1) html += `<div style="display:flex;gap:4px;justify-content:center;padding:16px 0">${Array.from({length:p.pages},(_,i)=>`<button class="bs sm${i+1===p.page?' on':''}" onclick="PG.nok=${i+1};renderNok()">${i+1}</button>`).join('')}</div>`;
      }
      document.getElementById('content').innerHTML = html;
    }

      const u = curUser();
      // Contact options for linking
      const myContacts = db.contacts.filter(c=>c.userId===u.id&&!c.archived);
      const cOpts = myContacts.map(c=>`<option value="${c.id}" ${n?.nokContactId===c.id?'selected':''}>${esc(c.name)}</option>`).join('');
      const d = document.createElement('div');

        <div class="modal" onclick="event.stopPropagation()">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
            <div class="modal-title" style="margin:0;">${n?'Edit':'Add'} Next of Kin</div>
            <button class="gh sm" onclick="document.getElementById('nokModalBg').remove()">✕</button>
          </div>
          <div class="grid2">
            <div class="fg"><label>Full Legal Name *</label><input id="nok_name" value="${esc(n?.fullName||'')}" placeholder="Jane Doe"></div>
            <div class="fg"><label>Relationship *</label><input id="nok_rel" value="${esc(n?.relationship||'')}" placeholder="Spouse, Child, Sibling..."></div>
            <div class="fg"><label>Email</label><input type="email" id="nok_email" value="${esc(n?.email||'')}"></div>

          </div>
          <div class="fg"><label>Address</label><textarea id="nok_addr" rows="2">${esc(n?.address||'')}</textarea></div>
          <div class="fg">
            <label>Link to Contact Record <span style="color:var(--muted);font-weight:400;">(optional — links this NOK to an existing contact)</span></label>
            <select id="nok_cid">
              <option value="">— No linked contact —</option>
              ${cOpts}
            </select>
          </div>
          <div class="fg">
            <label>Data Release Type</label>
            <select id="nok_release">
              <option value="full" ${(!n||n.releaseType==='full')?'selected':''}>Full ledger export</option>
              <option value="summary" ${n?.releaseType==='summary'?'selected':''}>Summary report only</option>
              <option value="selected" ${n?.releaseType==='selected'?'selected':''}>Selected fields only</option>
            </select>
          </div>
          <div class="fg"><label>Message to Recipient</label><textarea id="nok_msg" rows="2">${esc(n?.message||'Your kind attention is requested')}</textarea></div>
          <div class="fg"><label>Notes</label><textarea id="nok_notes" rows="2">${esc(n?.notes||'')}</textarea></div>
          <div style="background:rgba(251,191,36,.08);border:1px solid rgba(251,191,36,.3);border-radius:8px;padding:10px 14px;font-size:12px;color:var(--yellow);margin-bottom:14px;">
            ⚠️ This system releases <strong>information only</strong>. It is not a legal will, does not transfer money, and is not legally binding for debt assignment.
          </div>
          <div style="display:flex;gap:8px;justify-content:flex-end;">
            <button class="bs" onclick="document.getElementById('nokModalBg').remove()">Cancel</button>
            <button class="btn" onclick="saveNokModal('${nid||''}')">Save</button>
          </div>
        </div></div>`;
      document.body.appendChild(d.firstChild);
    }

    function saveNokModal(nid) {
      const fullName    = document.getElementById('nok_name')?.value.trim();
      const relationship= document.getElementById('nok_rel')?.value.trim();
      if (!fullName||!relationship) return alert('Full name and relationship required');
      const data = {
        fullName, relationship,
        email:       document.getElementById('nok_email')?.value.trim()||'',
        phone:       document.getElementById('nok_phone')?.value.trim()||'',
        address:     document.getElementById('nok_addr')?.value.trim()||'',
        nokContactId:document.getElementById('nok_cid')?.value||null,
        releaseType: document.getElementById('nok_release')?.value||'full',
        message:     document.getElementById('nok_msg')?.value.trim()||'Your kind attention is requested',
        notes:       document.getElementById('nok_notes')?.value.trim()||''
      };
      if (nid) {
        const n = db.nok.find(x=>x.id===nid);
        if (n) Object.assign(n, data);
        logAudit('edit_nok',{nid,fullName});
        toast('NOK updated');
      } else {
        db.nok.push({ id:uuid(), userId:curUser().id, ...data, createdAt:Date.now() });
        logAudit('add_nok',{fullName,relationship});
        toast('NOK added');
      }
      save();
      document.getElementById('nokModalBg')?.remove();
      renderNok();
    }

    function delNok(nid) {
      if (!confirm('Remove this Next of Kin record?')) return;
      db.nok = db.nok.filter(x=>x.id!==nid);
      save(); logAudit('delete_nok',{nid}); toast('NOK removed'); renderNok();
    }

    // ============ PAGE: USER MANAGEMENT ============
    function renderUsers() {
      if (!isAdmin()) return nav('dash');
      const users = db.users;
      PG['users'] = PG['users'] || 1;
      const p = paginate(users, 'users');
      const roleBadge = r => r === 'admin' ? 'badge-blue' : r === 'standard' ? 'badge-green' : 'badge-gray';

      let html = `<div class="page-header"><h2>User Management</h2><button class="btn" onclick="addUserModal()">+ Add User</button></div>
      <div class="card" style="overflow:visible;">
        <div style="overflow-x:auto;"><table><thead><tr><th>Name</th><th>Email</th><th class="hide-mobile">Role</th><th>Status</th><th style="width:60px;"></th></tr></thead><tbody>`;
      if (p.items.length === 0) {
        html += `<tr><td colspan="5" style="text-align:center;color:var(--muted);padding:24px;">No users yet. Click + Add User to create one.</td></tr>`;
      }
      p.items.forEach(u => {
        const self = u.id === db.settings.currentUserId;
        html += `<tr>
          <td><div style="display:flex;align-items:center;gap:10px;">${avatar((u.displayName||'?')[0].toUpperCase())}<div><strong>${esc(u.displayName)}</strong>${self ? ' <span style="font-size:11px;color:var(--muted)">(you)</span>' : ''}</div></div></td>
          <td>${esc(u.email || '—')}</td>
          <td class="hide-mobile"><span class="badge ${roleBadge(u.role)}">${esc(u.role)}</span></td>
          <td><span class="badge ${u.status === 'active' ? 'badge-green' : u.status === 'banned' ? 'badge-red' : 'badge-yellow'}">${esc(u.status)}</span></td>
          <td><div class="action-menu"><button class="action-menu-btn" onclick="toggleActionMenu(this)">⋮</button><div class="action-dropdown">
            <button onclick="viewUserRecords('${u.id}')">📋 View Records</button>
            ${!self ? `<button onclick="impersonateUser('${u.id}')">🔍 Test as User</button>` : ''}
            ${!self ? `<button onclick="impersonateContact('${u.id}')">👤 Test as Contact</button>` : ''}
            <button onclick="editUserModal('${u.id}')">✏️ Edit</button>
            ${!self ? `<button onclick="changeUserStatus('${u.id}')">${u.status === 'active' ? '⏸ Suspend' : '▶ Activate'}</button>` : ''}
            ${!self ? `<button onclick="banUser('${u.id}')" style="color:var(--yellow);">${u.status === 'banned' ? '✅ Unban' : '🚫 Ban'}</button>` : ''}
            ${!self ? `<button onclick="delUser('${u.id}')" style="color:var(--red);">🗑 Delete</button>` : ''}

        </tr>`;

      if (p.pages > 1) html += `<div style="display:flex;gap:4px;justify-content:center;padding:12px 0">${Array.from({length:p.pages},(_,i)=>`<button class="bs sm${i+1===p.page?' on':''}" onclick="PG.users=${i+1};renderUsers()">${i+1}</button>`).join('')}</div>`;
      html += `</div>`;
      document.getElementById('content').innerHTML = html;
    }

    function addUserModal(editId) {
      const u = editId ? db.users.find(x => x.id === editId) : null;
      const title = u ? 'Edit User' : 'Add User';
      const html = `<div class="modal-bg" id="addUserBg" onclick="if(event.target===this)this.remove()">
        <div class="modal" onclick="event.stopPropagation()">
          <div class="modal-title">${title}</div>
          <div class="fg"><label>Display Name *</label><input id="nu_name" value="${esc(u?.displayName||'')}"></div>
          <div class="fg"><label>Username</label><input id="nu_username" value="${esc(u?.username||'')}" placeholder="auto-generated if blank"><span style="font-size:11px;color:var(--muted);">No spaces. Used for identification.</span></div>
          <div class="fg"><label>Email</label><input type="email" id="nu_email" value="${esc(u?.email||'')}"></div>
          <div class="fg"><label>Phone</label><input id="nu_phone" value="${esc(u?.phone||'')}"></div>
          <div class="fg"><label>Role</label>
            <select id="nu_role">
              <option value="standard"${(!u||u.role==='standard')?' selected':''}>Standard User</option>
              <option value="admin"${u?.role==='admin'?' selected':''}>Admin</option>
              <option value="contact"${u?.role==='contact'?' selected':''}>Contact Only</option>
            </select>
          </div>
          <div id="nu_err" class="err"></div>
          <div style="display:flex;gap:8px;margin-top:16px;">
            <button class="btn" style="flex:1" onclick="saveUserModal('${editId||''}')">${u ? 'Save Changes' : 'Create User'}</button>
            <button class="bs" onclick="document.getElementById('addUserBg').remove()">Cancel</button>
          </div>
        </div></div>`;
      const d = document.createElement('div');
      d.innerHTML = html;
      document.body.appendChild(d.firstChild);
    }

    function editUserModal(uid) { addUserModal(uid); }

    function saveUserModal(editId) {
      const name = document.getElementById('nu_name').value.trim();
      if (!name) { document.getElementById('nu_err').textContent = 'Display name is required'; return; }
      const role = document.getElementById('nu_role').value;
      const email = document.getElementById('nu_email').value.trim();
      const phone = document.getElementById('nu_phone').value.trim();
      // Unique email check
      if (email) {
        const conflict = db.users.find(u => u.email && u.email.toLowerCase()===email.toLowerCase() && u.id!==editId);
        if (conflict) { document.getElementById('nu_err').textContent = 'This email is already in use. Log in to recover that account or use a different email.'; return; }
      }
      if (editId) {
        const u = db.users.find(x => x.id === editId);
        if (u) {
          u.displayName = name; u.role = role; u.email = email; u.phone = phone;
          const uname = document.getElementById('nu_username')?.value.trim().replace(/\s+/g,'_');
          if (uname) u.username = uname;
        }
        logAudit('edit_user', { uid: editId, name });
        toast('User updated');
      } else {
        const rawUser = document.getElementById('nu_username')?.value.trim().replace(/\s+/g,'_') || '';
      const username = rawUser || name.toLowerCase().replace(/\s+/g,'_').replace(/[^a-z0-9_]/g,'');
      const u = { id: uuid(), role, displayName: name, username, email, phone,
          address:'', photo:'', status:'active', notifPrefs:{inapp:true,email:false,sms:false}, discoverable:true, createdAt:Date.now() };
        db.users.push(u);
        logAudit('add_user', { uid: u.id, name, role });
        toast('User created');
      }
      save();
      document.getElementById('addUserBg')?.remove();
      renderUsers();
    }

    function impersonateContact(uid) {
      startImpersonate(uid, 'contact');
      toast('Entered contact test mode');
    }

    function banUser(uid) {
      const u = db.users.find(x => x.id === uid);
      if (!u || u.id === db.settings.currentUserId) return;
      u.status = u.status === 'banned' ? 'active' : 'banned';
      save(); logAudit('ban_toggle', { uid, status: u.status }); toast('Status updated'); renderUsers();
    }

    function viewUserRecords(uid) {
      const u = db.users.find(x => x.id === uid);
      if (!u) return;
      const contacts = db.contacts.filter(c => c.userId === uid);
      const entries  = db.entries.filter(e => e.userId === uid);
      const noks     = db.nok.filter(n => n.userId === uid);
      let html = `<div class="modal-bg" onclick="this.remove()"><div class="modal" style="max-width:640px;" onclick="event.stopPropagation()">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
          <div class="modal-title" style="margin:0;">User Records — ${esc(u.displayName)}</div>
          <button class="gh sm" onclick="this.closest('.modal-bg').remove()">✕</button>
        </div>
        <h3>Contacts (${contacts.length})</h3>
        <div class="tbl-wrap" style="margin-bottom:20px;"><table><thead><tr><th>Name</th><th>Tags</th><th>Balance</th></tr></thead><tbody>`;
      contacts.forEach(c => {
        const userEntries = entries.filter(e => e.cId === c.id && e.status !== 'voided');
        let bal = 0;
        userEntries.forEach(e => {
          if (e.txType === 'they_owe_you') bal += e.amount;
          else if (e.txType === 'they_paid_you') bal -= e.amount;
          else if (e.txType === 'you_owe_them') bal -= e.amount;
          else if (e.txType === 'you_paid_them') bal += e.amount;
        });
        html += `<tr><td>${esc(c.name)}</td><td>${(c.tags||[]).join(', ')||'—'}</td><td style="color:${bal>=0?'var(--green)':'var(--red)'};">${fmt(Math.abs(bal))} ${bal>=0?'owed to user':'user owes'}</td></tr>`;
      });
      html += `</tbody></table></div>
        <h3>Entries (${entries.length})</h3>
        <div class="tbl-wrap" style="margin-bottom:20px;"><table><thead><tr><th>Contact</th><th>Type</th><th>Amount</th><th>Date</th><th>Status</th></tr></thead><tbody>`;
      entries.slice(0, 20).forEach(e => {
        const c = db.contacts.find(x => x.id === e.cId);
        html += `<tr><td>${esc(c?.name || '—')}</td><td>${esc(TXL[e.txType] || e.txType)}</td><td>${_fmtAmtCell(e.id)}</td><td>${new Date(e.date).toLocaleDateString()}</td><td>${statusBadge(e.status, e)}</td></tr>`;
      });
      if (entries.length > 20) html += `<tr><td colspan="5" style="color:var(--muted);text-align:center;font-size:12px;">…and ${entries.length - 20} more</td></tr>`;
      html += `</tbody></table></div>`;
      // NOK section — scoped to this user only
      html += `<h3>Next of Kin (${noks.length})</h3>`;
      if (noks.length === 0) {
        html += `<p style="color:var(--muted);font-size:13px;margin-bottom:20px;">No Next of Kin designated for this user.</p>`;
      } else {
        html += `<div style="display:flex;flex-direction:column;gap:8px;margin-bottom:20px;">`;
        noks.forEach(n => {
          const linked = nokLinkedContact(n);
          html += `<div style="background:var(--bg3);border-radius:8px;padding:12px 14px;border:1px solid var(--border);">
            <div style="font-weight:700;">${esc(n.fullName)} <span style="font-size:12px;color:var(--muted);font-weight:400;">${esc(n.relationship||'')}</span></div>
            <div style="font-size:12px;color:var(--muted);margin-top:4px;display:flex;gap:12px;flex-wrap:wrap;">
              ${n.email?`<span>✉ ${esc(n.email)}</span>`:''}
              ${n.phone?`<span>📞 ${esc(n.phone)}</span>`:''}
              <span>Release: ${esc(n.releaseType||'full')}</span>
              ${linked?`<span style="color:var(--green);">🔗 Linked to: ${esc(linked.name)}</span>`:'<span>No linked contact</span>'}
            </div>
          </div>`;
        });
        html += `</div>`;
      }
      html += `<button class="bs sm" style="width:100%;" onclick="this.closest('.modal-bg').remove()">Close</button></div></div>`;
      const d = document.createElement('div');
      d.innerHTML = html;
      document.body.appendChild(d.firstChild);
    }

    async function impersonateUser(uid) {
      toast('Loading user data…', 2000);
      await startImpersonate(uid, 'user');
      toast('Viewing as user — data loaded from server', 3000);
    }

    function changeUserStatus(uid) {
      const u = db.users.find(x => x.id === uid);
      if (!u || u.id === db.settings.currentUserId) return alert('Cannot modify own status');
      u.status = u.status === 'active' ? 'suspended' : 'active';
      save();
      logAudit('change_user_status', { uid, newStatus: u.status });
      toast('Status updated');
      renderUsers();
    }

    function delUser(uid) {
      const u = db.users.find(x => x.id === uid);
      if (!u || u.id === db.settings.currentUserId) return alert('Cannot delete own account');
      if (!confirm(`Delete user "${u.displayName}" and all associated data?`)) return;
      db.users = db.users.filter(x => x.id !== uid);
      db.contacts = db.contacts.filter(c => c.userId !== uid);
      db.entries = db.entries.filter(e => e.userId !== uid);
      db.templates = db.templates.filter(t => t.userId !== uid);
      db.recurring = db.recurring.filter(r => r.userId !== uid);
      db.notifs = db.notifs.filter(n => n.userId !== uid);
      db.nok = db.nok.filter(n => n.userId !== uid);
      save();
      logAudit('delete_user', { uid, name: u.displayName });
      toast('User deleted');
      renderUsers();
    }

    // ============ PAGE: AUDIT LOG ============
    function renderAudit() {
      if (!isAdmin()) return nav('dash');
      const audit = db.audit || [];
      PG['audit'] = PG['audit'] || 1;
      const p = paginate(audit.sort((a, b) => b.ts - a.ts), 'audit');

      let html = `<h2>Audit Log</h2><div class="card">

    function handleProfilePhotoUpload(event) {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = e => {
        curUser().photo = e.target.result;
        save();
        renderSettings();
        toast('Photo updated');
      };
      reader.readAsDataURL(file);
    }

    function handleLogoUpload(event) {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (e) => {
        db.settings.logoData = e.target.result;
        toast('Logo loaded (not saved yet)');
      };
      reader.readAsDataURL(file);
    }

    function handleUserLogoUpload(event) {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = e => {
        curUser().logoData = e.target.result;
        save();
        renderSettings();
        toast('Invoice logo updated');
      };
      reader.readAsDataURL(file);
    }

    function saveInvoiceDisplaySettings() {
      const u = curUser();
      if (!u.invoiceShow) u.invoiceShow = {};
      ['logo','displayName','businessName','email','phone','address'].forEach(k => {
        u.invoiceShow[k] = document.getElementById(`pinvshow_${k}`)?.checked || false;
      });
      save();
      logAudit('update_invoice_display', { uid: u.id });
      toast('Invoice display settings saved');
    }

    async function sendTestEmail() {
      const resultDiv = document.getElementById('testEmailResult');
      resultDiv.innerHTML = '<p style="color:var(--muted);font-size:13px;">Sending test email…</p>';

      const res = await fetch('/api/auth/reset-request', {
        method: 'POST',
        credentials: 'include',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: curUser().email })
      }).then(r => r.json()).catch(e => ({ ok: false, error: e.message }));

      logEmail('test', curUser().email, res.ok ? 'sent' : 'failed', res.error || null);

      if (res.ok) {
        resultDiv.innerHTML = `<div style="padding:10px 14px;background:rgba(74,222,128,.15);border-radius:8px;color:var(--green);font-size:13px;font-weight:600;">✓ Email sent successfully to ${esc(curUser().email)}</div>`;
      } else {
        resultDiv.innerHTML = `<div style="padding:10px 14px;background:rgba(248,113,113,.15);border-radius:8px;color:var(--red);font-size:13px;font-weight:600;">✗ Email failed: ${esc(res.error || 'Unknown error')}</div>`;
      }
    }

      if (document.getElementById('snotifsend'))  saveNotifDefaults(true);
      save();
      updateUserInfo();
      logAudit('save_all_admin_settings', {});
      toast('✅ All settings saved');
    }
