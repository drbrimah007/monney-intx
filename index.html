    // Track which userId's data has been injected into db for impersonation
    let _impersonatingDataUserId = null;

    async function startImpersonate(userId, mode) {
      if (!isAdmin()) return;

      // Remove any previously injected impersonation data
      _stripImpersonateData(_impersonatingDataUserId);

      db.settings.impersonating = { userId, mode };
      // Cancel any pending debounced sync — we don't want stale state pushed to server
      clearTimeout(_syncTimer); _syncTimer = null;

      // If on server, fetch the real user blob and inject into db in-memory
      // so the admin sees the user's actual entries/contacts/templates.
      if (_IS_SERVER && mode === 'user') {
        try {
          const tok = localStorage.getItem('mxi_token');
          const headers = { 'Content-Type': 'application/json' };
          if (tok) headers['Authorization'] = 'Bearer ' + tok;
          const r = await fetch('/api/admin/user-data?userId=' + encodeURIComponent(userId), {
            credentials: 'include', headers
          });
          if (r.ok) {
            const { data, sharedRecords, user: impUser } = await r.json();
            // Merge their entries/contacts/templates into db in-memory only (NOT saved)
            (data.entries      || []).forEach(e => { if (!db.entries.find(x=>x.id===e.id))      db.entries.push(e); });
            (data.contacts     || []).forEach(c => { if (!db.contacts.find(x=>x.id===c.id))     db.contacts.push(c); });
            (data.templates    || []).forEach(t => { if (!db.templates.find(x=>x.id===t.id))    db.templates.push(t); });
            (data.recurring    || []).forEach(r => { if (!db.recurring.find(x=>x.id===r.id))    db.recurring.push(r); });
            (data.groups       || []).forEach(g => { if (!db.groups.find(x=>x.id===g.id))       db.groups.push(g); });
            (data.investments  || []).forEach(i => { if (!db.investments.find(x=>x.id===i.id))  db.investments.push(i); });
            (data.nok          || []).forEach(n => { if (!db.nok.find(x=>x.id===n.id))          db.nok.push(n); });
            (data.assetLockers || []).forEach(l => { if (!db.assetLockers.find(x=>x.id===l.id)) db.assetLockers.push(l); });
            (data.notifs       || []).forEach(n => { if (!db.notifs.find(x=>x.id===n.id))       db.notifs.push(n); });
            // Inject the impersonated user's record so curUser() resolves to them
            // (not the admin fallback), ensuring myContacts/myEntries filter correctly.
            if (impUser && !db.users.find(u => u.id === impUser.id)) {
              db.users.push({ id: impUser.id, name: impUser.username || impUser.email || '', email: impUser.email || '', role: impUser.role || 'standard' });
            }
            _impersonatingDataUserId = userId;

            // Load confirmed shared records for the impersonated user and run
            // the same migration _loadSharedWithMe would run — ensures admin
            // sees the user's incoming shared entries in Entries and balance totals.
            if (sharedRecords && sharedRecords.length > 0) {
              _cachedSharedRecords = sharedRecords;
              for (const mr of sharedRecords) {
                if (mr.confirmed && !mr.recipientClosed && !(mr.entry?.dismissed)) {
                  const _existingE = db.entries.find(e => e.shareToken === mr.token);
                  if (!_existingE || _existingE.noLedger || !_existingE.cId) {
                    _insertSharedEntry(mr);
                  }
                }
              }
            }
          }
        } catch(_) { /* non-critical — fall back to empty view */ }
      }

      // Save only the admin's own settings flag — do NOT push merged data to server
      save();
      renderImpersonateBanner();
      renderNav();
      nav('dash');
    }

    function _stripImpersonateData(userId) {
      if (!userId) return;
      // Remove entries/contacts/templates/users that were injected for impersonation
      const adminId = db.settings.sessionUserId;
      db.entries      = db.entries.filter(e => e.userId === adminId || e.userId === 'admin_001');
      db.contacts     = db.contacts.filter(c => c.userId === adminId || c.userId === 'admin_001');
      db.templates    = db.templates.filter(t => t.userId === adminId || t.userId === 'admin_001');
      db.recurring    = db.recurring.filter(r => r.userId === adminId || r.userId === 'admin_001');
      db.groups       = db.groups.filter(g => (g.userId === adminId || g.userId === 'admin_001') && !g._impersonated);
      db.investments  = db.investments.filter(i => (i.userId === adminId || i.userId === 'admin_001') && !i._impersonated);
      db.nok          = db.nok.filter(n => n.userId === adminId || n.userId === 'admin_001');
      db.assetLockers = db.assetLockers.filter(l => l.userId === adminId || l.userId === 'admin_001');
      db.notifs       = db.notifs.filter(n => n.userId === adminId || n.userId === 'admin_001');
      db.users        = db.users.filter(u => u.id === adminId || u.id === 'admin_001' || u.role === 'admin');
      _impersonatingDataUserId = null;
    }

    function stopImpersonate() {
      _stripImpersonateData(_impersonatingDataUserId);
      db.settings.impersonating = null;
      save();
      renderImpersonateBanner();
      renderNav();
      nav('dash');

    function nav(page, _skipHash) {
      if (document.getElementById('nav').classList.contains('open')) toggleMobileNav();
      // Clean up bulk bar + select mode when navigating away from entries
      if (page !== 'entries') { document.getElementById('_bulkBar')?.remove(); window._selectMode = false; window._selectedEntries = new Set(); }
      const role = curRole();
      if (page === 'dash' && (role === 'admin' || role === 'standard' || role === 'contact')) { _curPage = 'dash'; renderDash(); }
      else if (page === 'contacts' && (role === 'admin' || role === 'standard')) { _curPage = 'contacts'; renderContacts(); }
      else if (page === 'entries') { _curPage = 'entries'; renderEntries(); }
      else if (page === 'templates' && (role === 'admin' || role === 'standard')) { _curPage = 'templates'; renderTemplates(); }
      else if (page === 'templatedb' && (role === 'admin' || role === 'standard')) { _curPage = 'templatedb'; renderTemplateDB(); }
      else if (page === 'recurring' && (role === 'admin' || role === 'standard')) { _curPage = 'recurring'; renderRecurring(); }
      else if (page === 'notifs') { _curPage = 'notifs'; renderNotifs(); }
      else if (page === 'groups' && (role === 'admin' || role === 'standard')) { _curPage = 'groups'; renderGroups(); }
      else if (page === 'investments' && (role === 'admin' || role === 'standard')) { _curPage = 'investments'; renderInvestments(); }
      else if (page === 'nok' && (role === 'admin' || role === 'standard')) { _curPage = 'nok'; renderNok(); }
      else if (page === 'users' && isAdmin()) { _curPage = 'users'; renderUsers(); }
      else if (page === 'audit' && isAdmin()) { _curPage = 'audit'; renderAudit(); }
      else if (page === 'settings') { _curPage = 'settings'; renderSettings(); }
      else { nav('dash'); return; }
      // Keep the URL hash in sync so refresh restores the same page
      if (!_skipHash) history.replaceState(null, '', '#' + _curPage);
      renderNav(); // refresh active tab highlight
    }

          <div class="stat-card"><div class="stat-lbl">Accepted</div><div class="stat-val" style="color:var(--green)">${sharedEntries.filter(e=>e.status==='accepted').length}</div></div>
        </div>`;

        if (sharedEntries.length === 0) {
          html += `<p style="color:var(--muted);font-size:14px;padding:16px 0;">No shared entries yet.</p>`;
        } else {
          html += `<div class="tbl-wrap"><table><thead><tr><th>Amount</th><th>Type</th><th>Date</th><th>Status</th></tr></thead><tbody>`;
          sharedEntries.slice(0, 10).forEach(e => {
            html += `<tr><td><strong>${fmt(e.amount, e.currency)}</strong></td><td>${`<span style="font-weight:700;color:${txTypeColor(e.txType)}">${esc(TXL[e.txType]||e.txType)}</span>`}</td><td>${new Date(e.date).toLocaleDateString()}</td><td>${statusBadge(e.status, e)}</td></tr>`;
          });

        }
        html += `</div>`;

      // ── ADMIN ROLE ───────────────────────────────────────────────────
      } else if (role === 'admin') {

    let _sharedWithMeRunning = false;
    async function _loadSharedWithMe() {
      if (_sharedWithMeRunning) return; // prevent parallel execution
      _sharedWithMeRunning = true;
      try { await _loadSharedWithMeInner(); } finally { _sharedWithMeRunning = false; }

    // ── Load groups/investments where current user is an invited member ──
    // Shared items are merged INTO db.groups/db.investments with _shared flag.
    // _saveSharedItem() pushes mutations back to the owner's blob via server.
    window._sharedGroupIds = new Set();
    window._sharedInvestmentIds = new Set();

    async function _loadSharedGroupsAndInvestments() {
      try {
        const _tok = localStorage.getItem('mxi_token');
        const _headers = {};
        if (_tok) _headers['Authorization'] = 'Bearer ' + _tok;
        const res = await fetch('/api/shared-groups', { credentials: 'include', headers: _headers });
        if (!res.ok) return;
        const { groups, investments } = await res.json();

        // Remove old shared items from db arrays
        if (!db.groups) db.groups = [];
        if (!db.investments) db.investments = [];
        db.groups = db.groups.filter(g => !g._shared);
        db.investments = db.investments.filter(i => !i._shared);

        // Merge new shared items in.
        // After filtering out all _shared items above, we add server-returned items.
        // Guard against edge case: if user owns an item with same ID (shouldn't happen
        // but protects against data corruption), skip it to avoid duplicates.
        window._sharedGroupIds = new Set();
        window._sharedInvestmentIds = new Set();
        for (const g of (groups || [])) {
          const existingIdx = db.groups.findIndex(x => x.id === g.id);
          if (existingIdx >= 0) {
            // Local (owned) item with same ID exists — don't duplicate, but still track
            console.warn('[shared-groups] skipping shared group with duplicate local ID:', g.id);
          } else {
            db.groups.push(g);
          }
          window._sharedGroupIds.add(g.id);
        }
        for (const inv of (investments || [])) {
          const existingIdx = db.investments.findIndex(x => x.id === inv.id);
          if (existingIdx >= 0) {
            console.warn('[shared-groups] skipping shared investment with duplicate local ID:', inv.id);
          } else {
            db.investments.push(inv);
          }
          window._sharedInvestmentIds.add(inv.id);
        }

        if (_curPage === 'groups') renderGroups();
        if (_curPage === 'investments') renderInvestments();
      } catch (e) {
        console.error('[shared-groups] load failed:', e.message);
      }
    }

    // Save a shared item back to the owner's blob via server
    async function _saveSharedItem(item, collection) {
      if (!item._shared) {
        // Local item — just save normally
        await saveNow();
        return;
      }
      // Shared item — push update to server
      // Stamp a _lastModified timestamp for optimistic concurrency
      item._lastModified = Date.now();
      item._lastModifiedBy = curUser().id || curUser().email;
      try {
        const _tok = localStorage.getItem('mxi_token');
        const _headers = { 'Content-Type': 'application/json' };
        if (_tok) _headers['Authorization'] = 'Bearer ' + _tok;
        const cleanItem = { ...item };
        delete cleanItem._shared;
        delete cleanItem._ownerUserId;
        const res = await fetch('/api/shared-groups', {
          method: 'POST', credentials: 'include', headers: _headers,
          body: JSON.stringify({ action: 'update-item', itemId: item.id, collection, updatedItem: cleanItem })
        });
        if (!res.ok) {
          const errBody = await res.json().catch(() => ({}));
          console.error('[saveSharedItem] server rejected:', res.status, errBody.error);
          if (res.status === 403) {
            toast('Permission denied — you may no longer be a member');
          } else {
            toast('Failed to save — server error (' + res.status + ')');
          }
          // Reload shared items to get the authoritative server state
          await _loadSharedGroupsAndInvestments();
          return;
        }
        const body = await res.json().catch(() => ({}));
        if (body.ok && !body.updated) {
          console.warn('[saveSharedItem] item not found in any blob — may have been deleted');
          toast('Item not found — it may have been removed');
          await _loadSharedGroupsAndInvestments();
        }
      } catch (e) {
        console.error('[saveSharedItem]', e.message);
        toast('Failed to save — check connection');
      }
    }


    async function _loadSharedWithMeInner() {
      const el = document.getElementById('shared-with-me');
      // Note: el may be null if we're on the entries page — that's fine, we still load the data
      try {
        const _swmHeaders = {};
        const _swmTok = localStorage.getItem('mxi_token');
        if (_swmTok) _swmHeaders['Authorization'] = 'Bearer ' + _swmTok;
        const res  = await fetch('/api/share?linked=1&_t=' + Date.now(), { credentials: 'include', cache: 'no-store', headers: _swmHeaders });
        const data = await res.json();
        if (!data.ok || !data.shared || data.shared.length === 0) {
          // Populate entries-page placeholder with empty state if it exists
          const entriesEl = document.getElementById('entries-shared-with-me');
          if (entriesEl) entriesEl.innerHTML = '';
          return;
        }
        // Filter out any reverse backfill tokens (entry_data.isShared === true).
        // These are artifacts from an old backfill bug that processed received isShared entries,
        // creating tokens pointing back to the original sender. Filtering here prevents them
        // from appearing as fake "Shared With You" records or causing wrong-direction reminders.
        const records = data.shared.filter(r => !r.entry?.isShared);
        _cachedSharedRecords = records; // cache for UI rendering — confirmed records are in db.entries (isShared:true)

        // ── Migration: Unified Record Layer ──────────────────────────────────
        // For any already-confirmed shared records not yet in db.entries, insert them now.
        // This is idempotent (_insertSharedEntry checks for existing shareToken).
        if (!_impersonatingDataUserId) {
          let migrated = false;
          for (const mr of records) {
            // Auto-confirm SELLER-initiated settlement receipts regardless of dismissed status.
            // These are not optional — they're settlement proof that must affect the ledger.
            const _isSellerReceipt = mr.entry && !mr.entry.settledByRecipient && (
              mr.entry.linkedInvoiceId ||
              mr.entry.txType === 'they_paid_you' || mr.entry.txType === 'you_paid_them'
            );
            if (!mr.confirmed && _isSellerReceipt) { mr.confirmed = true; }
            // Settlement receipts bypass dismissed check — all others require it
            if (mr.confirmed && !mr.recipientClosed && (_isSellerReceipt || !(mr.entry?.dismissed))) {
              const _existingE = db.entries.find(e => e.shareToken === mr.token);
              // Run _insertSharedEntry if:
              //   (a) entry doesn't exist yet — initial migration
              //   (b) entry exists but still has noLedger:true — needs cleanup from old code
              //   (c) entry exists but cId is null — auto-contact creation missed it
              if (!_existingE || _existingE.noLedger || !_existingE.cId) {
                _insertSharedEntry(mr);
                migrated = true;
              } else if (_existingE && mr.entry) {
                // ── Status + amount sync: keep recipient's isShared entry in sync with token ──
                let _entryChanged = false;
                // Don't overwrite 'payment'/'receipt' status on receipt entries with 'settled' from token
                const _isReceiptEntry = _existingE.isReceipt || _existingE.settledByRecipient || _existingE.linkedInvoiceId;
                const _skipStatusSync = _isReceiptEntry && _existingE.status === 'payment' && (mr.entry.status === 'settled' || !mr.entry.status);
                if (mr.entry.status && _existingE.status !== mr.entry.status && !_skipStatusSync) {
                  _existingE.status = mr.entry.status; _entryChanged = true;
                }
                if (mr.entry.settledAmt != null && _existingE.settledAmt !== mr.entry.settledAmt) {
                  _existingE.settledAmt = mr.entry.settledAmt; _entryChanged = true;
                }
                if (mr.entry.remaining != null && _existingE.remaining !== mr.entry.remaining) {
                  _existingE.remaining = mr.entry.remaining; _entryChanged = true;
                }
                if (mr.entry.fulfilledAt && !_existingE.fulfilledAt) {
                  _existingE.fulfilledAt = mr.entry.fulfilledAt; _entryChanged = true;
                }
                // Refresh fromName on the entry if the token has a better (non-email) name.
                // Also queue a contact-name suggestion if BOTH names are real (not emails)
                // so the user can decide whether to update their contact record too.
                if (mr.entry.fromName && mr.entry.fromName !== _existingE.fromName) {
                  const _newIsEmail = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(mr.entry.fromName);
                  const _oldIsEmail = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(_existingE.fromName || '');
                  if (!_newIsEmail || _oldIsEmail) {
                    const _prevName = _existingE.fromName;
                    _existingE.fromName = mr.entry.fromName; _entryChanged = true;
                    // Both real names → queue contact-name suggestion so user can decide
                    if (!_newIsEmail && !_oldIsEmail && _existingE.cId) {
                      const _c = db.contacts.find(x => x.id === _existingE.cId);
                      if (_c && _c.name === _prevName) {
                        if (!db.settings._pendingNameSuggestions) db.settings._pendingNameSuggestions = [];
                        const _already = db.settings._pendingNameSuggestions.some(
                          s => s.contactId === _existingE.cId && s.newName === mr.entry.fromName
                        );
                        if (!_already) {
                          db.settings._pendingNameSuggestions.push({
                            id: uuid(), contactId: _existingE.cId,
                            oldName: _prevName, newName: mr.entry.fromName,
                            detectedAt: Date.now()
                          });
                        }
                      }
                    }
                  }
                }
                // Settlement credits handled by auto-confirmed seller receipt tokens.
                if (_entryChanged) migrated = true;
              }
            }
          }
          if (migrated) {
            try { await saveNow(); } catch(_) { save(); }
          }
        }

        // ── Auto-add senders as contacts (catch-up) ───────────────────────
        // Runs every time shared records load — ensures senders are always in contacts.
        // Also unifies sender identity: if fromName looks like an email and we find
        // a contact with that email, we patch the entry_data display name in-memory.
        if (!_impersonatingDataUserId) {
          const u = curUser();
          if (u) {
            let contactAdded = false;
            for (const r of records) {
              const e = r.entry;
              if (!e) continue;

              // ── Identity unification ────────────────────────────────────
              // If fromName looks like an email, try to resolve to a real contact name
              const _looksLikeEmail = s => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(s||'');
              if (_looksLikeEmail(e.fromName)) {
                const emailLower = (e.fromName||'').toLowerCase().trim();
                // Check contacts first
                const byEmail = db.contacts.find(c =>
                  c.userId === u.id && (c.email||'').toLowerCase().trim() === emailLower
                );
                if (byEmail && byEmail.name && !_looksLikeEmail(byEmail.name)) {
                  e._resolvedFromName = byEmail.name;
                } else {
                  // Fallback: check db.users for a registered user with that email
                  const byUser = db.users.find(u2 => (u2.email||'').toLowerCase() === emailLower);
                  if (byUser && byUser.displayName && !_looksLikeEmail(byUser.displayName)) {
                    e._resolvedFromName = byUser.displayName;
                  } else {
                    // Last resort: use username part of email
                    e._resolvedFromName = emailLower.split('@')[0].replace(/[._]/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
                  }
                }
              }

              // ── Auto-add contact if not found by name or email ──────────
              const displayName = e._resolvedFromName || e.fromName;
              if (!displayName) continue;
              const nameLower  = displayName.toLowerCase().trim();
              const emailLower2 = (e.fromEmail || (e.contactEmail) || '').toLowerCase().trim();
              const exists = db.contacts.find(c =>
                c.userId === u.id && (
                  (c.name || '').toLowerCase().trim() === nameLower ||
                  (emailLower2 && (c.email||'').toLowerCase().trim() === emailLower2)
                )
              );
              if (!exists) {
                db.contacts.push({
                  id: uuid(), userId: u.id,
                  name: displayName,
                  email: emailLower2 || '',
                  phone: '', address: '', notes: 'Added from shared record',
                  tags: [], archived: false, photo: '', linkedUserId: null,
                  createdAt: Date.now()
                });
                contactAdded = true;
              }
            }
            if (contactAdded) {
              saveNow().catch(() => {}); // non-blocking, best-effort
            }
          }
        }

        // If contacts page is open, refresh it so balances reflect shared records
        if (_curPage === 'contacts') renderContacts();
        // If entries page is open, re-render so tab counts + shared rows update
        // Use _sharedLoadInProgress flag to prevent re-entrant loop
        if (_curPage === 'entries' && !window._sharedLoadInProgress) {
          window._sharedLoadInProgress = true;
          renderEntries();
          window._sharedLoadInProgress = false;
        }
        // If dashboard is open, refresh the Recent Entries section to include shared records
        if (_curPage === 'dash') {
          const dashCard = document.getElementById('dash-recent-entries-card');
          if (dashCard) {
            // Re-run renderDash to pick up newly loaded shared records
            // Use a flag to prevent recursive loops
            if (!window._dashSharedLoading) {
              window._dashSharedLoading = true;
              renderDash();
              window._dashSharedLoading = false;
            }
          }
        }
        // If there are shared records, hide the onboarding CTA
        const ctaEl = document.getElementById('first-entry-cta');
        if (ctaEl) ctaEl.style.display = 'none';

        // Lower panel removed — shared records are now integrated into
        // Recent Entries (dashboard) and the Shared With Me tab (entries page).
        // Clear any leftover panel content
        const el2 = document.getElementById('shared-with-me');
        if (el2) el2.innerHTML = '';
        const justLinked = sessionStorage.getItem('justLinkedShare');
        if (justLinked) sessionStorage.removeItem('justLinkedShare');

        // ── Update balance stat cards with shared-with-me amounts ──────────
        // txType is from SENDER's perspective:
        //   sender "they_owe_you"/"invoice"/"lend" → we (recipient) OWE the sender
        // Shared-with-me records are informational only — they do NOT affect balance.
        // Dashboard stat cards use getLedger() which only counts own entries.
        const toyEl = document.getElementById('stat_shared_toy');
        const yotEl = document.getElementById('stat_shared_yot');
        if (toyEl || yotEl) {
          const _u2 = curUser();
          const _myC2 = db.contacts.filter(c => c.userId === _u2.id && !c.archived);
          let _tot2Toy = 0, _tot2Yot = 0;
          _myC2.forEach(c => { const l = getLedger(c.id); _tot2Toy += l.toy; _tot2Yot += l.yot; });
          if (toyEl) toyEl.textContent = fmt(_tot2Toy);
          if (yotEl) yotEl.textContent = fmt(_tot2Yot);
        }

        // Scroll to it if this is a fresh link
        if (justLinked) {
          const scrollTarget = el || entriesSharedEl;
          if (scrollTarget) setTimeout(() => scrollTarget.scrollIntoView({ behavior: 'smooth', block: 'start' }), 150);
        }
      } catch(_) {}
    }

    // ============ PAGE: ENTRIES ============
    // Helper: does a field value count as "filled"?
    // Numbers: non-zero. Strings: non-empty. Everything else: truthy.
    function _fieldHasValue(v) {
      if (v === null || v === undefined) return false;
      const s = String(v).trim();
      if (s === '') return false;
      const n = parseFloat(s);
      if (!isNaN(n) && String(n) === s) return n !== 0;  // pure numeric
      return true; // non-empty string (e.g. item name, text field)
    }

    /* ── Build visible field list from entry templateData ───────────── */
    function _visibleEntryFields(e, tpl) {
      const tplFieldDefs = tpl ? (tpl.fields || []) : [];
      const tplDataMap   = e.templateData || {};
      const orderedIds   = tplFieldDefs.length
        ? tplFieldDefs.map(f => f.id).filter(id => tplDataMap[id])
        : Object.keys(tplDataMap);
      return orderedIds.map(id => {
        const fd  = tplDataMap[id];
        const def = tplFieldDefs.find(f => f.id === id);
        if (!fd) return null;
        // Paired field: visible if it has at least one non-empty row
        if (fd.type === 'paired') {
          const hasRows = fd.rows && fd.rows.some(r => r.text || r.numeric);
          return hasRows ? { ...fd, id } : null;
        }
        // Computed result field
        if (fd.computed) {
          const calcs = def?.calculators || [];
          const anyVisible = calcs.length === 0 || calcs.some(c => c.resultVisible !== false);
          return (anyVisible && _fieldHasValue(fd.value)) ? { ...fd, id } : null;
        }
        // Regular input field
        return _fieldHasValue(fd.value) ? { ...fd, id } : null;
      }).filter(Boolean);
    }

            ${companyName ? `<div style="font-size:12px;color:#555;margin-top:2px;">${esc(companyName)}</div>` : ''}
            ${fromAddr  ? `<div style="font-size:11px;color:#777;margin-top:3px;white-space:pre-line;">${esc(fromAddr)}</div>`  : ''}
            ${fromEmail ? `<div style="font-size:11px;color:#777;">${esc(fromEmail)}</div>` : ''}
            ${fromPhone ? `<div style="font-size:11px;color:#777;">${esc(fromPhone)}</div>` : ''}
          </div>

          <!-- RIGHT: Document label + number + date + status -->
          <div style="text-align:right;">
            <div style="font-size:34px;font-weight:900;letter-spacing:.01em;text-transform:uppercase;color:#111;line-height:1;">${docLabel}</div>
            ${docId ? `<div style="font-size:13px;font-weight:700;color:#555;margin-top:5px;"># ${esc(docId)}</div>` : ''}
            <div style="margin-top:8px;">
              <div style="font-size:11px;color:#888;text-transform:uppercase;letter-spacing:.06em;">Date</div>
              <div style="font-weight:700;font-size:13px;">${dateStr}</div>
            </div>
            <div style="margin-top:8px;">${_docStatusChip(invSt.status, e)}</div>
          </div>
        </div>

        <!-- Parties: Bill To (left) | From / Issued By (right) -->
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:28px;margin-bottom:28px;padding-bottom:20px;border-bottom:1px solid #e5e5e5;">
          <div>
            <div style="font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#aaa;margin-bottom:6px;font-weight:700;">Bill To</div>
            <div style="font-weight:800;font-size:15px;">${esc(contact?.name||'—')}</div>
            ${contact?.email   ? `<div style="font-size:12px;color:#555;margin-top:3px;">${esc(contact.email)}</div>`  : ''}
            ${contact?.phone   ? `<div style="font-size:12px;color:#555;">${esc(contact.phone)}</div>`                : ''}
            ${contact?.address ? `<div style="font-size:12px;color:#555;margin-top:3px;white-space:pre-line;">${esc(contact.address)}</div>` : ''}
          </div>
          <div>
            <div style="font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#aaa;margin-bottom:6px;font-weight:700;">Issued By</div>
            <div style="font-weight:800;font-size:15px;">${esc(fromName)}</div>
            ${companyName ? `<div style="font-size:12px;color:#555;margin-top:3px;">${esc(companyName)}</div>` : ''}
            ${fromEmail ? `<div style="font-size:12px;color:#555;margin-top:3px;">${esc(fromEmail)}</div>` : ''}
            ${fromPhone ? `<div style="font-size:12px;color:#555;">${esc(fromPhone)}</div>` : ''}
            ${tpl       ? `<div style="font-size:11px;color:#aaa;margin-top:4px;font-style:italic;">${esc(tpl.name)}</div>` : ''}
          </div>
        </div>`;

      // Line items — paired fields render as row tables; text/numeric fields as simple rows
      if (inFields.length) {
        doc += `<table style="width:100%;border-collapse:collapse;margin-bottom:4px;"><tbody>`;

        // Track whether we're currently inside a paired section to avoid re-emitting its header
        let lastPairedId = null;
        inFields.forEach((f, i) => {
          if (f.type === 'paired') {
            // Paired field: group label + column header row, then data rows
            if (f.id !== lastPairedId) {
              lastPairedId = f.id;
              const txtLbl = f.textLabel || 'Item';
              const numLbl = f.numericLabel || 'Amount';
              doc += `<tr style="background:#f0f0f0;border-top:2px solid #111;">
                <td colspan="2" style="padding:6px 10px;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:#555;">${esc(f.label)}</td>
              </tr>
              <tr style="border-bottom:1px solid #ccc;">
                <td style="padding:4px 10px;font-size:10px;font-weight:700;color:#888;text-transform:uppercase;">${esc(txtLbl)}</td>
                <td style="padding:4px 10px;font-size:10px;font-weight:700;color:#888;text-transform:uppercase;text-align:right;">${esc(numLbl)}</td>
              </tr>`;
            }
            // Data rows (skip empty) — qty × price → effective value; qty itself not shown
            (f.rows || []).filter(r => r.text || r.numeric).forEach((r, ri) => {
              const _effAmt = (r.qty && r.numeric) ? r.qty * r.numeric : (r.numeric || 0);
              doc += `<tr style="background:${ri%2===0?'#fafafa':'#fff'};border-bottom:1px solid #eee;">
                <td style="padding:10px;">${esc(r.text||'')}</td>
                <td style="padding:10px;font-weight:600;text-align:right;">${_effAmt ? fmt(_effAmt, e.currency) : '—'}</td>
              </tr>`;
            });
          } else {
            // Regular text or numeric input field
            lastPairedId = null;
            const v    = f.value;
            const numV = parseFloat(v);
            const isN  = !isNaN(numV) && String(v).trim() !== '';
            doc += `<tr style="background:${i%2===0?'#fafafa':'#fff'};border-bottom:1px solid #eee;border-top:${i===0?'2px solid #111':'none'}">
              <td style="padding:10px;">${esc(f.label)}</td>
              <td style="padding:10px;font-weight:600;text-align:right;">${isN ? fmt(numV, e.currency) : esc(String(v))}</td>
            </tr>`;
          }
        });

        doc += `</tbody></table>`;
      }

      // Computed results summary
      if (calcF.length) {
        doc += `<div style="margin:${inFields.length?'0':'8px'} 0 20px;">`;
        calcF.forEach((f, i) => {
          const last = i === calcF.length - 1;
          doc += `<div style="display:flex;justify-content:space-between;align-items:center;
              padding:${last?'14px 10px':'9px 10px'};
              border-top:${i===0?'2px solid #111':'1px solid #e0e0e0'};
              ${last?'border-bottom:2px solid #111;':''}">
            <span style="font-size:${last?'14px':'13px'};font-weight:${last?'800':'500'};color:${last?'#111':'#555'};${last?'text-transform:uppercase;letter-spacing:.04em;':''}">${esc(f.label)}</span>
            <span style="font-size:${last?'22px':'15px'};font-weight:${last?'900':'600'};color:${last?'#111':'#333'};">${fmt(parseFloat(f.value)||0, e.currency)}</span>
          </div>`;
        });
        doc += `</div>`;
      }

      // Total / Settlement block — clean white, no dark card, live data
      if (e.amount) {
        doc += `<div style="display:flex;justify-content:flex-end;margin-bottom:28px;">
          <div style="border:2px solid #111;border-radius:8px;padding:16px 24px;min-width:260px;">`;
        if (invSt.settled > 0) {
          doc += `
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
              <span style="font-size:12px;color:#666;text-transform:uppercase;letter-spacing:.06em;">Invoice Total</span>
              <span style="font-size:14px;font-weight:700;">${fmt(invSt.total, e.currency)}</span>
            </div>
            <div style="display:flex;justify-content:space-between;align-items:center;padding-bottom:10px;border-bottom:1px solid #ddd;margin-bottom:10px;">
              <span style="font-size:12px;color:#059669;text-transform:uppercase;letter-spacing:.06em;">Settled</span>
              <span style="font-size:14px;font-weight:700;color:#059669;">− ${fmt(invSt.settled, e.currency)}</span>
            </div>
            <div style="display:flex;justify-content:space-between;align-items:center;">
              <span style="font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;">Remaining</span>
              <span style="font-size:26px;font-weight:900;color:${invSt.remaining<=0?'#059669':'#111'};">${fmt(invSt.remaining, e.currency)}</span>
            </div>`;
        } else {
          doc += `
            <div style="display:flex;justify-content:space-between;align-items:center;">
              <span style="font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;">Total Due</span>
              <span style="font-size:30px;font-weight:900;">${fmt(e.amount, e.currency)}</span>
            </div>`;
        }
        doc += `</div></div>`;
      }

      // Note
      if (e.note) {
        doc += `<div style="background:#f8f8f8;border-left:4px solid #ccc;border-radius:4px;padding:12px 16px;margin-bottom:20px;">
          <div style="font-size:10px;color:#aaa;text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px;">Note</div>
          <div style="font-size:13px;color:#333;">${esc(e.note)}</div>
        </div>`;
      }

      // Attached documents
      if (e.attachments && e.attachments.length) {
        doc += `<div style="margin-bottom:20px;">
          <div style="font-size:10px;color:#aaa;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;">Attachments</div>`;
        e.attachments.forEach(att => {
          if (att.type && att.type.startsWith('image/')) {
            doc += `<div style="margin-bottom:8px;">
              <div style="font-size:11px;color:#666;margin-bottom:4px;">${esc(att.name)}</div>
              <img src="${att.data}" alt="${esc(att.name)}" style="max-width:100%;max-height:300px;border-radius:6px;border:1px solid #e5e5e5;">
            </div>`;
          } else {
            doc += `<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;padding:8px 12px;background:#f8f8f8;border:1px solid #e5e5e5;border-radius:6px;">
              <span style="font-size:18px;">📄</span>
              <a href="${att.data}" download="${esc(att.name)}" style="font-size:12px;color:#4a45a8;text-decoration:underline;font-weight:600;">${esc(att.name)}</a>
            </div>`;
          }
        });
        doc += `</div>`;
      }

      // Fulfillment details (if fulfilled)
      if (e.status === 'fulfilled' && (e.fulfillTracking || e.fulfillBol || e.fulfillNotes)) {
        doc += `<div style="margin-top:20px;padding:14px 16px;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;">
          <div style="font-size:12px;font-weight:700;color:#16a34a;margin-bottom:6px;">✅ Fulfillment Details</div>
          ${e.fulfillTracking ? `<div style="font-size:12px;color:#333;margin-bottom:3px;"><strong>Tracking:</strong> ${esc(e.fulfillTracking)}</div>` : ''}
          ${e.fulfillBol ? `<div style="font-size:12px;color:#333;margin-bottom:3px;"><strong>BOL / Ref:</strong> ${esc(e.fulfillBol)}</div>` : ''}
          ${e.fulfillNotes ? `<div style="font-size:12px;color:#333;white-space:pre-line;"><strong>Notes:</strong> ${esc(e.fulfillNotes)}</div>` : ''}
          ${e.fulfilledAt ? `<div style="font-size:10px;color:#888;margin-top:4px;">Fulfilled: ${new Date(e.fulfilledAt).toLocaleString()}</div>` : ''}
        </div>`;
      }

      // Invoice signature (only if toggle is on and text exists)
      const _invSig = (curUser().invoiceShow?.signature !== false) ? curUser().invoiceSignature : null;
      if (_invSig) {
        doc += `<div style="margin-top:24px;padding:16px 0;border-top:1px solid #e8e8e8;">
          <div style="font-size:13px;color:#333;white-space:pre-line;line-height:1.6;">${esc(_invSig)}</div>
        </div>`;
      }

      doc += `<div style="margin-top:${_invSig?'12px':'28px'};padding-top:14px;border-top:1px solid #e8e8e8;display:flex;align-items:center;justify-content:flex-end;flex-wrap:wrap;gap:8px;">
        ${platformLogoSrc
          ? `<div style="display:flex;align-items:center;">${platformLogoHtml}</div>`
          : `<div style="font-size:10px;color:#aaa;">${esc(appName)}</div>`}
      </div>`;

      const canSettle = (invSt.remaining > 0 && e.status !== 'voided');
      const actionBar = `
        ${canSettle ? `<button onclick="recordSettlement('${e.id}')" style="background:#065f46;color:#fff;border:none;border-radius:6px;padding:9px 18px;font-size:13px;font-weight:700;cursor:pointer;">✅ Record Settlement</button>` : ''}
        <button onclick="_downloadEntryPDF('${e.id}')" style="background:#4a45a8;color:#fff;border:none;border-radius:6px;padding:9px 18px;font-size:13px;font-weight:700;cursor:pointer;">📄 PDF</button>
        <button onclick="window.print()" style="background:#111;color:#fff;border:none;border-radius:6px;padding:9px 18px;font-size:13px;font-weight:700;cursor:pointer;">🖨 Print</button>
        <button onclick="document.getElementById('invoicePrintWrap').remove()" style="background:#fff;color:#111;border:1px solid #ccc;border-radius:6px;padding:9px 18px;font-size:13px;font-weight:600;cursor:pointer;">Close</button>`;

      _showDocPopup(doc, actionBar);
    }

    /* ═══════════════════════════════════════════════════════════════════
       MODE B — TRANSACTION RECORD  (ledger entries — no invoice layout)
    ═══════════════════════════════════════════════════════════════════ */
    function _renderTransactionDoc(e) {
      const contact = db.contacts.find(x => x.id === e.cId);
      const co      = db.settings.company || {};
      const fromUser = curUser();
      const dateStr = new Date(e.date).toLocaleDateString('en-US', {year:'numeric',month:'long',day:'numeric'});
      const docId   = e.entryNum ? '#'+String(e.entryNum).padStart(4,'0') : null;
      const txLabel = TXL[e.txType] || e.txType;

      // Accent colour based on direction
      const accentHex =
        (e.txType==='they_owe_you')  ? '#059669' :
        (e.txType==='you_owe_them')  ? '#dc2626' :
        (e.txType==='they_paid_you'||e.txType==='you_paid_them') ? '#0d9488' : '#6c63ff';

      const appName2    = db.settings.appName || 'Money IntX';
      const companyName2 = (co.name && co.name !== appName2) ? co.name : '';
      const fromName    = fromUser.displayName || companyName2 || 'Unknown';
      const logoSrc2    = db.settings.logoData || '';
      const logoHtml2   = logoSrc2
        ? `<img src="${logoSrc2}" style="height:40px;max-width:120px;object-fit:contain;margin-bottom:5px;display:block;">` : '';

      // Party labels based on transaction direction
      const partyLabels = {
        they_owe_you:  { left:'Owed To',    right:'Owed By' },
        they_paid_you: { left:'Received By', right:'Settled By' },
        you_owe_them:  { left:'Owed By',    right:'Owed To' },
        you_paid_them: { left:'Paid By',    right:'Settled To' },
      };
      const labels = partyLabels[e.txType] || { left:'You', right:'Contact' };

      let doc = `<div id="invoicePrintDoc" style="font-family:'Segoe UI',Arial,sans-serif;color:#111;background:#fff;padding:40px 44px;">

        <!-- Top: Branding left | Document meta right -->
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:28px;padding-bottom:18px;border-bottom:2px solid #111;">
          <div>
            ${logoHtml2}
            <div style="font-size:14px;font-weight:800;color:#111;">${esc(fromName)}</div>
            ${companyName2 ? `<div style="font-size:11px;color:#555;margin-top:1px;">${esc(companyName2)}</div>` : ''}
            ${co.address ? `<div style="font-size:11px;color:#777;margin-top:2px;white-space:pre-line;">${esc(co.address)}</div>` : ''}
          </div>
          <div style="text-align:right;">
            <div style="font-size:26px;font-weight:900;text-transform:uppercase;letter-spacing:.01em;color:#111;">Transaction</div>
            <div style="font-size:14px;font-weight:700;color:${accentHex};margin-top:4px;">${esc(txLabel)}</div>
            ${docId ? `<div style="font-size:12px;color:#999;margin-top:3px;">Ref&nbsp;${esc(docId)}</div>` : ''}
            <div style="margin-top:8px;">
              <div style="font-size:11px;color:#aaa;text-transform:uppercase;letter-spacing:.06em;">Date</div>
              <div style="font-weight:700;font-size:13px;">${dateStr}</div>
            </div>
            <div style="margin-top:8px;">${_docStatusChip(e.status, e)}</div>
          </div>
        </div>

        <!-- Parties: labelled by transaction direction -->
        <div style="display:grid;grid-template-columns:1fr auto 1fr;gap:16px;align-items:center;margin-bottom:28px;padding:18px 20px;background:#f9fafb;border-radius:8px;border:1px solid #e5e5e5;">
          <div>
            <div style="font-size:10px;color:#aaa;text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px;font-weight:700;">${labels.left}</div>
            <div style="font-weight:800;font-size:15px;">${esc(fromName)}</div>
            ${fromUser.email||co.email ? `<div style="font-size:11px;color:#777;margin-top:2px;">${esc(fromUser.email||co.email)}</div>` : ''}
          </div>
          <div style="font-size:24px;color:${accentHex};font-weight:900;text-align:center;padding:0 8px;">⇄</div>
          <div style="text-align:right;">
            <div style="font-size:10px;color:#aaa;text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px;font-weight:700;">${labels.right}</div>
            <div style="font-weight:800;font-size:15px;">${esc(contact?.name||'—')}</div>
            ${contact?.email   ? `<div style="font-size:11px;color:#777;margin-top:2px;">${esc(contact.email)}</div>` : ''}
            ${contact?.phone   ? `<div style="font-size:11px;color:#777;">${esc(contact.phone)}</div>` : ''}
          </div>
        </div>

        <!-- Amount -->
        <div style="text-align:center;padding:28px 0 24px;margin-bottom:24px;border-top:1px solid #e5e7eb;border-bottom:1px solid #e5e7eb;">
          <div style="font-size:11px;color:#aaa;text-transform:uppercase;letter-spacing:.12em;margin-bottom:8px;">Amount</div>
          <div style="font-size:52px;font-weight:900;color:${accentHex};letter-spacing:-.01em;">${fmt(e.amount, e.currency)}</div>
        </div>`;

      // Settlement breakdown (mirrors invoice doc behaviour)
      let _txSt = _getInvoiceSettlement(e.id);
      // Fallback: if linkedInvoiceId lookup returns 0 but status shows settlement,
      // try matching by note text or by cId + creditType + entryNum ref
      if (_txSt.settled === 0 && (e.status === 'partially_settled' || e.status === 'settled')) {
        const docRef = e.invoiceNumber || (e.entryNum ? '#'+String(e.entryNum).padStart(4,'0') : null);
        const altSettled = db.entries
          .filter(s => s.cId === e.cId && s.status !== 'voided' &&
                       (s.txType === 'they_paid_you' || s.txType === 'you_paid_them') &&
                       (s.linkedInvoiceId === e.id || (docRef && s.note && s.note.includes(docRef))))
          .reduce((sum, s) => sum + (parseFloat(s.amount) || 0), 0);
        if (altSettled > 0) {
          const total = parseFloat(e.amount) || 0;
          _txSt = { total, settled: altSettled, remaining: Math.max(0, total - altSettled), status: e.status };
          // Back-fill linkedInvoiceId so future calls work correctly
          db.entries.forEach(s => {
            if (s.cId === e.cId && s.status !== 'voided' &&
                (s.txType === 'they_paid_you' || s.txType === 'you_paid_them') &&
                !s.linkedInvoiceId && docRef && s.note && s.note.includes(docRef)) {
              s.linkedInvoiceId = e.id;
            }
          });
        }
      }
      if (_txSt.settled > 0) {
        doc += `<div style="display:flex;justify-content:flex-end;margin-bottom:24px;">
          <div style="border:2px solid #111;border-radius:8px;padding:16px 24px;min-width:260px;">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
              <span style="font-size:12px;color:#666;text-transform:uppercase;letter-spacing:.06em;">Original Amount</span>
              <span style="font-size:14px;font-weight:700;">${fmt(_txSt.total, e.currency)}</span>
            </div>
            <div style="display:flex;justify-content:space-between;align-items:center;padding-bottom:10px;border-bottom:1px solid #ddd;margin-bottom:10px;">
              <span style="font-size:12px;color:#059669;text-transform:uppercase;letter-spacing:.06em;">Settled</span>
              <span style="font-size:14px;font-weight:700;color:#059669;">− ${fmt(_txSt.settled, e.currency)}</span>
            </div>
            <div style="display:flex;justify-content:space-between;align-items:center;">
              <span style="font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;">Balance</span>
              <span style="font-size:26px;font-weight:900;color:${_txSt.remaining<=0?'#059669':'#111'};">${fmt(_txSt.remaining, e.currency)}</span>
            </div>
          </div>
        </div>`;
      }

      // Note
      if (e.note) {
        doc += `<div style="background:#f8f8f8;border-left:4px solid #d1d5db;border-radius:4px;padding:12px 16px;margin-bottom:20px;">
          <div style="font-size:10px;color:#aaa;text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px;">Note</div>
          <div style="font-size:13px;color:#333;">${esc(e.note)}</div>
        </div>`;
      }

      // Attached documents
      if (e.attachments && e.attachments.length) {
        doc += `<div style="margin-bottom:20px;">
          <div style="font-size:10px;color:#aaa;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;">Attachments</div>`;
        e.attachments.forEach(att => {
          if (att.type && att.type.startsWith('image/')) {
            doc += `<div style="margin-bottom:8px;">
              <div style="font-size:11px;color:#666;margin-bottom:4px;">${esc(att.name)}</div>
              <img src="${att.data}" alt="${esc(att.name)}" style="max-width:100%;max-height:300px;border-radius:6px;border:1px solid #e5e5e5;">
            </div>`;
          } else {
            doc += `<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;padding:8px 12px;background:#f8f8f8;border:1px solid #e5e5e5;border-radius:6px;">
              <span style="font-size:18px;">📄</span>
              <a href="${att.data}" download="${esc(att.name)}" style="font-size:12px;color:#4a45a8;text-decoration:underline;font-weight:600;">${esc(att.name)}</a>
            </div>`;
          }
        });
        doc += `</div>`;
      }

      // Invoice signature (transaction record — only if toggle on)
      const _txSig = (curUser().invoiceShow?.signature !== false) ? curUser().invoiceSignature : null;
      if (_txSig) {
        doc += `<div style="margin-top:24px;padding:16px 0;border-top:1px solid #e8e8e8;">
          <div style="font-size:13px;color:#333;white-space:pre-line;line-height:1.6;">${esc(_txSig)}</div>
        </div>`;
      }

      doc += `<div style="margin-top:${_txSig?'12px':'28px'};padding-top:14px;border-top:1px solid #e8e8e8;"></div>`;

      const canSettle = (_txSt.remaining > 0 && e.status !== 'voided' &&
                         (e.txType==='they_owe_you' || e.txType==='you_owe_them'));
      const actionBar = `
        ${canSettle ? `<button onclick="recordSettlement('${e.id}')" style="background:#065f46;color:#fff;border:none;border-radius:6px;padding:9px 18px;font-size:13px;font-weight:700;cursor:pointer;">✅ Record Settlement</button>` : ''}
        <button onclick="_downloadEntryPDF('${e.id}')" style="background:#4a45a8;color:#fff;border:none;border-radius:6px;padding:9px 18px;font-size:13px;font-weight:700;cursor:pointer;">📄 PDF</button>

    /* ── Entry point: pick mode based on entry type ─────────────────── */
    function openEntryInvoice(eid) {
      const e = db.entries.find(x => x.id === eid); if (!e) return;
      if (isInvoiceMode(e)) {
        _renderInvoiceDoc(e);
        // Sync current status to share_tokens snapshot whenever owner views invoice
        // This also back-fills stale tokens from before the sync-status feature
        _pushShareStatus(eid);
      } else {
        _renderTransactionDoc(e);
      }
    }

    /* ── Download Entry as PDF (opens print-ready window) ────────────── */
    function _downloadEntryPDF(eid) {
      const e = db.entries.find(x => x.id === eid);
      if (!e) return;
      const isInv = isInvoiceMode(e);
      const docId = e.invoiceNumber || (e.entryNum ? '#'+String(e.entryNum).padStart(4,'0') : null);

      // Build the document HTML by temporarily capturing _showDocPopup output
      let capturedDoc = '';
      const origShowDocPopup = _showDocPopup;
      _showDocPopup = function(docHtml, actionBarHtml) { capturedDoc = docHtml; };
      try {
        if (isInv) { _renderInvoiceDoc(e); } else { _renderTransactionDoc(e); }
      } finally {
        _showDocPopup = origShowDocPopup;
      }
      if (!capturedDoc) return;

      const title = (isInv ? (e.txType === 'bill' ? 'Bill' : 'Invoice') : 'Transaction') +
        ' - ' + (docId || 'Record');

      const printWin = window.open('', '_blank');
      if (!printWin) { toast('Popup blocked — please allow popups for this site.'); return; }
      printWin.document.write(`<!DOCTYPE html><html><head>
        <meta charset="utf-8">
        <title>${esc(title)}</title>

          * { box-sizing: border-box; }

        const c = db.contacts.find(x => x.id === e.cId);

        return (c?.name||'').toLowerCase().includes(q) || docNum.toLowerCase().includes(q) ||
