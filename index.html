    function openNewRecurring(cid = null) {
      const body = recurringFormHtml(null);
      const d = document.createElement('div');
      d.innerHTML = `<div class="modal-bg" id="recModalBg" onclick="if(event.target===this)this.remove()">
        <div class="modal" onclick="event.stopPropagation()">
          <div class="modal-title">Add Recurring Transaction</div>
          ${body}
          <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px;">
            <button class="bs sm" onclick="document.getElementById('recModalBg').remove()">Cancel</button>
            <button class="btn sm" onclick="saveNewRecurring()">Create</button>
          </div>
        </div></div>`;
      document.body.appendChild(d.firstChild);
      if (cid) {
        const c = db.contacts.find(x => x.id === cid);
        if (c) _csSelect('rcon', c.id, c.name);
        else document.getElementById('rcon').value = cid;
      }
    }

    function saveNewRecurring() {
      const cid    = document.getElementById('rcon').value.trim();
      const name   = document.getElementById('rname').value.trim();
      const txType = document.getElementById('rtx').value.trim();
      const amt    = document.getElementById('ramt').value.trim();
      const freq   = document.getElementById('rfreq').value.trim();
      if (!cid)   return alert('Contact required');
      if (!name)  return alert('Name required');
      if (!txType)return alert('Type required');
      const amtErr = valAmt(amt); if (amtErr) return alert(amtErr);
      if (!freq)  return alert('Frequency required');
      if (freq === 'repeat_n') {
        const rt = parseInt(document.getElementById('rreptimes')?.value||0);
        if (!rt || rt < 1) return alert('Enter how many times to repeat');
      }
      const startDate   = new Date(document.getElementById('rstart').value||new Date()).getTime();
      const endDateStr  = document.getElementById('renddate')?.value;
      const endDate     = endDateStr ? new Date(endDateStr).getTime() : null;
      const repeatTimes = freq === 'repeat_n' ? parseInt(document.getElementById('rreptimes').value) : null;
      const newRid = uuid();
      db.recurring.push({ id:newRid, userId:curUser().id, cId:cid, name, txType, amount:parseFloat(amt),
        startDate, endDate, repeatTimes, freq, status:'active', archived:false, lastPosted:null, createdAt:Date.now() });
      save();
      logAudit('add_recurring', {cid, name, freq});
      // Notify contact if toggle is on
      const rNotifyOn  = document.getElementById('r_notify_btn')?.classList.contains('on');
      const rNotifyMsg = document.getElementById('r_notify_msg')?.value.trim();
      if (rNotifyOn && rNotifyMsg) {
        // Check for inline email if contact has none
        const rc = db.contacts.find(x => x.id === cid);
        const inlineEmail = document.getElementById('r_notify_contact_email')?.value.trim() || '';
        if (inlineEmail && rc && !rc.email) { rc.email = inlineEmail; save(); }
        const rNotifyWho = window._formNwho_r || 'them';
        _sendRecurringNotif(newRid, rNotifyMsg, rNotifyWho);
      }
      document.getElementById('recModalBg')?.remove();
      toast('Recurring created');
      renderRecurring();
    }

    function editRecurring(rid) {
      const r = db.recurring.find(x => x.id === rid);
      if (!r) return;
      const body = recurringFormHtml(r);
      const d = document.createElement('div');
      d.innerHTML = `<div class="modal-bg" id="recModalBg" onclick="if(event.target===this)this.remove()">
        <div class="modal" onclick="event.stopPropagation()">
          <div class="modal-title">Edit Recurring</div>
          ${body}
          <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px;">
            <button class="bs sm" onclick="document.getElementById('recModalBg').remove()">Cancel</button>
            <button class="btn sm" onclick="saveEditRecurring('${rid}')">Save</button>
          </div>
        </div></div>`;
      document.body.appendChild(d.firstChild);
    }

    function saveEditRecurring(rid) {
      const r = db.recurring.find(x => x.id === rid);
      if (!r) return;
      const cid    = document.getElementById('rcon').value.trim();
      const name   = document.getElementById('rname').value.trim();
      const txType = document.getElementById('rtx').value.trim();
      const amt    = document.getElementById('ramt').value.trim();
      const freq   = document.getElementById('rfreq').value.trim();
      const amtErr = valAmt(amt); if (amtErr) return alert(amtErr);
      if (freq === 'repeat_n') {
        const rt = parseInt(document.getElementById('rreptimes')?.value||0);
        if (!rt || rt < 1) return alert('Enter how many times to repeat');
        r.repeatTimes = rt;
      } else { r.repeatTimes = null; }
      const endDateStr = document.getElementById('renddate')?.value;
      r.cId      = cid; r.name = name; r.txType = txType;
      r.amount   = parseFloat(amt); r.freq = freq;
      r.startDate= new Date(document.getElementById('rstart').value||r.startDate).getTime();
      r.endDate  = endDateStr ? new Date(endDateStr).getTime() : null;
      save();
      logAudit('edit_recurring', {rid, name, freq});
      document.getElementById('recModalBg')?.remove();
      toast('Recurring updated');
      renderRecurring();
    }

    function toggleArchiveRecurring(rid) {
      const r = db.recurring.find(x => x.id === rid);
      if (r) {
        r.archived = !r.archived;
        save();
        renderRecurring();
      }
    }

    function delRecurring(rid) {
      if (!confirm('Delete this recurring?')) return;
      db.recurring = db.recurring.filter(x => x.id !== rid);
      save();
      logAudit('delete_recurring', { rid });
      toast('Recurring deleted');
      renderRecurring();
    }

    // ============ PAGE: NOTIFICATIONS ============
    function renderNotifs() {
      const u = curUser();
      const isAdm = curRole() === 'admin';
      const notifs = (isAdm ? db.notifs : db.notifs.filter(n => n.userId === u.id))
                       .slice().sort((a, b) => (b.createdAt||0) - (a.createdAt||0));

      // Mark all unread notifications as read, then refresh nav badge
      let anyMarked = false;
      notifs.forEach(n => { if (!n.read) { n.read = true; anyMarked = true; } });
      if (anyMarked) { save(); renderNav(); }

      PG['notifs'] = PG['notifs'] || 1;
      const p = paginate(notifs, 'notifs');

      const whoLabel = w => w === 'them' ? 'Contact' : w === 'you' ? 'You' : w === 'both' ? 'Both' : '—';
      const eventBadge = t => {
        if (t === 'viewed')    return `<span class="badge" style="background:rgba(108,99,255,.12);color:var(--accent);font-size:11px;">👁 Viewed</span>`;
        if (t === 'confirmed') return `<span class="badge" style="background:rgba(22,163,74,.12);color:#16a34a;font-size:11px;">✅ Confirmed</span>`;
        if (t === 'closed')    return `<span class="badge badge-gray" style="font-size:11px;">🔒 Closed</span>`;
        if (t === 'reminder')  return `<span class="badge" style="background:rgba(239,68,68,.12);color:#dc2626;font-size:11px;">🚩 Reminder</span>`;
        if (t === 'self-reminder') return `<span class="badge" style="background:rgba(245,158,11,.12);color:#d97706;font-size:11px;">⏰ Self-Reminder</span>`;
        if (t === 'payment')   return `<span class="badge" style="background:rgba(22,163,74,.12);color:#16a34a;font-size:11px;">📋 Receipt</span>`;
        if (t === 'fulfilled') return `<span class="badge badge-green" style="font-size:11px;">✅ Fulfilled</span>`;
        if (t === 'settlement_pending')   return `<span class="badge" style="background:rgba(245,158,11,.12);color:#d97706;font-size:11px;">⏳ Review Payment</span>`;
        if (t === 'settlement_confirmed') return `<span class="badge" style="background:rgba(22,163,74,.12);color:#16a34a;font-size:11px;">✅ Payment Confirmed</span>`;
        if (t === 'settlement_rejected')  return `<span class="badge" style="background:rgba(239,68,68,.12);color:#dc2626;font-size:11px;">❌ Payment Rejected</span>`;
        if (t === 'notification')  return `<span class="badge badge-blue" style="font-size:11px;">📬 Notification</span>`;
        if (t === 'reconciliation_mismatch') return `<span class="badge" style="background:rgba(239,68,68,.12);color:#dc2626;font-size:11px;">⚠ Balance Mismatch</span>`;
        if (t === 'invite') return `<span class="badge" style="background:rgba(108,99,255,.12);color:var(--accent);font-size:11px;">🤝 Invitation</span>`;
        if (t === 'invite_sent') return `<span class="badge" style="background:rgba(108,99,255,.12);color:var(--accent);font-size:11px;">📨 Invite Sent</span>`;
        if (t === 'join_request')       return `<span class="badge" style="background:rgba(245,158,11,.12);color:#d97706;font-size:11px;">🙋 Join Request</span>`;
        if (t === 'group_created')      return `<span class="badge" style="background:rgba(22,163,74,.12);color:#16a34a;font-size:11px;">👥 Group Created</span>`;
        if (t === 'investment_created') return `<span class="badge" style="background:rgba(108,99,255,.12);color:var(--accent);font-size:11px;">📈 Investment Created</span>`;
        return `<span class="badge badge-blue" style="font-size:11px;">📤 Sent</span>`;
      };

      let html = `<div class="page-header"><h2>Notifications</h2></div><div class="card">`;
      if (notifs.length === 0) {
        html += '<p style="color: var(--muted);padding:16px 0;">No notifications sent yet.</p>';
      } else {
        html += `<div class="tbl-wrap"><table><thead><tr>
          <th>Contact</th>
          <th>Amount</th>
          <th class="hide-mobile">Message</th>
          <th class="hide-mobile">Sent To</th>
          <th class="hide-mobile">Date</th>
          <th>Event</th>
          <th style="width:36px;"></th>
        </tr></thead><tbody>`;
        p.items.forEach(n => {
          const c  = db.contacts.find(x => x.id === n.cId);
          const e  = db.entries.find(x => x.id === n.eid);
          // Use embedded _amount/_contactName as fallbacks for cross-blob notifications
          const amtStr = e ? fmt(e.amount, e.currency) : (n._amount ? fmt(n._amount, n._currency) : '—');
          const sentTo = Array.isArray(n.sentTo) && n.sentTo.length
            ? n.sentTo.join(', ')
            : (n.who ? whoLabel(n.who) : '—');
          const dateStr = n.createdAt ? new Date(n.createdAt).toLocaleDateString() : '—';
          const isClickable = (n.type === 'settlement_pending' || n.type === 'settlement_confirmed' || n.type === 'settlement_rejected') && n.shareToken;
          const rowClick = isClickable ? `onclick="_reviewSettlement('${esc(n.shareToken)}')" style="cursor:pointer;"` : '';
          const isInvite = n.type === 'invite' || n.type === 'invite_sent' || n.type === 'join_request';
          const inviteClick = isInvite ? `onclick="nav('groups')" style="cursor:pointer;"` : '';
          const contactDisplay = c ? cLink(c.id, c.name) : (n._contactName ? `<strong>${esc(n._contactName)}</strong>` : (isInvite && n.who ? `<strong style="color:var(--accent);">${esc(n.who)}</strong>` : '<span style="color:var(--muted)">—</span>'));
          html += `<tr ${rowClick || inviteClick}>
            <td>${contactDisplay}</td>
            <td style="font-size:13px;font-weight:600;white-space:nowrap;">${isInvite ? '' : esc(amtStr)}</td>
            <td class="hide-mobile" style="max-width:200px;"><span style="display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;" title="${esc(n.msg)}">${esc(n.msg)}</span>${isClickable ? ` <span style="color:var(--accent);font-size:11px;font-weight:600;">${n.type === 'settlement_pending' ? 'Click to review' : 'View details'}</span>` : ''}${isInvite ? ` <span style="color:var(--accent);font-size:11px;font-weight:600;">→ View Groups</span>` : ''}</td>
            <td class="hide-mobile" style="font-size:12px;">${esc(sentTo)}</td>
            <td class="hide-mobile" style="font-size:12px;color:var(--muted);">${dateStr}</td>
            <td>${eventBadge(n.type)}</td>
            <td><button onclick="event.stopPropagation();delNotif('${n.id}')" style="background:none;border:none;color:#ef4444;font-size:16px;cursor:pointer;padding:4px 6px;line-height:1;" title="Delete">✕</button></td>
          </tr>`;
        });
        html += `</tbody></table></div>`;
        if (p.pages > 1) html += `<div style="display:flex;align-items:center;justify-content:space-between;padding:12px 0 4px;">
          <button class="bs sm" onclick="PG['notifs']=Math.max(1,(PG['notifs']||1)-1);renderNotifs()" ${p.page===1?'disabled':''}>← Prev</button>
          <span style="font-size:12px;color:var(--muted);">Page ${p.page} of ${p.pages}</span>
          <button class="bs sm" onclick="PG['notifs']=Math.min(${p.pages},(PG['notifs']||1)+1);renderNotifs()" ${p.page===p.pages?'disabled':''}>Next →</button>
        </div>`;
      }
      html += '</div>';
      document.getElementById('content').innerHTML = html;
    }

    function delNotif(nid) {
      db.notifs = db.notifs.filter(x => x.id !== nid);
      save();
      renderNotifs();
    }

    // ============ PAGE: NEXT OF KIN (TRUSTED ACCESS) ============

    // ── NOK HELPERS ────────────────────────────────────────────────────
    function nokLinkedContact(n) {
      if (n.nokContactId) return db.contacts.find(c=>c.id===n.nokContactId)||null;
      const name = (n.fullName||'').toLowerCase().trim();
      return db.contacts.find(c=>c.userId===n.userId && c.name.toLowerCase().trim()===name)||null;
    }

    function _nokStatusBadge(n) {
      if (n.status === 'active')     return '<span class="badge badge-green">✅ Active</span>';
      if (n.status === 'verified')   return '<span class="badge badge-blue">✔ Verified</span>';
      if (n.status === 'revoked')    return '<span class="badge badge-red">🚫 Revoked</span>';
      return '<span class="badge badge-yellow">⏳ Unverified</span>';
    }

    function _nokAccessBadge(level) {
      const map = { view_only:['badge-gray','👁 View Only'], notify_only:['badge-yellow','🔔 Notify Only'], limited_control:['badge-blue','⚙️ Limited Control'], full_control:['badge-green','🔑 Full Control'] };
      const [cls, label] = map[level] || ['badge-gray', level || 'View Only'];
      return `<span class="badge ${cls}">${label}</span>`;
    }

    function _nokTriggerLabel(n) {
      const map = { manual:'Manual activation only', inactivity_30:'30-day inactivity', inactivity_60:'60-day inactivity', inactivity_90:'90-day inactivity', emergency:'Emergency verification' };
      return map[n.activationTrigger] || 'Manual';
    }

    function _updateLastActivity() {
      if (!db.settings) db.settings = {};
      db.settings.lastActivity = Date.now();
    }

    function _checkNokInactivity() {
      const u = curUser();
      const lastAct = db.settings.lastActivity || Date.now();
      const daysSince = Math.floor((Date.now() - lastAct) / 86400000);
      (db.nok||[]).filter(n => n.userId === u.id && n.status !== 'revoked' && n.status !== 'active').forEach(n => {
        if (!n.activationTrigger || !n.activationTrigger.startsWith('inactivity')) return;
        const threshold = parseInt(n.activationTrigger.split('_')[1] || '90');
        if (daysSince >= threshold) {
          n.status = 'active'; n.activatedAt = Date.now(); n.triggerActivatedBy = 'inactivity';
          if (!n.nokAuditLog) n.nokAuditLog = [];
          n.nokAuditLog.push({ action:'auto_activated', by:'system', at:Date.now(), detail:`Auto-activated after ${daysSince} days of inactivity (threshold: ${threshold}d)` });
          save();
          if (n.email) _sendNokActivationEmail(n);
        }
      });
    }

    function renderNok() {
      const u = curUser();
      const noks = db.nok.filter(n => n.userId === u.id);
      _checkNokInactivity();
      const lastAct = db.settings.lastActivity || Date.now();
      const daysSince = Math.floor((Date.now() - lastAct) / 86400000);
      const activeCount = noks.filter(n=>n.status==='active').length;
      const verifiedCount = noks.filter(n=>n.status==='verified').length;

      let html = `<div class="page-header" style="align-items:center;">
        <div style="display:flex;align-items:center;gap:14px;">
          <div style="font-size:44px;line-height:1;">🔐</div>
          <div><h2 style="margin:0;">Next of Kin <span style="font-size:14px;font-weight:500;color:var(--muted);">(Trusted Access)</span></h2>
            <p style="font-size:13px;color:var(--accent);font-weight:600;margin:2px 0 0;">Information Release &amp; Continuity System</p>
          </div>
        </div>
        <button class="btn sm" onclick="openNokModal()">+ Add Trusted Contact</button>
      </div>`;

      html += `<div style="background:linear-gradient(135deg,rgba(255,255,255,0.04),rgba(108,99,255,0.07));border:1px solid rgba(255,255,255,0.09);border-radius:12px;padding:14px 18px;margin-bottom:16px;font-size:13px;line-height:1.75;box-shadow:inset 0 1px 0 rgba(255,255,255,0.06);">
        <strong style="color:var(--accent);">"Your financial memory doesn't end with you — not in death, not in incapacity, not in absence."</strong><br>
        <span style="color:var(--muted);">Designate trusted contacts who can access your records when you're gone, incapacitated, or simply unavailable. Set access levels, activation conditions, and stay in full control until you decide otherwise. This releases <strong>information only</strong> — not money or legal title.</span>
      </div>`;

      // Activity health panel
      const inactivityNoks = noks.filter(n => n.activationTrigger?.startsWith('inactivity'));
      html += `<div class="card" style="margin-bottom:16px;padding:14px 18px;">
        <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;">
          <div><div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-bottom:2px;">Account Activity</div>
            <div style="font-size:13px;">Last active: <strong>${daysSince === 0 ? 'Today' : daysSince + ' day' + (daysSince!==1?'s':'') + ' ago'}</strong></div>
          </div>
          <div style="text-align:right;font-size:12px;">${noks.length === 0 ? '<span style="color:var(--muted);">No trusted contacts yet</span>' : `<span style="color:var(--green);">${activeCount} active</span> · <span style="color:var(--blue);">${verifiedCount} verified</span> · ${noks.length} total`}</div>
        </div>
        ${inactivityNoks.length > 0 ? (() => {
          const earliest = Math.min(...inactivityNoks.map(n=>parseInt(n.activationTrigger.split('_')[1]||'90')));
          const pct = Math.min(100, (daysSince / earliest) * 100);
          const col = pct >= 80 ? 'var(--red)' : pct >= 50 ? 'var(--amber)' : 'var(--green)';
          return `<div style="margin-top:10px;"><div style="display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:4px;"><span>Inactivity trigger at ${earliest} days</span><span>${daysSince}/${earliest} days</span></div><div style="background:var(--bg3);border-radius:99px;height:6px;overflow:hidden;"><div style="height:100%;width:${pct}%;background:${col};border-radius:99px;transition:width .4s;"></div></div></div>`;
        })() : ''}
      </div>`;

      if (noks.length === 0) {
        html += `<div class="card" style="text-align:center;padding:40px 24px;">
          <div style="font-size:48px;margin-bottom:12px;">🔐</div>
          <div style="font-size:16px;font-weight:700;margin-bottom:8px;">No Trusted Contacts designated yet</div>
          <div style="font-size:13px;color:var(--muted);max-width:420px;margin:0 auto 20px;">Add trusted people who should be able to access your records if you're unavailable. You control what they can see and when.</div>
          <button class="btn" onclick="openNokModal()">+ Designate First Trusted Contact</button>
        </div>`;
      } else {
        html += `<div style="display:flex;flex-direction:column;gap:12px;">`;
        noks.forEach(n => {
          const linked = nokLinkedContact(n);
          const isRevoked = n.status === 'revoked';
          const isActive  = n.status === 'active';
          html += `<div class="card" style="${isRevoked?'opacity:.55;':''}">
            <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap;">
              <div style="flex:1;min-width:200px;">
                <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:4px;">
                  <span style="font-size:16px;font-weight:700;">${esc(n.fullName)}</span>
                  ${_nokStatusBadge(n)}
                  ${_nokAccessBadge(n.accessLevel||'view_only')}
                </div>
                <div style="font-size:13px;color:var(--muted);">${esc(n.relationship||'—')}</div>
                <div style="margin-top:8px;display:flex;gap:8px;flex-wrap:wrap;font-size:12px;">
                  ${n.email?`<span>✉ ${esc(n.email)}</span>`:''}
                  ${n.phone?`<span>📞 ${esc(n.phone)}</span>`:''}
                  ${linked?`<span style="background:rgba(74,222,128,.12);color:var(--green);border-radius:5px;padding:2px 8px;border:1px solid rgba(74,222,128,.25);">🔗 ${esc(linked.name)}</span>`:''}
                </div>
                <div style="margin-top:8px;display:flex;gap:6px;flex-wrap:wrap;">
                  <span style="background:var(--bg3);padding:3px 8px;border-radius:6px;font-size:12px;color:var(--muted);">⏱ ${esc(_nokTriggerLabel(n))}</span>
                  <span style="background:var(--bg3);padding:3px 8px;border-radius:6px;font-size:12px;color:var(--muted);">📄 ${{full:'Full export',summary:'Summary',selected:'Selected fields'}[n.releaseType]||'Full export'}</span>
                </div>
                ${n.notes?`<div style="margin-top:6px;font-size:12px;color:var(--muted);font-style:italic;">${esc(n.notes)}</div>`:''}
                ${isActive&&n.activatedAt?`<div style="margin-top:6px;font-size:11px;color:var(--green);">Activated ${new Date(n.activatedAt).toLocaleDateString()}${n.triggerActivatedBy?' ('+n.triggerActivatedBy+')'  :''}</div>`:''}
                ${n.verifiedAt?`<div style="margin-top:2px;font-size:11px;color:var(--muted);">Verified ${new Date(n.verifiedAt).toLocaleDateString()}</div>`:''}
              </div>
              <div class="action-menu"><button class="action-menu-btn" onclick="toggleActionMenu(this)">⋮</button><div class="action-dropdown">
                ${!isRevoked?`<button onclick="openNokModal('${n.id}')">✏️ Edit</button>`:''}
                ${!isRevoked&&n.email?`<button onclick="sendNokVerificationEmail('${n.id}')">📧 Send Verification</button>`:''}
                ${!isRevoked&&!isActive?`<button onclick="activateNok('${n.id}')" style="color:var(--green);">✅ Activate Access</button>`:''}
                ${isActive?`<button onclick="deactivateNok('${n.id}')" style="color:var(--amber);">⏸ Suspend Access</button>`:''}
                ${!isRevoked?`<button onclick="previewNokAccess('${n.id}')">👁 Preview Access</button>`:''}
                ${!isRevoked?`<button onclick="viewNokAudit('${n.id}')">📋 Audit Log</button>`:''}
                ${!isRevoked?`<button onclick="revokeNok('${n.id}')" style="color:var(--red);">🚫 Revoke</button>`:''}
                <button onclick="delNok('${n.id}')" style="color:var(--red);">🗑 Delete</button>
              </div></div>
            </div>
          </div>`;
        });
        html += `</div>`;
      }

      // ── ASSET LOCKERS SECTION ──────────────────────────────────────
      if (!db.assetLockers) db.assetLockers = [];
      const myLockers = db.assetLockers.filter(l => l.userId === u.id);
      const lockersUnlocked = _lockerIsUnlocked();

      // Precompute locker list HTML to avoid deep template literal nesting
      let _lockerListHtml = '';
      if (!lockersUnlocked) {
        const _cnt = myLockers.length;
        _lockerListHtml = '<div style="text-align:center;padding:32px 20px;background:var(--bg2);border:1px solid var(--border);border-radius:14px;">'
          + '<div style="font-size:40px;margin-bottom:12px;">🔐</div>'
          + '<div style="font-size:15px;font-weight:700;margin-bottom:6px;">Asset Lockers are Protected</div>'
          + '<div style="font-size:13px;color:var(--muted);margin-bottom:6px;">' + (_cnt > 0 ? 'You have <strong>' + _cnt + '</strong> locker' + (_cnt > 1 ? 's' : '') + ' stored.' : 'No lockers yet.') + '</div>'
          + '<div style="font-size:12px;color:var(--muted);margin-bottom:20px;max-width:340px;margin-left:auto;margin-right:auto;">To view or manage your lockers, you\'ll need to verify your identity with a one-time code sent to your email.</div>'
          + '<button class="btn" onclick="requestLockerOtp()" style="min-width:160px;">📧 Send Access Code</button>'
          + '</div>';
      } else if (myLockers.length === 0) {
        _lockerListHtml = '<div style="text-align:center;padding:28px 16px;background:var(--bg2);border:1px dashed var(--border);border-radius:12px;color:var(--muted);">'
          + '<div style="font-size:28px;margin-bottom:8px;">🗄</div>'
          + '<div style="font-size:14px;font-weight:600;margin-bottom:6px;">No asset lockers yet</div>'
          + '<div style="font-size:12px;margin-bottom:16px;">Add physical rooms, devices, accounts, or anything a trusted contact may need to find or access.</div>'
          + '<button class="btn sm" onclick="openAssetLockerModal()">+ Add First Locker</button>'
          + '</div>';
      } else {
        _lockerListHtml = '<div style="display:flex;flex-direction:column;gap:10px;">';
        myLockers.forEach(function(l) {
          // Build trustee rows: each shows name (bold) + email + phone
          function _trusteeCardLine(t, label) {
            var to = _trusteeObj(t);
            if (!to.name) return '';
            var line = '<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;padding:5px 0;">'
              + '<span style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);min-width:46px;">' + label + '</span>'
              + '<span style="font-size:13px;font-weight:600;">' + esc(to.name) + '</span>';
            if (to.email) line += '<span style="font-size:12px;color:var(--muted);">' + esc(to.email) + '</span>';
            if (to.phone) line += '<span style="font-size:12px;color:var(--muted);">' + esc(to.phone) + '</span>';
            line += '</div>';
            return line;
          }
          var allTrustees = [];
          if (l.primaryTrustee) allTrustees.push({ t: l.primaryTrustee, label: 'Primary' });
          (l.otherTrustees||[]).forEach(function(t){ allTrustees.push({ t: t, label: 'Other' }); });
          var trusteeBlock = '';
          if (allTrustees.length > 0) {
            trusteeBlock = '<div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--border);">';
            allTrustees.forEach(function(item){ trusteeBlock += _trusteeCardLine(item.t, item.label); });
            trusteeBlock += '</div>';
          }
          _lockerListHtml += '<div class="card" style="padding:14px 18px;">'
            + '<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px;flex-wrap:wrap;">'
            + '<div style="flex:1;min-width:180px;">'
            + '<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:2px;">'
            + '<span style="font-size:15px;font-weight:700;">' + esc(l.title) + '</span>'
            + (l.type ? '<span class="badge badge-gray" style="font-size:11px;">' + esc(l.type) + '</span>' : '')
            + '</div>'
            + (l.assetKey ? '<div style="font-size:11px;color:var(--muted);font-family:monospace;margin-bottom:8px;opacity:.7;">' + esc(l.assetKey) + '</div>' : '<div style="margin-bottom:8px;"></div>')
            + '<div style="display:grid;grid-template-columns:60px 1fr;gap:4px 10px;font-size:13px;">'
            + (l.location ? '<span style="color:var(--muted);font-size:11px;font-weight:600;text-transform:uppercase;padding-top:2px;">Location</span><span>' + esc(l.location) + '</span>' : '')
            + (l.access  ? '<span style="color:var(--muted);font-size:11px;font-weight:600;text-transform:uppercase;padding-top:2px;">Access</span><span>' + esc(l.access) + '</span>' : '')
            + '</div>'
            + (l.notes ? '<div style="margin-top:8px;font-size:12px;color:var(--muted);font-style:italic;">' + esc(l.notes) + '</div>' : '')
            + trusteeBlock
            + '</div>'
            + '<div style="display:flex;gap:6px;flex-shrink:0;">'
            + '<button class="bs sm" onclick="openAssetLockerModal(\'' + l.id + '\')">✏️</button>'
            + '<button class="bs sm" style="color:var(--red);" onclick="delAssetLocker(\'' + l.id + '\')">🗑</button>'
            + '</div>'
            + '</div></div>';
        });
        _lockerListHtml += '</div>';
      }
      const _lockerBtns = lockersUnlocked
        ? '<button class="bs sm" style="font-size:11px;color:var(--muted);" onclick="_lockLockers()">🔒 Lock</button><button class="btn sm" onclick="openAssetLockerModal()">+ Add Locker</button>'
        : '<button class="btn sm" onclick="requestLockerOtp()">' + (myLockers.length > 0 ? '🔐 Unlock to View' : '+ Add Locker') + '</button>';

      html += '<div style="margin-top:32px;">'
        + '<div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:10px;">'
        + '<div>'
        + '<div style="font-size:17px;font-weight:800;letter-spacing:-.01em;">🗄 Asset Lockers</div>'
        + '<div style="font-size:12px;color:var(--muted);margin-top:2px;">Record what you own, where it is, and how to access it — for those who may need to know.</div>'
        + '</div>'
        + '<div style="display:flex;gap:8px;align-items:center;">' + _lockerBtns + '</div>'
        + '</div>'
        + '<div style="background:rgba(232,30,130,0.06);border:1px solid rgba(232,30,130,0.18);border-radius:10px;padding:10px 14px;font-size:12px;color:var(--muted);line-height:1.65;margin-bottom:14px;">'

    function saveNokModal(nid, sendVerif) {
      const fullName     = document.getElementById('nok_name')?.value.trim();
      const relationship = document.getElementById('nok_rel')?.value.trim();
      if (!fullName || !relationship) { toast('Full name and relationship are required'); return; }
      const data = {
        fullName, relationship,
        email:            document.getElementById('nok_email')?.value.trim()||'',
        phone:            document.getElementById('nok_phone')?.value.trim()||'',
        address:          document.getElementById('nok_addr')?.value.trim()||'',
        nokContactId:     document.getElementById('nok_cid')?.value||null,
        accessLevel:      document.getElementById('nok_access')?.value||'view_only',
        activationTrigger:document.getElementById('nok_trigger')?.value||'manual',
        passphrase:       document.getElementById('nok_pass')?.value.trim()||'',
        releaseType:      document.getElementById('nok_release')?.value||'full',
        message:          document.getElementById('nok_msg')?.value.trim()||'Your kind attention is requested.',
        notes:            document.getElementById('nok_notes')?.value.trim()||''
      };
      let savedNok;
      if (nid) {
        savedNok = db.nok.find(x=>x.id===nid);
        if (savedNok) Object.assign(savedNok, data);
        logAudit('edit_nok',{nid,fullName});
        toast('Trusted contact updated');
      } else {
        savedNok = { id:uuid(), userId:curUser().id, ...data, status:'unverified', nokAuditLog:[], createdAt:Date.now() };
        db.nok.push(savedNok);
        logAudit('add_nok',{fullName,relationship});
        toast('Trusted contact added');
      }
      save();
      document.getElementById('nokModalBg')?.remove();
      if (sendVerif && savedNok?.email) sendNokVerificationEmail(savedNok.id);
      renderNok();
    }

    function activateNok(nid) {
      const n = db.nok.find(x=>x.id===nid);
      if (!n || !confirm('Activate access for ' + n.fullName + '?\n\nThey will be notified by email if one is on file.')) return;
      n.status = 'active'; n.activatedAt = Date.now(); n.triggerActivatedBy = 'manual';
      if (!n.nokAuditLog) n.nokAuditLog = [];
      n.nokAuditLog.push({ action:'activated', by:curUser().email, at:Date.now(), detail:'Manual activation by account owner' });
      save(); logAudit('activate_nok',{nid,fullName:n.fullName});
      toast(n.fullName + ' — access activated');
      if (n.email) _sendNokActivationEmail(n);
      renderNok();
    }

    function deactivateNok(nid) {
      const n = db.nok.find(x=>x.id===nid);
      if (!n) return;
      n.status = 'verified'; n.activatedAt = null; n.triggerActivatedBy = null;
      if (!n.nokAuditLog) n.nokAuditLog = [];
      n.nokAuditLog.push({ action:'suspended', by:curUser().email, at:Date.now(), detail:'Access suspended by account owner' });
      save(); toast(n.fullName + ' — access suspended'); renderNok();
    }

    function revokeNok(nid) {
      const n = db.nok.find(x=>x.id===nid);
      if (!n || !confirm('Permanently revoke access for ' + n.fullName + '?\n\nThis cannot be undone.')) return;
      n.status = 'revoked'; n.revokedAt = Date.now();
      if (!n.nokAuditLog) n.nokAuditLog = [];
      n.nokAuditLog.push({ action:'revoked', by:curUser().email, at:Date.now(), detail:'Permanently revoked by account owner' });
      save(); logAudit('revoke_nok',{nid,fullName:n.fullName}); toast(n.fullName + ' — access permanently revoked'); renderNok();
    }

    function delNok(nid) {
      if (!confirm('Remove this trusted contact record?')) return;
      db.nok = db.nok.filter(x=>x.id!==nid);
      save(); logAudit('delete_nok',{nid}); toast('Trusted contact removed'); renderNok();
    }

    async function sendNokVerificationEmail(nid) {
      const n = db.nok.find(x=>x.id===nid);
      if (!n || !n.email) { toast('No email on this record'); return; }
      const u = curUser();
      const tok = localStorage.getItem('mxi_token');
      const headers = { 'Content-Type':'application/json' };
      if (tok) headers['Authorization'] = 'Bearer ' + tok;
      try {
        const res = await fetch('/api/email', { method:'POST', credentials:'include', headers,
          body: JSON.stringify({ action:'send-nok-verification', recipientEmail:n.email, recipientName:n.fullName,
            fromName:u.displayName||u.email, relationship:n.relationship, accessLevel:n.accessLevel||'view_only',
            siteUrl:db.settings?.siteUrl||window.location.origin, appName:db.settings?.appName||'Money IntX',
            tagline:db.settings?.tagline||'Making Money Matters Memorable', logoData:db.settings?.logoData||'' }) });
        const r = await res.json().catch(()=>({}));
        if (r.ok) {
          if (!n.nokAuditLog) n.nokAuditLog = [];
          n.nokAuditLog.push({ action:'verification_sent', by:u.email, at:Date.now(), detail:'Verification email sent to '+n.email });
          save(); toast('Verification email sent to ' + n.email);
        } else { toast('Email failed: '+(r.error||'unknown'), 4000); }
      } catch(e) { toast('Could not send email', 3000); }
    }

    async function _sendNokActivationEmail(n) {
      const u = curUser();
      const tok = localStorage.getItem('mxi_token');
      const headers = { 'Content-Type':'application/json' };
      if (tok) headers['Authorization'] = 'Bearer ' + tok;
      try {
        await fetch('/api/email', { method:'POST', credentials:'include', headers,
          body: JSON.stringify({ action:'send-nok-activation', recipientEmail:n.email, recipientName:n.fullName,
            fromName:u.displayName||u.email, relationship:n.relationship, message:n.message||'',
            accessLevel:n.accessLevel||'view_only', releaseType:n.releaseType||'full',
            triggerReason:n.triggerActivatedBy||'manual',
            siteUrl:db.settings?.siteUrl||window.location.origin, appName:db.settings?.appName||'Money IntX',
            tagline:db.settings?.tagline||'Making Money Matters Memorable', logoData:db.settings?.logoData||'' }) });
      } catch(e) { console.error('[nok activation email]', e); }
    }

    function viewNokAudit(nid) {
      const n = db.nok.find(x=>x.id===nid);
      if (!n) return;
      const log = (n.nokAuditLog||[]).slice().reverse();
      const rows = log.length === 0
        ? '<p style="color:var(--muted);font-size:13px;text-align:center;padding:16px;">No actions recorded yet.</p>'
        : log.map(e=>`<div style="padding:8px 0;border-bottom:1px solid var(--border);">
            <div style="display:flex;justify-content:space-between;align-items:baseline;flex-wrap:wrap;gap:4px;">
              <strong style="font-size:13px;text-transform:capitalize;">${esc((e.action||'').replace(/_/g,' '))}</strong>
              <span style="font-size:11px;color:var(--muted);">${new Date(e.at).toLocaleString()}</span>
            </div>
            <div style="font-size:12px;color:var(--muted);">${esc(e.detail||'')}${e.by?' — by '+esc(e.by):''}</div>
          </div>`).join('');
      document.body.insertAdjacentHTML('beforeend', `<div class="modal-bg" onclick="this.remove()"><div class="modal" style="max-width:480px;" onclick="event.stopPropagation()">
        <div class="modal-title">Audit Log — ${esc(n.fullName)}</div>${rows}
        <div style="margin-top:14px;text-align:right;"><button class="bs" onclick="this.closest('.modal-bg').remove()">Close</button></div>
      </div></div>`);
    }

    function previewNokAccess(nid) {

      if (!n) return;
      const u = curUser();
      const ownEntries  = db.entries.filter(e=>e.userId===u.id&&!e.archived);
      const ownContacts = db.contacts.filter(c=>c.userId===u.id&&!c.archived);

      ownContacts.forEach(c=>{ tYou+=(c.startToy||0); tThem+=(c.startYot||0); });

              + '<div style="display:flex;align-items:center;gap:6px;">'

    async function sendLockerInfo(lockerId, trusteeName, trusteeEmail) {
      if (!trusteeEmail) { toast('No email address for this trustee.'); return; }
      const l = (db.assetLockers||[]).find(x=>x.id===lockerId);
      if (!l) { toast('Locker not found.'); return; }
      if (!confirm('Send locker details for "' + l.title + '" to ' + trusteeName + ' (' + trusteeEmail + ')?')) return;
      const u   = curUser();
      const cfg = db.settings||{};
      try {
        const resp = await fetch('/api/email', {
          method:'POST',
          headers:{ 'Content-Type':'application/json', Authorization:'Bearer '+(localStorage.getItem('mxi_token')||'') },
          body: JSON.stringify({
            action:         'send-locker-info',
            recipientEmail: trusteeEmail,
            trusteeName,
            fromName:       cfg.appName || u.name || 'Money IntX',
            lockerTitle:    l.title,
            lockerType:     l.type||'',
            lockerLocation: l.location||'',
            lockerAccess:   l.access||'',
            lockerKey:      l.assetKey||'',
            lockerNotes:    l.notes||'',
            siteUrl:        cfg.siteUrl || window.location.origin,
            appName:        cfg.appName || 'Money IntX',
            tagline:        cfg.tagline || '',
            logoData:       cfg.logoData || ''
          })
        });
        const r = await resp.json();
        if (r.ok) toast('📧 Locker info sent to ' + trusteeName);
        else toast('Could not send: ' + (r.error||'unknown error'), 4000);
      } catch(e) { toast('Email error: ' + e.message, 4000); }

    // Normalise trustee to { name, email, phone } regardless of old plain-string format
    function _trusteeObj(t) {
      if (!t) return { name:'', email:'', phone:'' };
      if (typeof t === 'string') return { name: t, email: '', phone: '' };
      return { name: t.name||'', email: t.email||'', phone: t.phone||'' };
    }

    // Build a single trustee row for the locker modal
    function _alTrusteeRowHtml(idx, t, isList) {
      const u   = curUser();
      const contacts = (db.contacts||[]).filter(c=>c.userId===u.id&&!c.archived);
      const cOpts = contacts.map(c=>'<option value="'+c.id+'"'+(t&&t.contactId===c.id?' selected':'')+'>'+esc(c.name)+'</option>').join('');

      const cid = sel.value;

      const nameEl  = document.getElementById(prefix+'name');

      const phoneEl = document.getElementById(prefix+'phone');
      if (nameEl)  nameEl.value  = c.name  || '';

    function saveAssetLockerModal(lid) {
      const title    = document.getElementById('al_title')?.value.trim();
      const assetKey = document.getElementById('al_key')?.value.trim();
      if (!title) { toast('Title is required'); return; }
      if (!db.assetLockers) db.assetLockers = [];
      // Collect other trustees from dynamic rows
      const otherRows  = Array.from(document.getElementById('alOtherTrusteesList')?.querySelectorAll('[id^=alTrusteeRow_]')||[]);
      const otherTrustees = otherRows.map(row => ({
        name:  (row.querySelector('.al_t_name')?.value||'').trim(),
        email: (row.querySelector('.al_t_email')?.value||'').trim(),
        phone: (row.querySelector('.al_t_phone')?.value||'').trim()
      })).filter(t => t.name);

      const ptEmail = document.getElementById('al_pt_email')?.value.trim()||'';

    // ── ASSET LOCKER OTP GATE ─────────────────────────────────────────
    // OTP is session-only (window vars) — never persisted to storage
    window._lockerOtp       = null;   // 6-digit string
    window._lockerOtpExpiry = 0;      // ms timestamp
    window._lockerUnlocked  = false;  // session unlock flag

    function _lockerIsUnlocked() {
      if (!window._lockerUnlocked) return false;
      if (Date.now() > window._lockerOtpExpiry) {
        window._lockerUnlocked = false;
        return false;
      }
      return true;
    }

    function _lockLockers() {
      window._lockerUnlocked  = false;
      window._lockerOtp       = null;
      window._lockerOtpExpiry = 0;
      renderNok();
    }

    async function requestLockerOtp() {
      const u     = curUser();
      const email = u.email || db.settings?.email;
      if (!email) { toast('No email address found for your account. Please add one in Settings.', 4000); return; }

      // Generate 6-digit OTP
      const code = String(Math.floor(100000 + Math.random() * 900000));
      window._lockerOtp       = code;
      window._lockerOtpExpiry = Date.now() + 30 * 60 * 1000; // 30 min

      // Send via API
      try {
        const cfg  = db.settings || {};
        const resp = await fetch('/api/email', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + (localStorage.getItem('mxi_token')||'') },
          body: JSON.stringify({
            action:         'send-locker-otp',
            recipientEmail: email,
            fromName:       cfg.appName || 'Money IntX',
            code,
            siteUrl:        cfg.siteUrl || window.location.origin,
            appName:        cfg.appName || 'Money IntX',
            tagline:        cfg.tagline || '',
            logoData:       cfg.logoData || ''
          })
        });
        const r = await resp.json();
        if (!r.ok) { toast('Could not send code: ' + (r.error||'unknown error'), 4000); return; }
      } catch(e) {
        toast('Email error: ' + e.message, 4000); return;
      }

      // Show entry modal
      document.body.insertAdjacentHTML('beforeend', `<div class="modal-bg" id="lockerOtpBg" onclick="if(event.target===this)this.remove()">
        <div class="modal" style="max-width:380px;text-align:center;" onclick="event.stopPropagation()">
          <div style="font-size:36px;margin-bottom:12px;">📧</div>
          <div style="font-size:17px;font-weight:800;margin-bottom:6px;">Check Your Email</div>
          <div style="font-size:13px;color:var(--muted);margin-bottom:20px;line-height:1.6;">
            A 6-digit access code has been sent to <strong>${email}</strong>.<br>Enter it below to unlock your Asset Lockers.
          </div>
          <input id="lockerOtpInput" type="text" inputmode="numeric" maxlength="6"
            placeholder="000000"
            style="text-align:center;font-size:26px;letter-spacing:6px;font-family:monospace;padding:12px 10px;width:180px;margin-bottom:16px;"
            onkeydown="if(event.key==='Enter')verifyLockerOtp()">
          <div style="display:flex;flex-direction:column;gap:8px;align-items:center;">
            <button class="btn" onclick="verifyLockerOtp()" style="min-width:160px;">Unlock</button>
            <button class="bs sm" onclick="document.getElementById('lockerOtpBg').remove()">Cancel</button>
          </div>
          <div style="font-size:11px;color:var(--muted);margin-top:14px;">Code expires in 30 minutes.</div>
        </div>
      </div>`);

      setTimeout(()=>document.getElementById('lockerOtpInput')?.focus(), 100);
      toast('Access code sent to ' + email);
    }

    function verifyLockerOtp() {
      const entered = (document.getElementById('lockerOtpInput')?.value || '').trim();
      if (!window._lockerOtp) { toast('No code pending — please request a new one.'); return; }
      if (Date.now() > window._lockerOtpExpiry) {
        window._lockerOtp = null;
        toast('Your code has expired. Please request a new one.', 4000);
        document.getElementById('lockerOtpBg')?.remove();
        return;
      }
      if (entered !== window._lockerOtp) {
        toast('Incorrect code. Please try again.', 3000);
        const inp = document.getElementById('lockerOtpInput');
        if (inp) { inp.style.borderColor = 'var(--red)'; inp.value = ''; setTimeout(()=>{ inp.style.borderColor=''; inp.focus(); }, 600); }
        return;
      }
      // Correct!
      window._lockerUnlocked = true;
      window._lockerOtp      = null; // consume code immediately
      document.getElementById('lockerOtpBg')?.remove();
      toast('🔓 Asset Lockers unlocked for this session.');
      renderNok();
    }

    function editUserModal(uid) { addUserModal(uid); }

    function saveUserModal(editId) {
      const name = document.getElementById('nu_name').value.trim();
      if (!name) { document.getElementById('nu_err').textContent = 'Display name is required'; return; }
      const role = document.getElementById('nu_role').value;
      const email = document.getElementById('nu_email').value.trim();
      const phone = document.getElementById('nu_phone').value.trim();
      // Unique email check
      if (email) {
        const conflict = db.users.find(u => u.email && u.email.toLowerCase()===email.toLowerCase() && u.id!==editId);
        if (conflict) { document.getElementById('nu_err').textContent = 'This email is already in use. Log in to recover that account or use a different email.'; return; }
      }
      if (editId) {
        const u = db.users.find(x => x.id === editId);
        if (u) {
          u.displayName = name; u.role = role; u.email = email; u.phone = phone;
          const uname = document.getElementById('nu_username')?.value.trim().replace(/\s+/g,'_');
          if (uname) u.username = uname;
        }
        logAudit('edit_user', { uid: editId, name });
        toast('User updated');
      } else {
        const rawUser = document.getElementById('nu_username')?.value.trim().replace(/\s+/g,'_') || '';
      const username = rawUser || name.toLowerCase().replace(/\s+/g,'_').replace(/[^a-z0-9_]/g,'');
      const u = { id: uuid(), role, displayName: name, username, email, phone,
          address:'', photo:'', status:'active', notifPrefs:{inapp:true,email:false,sms:false}, discoverable:true, createdAt:Date.now() };
        db.users.push(u);
        logAudit('add_user', { uid: u.id, name, role });
        toast('User created');
      }
      save();
      document.getElementById('addUserBg')?.remove();
      renderUsers();
    }

    function impersonateContact(uid) {
      startImpersonate(uid, 'contact');
      toast('Entered contact test mode');

    function banUser(uid) {
      const u = db.users.find(x => x.id === uid);
      if (!u || u.id === db.settings.currentUserId) return;
      u.status = u.status === 'banned' ? 'active' : 'banned';
      save(); logAudit('ban_toggle', { uid, status: u.status }); toast('Status updated'); renderUsers();

    function viewUserRecords(uid) {
      const u = db.users.find(x => x.id === uid);
      if (!u) return;
      const contacts = db.contacts.filter(c => c.userId === uid);
      const entries  = db.entries.filter(e => e.userId === uid);
      const noks     = db.nok.filter(n => n.userId === uid);
      let html = `<div class="modal-bg" onclick="this.remove()"><div class="modal" style="max-width:640px;" onclick="event.stopPropagation()">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
          <div class="modal-title" style="margin:0;">User Records — ${esc(u.displayName)}</div>
          <button class="gh sm" onclick="this.closest('.modal-bg').remove()">✕</button>
        </div>
        <h3>Contacts (${contacts.length})</h3>
        <div class="tbl-wrap" style="margin-bottom:20px;"><table><thead><tr><th>Name</th><th>Tags</th><th>Balance</th></tr></thead><tbody>`;
      contacts.forEach(c => {
        const userEntries = entries.filter(e => e.cId === c.id && e.status !== 'voided');
        let bal = 0;
        userEntries.forEach(e => {
          if (e.txType === 'they_owe_you') bal += e.amount;
          else if (e.txType === 'they_paid_you') bal -= e.amount;
          else if (e.txType === 'you_owe_them') bal -= e.amount;
          else if (e.txType === 'you_paid_them') bal += e.amount;
        });
        html += `<tr><td>${esc(c.name)}</td><td>${(c.tags||[]).join(', ')||'—'}</td><td style="color:${bal>=0?'var(--green)':'var(--red)'};">${fmt(Math.abs(bal))} ${bal>=0?'owed to user':'user owes'}</td></tr>`;
      });
      html += `</tbody></table></div>
        <h3>Entries (${entries.length})</h3>
        <div class="tbl-wrap" style="margin-bottom:20px;"><table><thead><tr><th>Contact</th><th>Type</th><th>Amount</th><th>Date</th><th>Status</th></tr></thead><tbody>`;
      entries.slice(0, 20).forEach(e => {
        const c = db.contacts.find(x => x.id === e.cId);
        html += `<tr><td>${esc(c?.name || '—')}</td><td>${esc(TXL[e.txType] || e.txType)}</td><td>${_fmtAmtCell(e.id)}</td><td>${new Date(e.date).toLocaleDateString()}</td><td>${statusBadge(e.status, e)}</td></tr>`;
      });
      if (entries.length > 20) html += `<tr><td colspan="5" style="color:var(--muted);text-align:center;font-size:12px;">…and ${entries.length - 20} more</td></tr>`;
      html += `</tbody></table></div>`;
      // NOK section — scoped to this user only
      html += `<h3>Next of Kin / Trusted Access (${noks.length})</h3>`;
      if (noks.length === 0) {
        html += `<p style="color:var(--muted);font-size:13px;margin-bottom:20px;">No trusted contacts designated for this user.</p>`;
      } else {
        html += `<div style="display:flex;flex-direction:column;gap:8px;margin-bottom:20px;">`;
        noks.forEach(n => {
          const linked = nokLinkedContact(n);
          html += `<div style="background:var(--bg3);border-radius:8px;padding:12px 14px;border:1px solid var(--border);">
            <div style="font-weight:700;">${esc(n.fullName)} <span style="font-size:12px;color:var(--muted);font-weight:400;">${esc(n.relationship||'')}</span></div>
            <div style="font-size:12px;color:var(--muted);margin-top:4px;display:flex;gap:12px;flex-wrap:wrap;">
              ${n.email?`<span>✉ ${esc(n.email)}</span>`:''}
              ${n.phone?`<span>📞 ${esc(n.phone)}</span>`:''}
              <span>Release: ${esc(n.releaseType||'full')}</span>
              ${linked?`<span style="color:var(--green);">🔗 Linked to: ${esc(linked.name)}</span>`:'<span>No linked contact</span>'}
            </div>
          </div>`;
        });
        html += `</div>`;
      }
      html += `<button class="bs sm" style="width:100%;" onclick="this.closest('.modal-bg').remove()">Close</button></div></div>`;
      const d = document.createElement('div');
      d.innerHTML = html;
      document.body.appendChild(d.firstChild);
    }

    async function saveNewGroup() {
      const name = document.getElementById('gname').value.trim();
      const amount = parseFloat(document.getElementById('gamount').value) || 0;
      if (!name) { toast('Group name is required'); return; }
      if (amount <= 0) { toast('Amount must be greater than 0'); return; }
      const g = {
        id: 'g_' + Math.random().toString(36).substr(2, 9),
        userId: curUser().id,
        name,
        description: document.getElementById('gdesc').value.trim(),
        amount,
        currency: document.getElementById('gcurrency').value,
        frequency: document.getElementById('gfreq').value,
        members: [],
        rounds: [],
        useRotation: document.getElementById('grotation').checked,
        rotationOrder: [],
        noticeBoard: [],
        pendingInvites: [],
        archived: false,
        createdAt: Date.now()
      };
      const _invitedContacts = [];
      document.querySelectorAll('.gmember-cb:checked').forEach(cb => {
        const contact = db.contacts.find(c => c.id === cb.value);
        if (contact) {
          const mid = 'm_' + Math.random().toString(36).substr(2, 9);
          g.members.push({ id: mid, contactId: contact.id, name: contact.name, role: 'member', joinedAt: Date.now() });
          if (g.useRotation) g.rotationOrder.push(mid);
          _invitedContacts.push(contact);
        }
      });
      if (!db.groups) db.groups = [];
      db.groups.push(g);
      await saveNow();
      // Owner notification — group created
      db.notifs.push({
        id: uuid(), userId: curUser().id, cId: null, eid: null,
        type: 'group_created', msg: `Group "${g.name}" created with ${_invitedContacts.length} member(s)`,
        channel: 'in-app', sent: false, who: 'you', sentTo: [], read: false, createdAt: Date.now()
      });
      save();
      _invitedContacts.forEach(c => _sendMemberInvite(c, g.name, 'a Group Savings circle'));
      document.querySelector('.modal-bg:last-of-type')?.remove();
      toast('Group created & synced');
      renderGroups();
    }

    function addGroupRound(gid) {
      const g = (db.groups||[]).find(x => x.id === gid);
      if (!g) return;
      const roundNum = (g.rounds||[]).length + 1;
      const contributions = (g.members||[]).map(m => ({ memberId: m.id, paid: false, amount: 0, paidAt: null }));
      // If rotation is enabled, auto-pick next collector
      let collectorId = null;
      if (g.useRotation && g.rotationOrder && g.rotationOrder.length > 0) {
        const idx = ((g.rounds||[]).length) % g.rotationOrder.length;
        collectorId = g.rotationOrder[idx];
      }
      const round = { id: 'r_' + Math.random().toString(36).substr(2, 9), roundNum, collectorId, dueDate: new Date().toISOString().split('T')[0], contributions, createdAt: Date.now() };
      if (!g.rounds) g.rounds = [];
      g.rounds.push(round);
      _saveSharedItem(g, 'groups'); toast('Round ' + roundNum + ' started'); renderGroups();
    }

    function markContribution(gid, roundId, memberId) {
      const g = (db.groups||[]).find(x => x.id === gid);
      if (!g) return;
      const round = (g.rounds||[]).find(r => r.id === roundId);
      if (!round) return;
      const c = (round.contributions||[]).find(x => x.memberId === memberId);
      if (!c) return;
      c.paid = !c.paid;
      c.amount = c.paid ? g.amount : 0;
      c.paidAt = c.paid ? Date.now() : null;
      _saveSharedItem(g, 'groups');
      openGroupDetail(gid);
    }

    function addGroupMember(gid) {
      const g = (db.groups||[]).find(x => x.id === gid);
      if (!g) return;
      const u = curUser();
      const myContacts = db.contacts.filter(c => c.userId === u.id && !c.archived);
      const existing = new Set((g.members||[]).map(m => m.contactId));
      const available = myContacts.filter(c => !existing.has(c.id));
      if (available.length === 0) { toast('No more contacts to add'); return; }
      const opts = available.map(c => `<option value="${c.id}">${esc(c.name)}</option>`).join('');
      const html = `<div class="modal-bg" onclick="this.remove()"><div class="modal" style="max-width:400px;" onclick="event.stopPropagation()">
        <div class="modal-title">Add Member</div>
        <div class="fg"><label>Select Contact</label><select id="gaddmember">${opts}</select></div>
        <div style="display:flex;gap:8px;margin-top:12px;"><button class="btn sm" onclick="_doAddGroupMember('${gid}')">Add</button><button class="bs sm" onclick="this.closest('.modal-bg').remove()">Cancel</button></div>
      </div></div>`;
      document.body.insertAdjacentHTML('beforeend', html);
    }

    // ── Permission helpers for groups/investments ──────────────────
    // Roles: 'owner' (creator — full control)
    //        'admin' (everything except delete group)
    //        'member' (notice board, docs, copy invite, email invite, exit, receive reminders)
    //        'invitee' (view only — waiting for owner/admin to upgrade)
    function _getItemRole(item) {
      const u = curUser();
      if (item.userId === u.id) return 'owner';
      // Find my member record — match by name/email for shared items
      let mem = null;
      const uEmail = (u.email||'').toLowerCase();
      const uName = (u.displayName||'').toLowerCase();
      for (const m of (item.members||[])) {
        if (item._shared) {
          // Shared: match by member name or partial match
          if ((m.name||'').toLowerCase() === uName || (m.name||'').toLowerCase() === uEmail) { mem = m; break; }
        } else {
          const contact = db.contacts.find(c => c.id === m.contactId);
          if (contact && (contact.linkedUserId === u.id || (contact.email||'').toLowerCase() === uEmail)) { mem = m; break; }
        }
      }
      // For shared items: server verified membership, try fuzzy name match then default to member
      if (!mem && item._shared) {
        const firstName = uName.split(' ')[0];
        for (const m of (item.members||[])) {
          const mLow = (m.name||'').toLowerCase();
          if (firstName && (mLow.includes(firstName) || firstName.includes(mLow.split(' ')[0]))) { mem = m; break; }
        }
        if (!mem) mem = { role: 'member' }; // server verified, safe default
      }
      return mem?.role || 'invitee';
    }
    function _isItemOwner(item) { return item.userId === curUser().id; }
    function _canManageMembers(item) { const r = _getItemRole(item); return r === 'owner' || r === 'admin'; }
    function _canEdit(item) { const r = _getItemRole(item); return r === 'owner' || r === 'admin'; }
    function _canComment(item) { const r = _getItemRole(item); return r !== 'invitee'; }
    function _canUploadDocs(item) { const r = _getItemRole(item); return r !== 'invitee'; }

    // Email invite — type an email to invite someone not yet a contact
    function emailInviteToItem(itemId, itemCollection, itemType) {
      const item = (db[itemCollection]||[]).find(x => x.id === itemId);
      if (!item) return;
      const isOwner = _isItemOwner(item);
      const html = `<div class="modal-bg" onclick="this.remove()"><div class="modal" style="max-width:420px;" onclick="event.stopPropagation()">
        <div class="modal-title">Invite by Email</div>
        <div style="font-size:13px;color:var(--muted);margin-bottom:12px;">${isOwner ? 'They will be added immediately.' : 'The group owner will need to approve.'}</div>
        <div class="fg"><label>Email Address *</label><input type="email" id="einvite_email" placeholder="name@example.com"></div>
        <div class="fg"><label>Name (optional)</label><input type="text" id="einvite_name" placeholder="Their name"></div>
        <div style="display:flex;gap:8px;margin-top:12px;">
          <button class="btn sm" onclick="_doEmailInvite('${itemId}','${itemCollection}','${itemType}')">Send Invite</button>
          <button class="bs sm" onclick="this.closest('.modal-bg').remove()">Cancel</button>
        </div>
      </div></div>`;
      document.body.insertAdjacentHTML('beforeend', html);
    }

    async function _doEmailInvite(itemId, collection, itemType) {
      const item = (db[collection]||[]).find(x => x.id === itemId);
      if (!item) return;
      const email = (document.getElementById('einvite_email').value||'').trim().toLowerCase();
      const name = document.getElementById('einvite_name').value.trim() || email;
      if (!email || !email.includes('@')) { toast('Enter a valid email'); return; }
      // Check if already a member
      const existing = (item.members||[]).find(m => {
        const c = db.contacts.find(x => x.id === m.contactId);
        return c && (c.email||'').toLowerCase() === email;
      });
      if (existing) { toast('Already a member'); return; }

      const isOwner = _isItemOwner(item);
      if (isOwner) {
        // Owner: add directly — create contact if needed
        let contact = db.contacts.find(c => (c.email||'').toLowerCase() === email && c.userId === curUser().id);
        if (!contact) {
          contact = { id: uuid(), userId: curUser().id, name, email, phone: '', address: '', notes: '', tags: [],
            startToy: 0, startYot: 0, archived: false, photo: '', linkedUserId: null, createdAt: Date.now() };
          db.contacts.push(contact);
        }
        if (!item.members) item.members = [];
        item.members.push({ id: 'm_' + Math.random().toString(36).substr(2, 9), contactId: contact.id, name: contact.name, role: 'member', joinedAt: Date.now() });
        if (item.useRotation && item.rotationOrder) item.rotationOrder.push(item.members[item.members.length-1].id);
        await saveNow();
        _sendMemberInvite(contact, item.name, itemType);
        document.querySelector('.modal-bg:last-of-type')?.remove();
        toast(name + ' invited');
      } else {
        // Non-owner: add to pendingInvites for owner approval
        if (!item.pendingInvites) item.pendingInvites = [];
        item.pendingInvites.push({
          id: 'pi_' + Math.random().toString(36).substr(2, 9),
          email, name,
          requestedBy: curUser().displayName || curUser().email,
          requestedAt: Date.now()
        });
        await saveNow();
        document.querySelector('.modal-bg:last-of-type')?.remove();
        toast('Invite request sent — waiting for owner approval');
      }
      if (collection === 'groups') renderGroups();
      else renderInvestments();
    }

    // Owner approves/rejects pending invite
    async function approvePendingInvite(itemId, collection, pendingId, itemType) {
      const item = (db[collection]||[]).find(x => x.id === itemId);
      if (!item || !_isItemOwner(item)) return;
      const pi = (item.pendingInvites||[]).find(p => p.id === pendingId);
      if (!pi) return;
      // Create contact if needed and add as member
      let contact = db.contacts.find(c => (c.email||'').toLowerCase() === pi.email.toLowerCase() && c.userId === curUser().id);
      if (!contact) {
        contact = { id: uuid(), userId: curUser().id, name: pi.name, email: pi.email, phone: '', address: '', notes: '', tags: [],
          startToy: 0, startYot: 0, archived: false, photo: '', linkedUserId: null, createdAt: Date.now() };
        db.contacts.push(contact);
      }
      if (!item.members) item.members = [];
      item.members.push({ id: 'm_' + Math.random().toString(36).substr(2, 9), contactId: contact.id, name: contact.name, role: 'member', joinedAt: Date.now() });
      item.pendingInvites = (item.pendingInvites||[]).filter(p => p.id !== pendingId);
      await saveNow();
      _sendMemberInvite(contact, item.name, itemType);
      toast(pi.name + ' approved & invited');
      if (collection === 'groups') openGroupDetail(itemId);
      else openInvestmentDetail(itemId);
    }

    function rejectPendingInvite(itemId, collection, pendingId) {
      const item = (db[collection]||[]).find(x => x.id === itemId);
      if (!item || !_isItemOwner(item)) return;
      item.pendingInvites = (item.pendingInvites||[]).filter(p => p.id !== pendingId);
      saveNow(); toast('Invite rejected');
      if (collection === 'groups') openGroupDetail(itemId);
      else openInvestmentDetail(itemId);
    }

    // Change member role (owner only)
    function changeMemberRole(itemId, collection, memberId, newRole) {
      const item = (db[collection]||[]).find(x => x.id === itemId);
      if (!item || !_canManageMembers(item)) return;
      const mem = (item.members||[]).find(m => m.id === memberId);
      if (!mem) return;
      mem.role = newRole;
      _saveSharedItem(item, collection); toast('Role updated to ' + newRole);
      if (collection === 'groups') openGroupDetail(itemId);
      else openInvestmentDetail(itemId);
    }

    // Member exits group/investment
    async function exitItem(itemId, collection) {
      if (!confirm('Leave this ' + (collection === 'groups' ? 'group' : 'investment') + '?')) return;
      const u = curUser();
      const item = (db[collection]||[]).find(x => x.id === itemId);

      if (item && !item._shared) {
        // Item is in OUR blob (we're the owner or it's local) — modify directly
        item.members = (item.members||[]).filter(m => {
          const c = db.contacts.find(x => x.id === m.contactId);
          return !(c && (c.linkedUserId === u.id || (c.email||'').toLowerCase() === (u.email||'').toLowerCase()));
        });
        await saveNow();
      } else {
        // Item is in someone else's blob (_shared) — send removal request to server
        const _tok = localStorage.getItem('mxi_token');
        const _headers = { 'Content-Type': 'application/json' };
        if (_tok) _headers['Authorization'] = 'Bearer ' + _tok;
        try {
          await fetch('/api/shared-groups', {
            method: 'POST', credentials: 'include', headers: _headers,
            body: JSON.stringify({
              action: 'remove-member',
              itemId, collection,
              memberEmail: u.email
            })
          });
        } catch (e) { console.error('[exitItem]', e.message); }
      }
      // Remove from local shared cache
      if (collection === 'groups') {
        window._sharedGroups = (window._sharedGroups||[]).filter(g => g.id !== itemId);
      } else {
        window._sharedInvestments = (window._sharedInvestments||[]).filter(i => i.id !== itemId);
      }
      toast('You left');
      if (collection === 'groups') renderGroups();
      else renderInvestments();
    }

    // Generate and show shareable invite link + compose invite message
    function openInviteLink(itemId, collection) {
      const item = (db[collection]||[]).find(x => x.id === itemId);
      if (!item) return;
      const u = curUser();
      const _siteUrl = db.settings?.siteUrl || window.location.origin;

      const inviteCode = btoa(collection + ':' + itemId + ':' + u.id).replace(/=/g, '');
      const inviteUrl = _siteUrl + '?joingroup=' + encodeURIComponent(inviteCode);

      const html = `<div class="modal-bg" onclick="this.remove()"><div class="modal" style="max-width:480px;" onclick="event.stopPropagation()">
        <div class="modal-title">Invite Members</div>
        <div class="fg"><label>Share this invite link or message</label>
          <textarea id="_inviteMsg" rows="4" style="font-size:13px;" readonly>${esc(message)}</textarea>
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;">

          <button class="bs sm" onclick="navigator.clipboard.writeText('${esc(inviteUrl)}');toast('Link copied!')">🔗 Copy Link Only</button>
          ${navigator.share ? `<button class="bs sm" onclick="navigator.share({title:'Join ${esc(item.name)}',text:document.getElementById('_inviteMsg').value}).catch(()=>{})">📤 Share</button>` : ''}
          <button class="bs sm" onclick="this.closest('.modal-bg').remove()">Close</button>
