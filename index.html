<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <link rel="icon" type="image/png" sizes="256x256" href="favicon.png">
  <link rel="apple-touch-icon" href="favicon.png">
  <meta property="og:title" content="Money IntX">
  <meta property="og:description" content="Making Money Matters Memorable — Track invoices, settlements, and financial interactions.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://monney-intx.vercel.app">
  <meta property="og:image" content="https://monney-intx.vercel.app/og-image.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Money IntX">
  <meta name="twitter:description" content="Making Money Matters Memorable">
  <meta name="twitter:image" content="https://monney-intx.vercel.app/og-image.png">
  <title>Money Intx — Financial Tracking</title>
  <style>
    :root {
      --bg: #0f1117;
      --bg2: #1a1d27;
      --bg3: #222636;
      --border: #2e3348;
      --text: #e2e8f0;
      --muted: #8892a4;
      --accent: #6c63ff;
      --green: #4ade80;
      --red: #f87171;
      --yellow: #fbbf24;
      --blue: #60a5fa;
      --radius: 10px;
      --shadow: 0 2px 12px rgba(0,0,0,0.4);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 15px; line-height: 1.5;
      padding-top: env(safe-area-inset-top);
      padding-left: env(safe-area-inset-left);
      padding-right: env(safe-area-inset-right);
      padding-bottom: env(safe-area-inset-bottom); }
    #shell { display: flex; flex-direction: column; min-height: 100vh; }
    #topbar { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 0 16px; display: flex; align-items: center; gap: 12px; height: 56px; position: sticky; top: 0; z-index: 100; }
    #topbar-left { display: flex; align-items: center; gap: 12px; }
    #topbar-center { flex: 1; }
    #topbar-right { display: flex; align-items: center; gap: 8px; }
    #nav { display: flex; gap: 4px; flex-wrap: wrap; padding: 8px 16px; background: var(--bg2); border-bottom: 1px solid var(--border); }
    #main { flex: 1; padding: 20px 16px; }
    #content { max-width: 960px; margin: 0 auto; }
    .card { background: var(--bg2); border-radius: var(--radius); padding: 20px; margin-bottom: 16px; border: 1px solid var(--border); }
    .card-sm { padding: 14px; }
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .grid3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; }
    @media(max-width:640px) { .grid2,.grid3 { grid-template-columns: 1fr; } }
    .btn { background: var(--accent); color: #fff; border: none; border-radius: 8px; padding: 10px 18px; cursor: pointer; font-size: 14px; font-weight: 600; transition: opacity .15s; }
    .btn:hover { opacity: .85; }
    .btn.sm { padding: 6px 12px; font-size: 13px; }
    .bs { background: var(--bg3); color: var(--text); border: 1px solid var(--border); border-radius: 8px; padding: 10px 18px; cursor: pointer; font-size: 14px; font-weight: 500; }
    .bs.sm { padding: 6px 12px; font-size: 13px; }
    .bs.on { background: var(--accent); color: #fff; border-color: var(--accent); }
    .bd { background: var(--red); color: #fff; border: none; border-radius: 8px; padding: 10px 18px; cursor: pointer; font-size: 14px; font-weight: 600; }
    .bd.sm { padding: 6px 12px; font-size: 13px; }
    .gh { background: transparent; color: var(--text); border: none; cursor: pointer; font-size: 14px; padding: 6px 10px; border-radius: 6px; }
    .gh:hover { background: var(--bg3); }
    .clink { font-weight: 700; color: var(--accent); padding: 2px 6px; font-size: inherit; }
    input,select,textarea { background: var(--bg3); color: var(--text); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; font-size: 14px; width: 100%; outline: none; }
    input:focus,select:focus,textarea:focus { border-color: var(--accent); }
    label { font-size: 13px; color: var(--muted); margin-bottom: 4px; display: block; }
    .fg { display: flex; flex-direction: column; gap: 4px; margin-bottom: 14px; }
    .frow { display: flex; gap: 10px; align-items: flex-end; }
    @media(max-width:640px) { .frow { flex-direction: column; } }
    .err { color: var(--red); font-size: 12px; margin-top: 3px; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 700; }
    .badge-green { background: rgba(74,222,128,.15); color: var(--green); }
    .badge-red { background: rgba(248,113,113,.15); color: var(--red); }
    .badge-yellow { background: rgba(251,191,36,.15); color: var(--yellow); }
    .badge-blue { background: rgba(96,165,250,.15); color: var(--blue); }
    .badge-gray { background: var(--bg3); color: var(--muted); }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th { text-align: left; color: var(--muted); font-size: 12px; font-weight: 600; padding: 8px 10px; border-bottom: 1px solid var(--border); text-transform: uppercase; letter-spacing: .04em; }
    td { padding: 10px; border-bottom: 1px solid var(--border); vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr.voided td { opacity:.5; text-decoration:line-through; }
    tr.archived td { opacity:.6; font-style:italic; }
    .tbl-wrap { overflow-x: auto; }
    @media(max-width:640px) { .hide-mobile { display: none; } }
    .mobile-label { display: none; }
    @media(max-width:640px) { .mobile-label { display: block; } }
    /* ── Bulk selection ─────────────────────────────────────────────── */
    .sel-cb { width:16px;height:16px;cursor:pointer;accent-color:var(--accent); }
    th.sel-col, td.sel-col { width:36px;text-align:center;padding:6px 4px; }
    tr.row-selected td { background:rgba(108,99,255,.1) !important; }
    .bulk-bar { position:fixed;bottom:0;left:0;right:0;z-index:500;background:var(--bg2);border-top:2px solid var(--accent);
      padding:10px 16px;display:none;align-items:center;gap:10px;flex-wrap:wrap;box-shadow:0 -4px 20px rgba(0,0,0,.25); }
    @media(max-width:640px) { .bulk-bar { bottom:calc(56px + env(safe-area-inset-bottom));padding:8px 12px;gap:6px; } .bulk-bar button { font-size:11px;padding:5px 8px; } }
    .bulk-bar.visible { display:flex; }
    .bulk-bar .bulk-count { font-weight:700;font-size:13px;color:var(--accent);min-width:90px; }
    .bulk-bar button { font-size:12px;font-weight:600;padding:6px 12px;border-radius:7px;border:1px solid var(--border);
      background:var(--bg3);color:var(--text);cursor:pointer;white-space:nowrap; }
    .bulk-bar button:hover { background:var(--accent);color:#fff;border-color:var(--accent); }
    .bulk-bar .bulk-del { border-color:var(--red);color:var(--red); }
    .bulk-bar .bulk-del:hover { background:var(--red);color:#fff; }
    .bulk-bar .bulk-cancel { margin-left:auto; }
    /* ── Mobile modal: pin to top so keyboard doesn't push form off screen ── */
    @media(max-width:640px) {
      .modal-bg { align-items: flex-start; padding: 10px 8px; overflow-y: auto; overflow-x: hidden; }
      .modal { max-height: none; overflow-y: visible; border-radius: 12px; padding: 18px 16px; max-width: calc(100vw - 16px); box-sizing: border-box; }
      /* iOS auto-zooms viewport when input font-size < 16px — causes the form to shift sideways */
      input, select, textarea { font-size: 16px !important; touch-action: manipulation; }
    }
    /* Prevent page-level horizontal scroll from fixed dropdowns */
    html, body { overflow-x: hidden; max-width: 100vw; }
    .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
    h2 { font-size: 20px; font-weight: 700; }
    h3 { font-size: 16px; font-weight: 600; margin-bottom: 12px; }
    .toast { position: fixed; bottom: 24px; right: 24px; background: var(--bg3); border: 1px solid var(--border); color: var(--text); padding: 12px 20px; border-radius: 10px; font-size: 14px; z-index: 9999; box-shadow: var(--shadow); animation: fadeIn .2s; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }
    .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 500; display:flex; align-items:center; justify-content:center; padding:16px; }
    .modal { background: var(--bg2); border-radius: 14px; max-width: 600px; width: 100%; max-height: 90vh; overflow-y: auto; padding: 24px; border: 1px solid var(--border); position: relative; }
    .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 20px; }
    .tabs { display: flex; gap: 4px; border-bottom: 1px solid var(--border); margin-bottom: 20px; flex-wrap: nowrap; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
    .tabs::-webkit-scrollbar { display: none; }
    .tab { background: none; border: none; color: var(--muted); padding: 8px 16px; cursor: pointer; font-size: 14px; border-bottom: 2px solid transparent; margin-bottom: -1px; font-weight: 500; }
    .tab.on { color: var(--accent); border-bottom-color: var(--accent); }
    .impersonate-banner { background: #7c6800; color: var(--yellow); padding: 10px 16px; font-size: 13px; font-weight: 700; display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .section-title { font-size: 13px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 12px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
    .stat-card { background: var(--bg2); border-radius: var(--radius); padding: 18px; border: 1px solid var(--border); }
    .stat-val { font-size: 26px; font-weight: 800; margin: 4px 0; }
    .stat-lbl { font-size: 12px; color: var(--muted); font-weight: 600; text-transform: uppercase; }
    .hamburger { display: none; background: none; border: none; color: var(--text); font-size: 22px; cursor: pointer; }
    @media(max-width:640px) { .hamburger { display: block; } #nav { display: none; } #nav.open { display: flex; flex-direction: column; } }
    /* ── Mobile bottom tab bar ─────────────────────────────────────── */
    #mobile-tab-bar {
      display: none;
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 200;
      background: var(--bg2); border-top: 1px solid var(--border);
      padding-bottom: env(safe-area-inset-bottom);
    }
    #mobile-tab-bar .tab-bar-inner {
      display: flex; align-items: stretch; height: 56px;
    }
    #mobile-tab-bar button {
      flex: 1; background: none; border: none; color: var(--muted);
      font-size: 11px; font-weight: 600; cursor: pointer;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px;
      padding: 6px 2px; transition: color .15s;
    }
    #mobile-tab-bar button.active { color: var(--accent); }
    #mobile-tab-bar button .tab-icon { font-size: 20px; line-height: 1; }
    #mobile-tab-bar .tab-notif-badge {
      position: relative; display: inline-flex; align-items: center; justify-content: center;
    }
    #mobile-tab-bar .tab-notif-badge .badge-dot {
      position: absolute; top: -2px; right: -6px;
      background: #ef4444; color: #fff; font-size: 9px; font-weight: 700;
      border-radius: 99px; min-width: 15px; height: 15px; padding: 0 3px;
      display: flex; align-items: center; justify-content: center;
    }
    @media(max-width:640px) {
      #mobile-tab-bar { display: block; }
      #main { padding-bottom: calc(56px + env(safe-area-inset-bottom)); }
    }
    /* ── Notify toggle card ─────────────────────────────────────────── */
    .notify-toggle-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 13px 16px; background: var(--bg3); border: 2px solid var(--border);
      border-radius: 12px; cursor: pointer; transition: border-color .2s, background .2s;
      width: 100%; text-align: left; box-sizing: border-box;
    }
    .notify-toggle-row.on { border-color: var(--accent); background: rgba(108,99,255,.08); }
    .notify-toggle-row .ntl-left { display: flex; align-items: center; gap: 10px; font-size: 14px; font-weight: 600; color: var(--text); }
    .toggle-switch { width: 40px; height: 22px; background: var(--border); border-radius: 11px; position: relative; transition: background .2s; flex-shrink: 0; pointer-events: none; }
    .toggle-switch.on { background: var(--accent); }
    .toggle-switch::after { content: ''; position: absolute; top: 3px; left: 3px; width: 16px; height: 16px; background: #fff; border-radius: 50%; transition: transform .2s; box-shadow: 0 1px 3px rgba(0,0,0,.3); }
    .toggle-switch.on::after { transform: translateX(18px); }
    /* ── Entry type tab switcher ─────────────────────────────────────── */
    .entry-type-tabs { display: flex; gap: 6px; margin-bottom: 16px; }
    .entry-type-tab {
      flex: 1; padding: 9px 8px; border-radius: 10px; font-size: 13px; font-weight: 600;
      border: 2px solid var(--border); background: var(--bg3); color: var(--muted); cursor: pointer;
      transition: all .15s; text-align: center;
    }
    .entry-type-tab.active { border-color: var(--accent); background: rgba(108,99,255,.12); color: var(--accent); }
    /* ── Mobile "More" bottom sheet ────────────────────────────────── */
    #mobile-more-sheet {
      display: none; position: fixed; inset: 0; z-index: 9500;
    }
    #mobile-more-sheet .sheet-backdrop {
      position: absolute; inset: 0; background: rgba(0,0,0,.55);
    }
    #mobile-more-sheet .sheet-body {
      position: absolute; bottom: 0; left: 0; right: 0;
      background: var(--bg2); border-radius: 18px 18px 0 0;
      border-top: 1px solid var(--border);
      padding: 12px 0 calc(12px + env(safe-area-inset-bottom));
      animation: slideUp .22s ease;
    }
    @keyframes slideUp { from{transform:translateY(100%)} to{transform:none} }
    #mobile-more-sheet .sheet-handle {
      width: 36px; height: 4px; background: var(--border); border-radius: 2px;
      margin: 0 auto 14px;
    }
    #mobile-more-sheet .sheet-item {
      display: flex; align-items: center; gap: 14px;
      padding: 14px 24px; font-size: 15px; font-weight: 500;
      cursor: pointer; color: var(--text); background: none; border: none;
      width: 100%; text-align: left;
    }
    #mobile-more-sheet .sheet-item:hover, #mobile-more-sheet .sheet-item:active { background: var(--bg3); }
    #mobile-more-sheet .sheet-item .si-icon { font-size: 20px; width: 28px; text-align: center; }
    #mobile-more-sheet .sheet-divider { height: 1px; background: var(--border); margin: 6px 0; }
    #mobile-more-sheet .sheet-item.active { color: var(--accent); font-weight: 700; }
    /* ── Searchable contact select ─────────────────────────────────── */
    .cs-wrap { position: relative; flex: 1; }
    .cs-list { display: none; position: absolute; z-index: 9100; top: calc(100% + 4px); left: 0; right: 0;
      max-height: 220px; overflow-y: auto; background: var(--bg2); border: 1px solid var(--border);
      border-radius: 10px; box-shadow: 0 6px 24px rgba(0,0,0,.2); }
    .csopt { padding: 10px 14px; cursor: pointer; font-size: 14px; display: flex; align-items: baseline; gap: 6px; }
    .csopt:hover, .csopt:focus { background: var(--bg3); }
    .csopt .cs-sub { font-size: 11px; color: var(--muted); }
    .nav-btn { background: none; border: none; color: var(--muted); padding: 8px 12px; cursor: pointer; font-size: 14px; border-radius: 6px; font-weight: 500; white-space: nowrap; transition: background 0.15s, color 0.15s; }
    .nav-btn:hover,.nav-btn.on { background: var(--bg3); color: var(--text); }
    .nav-dropdown { box-shadow: var(--shadow); }
    .nav-dropdown-item { background: none; border: none; color: var(--text); padding: 10px 16px; cursor: pointer; font-size: 13px; text-align: left; transition: background 0.15s; }
    .nav-dropdown-item:hover { background: var(--bg3); }
    .action-menu { position: relative; display: inline-block; }
    .action-menu-btn { background: var(--bg3); border: 1px solid var(--border); color: var(--text); border-radius: 6px; padding: 4px 10px; cursor: pointer; font-size: 18px; }
    .action-dropdown { display: none; position: fixed; background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; min-width: 150px; z-index: 9000; box-shadow: var(--shadow); max-height: 70vh; overflow-y: auto; }
    .action-dropdown.open { display: block; }
    .action-dropdown button { display: block; width: 100%; text-align: left; background: none; border: none; color: var(--text); padding: 10px 16px; cursor: pointer; font-size: 13px; }
    .action-dropdown button:hover { background: var(--bg3); }
    .divider { border: none; border-top: 1px solid var(--border); margin: 16px 0; }
    .toggle { position: relative; display: inline-block; width: 44px; height: 24px; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; inset: 0; background: var(--bg3); border-radius: 24px; transition: .3s; cursor: pointer; border: 1px solid var(--border); }
    .slider:before { content: ''; position: absolute; height: 18px; width: 18px; left: 2px; bottom: 2px; background: var(--muted); border-radius: 50%; transition: .3s; }
    input:checked + .slider { background: var(--accent); border-color: var(--accent); }
    input:checked + .slider:before { transform: translateX(20px); background: #fff; }
    .trow { display: flex; gap: 12px; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--border); }
    .trow:last-child { border-bottom: none; }
    .avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--accent); color: #fff; font-weight: 800; font-size: 14px; display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .logo-preview { width: 60px; height: 60px; background: var(--bg3); border-radius: 8px; border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; overflow: hidden; }
    .logo-preview img { max-width: 100%; max-height: 100%; }
    /* ---- MOBILE QUICK ADD ---- */
    #mobile-quick-add { display: none !important; }
    @media (max-width: 640px) {
      #shell:not(.hidden) #mobile-quick-add { display: flex !important; }
      #main { padding-bottom: 80px; }
    }
    /* ---- UX POLISH ---- */
    .btn, .bs { transition: transform 0.1s, background 0.15s, border-color 0.15s; }
    .btn:active, .bs:active { transform: scale(0.97); }
    .modal-content { animation: slideUp 0.2s ease; }
    @keyframes slideUp { from { transform: translateY(12px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .toast { animation: fadeInUp 0.2s ease; }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .modal-body { gap: 14px; }
    /* ---- LANDING PAGE ---- */
    #landing { display:none; min-height:100vh; background:var(--bg); flex-direction:column; }
    #landing.active { display:flex; }
    #shell.hidden { display:none; }
    .lp-topnav { background:var(--bg2); border-bottom:1px solid var(--border); height:60px; display:flex; align-items:center; justify-content:space-between; padding:0 32px; position:sticky; top:0; z-index:200; }
    .lp-topnav-brand { display:flex; align-items:center; gap:10px; }
    .lp-topnav-brand strong { font-size:18px; font-weight:800; letter-spacing:-.02em; }
    .lp-topnav-actions { display:flex; gap:10px; }
    .lp-hero { background: linear-gradient(135deg, #1a1d27 0%, #0f1117 60%, #1c1830 100%); padding:80px 32px 64px; text-align:center; }
    .lp-hero h1 { font-size:clamp(28px,5vw,52px); font-weight:900; line-height:1.15; margin-bottom:18px; background:linear-gradient(135deg, #fff 30%, var(--accent) 100%); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
    .lp-hero p { font-size:clamp(15px,2vw,19px); color:var(--muted); max-width:600px; margin:0 auto 36px; line-height:1.7; }
    .lp-hero-btns { display:flex; gap:14px; justify-content:center; flex-wrap:wrap; }
    .lp-btn-primary { background:var(--accent); color:#fff; border:none; border-radius:10px; padding:14px 32px; font-size:16px; font-weight:700; cursor:pointer; transition:transform .15s,opacity .15s; }
    .lp-btn-primary:hover { opacity:.88; transform:translateY(-1px); }
    .lp-btn-secondary { background:transparent; color:var(--text); border:1.5px solid var(--border); border-radius:10px; padding:14px 32px; font-size:16px; font-weight:600; cursor:pointer; transition:border-color .15s,color .15s; }
    .lp-btn-secondary:hover { border-color:var(--accent); color:var(--accent); }
    .lp-section { padding:60px 32px; max-width:1000px; margin:0 auto; width:100%; }
    .lp-section-title { font-size:24px; font-weight:800; text-align:center; margin-bottom:8px; }
    .lp-section-sub { color:var(--muted); text-align:center; margin-bottom:36px; font-size:15px; }
    .lp-features-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); gap:20px; }
    .lp-feature-card { background:var(--bg2); border:1px solid var(--border); border-radius:14px; padding:24px; }
    .lp-feature-icon { font-size:28px; margin-bottom:12px; }
    .lp-feature-card h3 { font-size:16px; font-weight:700; margin-bottom:8px; }
    .lp-feature-card p { font-size:13px; color:var(--muted); line-height:1.6; }
    .lp-ad-block { background:var(--bg2); border:2px dashed var(--border); border-radius:14px; padding:40px 24px; text-align:center; display:flex; flex-direction:column; align-items:center; gap:12px; }
    .lp-ad-block .ad-icon { font-size:36px; opacity:.4; }
    .lp-ad-block .ad-title { font-size:14px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.08em; }
    .lp-ad-block .ad-sub { font-size:12px; color:var(--border); }
    .lp-ad-contact { font-size:12px; color:var(--accent); margin-top:4px; }
    .lp-ad-wide { margin:0 auto; width:100%; max-width:1000px; padding:0 32px 40px; }
    .lp-footer { background:var(--bg2); border-top:1px solid var(--border); padding:28px 32px; text-align:center; color:var(--text); font-size:13px; margin-top:auto; }
    .lp-footer strong { color:var(--accent); font-weight:800; font-size:14px; }
    /* Auth modal tweaks */
    .auth-modal { max-width:420px; }
    .auth-divider { display:flex; align-items:center; gap:12px; margin:18px 0; color:var(--muted); font-size:12px; }
    .auth-divider::before,.auth-divider::after { content:''; flex:1; height:1px; background:var(--border); }
    /* ── MOBILE WRAP & RESPONSIVE FIXES ─────────────────────────── */
    /* Text wrapping — prevent overflow on long names, emails, notes */
    td, .trow { word-break: break-word; overflow-wrap: break-word; }
    /* Tables: card-style stacking on narrow phones */
    @media(max-width:480px) {
      /* Reduce action column widths */
      th[style*="width:80px"], th[style*="width:60px"], th[style*="width:70px"] { width: 48px !important; }
      /* Tighter table cell padding */
      th, td { padding: 8px 6px; font-size: 13px; }
      /* Action dropdown: full-width bottom sheet style on narrow screens */
      .action-dropdown { min-width: 180px; max-width: calc(100vw - 24px); }
      /* Search inputs: remove min-width so they can shrink */
      input[type="search"] { min-width: 0 !important; max-width: 100% !important; }
      /* Stat cards: smaller text */
      .stat-val { font-size: 20px; }
      .stat-card { padding: 12px; }
      /* Page headers wrap properly */
      .page-header { gap: 6px; }
      .page-header h2 { font-size: 17px; }
      /* Modal max-width: never exceed viewport on any modal */
      .modal { max-width: calc(100vw - 16px) !important; }
      .modal-bg .modal, .modal-bg > div { max-width: calc(100vw - 16px) !important; }
      /* Toast: don't overflow on narrow screens */
      .toast { right: 12px; left: 12px; max-width: none; }
      /* Landing page: tighter padding */
      .lp-hero { padding: 48px 16px 40px; }
      .lp-section { padding: 40px 16px; }
      .lp-topnav { padding: 0 16px; }
      .lp-btn-primary, .lp-btn-secondary { padding: 12px 20px; font-size: 14px; }
      .lp-footer { padding: 20px 16px; }
      .lp-ad-wide { padding: 0 16px 28px; }
      .lp-feature-card { padding: 18px; }
      /* Tabs: tighter sizing */
      .tab { padding: 8px 12px; font-size: 13px; }
      .entry-type-tabs { gap: 4px; }
      .entry-type-tab { padding: 7px 6px; font-size: 12px; }
    }
    /* Pre-line text: ensure it also wraps */
    [style*="pre-line"] { word-break: break-word; overflow-wrap: break-word; }
    /* Impersonate banner wrap */
    .impersonate-banner { flex-wrap: wrap; }
    /* Tiny screens (≤380px): extra compression */
    @media(max-width:380px) {
      .notify-toggle-row { padding: 10px 12px; gap: 8px; }
      .notify-toggle-row .ntl-left { font-size: 13px; }
      .btn.sm, .bs.sm { padding: 5px 8px; font-size: 12px; }
    }
    /* ---- PRINT: isolate the invoice document ---- */
    @media print {
      body > *:not(#invoicePrintWrap) { display: none !important; }
      #invoicePrintWrap { position: static !important; background: #fff !important; z-index: auto !important; padding: 0 !important; }
      #invoicePrintWrap > * { box-shadow: none !important; background: #fff !important; }
      #invoicePrintDoc { max-width: 100% !important; margin: 0 !important; padding: 32px !important; box-shadow: none !important; border: none !important; background: #fff !important; color: #000 !important; }
      .inv-no-print { display: none !important; }
      * { background: #fff !important; color: #000 !important; }
    }
  </style>
</head>
<body>
  <!-- ===== PUBLIC LANDING PAGE ===== -->
  <div id="landing">
    <!-- populated by renderLandingPage() -->
  </div>

  <div id="shell">
    <div id="topbar">
      <div id="topbar-left">
        <button class="hamburger" onclick="toggleMobileNav()">☰</button>
        <img id="topbar-logo" src="" style="height:40px;border-radius:6px;display:none;" alt="logo">
        <strong id="appname">Money Intx</strong>
      </div>
      <div id="topbar-center"></div>
      <div id="topbar-right">
        <span id="userinfo" style="font-size:13px; color:var(--muted);">Admin</span>
      </div>
    </div>
    <div id="impersonate-banner-slot"></div>
    <nav id="nav"></nav>
    <div id="main">
      <div id="content"></div>
      <div style="text-align:center;padding:28px 16px 36px;opacity:0.28;font-size:11px;line-height:2;letter-spacing:0.01em;color:var(--text);">
        <div><em>"Write it down for clarity."</em> <span style="opacity:0.75;">— Qur'an 2:282</span></div>
        <div><em>"Write it plain."</em> <span style="opacity:0.75;">— Habakkuk 2:2</span></div>
      </div>
    </div>
    <!-- Mobile bottom tab bar -->
    <div id="mobile-tab-bar">
      <div class="tab-bar-inner" id="mobileTabBarInner"></div>
    </div>
    <!-- Mobile "More" bottom sheet -->
    <div id="mobile-more-sheet">
      <div class="sheet-backdrop" onclick="closeMobileMore()"></div>
      <div class="sheet-body" id="mobileMoreBody">
        <div class="sheet-handle"></div>
      </div>
    </div>
  </div>

  <script>
    // ============ DATA MODEL ============
    const defDB = () => ({
      users: [
        {
          id: 'admin_001',
          role: 'admin',
          displayName: 'Admin',
          username: 'admin',
          email: 'admin@moneyintx.local',
          _pw: 'admin',
          phone: '',
          address: '',
          photo: '',
          status: 'active',
          notifPrefs: { inapp: true, email: true, sms: false },
          discoverable: true,
          createdAt: Date.now()
        }
      ],
      contacts: [],
      entries: [],
      templates: [],
      recurring: [],
      notifs: [],
      nok: [],
      releases: [],
      audit: [],
      emailLog: [],
      groups: [],
      investments: [],
      settings: {
        appName: 'Money IntX',
        logoData: '',
        currency: 'USD',
        company: { name: '', address: '', email: '', phone: '', website: '', aboutText: '', contactText: '' },
        publicShow: {
          logo: true, companyName: true, address: false,
          email: true, phone: false, website: true,
          aboutText: false, contactText: false
        },
        notifDefaults: { autoSend: false, channels: ['inapp'], smsEnabled: false },
        templateDefaults: { contactRequired: true, allowedTx: [] },
        currentUserId: 'admin_001',
        sessionUserId: 'admin_001',
        impersonating: null
      }
    });

    let db = defDB();
    const PG = {};
    let _curPage = 'dash'; // tracks active page for post-save refresh
    const PER_PAGE = 20;

    // ── Email rate limiter ────────────────────────────────────────────────
    const _emailThrottle = new Map(); // key → timestamp of last send
    function _canSendEmail(key, cooldownMs = 5000) {
      const last = _emailThrottle.get(key) || 0;
      if (Date.now() - last < cooldownMs) {
        const secsLeft = Math.ceil((cooldownMs - (Date.now() - last)) / 1000);
        toast(`Please wait ${secsLeft}s before sending again`, 2000);
        return false;
      }
      _emailThrottle.set(key, Date.now());
      return true;
    }

    const ENTRY_STATUS = {
      draft: 'Draft',
      posted: 'Posted',
      sent: 'Sent',
      viewed: 'Viewed',
      accepted: 'Accepted',
      rejected: 'Rejected',
      disputed: 'Disputed',
      paid: 'Settled',
      settled: 'Settled',
      payment: 'Receipt',
      partially_settled: 'Partially Settled',
      overdue: 'Overdue',
      voided: 'Voided',
      closed: 'Closed',
      fulfilled: 'Fulfilled',
      cancelled: 'Cancelled'
    };

    const TXL = {
      they_owe_you:  'They Owe Me',
      they_paid_you: 'They Settled Me',
      you_owe_them:  'I Owe Them',
      you_paid_them: 'I Settled Them',
      invoice:       'Invoice',
      bill:          'Bill'
    };
    // Recipient-facing labels (external: email, shared page, login-accept)
    const TXL_EXT = {
      they_owe_you:  'You Owe',
      they_paid_you: 'You Have Settled',
      you_owe_them:  'You Are Owed',
      you_paid_them: 'You Have Been Settled',
      invoice:       'Invoice Due',
      bill:          'Bill Due'
    };
    // Ledger direction for each tx type
    // invoice & bill both behave like they_owe_you (you are owed money)
    const TX_LEDGER = {
      they_owe_you:  'toy', they_paid_you: 'toy_credit',
      you_owe_them:  'yot', you_paid_them: 'yot_credit',
      invoice:       'toy', bill:          'toy'
    };

    // ============ UTILITY FUNCTIONS ============
    function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

    // ── Searchable contact select helpers ───────────────────────────────────
    function buildContactSearch(contacts, selectedId, id, placeholder) {
      const ph = placeholder || 'Search contact…';
      const sel = contacts.find(c => c.id === selectedId);
      const items = contacts.map(c => {
        const safeLabel = c.name.replace(/'/g, '&#39;').replace(/"/g, '&quot;');
        const safeId    = c.id.replace(/'/g, '&#39;');
        return `<div class="csopt" data-label="${safeLabel}" data-val="${safeId}"
                  onmousedown="event.preventDefault();_csSelect('${id}','${safeId}','${safeLabel}')"
                  ontouchend="event.preventDefault();_csSelect('${id}','${safeId}','${safeLabel}')"
                >${esc(c.name)}${c.email?`<span class="cs-sub">${esc(c.email)}</span>`:''}</div>`;
      }).join('');
      return `<div class="cs-wrap">
        <input type="text" id="${id}_search" autocomplete="off" placeholder="${ph}"
          value="${sel ? esc(sel.name) : ''}" style="width:100%;box-sizing:border-box;"
          oninput="_csFilter('${id}')"
          onfocus="_csFilter('${id}')"
          onblur="_csBlur('${id}')">
        <input type="hidden" id="${id}" value="${selectedId||''}">
        <div id="${id}_list" class="cs-list">
          ${items||`<div style="padding:10px 14px;color:var(--muted);font-size:13px;">No contacts yet — click + New</div>`}
        </div>
      </div>`;
    }
    function _csFilter(id) {
      const q = (document.getElementById(id+'_search')?.value||'').toLowerCase();
      const list = document.getElementById(id+'_list');
      if (!list) return;
      list.querySelectorAll('.csopt').forEach(el => {
        el.style.display = (el.dataset.label||'').toLowerCase().includes(q) ? '' : 'none';
      });
      // Use fixed positioning so dropdown escapes overflow:auto clipping inside modals
      const input = document.getElementById(id+'_search');
      if (input) {
        const r = input.getBoundingClientRect();
        const vw = window.innerWidth;
        const vh = window.innerHeight;
        const listH = Math.min(220, vh * 0.4); // cap dropdown height
        const spaceBelow = vh - r.bottom - 4;
        const topPos = spaceBelow < listH ? Math.max(4, r.top - listH - 4) : r.bottom + 2;
        const w = Math.min(r.width, vw - 8);
        const leftPos = Math.max(4, Math.min(r.left, vw - w - 4));
        list.style.position = 'fixed';
        list.style.top      = topPos + 'px';
        list.style.left     = leftPos + 'px';
        list.style.width    = w + 'px';
        list.style.maxWidth = (vw - 8) + 'px';
        list.style.right    = 'auto';
        list.style.maxHeight = listH + 'px';
        list.style.overflowY = 'auto';
      }
      list.style.display = 'block';
    }
    function _csBlur(id) {
      setTimeout(() => {
        const list = document.getElementById(id+'_list');
        if (list) list.style.display = 'none';
        // If the search text doesn't match any selection, restore the label or clear
        const hidden = document.getElementById(id);
        const search = document.getElementById(id+'_search');
        if (hidden && search) {
          if (!hidden.value) { search.value = ''; return; }
          // Find the item with this value to restore label
          const opt = document.querySelector(`#${id}_list .csopt[data-val="${hidden.value}"]`);
          if (opt) search.value = opt.dataset.label || search.value;
        }
      }, 200);
    }
    function _csSelect(id, val, label) {
      const hidden = document.getElementById(id);
      const search = document.getElementById(id+'_search');
      const list   = document.getElementById(id+'_list');
      if (hidden) hidden.value = val;
      if (search) search.value = label;
      if (list)   list.style.display = 'none';
      // Re-evaluate notify email prompt visibility when contact changes
      // id is 'necon' (entry form) or 'rcon' (recurring form)
      const prefix = id === 'necon' ? 'ne' : id === 'rcon' ? 'r' : null;
      if (prefix) {
        const currentNwho = window['_formNwho_' + prefix] || 'them';
        _setFormNwho(prefix, currentNwho);
      }
    }
    // Add a new contact option to an existing cs-wrap dropdown
    function _csAddOption(id, val, label) {
      const list = document.getElementById(id+'_list');
      if (!list) return;
      const safeLabel = label.replace(/'/g, '&#39;').replace(/"/g, '&quot;');
      const safeId    = val.replace(/'/g, '&#39;');
      const div = document.createElement('div');
      div.className = 'csopt';
      div.dataset.label = label;
      div.dataset.val   = val;
      div.setAttribute('onmousedown', `event.preventDefault();_csSelect('${id}','${safeId}','${safeLabel}')`);
      div.textContent = label;
      // Remove "no contacts yet" placeholder if present
      const empty = list.querySelector('[data-empty]');
      if (empty) empty.remove();
      list.appendChild(div);
    }
    // ── Transaction type colour (used in tables + popups) ────────────────
    function txTypeColor(txType) {
      if (txType==='they_owe_you'||txType==='invoice'||txType==='bill') return 'var(--green)';
      if (txType==='they_paid_you'||txType==='you_paid_them') return '#2dd4bf'; // teal = settled
      if (txType==='you_owe_them') return 'var(--red)';
      return 'var(--muted)';
    }
    // ── Status badge HTML (coloured by meaning) ───────────────────────────
    function statusBadge(s, entry) {
      const isInv = entry && isInvoiceMode(entry);
      let label;
      if (isInv && s === 'posted')   label = 'Offered';
      else if (isInv && s === 'sent')     label = 'Sent';
      else if (isInv && s === 'viewed')   label = 'Viewed';
      else if (isInv && s === 'accepted') label = 'Due';
      else label = ENTRY_STATUS[safeStatus(s)] || (s ? s.charAt(0).toUpperCase() + s.slice(1) : 'Posted');
      const cls =
        (s==='settled' || s==='paid') ? 'badge-green'  :
        (s==='payment')            ? 'badge-green'  :
        (s==='fulfilled')          ? 'badge-green'  :
        (s==='accepted')           ? 'badge-green'  :
        (s==='overdue')            ? 'badge-red'    :
        (s==='disputed')           ? 'badge-red'    :
        (s==='rejected')           ? 'badge-red'    :
        (s==='partially_settled')  ? 'badge-yellow' :
        (s==='sent')               ? 'badge-blue'   :
        (s==='viewed')             ? 'badge-blue'   :
        (s==='posted')             ? 'badge-blue'   :
        (s==='draft')              ? 'badge-gray'   :
        (s==='voided')             ? 'badge-gray'   :
        (s==='cancelled')          ? 'badge-gray'   :
        (s==='closed')             ? 'badge-gray'   : 'badge-blue';
      return `<span class="badge ${cls}">${esc(label)}</span>`;
    }
    // ── Is this entry displayed in Invoice mode? ──────────────────────────
    function isInvoiceMode(e) {
      return !!(e.templateId || e.txType==='invoice' || e.txType==='bill');
    }
    // Settlement receipts (auto-generated payment entries) — should not show Confirm & Track
    function _isSettlementEntry(e) {
      if (!e) return false;
      return !!(e.linkedInvoiceId || e.settledByRecipient ||
        e.txType === 'they_paid_you' || e.txType === 'you_paid_them');
    }

    function uuid() { return 'x' + Math.random().toString(36).substr(2, 9); }
    const CURRENCIES = {
      USD: { symbol: '$', name: 'US Dollar', locale: 'en-US' },
      EUR: { symbol: '€', name: 'Euro', locale: 'de-DE' },
      GBP: { symbol: '£', name: 'British Pound', locale: 'en-GB' },
      NGN: { symbol: '₦', name: 'Nigerian Naira', locale: 'en-NG' },
      CAD: { symbol: 'CA$', name: 'Canadian Dollar', locale: 'en-CA' },
      AUD: { symbol: 'A$', name: 'Australian Dollar', locale: 'en-AU' },
      JPY: { symbol: '¥', name: 'Japanese Yen', locale: 'ja-JP' },
      CNY: { symbol: '¥', name: 'Chinese Yuan', locale: 'zh-CN' },
      INR: { symbol: '₹', name: 'Indian Rupee', locale: 'hi-IN' },
      ZAR: { symbol: 'R', name: 'South African Rand', locale: 'en-ZA' },
      GHS: { symbol: 'GH₵', name: 'Ghanaian Cedi', locale: 'en-GH' },
      KES: { symbol: 'KSh', name: 'Kenyan Shilling', locale: 'en-KE' },
      AED: { symbol: 'د.إ', name: 'UAE Dirham', locale: 'ar-AE' },
      SAR: { symbol: '﷼', name: 'Saudi Riyal', locale: 'ar-SA' },
      BRL: { symbol: 'R$', name: 'Brazilian Real', locale: 'pt-BR' },
      MXN: { symbol: 'MX$', name: 'Mexican Peso', locale: 'es-MX' },
      CHF: { symbol: 'CHF', name: 'Swiss Franc', locale: 'de-CH' },
      SEK: { symbol: 'kr', name: 'Swedish Krona', locale: 'sv-SE' },
      SGD: { symbol: 'S$', name: 'Singapore Dollar', locale: 'en-SG' },
      HKD: { symbol: 'HK$', name: 'Hong Kong Dollar', locale: 'en-HK' }
    };
    function fmt(n, currencyCode) {
      const code = currencyCode || db.settings?.currency || 'USD';
      const val = parseFloat(n || 0);
      const noDecimals = ['JPY', 'KRW', 'VND'].includes(code);
      try {
        return new Intl.NumberFormat(CURRENCIES[code]?.locale || 'en-US', {
          style: 'currency', currency: code,
          minimumFractionDigits: noDecimals ? 0 : 2,
          maximumFractionDigits: noDecimals ? 0 : 2
        }).format(val);
      } catch (_) {
        return (CURRENCIES[code]?.symbol || '$') + val.toFixed(noDecimals ? 0 : 2);
      }
    }
    function safeStatus(s) { return ENTRY_STATUS[s] ? s : 'posted'; }

    // ── Server detection ──────────────────────────────────────────────────
    // If we're running on Vercel (or any server with /api routes), use the API.
    // If we're opening the HTML file directly (file://) fall back to localStorage.
    const _IS_SERVER = location.protocol !== 'file:' && location.hostname !== '';

    // ── Debounced search helper ──────────────────────────────────────
    let _searchTimer = null;
    function debounceSearch(key, fn) {
      return function(e) {
        const val = e.target.value;
        window[key] = val;
        clearTimeout(_searchTimer);
        _searchTimer = setTimeout(fn, 300);
      };
    }

    // ── load(): pull from server, fall back to localStorage ──────────────
    let _loadCompleted = false;
    let _lastServerUpdatedAt = 0; // track server blob timestamp for change detection
    async function load(opts) {
      const _forceRefresh = opts?.force || false;
      // If already loaded in this session and not forcing, skip — prevents overwriting entries
      // created by _loadSharedWithMe. Explicit re-loads (login, signup) reset this flag.
      if (_loadCompleted && _IS_SERVER && !_forceRefresh) {
        return;
      }
      // Read localStorage first — we need it as a recovery source if server is blank
      let _localData = null;
      try { const _s = localStorage.getItem('mxi_v2'); if (_s) _localData = JSON.parse(_s); } catch(_) {}

      if (_IS_SERVER) {
        try {
          const res = await fetch('/api/data/load?_t=' + Date.now(), { credentials: 'include', cache: 'no-store' });
          if (res.ok) {
            const { data, user: srvUser, allUsers, platformSettings, updatedAt } = await res.json();
            if (updatedAt) _lastServerUpdatedAt = updatedAt;

            // Determine which data source to use
            const serverHasData = Object.keys(data).length > 0 &&
              ((data.entries?.length > 0) || (data.contacts?.length > 0) || (data.templates?.length > 0));
            // Only recover local data if it belongs to the same logged-in user.
            // Allow recovery when sessionUserId is absent (older data format).
            const localBelongsToUser = _localData && srvUser &&
              (!_localData.settings?.sessionUserId || _localData.settings?.sessionUserId === srvUser.id);
            const localHasData = localBelongsToUser &&
              ((_localData.entries?.length > 0) || (_localData.contacts?.length > 0) || (_localData.templates?.length > 0));


            if (serverHasData) {
              // Preserve isShared entries from CURRENT in-memory db before overwriting.
              // These may have been created by _loadSharedWithMe auto-confirm and not yet
              // synced to server. Read from db (live) not _localData (snapshot from load start).
              const _liveShared = (db.entries || []).filter(e => e.isShared && e.shareToken);
              db = data;
              // Merge back isShared entries that the server doesn't have yet
              if (_liveShared.length > 0) {
                if (!db.entries) db.entries = [];
                const _srvTokens = new Set(db.entries.filter(e => e.shareToken).map(e => e.shareToken));
                let _merged = 0;
                for (const e of _liveShared) {
                  if (!_srvTokens.has(e.shareToken)) { db.entries.push(e); _merged++; }
                }
                // preserved isShared entries from memory
              }
              // server data loaded
            } else if (localHasData) {
              // Server blob is empty but this device has data for this user.
              // Recover: use local data and push to server immediately (AWAITED so it doesn't get dropped).
              db = _localData;
              // recovery: local data → server
              // Show toast AFTER render cycle — queue via setTimeout
              setTimeout(() => toast('⏫ Syncing your data to cloud…', 4000), 500);
              try {
                await _syncToServer(); // AWAIT — don't fire-and-forget, ensure it completes
                // recovery sync succeeded
                setTimeout(() => toast('✅ Data synced — reload other devices', 3000), 500);
              } catch(syncErr) {
                console.error('[load] Recovery sync failed:', syncErr.message);
                setTimeout(() => toast('⚠️ Sync failed — check connection and try again', 5000), 500);
              }
            } else {
              // no usable data — defaults
              db = defDB();
            }

            // Merge server user into db.users and set session
            if (srvUser) {
              db.settings = db.settings || {};
              db.settings.sessionUserId = srvUser.id;
              // Ensure the server user exists in local users array
              if (!db.users) db.users = [];
              const existing = db.users.find(u => u.id === srvUser.id);
              if (existing) {
                existing.displayName = srvUser.displayName;
                existing.email       = srvUser.email;
                existing.role        = srvUser.role;
              } else {
                db.users.push({ id: srvUser.id, displayName: srvUser.displayName,
                  email: srvUser.email, username: srvUser.username,
                  role: srvUser.role, status: 'active',
                  notifPrefs: { inapp: true, email: true, sms: false },
                  discoverable: true, createdAt: Date.now(),
                  invoiceShow: {}, logoData: '' });
              }
            }
            // Admin: sync all server users into local db.users so admin panel is always fresh
            if (allUsers && Array.isArray(allUsers)) {
              allUsers.forEach(su => {
                const ex = db.users.find(u => u.id === su.id);
                if (ex) {
                  ex.displayName = su.displayName; ex.email = su.email;
                  ex.role = su.role; ex.status = su.status;
                } else {
                  db.users.push({ ...su, phone:'', address:'', photo:'', notifPrefs:{inapp:true,email:true,sms:false}, discoverable:true, invoiceShow:{}, logoData:'' });
                }
              });
            }
            // Non-admin: inherit admin's platform branding for emails/headers
            if (platformSettings) {
              if (platformSettings.appName)  db.settings.appName  = platformSettings.appName;
              if (platformSettings.tagline)  db.settings.tagline  = platformSettings.tagline;
              if (platformSettings.siteUrl)  db.settings.siteUrl  = platformSettings.siteUrl;
              if (platformSettings.logoData) db.settings.logoData = platformSettings.logoData;
            }
            migrate();
            // Clear any stale impersonation flag — on reload the user data is not
            // re-injected, so the admin would be stuck in a broken impersonation state.
            if (db.settings && db.settings.impersonating) {
              db.settings.impersonating = null;
            }
            // Mirror to localStorage as offline cache
            localStorage.setItem('mxi_v2', JSON.stringify(db));
            _loadCompleted = true;
            return;
          }
          // 401 = not logged in, handled by caller
          if (res.status === 401) { db = defDB(); return; }
        } catch (e) {
          // server unreachable — using localStorage cache
        }
      }
      // Fallback: localStorage
      const stored = localStorage.getItem('mxi_v2');
      if (stored) try { db = JSON.parse(stored); migrate(); } catch(e) { console.error(e); db = defDB(); }
      else db = defDB();
      if (!db.settings) db.settings = defDB().settings;
      if (!db.audit) db.audit = [];
    }

    // ── save(): write to localStorage AND push to server ─────────────────
    let _syncTimer = null;
    function save() {
      // During impersonation, skip server sync — we only have the user's data merged
      // in-memory and must not push it to the admin's server blob.
      if (_impersonatingDataUserId) { return; }
      // Keep lastActivity fresh for NOK inactivity tracking
      if (db.settings && !_impersonatingDataUserId) db.settings.lastActivity = Date.now();
      localStorage.setItem('mxi_v2', JSON.stringify(db));
      // Debounce server sync: wait 3000 ms after last change before pushing
      if (_IS_SERVER) {
        clearTimeout(_syncTimer);
        _syncTimer = setTimeout(_syncToServer, 3000);
      }
    }

    // forceSyncNow: manually triggered by user — push full db to server and confirm
    async function forceSyncNow(evt) {
      if (!_IS_SERVER) return toast('Only available in online mode.');
      const btn = evt?.target || event?.target;
      if (btn) { btn.disabled = true; btn.textContent = '⏳ Syncing…'; }
      try {
        await saveNow();
        toast('✅ Synced! Open other devices and reload the page.', 4000);
      } catch(e) {
        toast('❌ Sync failed — check your connection.', 4000);
      } finally {
        if (btn) { btn.disabled = false; btn.textContent = '⏫ Sync This Device to Cloud Now'; }
      }
    }

    // saveNow: write localStorage + push to server immediately (no debounce).
    // Use for critical operations: entry save, contact add/edit, template actions.
    async function saveNow() {
      // During impersonation, skip server sync to avoid pushing merged data to admin's blob.
      if (_impersonatingDataUserId) { return; }
      localStorage.setItem('mxi_v2', JSON.stringify(db));
      if (_IS_SERVER) {
        clearTimeout(_syncTimer); // cancel any pending debounced sync
        await _syncToServer();
      }
    }

    async function _syncToServer() {
      // Never push to server while impersonating — db contains merged user+admin data
      if (_impersonatingDataUserId) { return; }
      _freshnessPaused = true; // pause polling during save to avoid race
      try {
        const _tok = localStorage.getItem('mxi_token');
        const _headers = { 'Content-Type': 'application/json' };
        if (_tok) _headers['Authorization'] = 'Bearer ' + _tok;

        // ── Merge-before-write: fetch latest server blob and merge in any entries/contacts
        // that exist on the server but not locally. This prevents one device from
        // overwriting another device's new data (the #1 cause of "missing entries").
        try {
          const _freshRes = await fetch('/api/data/load?_t=' + Date.now(), {
            credentials: 'include', cache: 'no-store',
            headers: _tok ? { 'Authorization': 'Bearer ' + _tok } : {}
          });
          if (_freshRes.ok) {
            const _fresh = await _freshRes.json();
            if (_fresh.data && Object.keys(_fresh.data).length > 0) {
              const srvData = _fresh.data;
              // Merge server entries not present locally (by id)
              if (Array.isArray(srvData.entries)) {
                const localIds = new Set((db.entries||[]).map(e => e.id));
                const localTokens = new Set((db.entries||[]).filter(e => e.shareToken).map(e => e.shareToken));
                for (const se of srvData.entries) {
                  if (!localIds.has(se.id) && !(se.shareToken && localTokens.has(se.shareToken))) {
                    db.entries.push(se);
                  }
                }
              }
              // Merge server contacts not present locally (by id)
              if (Array.isArray(srvData.contacts)) {
                const localCids = new Set((db.contacts||[]).map(c => c.id));
                for (const sc of srvData.contacts) {
                  if (!localCids.has(sc.id)) db.contacts.push(sc);
                }
              }
              // Do NOT merge notifications — deleted notifs should stay deleted
              if (false) {
              }
              // Merge server groups/investments not present locally
              if (Array.isArray(srvData.groups)) {
                const localGids = new Set((db.groups||[]).filter(g => !g._shared).map(g => g.id));
                for (const sg of srvData.groups) {
                  if (!localGids.has(sg.id)) db.groups.push(sg);
                }
              }
              if (Array.isArray(srvData.investments)) {
                const localIids = new Set((db.investments||[]).filter(i => !i._shared).map(i => i.id));
                for (const si of srvData.investments) {
                  if (!localIids.has(si.id)) db.investments.push(si);
                }
              }
              // Update localStorage with merged data
              localStorage.setItem('mxi_v2', JSON.stringify(db));
            }
          }
        } catch(_mergeErr) {
          // Merge failed — proceed with local data (better than not saving at all)
          console.warn('[sync] merge-before-write failed:', _mergeErr.message);
        }

        // Strip shared items before syncing — they belong to other users' blobs
        const _cleanDb = { ...db };
        _cleanDb.groups = (db.groups || []).filter(g => !g._shared);
        _cleanDb.investments = (db.investments || []).filter(i => !i._shared);
        const res = await fetch('/api/data/sync', {
          method: 'POST',
          credentials: 'include',
          headers: _headers,
          body: JSON.stringify({ data: _cleanDb })
        });
        if (!res.ok) {
          const errBody = await res.json().catch(() => ({}));
          throw new Error('[sync] HTTP ' + res.status + ': ' + (errBody.error || 'unknown'));
        }
        // Update our timestamp so freshness check doesn't trigger a reload from our own save
        _lastServerUpdatedAt = Date.now();
      } finally {
        // Resume polling after a short delay to let server settle
        setTimeout(() => { _freshnessPaused = false; }, 3000);
      }
    }
    // ── Cross-device freshness polling ──────────────────────────────────
    // Checks every 15s if another device has saved newer data.
    // If the server blob is newer than what we loaded, auto-refresh.
    let _freshnessTimer = null;
    let _freshnessPaused = false; // pause during saves to avoid race
    function _startFreshnessPolling() {
      if (!_IS_SERVER || _freshnessTimer) return;
      _freshnessTimer = setInterval(_checkFreshness, 30000);
    }
    function _stopFreshnessPolling() {
      if (_freshnessTimer) { clearInterval(_freshnessTimer); _freshnessTimer = null; }
    }
    async function _checkFreshness() {
      if (_freshnessPaused || !_IS_SERVER || _impersonatingDataUserId) return;
      try {
        const _tok = localStorage.getItem('mxi_token');
        const _h = {};
        if (_tok) _h['Authorization'] = 'Bearer ' + _tok;
        const res = await fetch('/api/data/freshness?_t=' + Date.now(), {
          credentials: 'include', cache: 'no-store', headers: _h
        });
        if (!res.ok) return;
        const { updatedAt } = await res.json();
        if (updatedAt && _lastServerUpdatedAt && updatedAt > _lastServerUpdatedAt + 1000) {
          // Server blob is newer — another device saved. Reload silently.
          console.log('[freshness] Server blob newer, reloading data…');
          _lastServerUpdatedAt = updatedAt;
          await load({ force: true });
          refreshCurPage();
          // Do NOT call _loadSharedWithMe here — it triggers saves which
          // cause a feedback loop between devices. Shared records load on
          // initial renderDash only.
        }
      } catch(_) { /* network error — skip this cycle */ }
    }

    function migrate() {
      const def = defDB();
      if (!db.users) db.users = [];
      if (!db.users.find(u => u.id === 'admin_001')) db.users.push(def.users[0]);
      if (!db.contacts)  db.contacts  = [];
      if (!db.entries)   db.entries   = [];
      if (!db.templates) db.templates = [];
      if (!db.recurring) db.recurring = [];
      if (!db.notifs)    db.notifs    = [];
      if (!db.nok)       db.nok       = [];
      // Migrate existing NOK records to new schema
      (db.nok||[]).forEach(n => {
        if (!n.status)            n.status = 'unverified';
        if (!n.accessLevel)       n.accessLevel = 'view_only';
        if (!n.activationTrigger) n.activationTrigger = 'manual';
        if (!n.nokAuditLog)       n.nokAuditLog = [];
      });
      if (!db.settings.lastActivity) db.settings.lastActivity = Date.now();
      if (!db.assetLockers) db.assetLockers = [];
      if (!db.releases)  db.releases  = [];
      if (!db.audit)     db.audit     = [];
      if (!db.emailLog)  db.emailLog  = [];
      if (!db.groups)      db.groups      = [];
      if (!db.investments) db.investments = [];
      // Ensure settings and ALL nested sub-objects exist
      if (!db.settings) db.settings = def.settings;
      if (!db.settings.company)       db.settings.company       = def.settings.company;
      if (!db.settings.publicShow)    db.settings.publicShow    = def.settings.publicShow;
      if (!db.settings.notifDefaults) db.settings.notifDefaults = def.settings.notifDefaults;
      if (!db.settings.templateDefaults) db.settings.templateDefaults = def.settings.templateDefaults;
      if (db.settings.currentUserId === undefined) db.settings.currentUserId = 'admin_001';
      // sessionUserId: undefined → backward compat (treat as still logged in as admin)
      if (db.settings.sessionUserId === undefined) db.settings.sessionUserId = db.settings.currentUserId || 'admin_001';
      if (db.settings.impersonating === undefined) db.settings.impersonating = null;
      // Ensure admin user has credentials — backfill for any existing stored record
      const _adminU = db.users.find(u => u.id === 'admin_001');
      if (_adminU) {
        if (!_adminU._pw)   _adminU._pw   = 'admin';
        if (!_adminU.email) _adminU.email = 'admin@moneyintx.local';
        if (!_adminU.username) _adminU.username = 'admin';
      }
      // Ensure each user has all fields
      db.users.forEach(u => {
        if (!u.notifPrefs)   u.notifPrefs   = { inapp: true, email: false, sms: false };
        if (!u.status)       u.status       = 'active';
        if (!u.photo)        u.photo        = '';
        if (!u.username)     u.username     = (u.displayName||'user').toLowerCase().replace(/\s+/g,'_');
        if (u.discoverable === undefined) u.discoverable = true;
      });
      // Ensure each template has fields array + public DB fields
      db.templates.forEach(t => {
        if (!t.fields)          t.fields          = [];
        if (!t.txType)          t.txType          = 'invoice';
        if (!t.invoicePrefix)   t.invoicePrefix   = 'INV-';
        if (t.invoiceStartNum  === undefined) t.invoiceStartNum  = 1;
        if (t.invoiceNextNum   === undefined) t.invoiceNextNum   = t.invoiceStartNum || 1;
        if (t.isPublic         === undefined) t.isPublic         = false;
        if (!t.creatorId)       t.creatorId       = t.userId || null;
        if (!t.creatorName)     t.creatorName     = '';
        if (!t.createdAt)       t.createdAt       = Date.now();
        if (!t.copiedFrom)      t.copiedFrom      = null;
      });
      // Ensure each user has invoiceShow + logoData
      db.users.forEach(u => {
        if (!u.invoiceShow) u.invoiceShow = { displayName: false, businessName: false, email: false, phone: false, address: false, logo: true };
        if (u.logoData === undefined) u.logoData = '';
      });
      // Ensure each entry has a valid status
      db.entries.forEach(e => { if (!ENTRY_STATUS[e.status]) e.status = 'posted'; });
      // Change all settlement/receipt entries status from 'settled' to 'payment' (shows as "Receipt")
      db.entries.forEach(e => {
        if (e.status === 'settled' && (
          e.isReceipt || e.settledByRecipient || e.linkedInvoiceId ||
          (e.isShared && (e.txType === 'you_paid_them' || e.txType === 'they_paid_you'))
        )) {
          e.status = 'payment';
          if (!e.isReceipt) e.isReceipt = true;
        }
      });
      // Migration (one-time): clear stale reminderCount from entries that had it
      // auto-set by old code. Now reminderCount is ONLY set by explicit "Send Reminder".
      if (!localStorage.getItem('mxi_mig_reminder_v2')) {
        db.entries.forEach(e => {
          if (e.reminderCount) { delete e.reminderCount; delete e.lastReminderAt; delete e.lastReminderMethod; }
        });
        localStorage.setItem('mxi_mig_reminder_v2', '1');
      }
      // Retype old notification events as 'notification' if they lack a type
      db.notifs.forEach(n => { if (!n.type) n.type = 'notification'; });
      // Fix contacts whose name is an email — find a better name
      const _emailRe = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      db.contacts.forEach(c => {
        if (!c.name || !_emailRe.test(c.name)) return;
        const emailLower = (c.email || c.name).toLowerCase();
        // 1. Check db.users (allUsers for admin, own user for standard)
        const matchedUser = db.users.find(u => (u.email||'').toLowerCase() === emailLower);
        if (matchedUser && matchedUser.displayName && !_emailRe.test(matchedUser.displayName)) {
          c.name = matchedUser.displayName; return;
        }
        // 2. Check other contacts with the same email that have a real name
        const sameEmail = db.contacts.find(c2 => c2.id !== c.id
          && (c2.email||'').toLowerCase() === emailLower
          && c2.name && !_emailRe.test(c2.name));
        if (sameEmail) { c.name = sameEmail.name; return; }
        // 3. Check isShared entries fromName for this contact
        const sharedEntry = db.entries.find(e => e.isShared && e.cId === c.id && e.fromName && !_emailRe.test(e.fromName));
        if (sharedEntry) { c.name = sharedEntry.fromName; return; }
        // 4. Fallback: capitalize username part of email
        c.name = c.name.split('@')[0].replace(/[._]/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
      });
      // Merge duplicate contacts (same email, same userId) — keep the one with proper name
      const _seen = new Map();
      db.contacts = db.contacts.filter(c => {
        if (!c.email || !c.userId) return true;
        const key = c.userId + '|' + c.email.toLowerCase();
        if (_seen.has(key)) {
          const prev = _seen.get(key);
          // Keep whichever has the better (non-email) name
          if (_emailRe.test(prev.name) && !_emailRe.test(c.name)) {
            // Current is better — replace prev's entries' cId to this one
            db.entries.filter(e => e.cId === prev.id).forEach(e => { e.cId = c.id; });
            return true; // keep current, prev already filtered
          }
          // Prev is better — reassign current's entries to prev
          db.entries.filter(e => e.cId === c.id).forEach(e => { e.cId = prev.id; });
          return false; // drop current duplicate
        }
        _seen.set(key, c);
        return true;
      });
      // Mark settlement receipt entries as noLedger + isReceipt (backfill)
      db.entries.forEach(e => {
        if (e.settledByRecipient && e.linkedInvoiceId) {
          if (!e.noLedger) e.noLedger = true;
          if (!e.isReceipt) e.isReceipt = true;
        }
      });
      // Fix isShared credit entries that have unflipped txType (from old backfill bugs)
      // Also remove stale backfill "Settlement by sender" entries — auto-confirm handles these now
      db.entries = db.entries.filter(e => !(e.isReceipt && e.note === 'Settlement by sender' && !e.isShared));
      // Backfill linkedInvoiceId for settlement entries created before this feature
      // They have notes like "Settlement for INV-0001" or "Settlement for #0001"
      db.entries.forEach(e => {
        if (e.linkedInvoiceId) return; // already linked
        if (e.txType !== 'they_paid_you' && e.txType !== 'you_paid_them') return;
        if (!e.note || !e.note.startsWith('Settlement for ')) return;
        const ref = e.note.replace('Settlement for ', '').trim();
        // Try to find matching invoice by invoiceNumber or entryNum ref
        const parent = db.entries.find(p =>
          (p.invoiceNumber && p.invoiceNumber === ref) ||
          (p.entryNum && ('#'+String(p.entryNum).padStart(4,'0')) === ref)
        );
        if (parent) e.linkedInvoiceId = parent.id;
      });
      // Resync all invoice statuses from linked settlements
      // Include they_owe_you / you_owe_them so non-template entries also reflect partial settlements
      db.entries.forEach(e => {
        if (e.status !== 'voided' && (isInvoiceMode(e) || e.txType === 'they_owe_you' || e.txType === 'you_owe_them')) _syncInvoiceStatus(e.id);
      });
      // Backfill sequential entryNum on entries that predate this feature
      if (db.settings.entryCounter === undefined) {
        const sorted = [...db.entries].sort((a,b) => (a.createdAt||new Date(a.date||0).getTime()||0) - (b.createdAt||new Date(b.date||0).getTime()||0));
        let n = 0;
        sorted.forEach(e => { if (!e.entryNum) e.entryNum = ++n; });
        db.settings.entryCounter = n;
      } else {
        // Catch any entries still missing a number (e.g. imported)
        db.entries.forEach(e => {
          if (!e.entryNum) {
            db.settings.entryCounter = (db.settings.entryCounter || 0) + 1;
            e.entryNum = db.settings.entryCounter;
          }
        });
      }
    }

    }

    // Action menu: position dropdown at button coords using fixed positioning
    function toggleActionMenu(btn) {
      // Close any open dropdowns
      document.querySelectorAll('.action-dropdown.open').forEach(d => {
        if (d !== btn.nextElementSibling) d.classList.remove('open');
      });
      const dd = btn.nextElementSibling;
      if (!dd) return;
      if (dd.classList.contains('open')) { dd.classList.remove('open'); return; }

      // Measure actual dropdown height by briefly making it visible off-screen
      dd.style.visibility = 'hidden';
      dd.style.top = '-9999px';
      dd.style.left = '-9999px';
      dd.classList.add('open');
      const ddH = dd.offsetHeight || 280; // real height, fallback to 280
      dd.classList.remove('open');
      dd.style.visibility = '';

      const r = btn.getBoundingClientRect();
      const spaceBelow = window.innerHeight - r.bottom;
      // Flip upward if not enough space below; clamp so it never goes off top either
      const topPos = spaceBelow < ddH + 8
        ? Math.max(4, r.top - ddH - 4)
        : r.bottom + 4;
      const leftPos = Math.max(4, Math.min(r.right - 150, window.innerWidth - 160));
      dd.style.top = topPos + 'px';
      dd.style.left = leftPos + 'px';
      dd.classList.add('open');
    }

    // ── INVOICE SETTLEMENT HELPERS ────────────────────────────────────
    // Compute live settled/remaining from linked settlement entries
    function _getInvoiceSettlement(eid) {
      const e = db.entries.find(x => x.id === eid);
      if (!e) return { settled: 0, remaining: 0, status: 'posted' };
      const total = parseFloat(e.amount) || 0;
      // Sum all valid (non-voided) settlement entries that reference this entry
      let settled = db.entries
        .filter(s => s.linkedInvoiceId === eid && s.status !== 'voided')
        .reduce((sum, s) => sum + (parseFloat(s.amount) || 0), 0);
      // Fallback: if settled = 0 but status indicates settlement, search by note text + cId
      if (settled === 0 && (e.status === 'partially_settled' || e.status === 'settled')) {
        const docRef = e.invoiceNumber || (e.entryNum ? '#' + String(e.entryNum).padStart(4, '0') : null);
        const altSettled = db.entries
          .filter(s => s.cId === e.cId && s.status !== 'voided' &&
                       (s.txType === 'they_paid_you' || s.txType === 'you_paid_them') &&
                       !s.linkedInvoiceId && docRef && s.note && s.note.includes(docRef))
          .reduce((sum, s) => sum + (parseFloat(s.amount) || 0), 0);
        if (altSettled > 0) {
          settled = altSettled;
          // Back-fill linkedInvoiceId so future calls are direct
          db.entries.forEach(s => {
            if (s.cId === e.cId && s.status !== 'voided' &&
                (s.txType === 'they_paid_you' || s.txType === 'you_paid_them') &&
                !s.linkedInvoiceId && docRef && s.note && s.note.includes(docRef)) {
              s.linkedInvoiceId = eid;
            }
          });
        }
      }
      const remaining = Math.max(0, total - settled);
      // Compute settlement-driven status without regressing forward statuses
      const _noRegress = ['sent','viewed','accepted','rejected','disputed','fulfilled','closed'];
      const status =
        e.status === 'voided' ? 'voided' :
        remaining <= 0 && settled > 0 ? 'settled' :
        settled > 0 ? 'partially_settled' :
        _noRegress.includes(e.status) ? e.status :
        e.status === 'overdue' ? 'overdue' :
        e.status === 'draft' ? 'draft' : 'posted';
      return { settled, remaining, status, total };
    }

    // ── Amount display helpers — show Paid / Balance Remaining breakdown ──────
    // Returns an HTML string for table cells: "$500  Paid $300 · Bal $200"
    // mobileLabelHtml: optional <div class="mobile-label">...</div> injected between amount and settlement lines
    function _fmtAmtCell(eid, mobileLabelHtml) {
      const _st = _getInvoiceSettlement(eid);
      const _e = db.entries.find(x=>x.id===eid);
      const _cur = _e?.currency;
      const base = fmt(_st.total || (_e?.amount||0), _cur);
      if (_st.settled <= 0) return `<strong>${base}</strong>${mobileLabelHtml||''}`;
      const remColor = _st.remaining <= 0 ? 'var(--green)' : 'var(--amber)';
      return `<strong>${base}</strong>${mobileLabelHtml||''}`
        + `<div style="font-size:11px;color:var(--muted);margin-top:1px;">Settled&nbsp;${fmt(_st.settled, _cur)}</div>`
        + `<div style="font-size:11px;font-weight:700;color:${remColor};">Bal&nbsp;${fmt(_st.remaining, _cur)}</div>`;
    }
    // Returns plain text for modal RECORD headers and message bodies
    function _fmtAmtLine(eid) {
      const _st = _getInvoiceSettlement(eid);
      const e   = db.entries.find(x=>x.id===eid);
      const _cur = e?.currency;
      if (_st.settled <= 0) return fmt(e?.amount || 0, _cur);
      return `${fmt(_st.total, _cur)} (Settled ${fmt(_st.settled, _cur)} · Bal ${fmt(_st.remaining, _cur)})`;
    }
    // Returns the display amount (remaining if partial, original if not)
    function _displayAmt(eid) {
      const _st = _getInvoiceSettlement(eid);
      if (_st.settled > 0 && _st.remaining != null) return _st.remaining;
      return parseFloat(db.entries.find(x=>x.id===eid)?.amount||0);
    }

    // ── CSV EXPORT HELPERS ─────────────────────────────────────────────
    function _csvEscape(val) {
      const s = String(val == null ? '' : val);
      if (s.includes(',') || s.includes('"') || s.includes('\n') || s.includes('\r')) {
        return '"' + s.replace(/"/g, '""') + '"';
      }
      return s;
    }

    function _exportCSV(entries, filename) {
      const header = ['Contact','Doc #','Amount','Type','Date','Status','Notes','Settled','Remaining'];
      const rows = [header.map(_csvEscape).join(',')];
      entries.forEach(function(e) {
        const contact = db.contacts.find(c => c.id === e.cId);
        const contactName = contact ? contact.name : '';
        const docNum = e.invoiceNumber || ('#' + String(e.entryNum || 0).padStart(4, '0'));
        const amount = fmt(e.amount, e.currency);
        const type = TXL[e.txType] || e.txType || '';
        const date = e.date ? new Date(e.date).toLocaleDateString() : '';
        const status = ENTRY_STATUS[e.status] || e.status || '';
        const notes = e.note || '';
        let settled = '', remaining = '';
        if (e.linkedInvoiceId || e.txType === 'invoice' || e.txType === 'bill') {
          const st = _getInvoiceSettlement(e.id);
          if (st.settled > 0 || st.remaining > 0) {
            settled = fmt(st.settled, e.currency);
            remaining = fmt(st.remaining, e.currency);
          }
        }
        rows.push([contactName, docNum, amount, type, date, status, notes, settled, remaining].map(_csvEscape).join(','));
      });
      const csv = rows.join('\r\n');
      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename || 'export.csv';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    function _exportLedgerCSV() {
      const header = ['Contact','They Owe Me','I Owe Them','Net'];
      const rows = [header.map(_csvEscape).join(',')];
      let totalToy = 0, totalYot = 0, totalNet = 0;
      db.contacts.filter(c => !c.archived).forEach(function(c) {
        const l = getLedger(c.id);
        totalToy += l.toy;
        totalYot += l.yot;
        totalNet += l.net;
        rows.push([c.name, fmt(l.toy), fmt(l.yot), fmt(l.net)].map(_csvEscape).join(','));
      });
      rows.push(['TOTAL', fmt(totalToy), fmt(totalYot), fmt(totalNet)].map(_csvEscape).join(','));
      const csv = rows.join('\r\n');
      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'ledger-summary.csv';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    // Recompute invoice status after any linked settlement changes
    function _syncInvoiceStatus(eid) {
      const e = db.entries.find(x => x.id === eid); if (!e) return;
      // Preserve terminal/manual statuses — don't overwrite with computed value
      if (e.status === 'voided' || e.status === 'fulfilled' || e.status === 'cancelled' || e.status === 'closed') return;
      const st = _getInvoiceSettlement(eid);
      e.status = st.status;
    }

    // Push settlement status update to share_tokens snapshot (fire-and-forget)
    function _pushShareStatus(eid) {
      if (!_IS_SERVER) return;
      const e = db.entries.find(x => x.id === eid); if (!e) return;
      const st = _getInvoiceSettlement(eid);
      const tok = localStorage.getItem('mxi_token');
      if (!tok) return;
      fetch('/api/share', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + tok },
        body: JSON.stringify({
          action: 'sync-status',
          entryId: eid,
          status: e.status,
          amount: e.amount,
          settledAmt: st.settled,
          remaining:  st.remaining
        })
      }).catch(() => {}); // non-fatal
    }

    function getLedger(cid) {
      const c = db.contacts.find(x => x.id === cid);
      if (!c) return { toy: 0, yot: 0, net: 0 };
      let toy = c.startToy || 0, yot = c.startYot || 0;
      db.entries.filter(e => e.cId === cid && e.status !== 'voided' && !e.noLedger).forEach(e => {
        const a = Math.abs(parseFloat(e.amount) || 0);
        const dir = TX_LEDGER[e.txType] || '';
        if      (dir === 'toy')        toy += a;
        else if (dir === 'toy_credit') toy = Math.max(0, toy - a);
        else if (dir === 'yot')        yot += a;
        else if (dir === 'yot_credit') yot = Math.max(0, yot - a);
      });
      // Confirmed shared records (isShared:true, noLedger not set) ARE included —
      // they were confirmed by the user and count toward the contact's balance.
      return { toy, yot, net: toy - yot };
    }
